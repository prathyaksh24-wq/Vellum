  const openProfileMenu = e => {
    const r = e.currentTarget.getBoundingClientRect();
    setMenu({type: 'profile', x: r.left, y: r.top});
  };

  const timers = useRef({});
  const turnCtl = useRef({});
  useEffect(() => () => {
    Object.values(timers.current).forEach(clearTimeout);
    Object.values(turnCtl.current).forEach(c => (c.timers || []).forEach(clearTimeout));
  }, []);

  const saveConversation = conversation => {
    if (!FEATURE_FLAGS.realConversations || !conversation) return;
    API.conversations.save(conversation).catch(err => console.warn('conversation save failed', err));
  };

  const updateChat = (chatId, mapper, persist = false) => {
    setChats(cs => cs.map(c => {
      if (c.id !== chatId) return c;
      const next = mapper(c);
      if (persist) setTimeout(() => saveConversation(next), 0);
      return next;
    }));
  };

  const sourceDomain = src => {
    try { return new URL(src.url || src.link || '').hostname; }
    catch { return String(src.domain || src.provider || src.url || 'source').replace(/^https?:\/\//, '').split('/')[0] || 'source'; }
  };
  const sourceTitle = src => src.title || src.name || src.url || src.link || 'Source';
  const normalizeSources = sources => (sources || []).filter(Boolean).map(src => {
    const dom = src.domain || sourceDomain(src);
    return {
      pub: src.provider_label || src.provider || src.publisher || prettyProvider(dom) || dom.replace(/^www\./, ''),
      dom,
      url: src.url || src.link || ('https://' + dom),
      title: sourceTitle(src),
      date: src.date || src.published || src.published_at || '',
      snippet: src.snippet || src.summary || src.description || '',
      favicon_url: src.favicon_url || src.logo_url || (dom ? `https://www.google.com/s2/favicons?domain=${dom}&sz=64` : ''),
    };
  });
  const activityFromSources = (sources, fallbackSteps) => {
    if (!sources.length) return fallbackSteps || [];
    return [
      {kind:'search', title:'Searching live sources', chips:sources.slice(0,3).map(s => ({dom:s.dom, favicon_url:s.favicon_url})), more: Math.max(0, sources.length - 3)},
      {kind:'eval', title:'Evaluating sources for the answer', text:'Checking the live results and using the most relevant source details in the final response.'},
      {kind:'done', title:'Worked with live context', text:'Done'},
    ];
  };
  const activityKind = item => {
    if (!item) return 'eval';
    if (item.type === 'tool_call' || item.type === 'function_call' || item.type === 'subagent_call' || item.type === 'source' || item.type === 'tool_call_started' || item.type === 'tool_call_delta' || item.type === 'source_discovered' || item.type === 'source_reading' || item.type === 'sub_agent_started') return 'search';
    if (item.type === 'answer' || item.type === 'final_answer_started' || item.type === 'final_answer_delta' || item.status === 'completed' || item.status === 'done') return 'done';
    return 'eval';
  };
  const stepsFromActivity = (items, fallbackSteps) => {
    const visible = (items || []).filter(item => item && (item.label || item.title || item.name));
    if (!visible.length) return fallbackSteps || [];
    const steps = visible.slice(-6).map(item => ({
      id: item.id,
      type: item.type,
      name: item.name,
      status: item.status,
      source: item.source,
      kind: activityKind(item),
      title: item.label || item.title || item.name || 'Agent activity',
      text: item.detail || item.text || '',
      chips: [],
      more: 0,
    }));
    if (!steps.some(step => step.kind === 'done')) steps.push({kind:'done', title:'Worked with live activity', text:'Done'});
    return steps;
  };
  const refLinesFromSources = (sources, fallback) => {
    if (!sources.length) return fallback || [];
    const names = sources.slice(0, 3).map(s => s.dom.replace(/^www\./, '')).join(', ');
    return [
      'Browsed live sources including ' + names,
      'Reading ' + sources[0].dom.replace(/^www\./, ''),
      sources[1] ? 'Cross-checking ' + sources[1].dom.replace(/^www\./, '') : 'Checking source details',
    ];
  };
  const refLinesFromActivity = (items, fallback) => {
    const visible = (items || []).filter(item => item && (item.label || item.title || item.name));
    if (!visible.length) return fallback || [];
    return visible.slice(-3).map(item => item.label || item.title || ('Using ' + item.name));
  };
  const priorSourceContext = (text, chat) => {
    const lower = (text || '').toLowerCase();
    if (!/(source|sources|citation|citations|url|urls|link|links|where did|where'd|from where|like .*source|same format)/.test(lower)) return '';
    const prior = [...((chat && chat.messages) || [])].reverse().find(m => m.role === 'assistant' && (m.sources || []).length);
    if (!prior) return '';
    const lines = (prior.sources || []).slice(0, 12).map((s, i) => {
      const label = s.pub || s.provider_label || s.title || s.dom || s.domain || 'Source';
      const url = s.url || s.link || '';
      const snippet = s.snippet ? ' - ' + s.snippet : '';
      return '[' + (i + 1) + '] ' + label + ': ' + url + snippet;
    });
    return [
      '[Conversation source context]',
      'The user is asking about sources or source formatting from the previous assistant answer.',
      'Use these exact prior-turn source URLs and keep the same topic. Do not switch topics because of an example format.',
      ...lines,
    ].join('\n');
  };
  const attachmentContext = (attachments) => {
    const items = (attachments || []).filter(Boolean);
    if (!items.length) return '';
    const lines = items.map((a, i) => '[' + (i + 1) + '] ' + (a.name || 'attachment') + ' (' + (a.kind || kindOf(a.name || 'file')) + ', ' + (a.size || 'unknown size') + ')');
    return [
      '[Attachment context]',
      'The user attached file(s) in the Vellum UI. If image bytes are unavailable to the backend, say that visual analysis is not wired yet instead of saying no image was attached.',
      ...lines,
    ].join('\n');
  };
  const messageForBackend = (text, attachments, chat) => {
    const extra = [priorSourceContext(text, chat), attachmentContext(attachments)].filter(Boolean).join('\n\n');
    return extra ? text + '\n\n' + extra : text;
  };
  const updateTurn = (chatId, msgId, mapper, persist = false) => updateChat(chatId, c => ({
    ...c,
    messages: c.messages.map(m => m.id === msgId ? mapper(m) : m),
  }), persist);
  const updateAgentTurn = (agentId, convoId, msgId, mapper) => updateAgentConvo(agentId, convoId, cv => ({
    ...cv,
    messages: cv.messages.map(m => m.id === msgId ? mapper(m) : m),
  }));
  const clearTurnTimers = msgId => {
    const ctl = turnCtl.current[msgId];
    if (ctl) (ctl.timers || []).forEach(clearTimeout);
    if (timers.current[msgId]) {
      clearTimeout(timers.current[msgId]);
      delete timers.current[msgId];
    }
  };
  const finishTurn = msgId => {
    clearTurnTimers(msgId);
    delete turnCtl.current[msgId];
  };
  const startTurnPhases = (chatId, msgId, act) => {
    finishTurn(msgId);
    const timersForTurn = [
      setTimeout(() => updateTurn(chatId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:1}) : m), 520),
      setTimeout(() => updateTurn(chatId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:Math.min(2, (m.refLines || []).length)}) : m), 1180),
      setTimeout(() => updateTurn(chatId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:(m.refLines || act.refLines || []).length}) : m), 1880),
    ];
    turnCtl.current[msgId] = {chatId, timers: timersForTurn};
  };
  const startAgentTurnPhases = (agentId, convoId, msgId, act) => {
    finishTurn(msgId);
    const timersForTurn = [
      setTimeout(() => updateAgentTurn(agentId, convoId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:1}) : m), 520),
      setTimeout(() => updateAgentTurn(agentId, convoId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:Math.min(2, (m.refLines || []).length)}) : m), 1180),
      setTimeout(() => updateAgentTurn(agentId, convoId, msgId, m => m.streaming ? ({...m, phase:'refs', refShown:(m.refLines || act.refLines || []).length}) : m), 1880),
    ];
    turnCtl.current[msgId] = {agentId, convoId, timers: timersForTurn};
  };
  const answerNow = msgId => {
    const ctl = turnCtl.current[msgId];
    if (!ctl) return;
    clearTurnTimers(msgId);
    if (ctl.chatId) updateTurn(ctl.chatId, msgId, m => ({...m, phase:'answering', refShown:(m.refLines || []).length}));
    else updateAgentTurn(ctl.agentId, ctl.convoId, msgId, m => ({...m, phase:'answering', refShown:(m.refLines || []).length}));
    if (ctl.startAnswer) ctl.startAnswer();
  };
  const stopActiveTurn = (chatId = activeChatId) => {
    const chat = chats.find(c => c.id === chatId);
    const msg = chat && [...chat.messages].reverse().find(m => m.role === 'assistant' && m.streaming);
    if (!chat || !msg) return;
    const ctl = turnCtl.current[msg.id];
    if (ctl && ctl.controller) {
      try { ctl.controller.abort(); } catch {}
    }
    finishTurn(msg.id);
    updateTurn(chat.id, msg.id, m => ({
      ...m,
      text: m.text || 'Stopped.',
      phase: 'done',
      streaming: false,
    }), true);
  };
  const stopActiveAgentTurn = (agentId = activeAgentId) => {
    const convoId = activeConvo[agentId];
    const convo = ((agentConvos[agentId] || []).find(c => c.id === convoId));
    const msg = convo && [...convo.messages].reverse().find(m => m.role === 'assistant' && m.streaming);
    if (!convo || !msg) return;
    const ctl = turnCtl.current[msg.id];
    if (ctl && ctl.controller) {
      try { ctl.controller.abort(); } catch {}
    }
    finishTurn(msg.id);
    updateAgentTurn(agentId, convo.id, msg.id, m => ({
      ...m,
      text: m.text || 'Stopped.',
      phase: 'done',
      streaming: false,
    }));
  };

  const streamReply = (chatId, msgId, data) => {
    const payload = typeof data === 'string' ? {answer:data, ...buildActivity(data)} : data;
    startTurnPhases(chatId, msgId, payload);
    let i = 0;
    const startAnswer = () => {
      finishTurn(msgId);
      const tick = () => {
        i += 3;
        const done = i >= payload.answer.length;
        updateTurn(chatId, msgId, m => ({
          ...m,
          text: payload.answer.slice(0, i),
          phase: done ? 'done' : 'answering',
          refShown:(m.refLines || []).length,
          streaming: !done,
        }), done);
        if (!done) timers.current[msgId] = setTimeout(tick, 22);
      };
      tick();
    };
    turnCtl.current[msgId].startAnswer = startAnswer;
    turnCtl.current[msgId].timers.push(setTimeout(startAnswer, 2600));
  };

  const streamBackendReply = async (chatId, assistantId, message, threadId, attachments = [], opts = {}) => {
    const completedSpotifyTools = new Set();
    try {
      await API.chat.stream(
        {message, thread_id: threadId || chatId, model: selModel, store: true, attachments, force_web_search: !!opts.forceWebSearch},
        {
          controller: controller => {
            const ctl = turnCtl.current[assistantId] || {chatId, timers: []};
            ctl.chatId = chatId;
            ctl.controller = controller;
            turnCtl.current[assistantId] = ctl;
          },
          meta: meta => {
            if (meta.thread_id) {
              threadRef.current[chatId] = meta.thread_id;
              updateChat(chatId, c => ({...c, thread_id: meta.thread_id}));
            }
          },
          trace: trace => {
            const liveSources = normalizeSources(trace.sources || []);
            updateTurn(chatId, assistantId, m => ({
              ...m,
              sources: liveSources.length ? liveSources : m.sources,
              steps: liveSources.length ? activityFromSources(liveSources, m.steps) : stepsFromActivity(trace.steps, m.steps),
              refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : refLinesFromActivity(trace.steps, m.refLines)),
              tools: trace.tools || m.tools || [],
              phase: FEATURE_FLAGS.realChat ? m.phase : (m.phase === 'thinking' ? 'refs' : m.phase),
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, liveSources.length ? 2 : 1),
              streaming: true,
            }));
          },
          activity: (activity, tools) => {
            activity.forEach(item => {
              const key = item && (item.id || item.name);
              if (key && String(item.name || '').startsWith('spotify_') && item.status === 'completed' && !completedSpotifyTools.has(key)) {
                completedSpotifyTools.add(key);
                window.dispatchEvent(new CustomEvent('vellum:spotify-player-refresh'));
              }
            });
            updateTurn(chatId, assistantId, m => ({
              ...m,
              activity,
              tools,
              steps: stepsFromActivity(activity, m.steps),
              refLines: FEATURE_FLAGS.realChat ? [] : refLinesFromActivity(activity, m.refLines),
              phase: FEATURE_FLAGS.realChat ? m.phase : (m.phase === 'thinking' ? 'refs' : m.phase),
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, 1),
              streaming: true,
            }));
          },
          sources: sources => {
            const liveSources = normalizeSources(sources);
            updateTurn(chatId, assistantId, m => ({
              ...m,
              sources: liveSources.length ? liveSources : m.sources,
              steps: liveSources.length ? activityFromSources(liveSources, m.steps) : m.steps,
              refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : m.refLines),
              phase: FEATURE_FLAGS.realChat ? m.phase : 'refs',
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, liveSources.length ? 2 : 1),
              streaming: true,
            }));
          },
          delta: text => {
            finishTurn(assistantId);
            updateTurn(chatId, assistantId, m => ({
              ...m,
              text,
              phase: 'answering',
              refShown: FEATURE_FLAGS.realChat ? 0 : (m.refLines || []).length,
              refLines: FEATURE_FLAGS.realChat ? [] : m.refLines,
              leadIn: FEATURE_FLAGS.realChat ? '' : m.leadIn,
              streaming: true,
            }));
          },
          error: error => {
            finishTurn(assistantId);
            updateTurn(chatId, assistantId, m => ({...m, text: 'Backend error: ' + error, phase:'done', streaming: false}), true);
          },
          done: final => {
            finishTurn(assistantId);
            const liveSources = normalizeSources(final.sources || []);
            updateChat(chatId, c => ({
              ...c,
              thread_id: final.thread_id || threadRef.current[chatId] || c.thread_id || chatId,
              messages: c.messages.map(m => m.id === assistantId ? {
                ...m,
                text: final.text || m.text || 'No response.',
                sources: liveSources.length ? liveSources : m.sources || [],
                steps: liveSources.length ? activityFromSources(liveSources, m.steps) : m.steps,
                refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : m.refLines),
                tools: final.tools || m.tools || [],
                activity: final.activity || m.activity || [],
                phase: 'done',
                refShown: FEATURE_FLAGS.realChat ? 0 : (m.refLines || []).length,
                leadIn: FEATURE_FLAGS.realChat ? '' : m.leadIn,
                streaming: false,
              } : m),
            }), true);
          },
        }
      );
    } catch (err) {
      finishTurn(assistantId);
      const aborted = err && (err.name === 'AbortError' || String(err.message || '').toLowerCase().includes('abort'));
      updateTurn(chatId, assistantId, m => ({...m, text: aborted ? (m.text || 'Stopped.') : 'Backend unreachable. Start the Vellum API and try again.', phase:'done', streaming: false}), true);
    }
  };

  const sendMessage = (text, attach, opts = {}) => {
    let chatId = opts.forceNew ? null : activeChatId;
    const existingChat = chatId ? chats.find(c => c.id === chatId) : null;
    const userMsg = {id: uid(), role: 'user', text, attachments: attach};
    const reply = vellumReply(text);
    const act = activitySeedForMode(text);
    const aMsg = {id: uid(), role: 'assistant', text: '', full: reply, streaming: true, activity: [], sources: act.sources, tools: [], phase:'thinking', refShown:0, refLines:act.refLines, steps:act.steps, duration:act.duration, leadIn:act.leadIn, suppressActivity: !!act.suppressActivity};
    const backendMessage = messageForBackend(text, attach, existingChat);
    const freshAttach = (attach || []).filter(a => a.fresh);
    if (freshAttach.length) {
      setLibrary(lib => [
        ...freshAttach.map(a => ({id: uid(), name: a.name, kind: a.kind || kindOf(a.name), size: a.size, modified: 'Today'})),
        ...lib,
      ]);
    }
    if (!chatId) {
      chatId = uid();
      const title = text.length > 28 ? text.slice(0, 28).trimEnd() + '?' : text;
      const record = {id: chatId, thread_id: chatId, title, pinned: false, archived: false, projectId: opts.projectId || null, created: 'Today', appIds: [...draftApps], messages: [userMsg, aMsg]};
      setChats(cs => [record, ...cs]);
      saveConversation(record);
      setDraftApps([]);
      setActiveChatId(chatId);
      try { localStorage.setItem('vellum-active-chat-id', chatId); } catch {}
    } else {
      setChats(cs => cs.map(c => {
        if (c.id !== chatId) return c;
        const next = {...c, messages: [...c.messages, userMsg, aMsg]};
        setTimeout(() => saveConversation(next), 0);
        return next;
      }));
      try { localStorage.setItem('vellum-active-chat-id', chatId); } catch {}
    }
    if (FEATURE_FLAGS.realChat) {
      streamBackendReply(chatId, aMsg.id, backendMessage, threadRef.current[chatId], attach, opts);
    } else {
      streamReply(chatId, aMsg.id, {...act, answer: reply});
    }
  };

  const sendInProject = projId => (text, attach, opts = {}) => {
    sendMessage(text, attach, {...opts, forceNew: true, projectId: projId});
    setExpandedProj(e => ({...e, [projId]: true}));
    setView('chat');
  };

  const regenerate = (msgId) => {
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;
    const idx = chat.messages.findIndex(m => m.id === msgId);
    const prevUser = [...chat.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
    const old = chat.messages[idx];
    const reply = vellumReply(prevUser ? prevUser.text : '', old.full);
    const act = activitySeedForMode(prevUser ? prevUser.text : '');
    setChats(cs => cs.map(c => c.id === chat.id
      ? {...c, messages: c.messages.map(m => m.id === msgId ? {...m, text: '', full: reply, streaming: true, sources: act.sources, phase:'thinking', refShown:0, refLines:act.refLines, steps:act.steps, duration:act.duration, leadIn:act.leadIn, suppressActivity: !!act.suppressActivity} : m)}
      : c));
    if (FEATURE_FLAGS.realChat) {
      streamBackendReply(chat.id, msgId, messageForBackend(prevUser ? prevUser.text : '', prevUser ? prevUser.attachments : [], chat), threadRef.current[chat.id] || chat.thread_id, prevUser ? prevUser.attachments : []);
    } else {
      streamReply(chat.id, msgId, {...act, answer: reply});
    }
  };

  useEffect(() => {
    const h = e => shortcutRef.current && shortcutRef.current(e);
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  const menuChat = menu && menu.type === 'chat' ? chats.find(c => c.id === menu.id) : null;
  const menuChatProject = menuChat && menuChat.projectId ? projects.find(p => p.id === menuChat.projectId) : null;
  const activeChat = chats.find(c => c.id === activeChatId) || null;
  const activeAgent = activeAgentId ? AGENTS.find(a => a.id === activeAgentId) : null;
  const activeAgentConvo = activeAgentId && activeConvo[activeAgentId] ? (agentConvos[activeAgentId] || []).find(c => c.id === activeConvo[activeAgentId]) : null;

  const pushToast = msg => { setToast(msg); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(null), 2200); };
  const selectModel = async id => {
    setSelModel(id);
    if (!FEATURE_FLAGS.realModels) return;
    try {
      const active = await API.settings.setActiveModel(id);
      if (active && active.id) setSelModel(active.id);
    }
    catch (err) { pushToast('Model switch failed'); }
  };
  const saveProviderKey = async (provider, apiKey) => {
    const result = await API.settings.setProviderKey(provider, apiKey);
    if (Array.isArray(result.models)) {
      const liveModels = result.models.map(m => ({id: m.id, label: m.label || m.id}));
      if (liveModels.length) {
        MODELS = liveModels;
        setModels(liveModels);
      }
    }
    if (result.active && result.active.id) setSelModel(result.active.id);
    const settingsData = await API.settings.get().catch(() => null);
    if (settingsData) setBackendSettings(settingsData);
    pushToast((provider || 'Provider') + ' connected');
  };
  const copyLastCodeBlock = () => {
    let msgs = [];
    if (view === 'agent' && activeAgentId) { const cv = (agentConvos[activeAgentId] || []).find(c => c.id === activeConvo[activeAgentId]); msgs = cv ? cv.messages : []; }
    else if (activeChat) msgs = activeChat.messages || [];
    const joined = msgs.map(m => m.text || '').join('\n');
    const blocks = joined.match(/```[\s\S]*?```/g);
    if (blocks && blocks.length) {
      const code = blocks[blocks.length - 1].replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
      if (navigator.clipboard) navigator.clipboard.writeText(code);
      pushToast('Last code block copied');
    } else pushToast('No code block found');
  };
  const deleteActiveChat = () => {
    if (view === 'chat' && activeChat) { deleteChat(activeChat.id); newChat(); pushToast('Chat deleted'); }
    else if (view === 'agent' && activeAgentId && activeConvo[activeAgentId]) { const cid = activeConvo[activeAgentId]; setAgentConvos(ac => ({...ac, [activeAgentId]: (ac[activeAgentId] || []).filter(c => c.id !== cid)})); agentNewConvo(); pushToast('Conversation deleted'); }
    else pushToast('No chat to delete');
  };
  shortcutRef.current = e => {
    const mod = e.ctrlKey || e.metaKey;
    if (!mod || e.altKey) return;
    const c = e.code;
    if (e.shiftKey) {
      if (c === 'KeyO') { e.preventDefault(); newChat(); }
      else if (c === 'KeyH') { e.preventDefault(); newChat(); }
      else if (c === 'KeyS') { e.preventDefault(); setSidebarPinned(p => !p); }
      else if (c === 'KeyI') { e.preventDefault(); setCustomInstrOpen(true); }
      else if (c === 'KeyL') { e.preventDefault(); nav('library'); }
      else if (c === 'KeyG') { e.preventDefault(); nav('ledger'); }
      else if (c === 'KeyK') { e.preventDefault(); nav('skills'); }
      else if (c === 'KeyE') { e.preventDefault(); nav('memory'); }
      else if (c === 'KeyM') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'model'})); }
      else if (c === 'KeyD') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'dictation'})); }
      else if (c === 'Semicolon') { e.preventDefault(); copyLastCodeBlock(); }
      else if (c === 'Backspace') { e.preventDefault(); deleteActiveChat(); }
      return;
    }
    if (c === 'Comma') { e.preventDefault(); setSettingsOpen(true); }
    else if (c === 'KeyK') { e.preventDefault(); setSearchOpen(true); }
    else if (c === 'KeyU') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'addfiles'})); }
    else if (c === 'Slash') { e.preventDefault(); setShortcutsOpen(s => !s); }
    else if (c === 'Period') { e.preventDefault(); setDevMode(d => !d); pushToast(devMode ? 'Dev mode off' : 'Dev mode on'); }
    else if (c === 'BracketLeft') { e.preventDefault(); if (canBack) navGo(-1); }
    else if (c === 'BracketRight') { e.preventDefault(); if (canFwd) navGo(1); }
  };

  // per-chat app selection ? landing/new-chat and project composers draw on a draft pool
  const selTargetIsChat = view === 'chat' && !!activeChat;
  const currentSel = selTargetIsChat ? (activeChat.appIds || []) : draftApps;
  const toggleSel = id => {
    if (selTargetIsChat) {
      setChats(cs => cs.map(c => {
        if (c.id !== activeChat.id) return c;
        const cur = c.appIds || [];
        return {...c, appIds: cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id]};
      }));
    } else {
      setDraftApps(cur => cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id]);
    }
  };
  const connectApp = id => {
    setApps(as => as.map(a => a.id === id ? {...a, state: 'ready'} : a));
    if (!currentSel.includes(id)) toggleSel(id);
  };
  const disconnectApp = id => {
    if (currentSel.includes(id)) toggleSel(id);
  };
  const activeChatProject = activeChat && activeChat.projectId ? projects.find(p => p.id === activeChat.projectId) : null;
  const activeProject = projects.find(p => p.id === activeProjectId) || null;
  const dockSide = dockPosition === 'auto' ? (['library','ledger','apps','kg','skills','memory','archive'].includes(view) ? 'right' : 'top') : dockPosition;

  return (
    <div className="stage" onMouseMove={e => { const r = e.currentTarget.getBoundingClientRect(); e.currentTarget.style.setProperty('--mx', (e.clientX - r.left) + 'px'); e.currentTarget.style.setProperty('--my', (e.clientY - r.top) + 'px'); }}>
      <SharedLayoutBg/>
      <div className="bg-orb orb1"></div>
      <div className="bg-orb orb2"></div>
      <div className="bg-orb orb3"></div>
      <div className="cursor-glow"></div>
      <div className="win">
        <AppBackground backgroundId={backgroundId}/>
        <div className="body">
          {sidebarPinned && <Sidebar chats={chats} projects={projects} activeChatId={activeChatId} view={view}
                renamingId={renamingId} projRenamingId={projRenamingId} profile={profile}
                secOpen={secOpen} expandedProj={expandedProj} onToggleSec={toggleSec} onToggleProj={toggleProj}
                onTogglePin={() => setSidebarPinned(p => !p)} pinned={sidebarPinned} onNewChat={newChat} onSearch={() => setSearchOpen(true)}
                onNav={nav} onOpenChat={openChat} onOpenAgent={openAgent} activeAgentId={activeAgentId}
                onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
                onRename={renameChat} onProfile={openProfileMenu}
                onNewProject={newProject}
                onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}
                onProjectRename={renameProject} onOpenProject={openProject}/>}

          {!sidebarPinned && <Rail view={view} profile={profile} chats={chats} projects={projects} menuOpen={!!menu}
            onExpand={() => setSidebarPinned(true)} onNewChat={newChat} onSearch={() => setSearchOpen(true)}
            onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY, preferLeft: true})}
            onNav={nav} onProfile={openProfileMenu} onOpenChat={openChat} activeAgentId={activeAgentId} onOpenAgent={openAgent}
            onNewProject={newProject} onOpenProject={openProject}
            onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}/>}

          <div className="main">
            {view === 'chat' && <ChatView chat={activeChat} project={activeChatProject} model={selModel} setModel={selectModel} models={models} onSend={sendMessage} onStop={() => stopActiveTurn(activeChatId)} onRegen={regenerate}
              onViewImage={setViewer}
              filesOpen={filesOpen} onCloseFiles={() => setFilesOpen(false)}
              onOpenActivity={setActivityMsg}
              onAnswerNow={answerNow}
              activity={activityMsg}
              onCloseActivity={() => setActivityMsg(null)}
              onHeadMenu={e => setMenu({type: 'chathead', x: e.clientX, y: e.clientY})}
              composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: currentSel, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
            {view === 'library' && <LibraryView library={library} setLibrary={setLibrary}/>}
            {view === 'projects' && <ProjectsView projects={projects} chats={chats} onNewProject={newProject} onOpenProject={openProject}/>}
            {view === 'project' && activeProject && <ProjectPage project={activeProject} chats={chats}
              model={selModel} setModel={selectModel} models={models}
              onSend={sendInProject(activeProject.id)} onOpenChat={openChat}
              onAddSource={f => addSource(activeProject.id, f)}
              onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
              onViewImage={setViewer}
              composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: currentSel, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
            {view === 'project' && !activeProject && <div className="placeholder">project not found</div>}
            {view === 'ledger' && <LedgerView/>}
            {view === 'skills' && <SkillsHubView/>}
            {view === 'apps' && <BackendConnectorsView apps={apps}/>}
            {view === 'memory' && <MemoryConsole page onBack={() => newChat()} onDreamComplete={refreshMemoryData}/>}
            {view === 'kg' && <KnowledgeGraphView onBack={() => newChat()}/>}
            {view === 'archive' && <ArchiveView chats={chats} onRestore={restoreChat} onDelete={deleteChat}/>}
            {view === 'agent' && activeAgentId && <AgentView agent={activeAgent} convos={agentConvos[activeAgentId] || []} activeConvoId={activeConvo[activeAgentId] || null} enabled={!agentCfg[activeAgentId] || agentCfg[activeAgentId].enabled} onToggleEnabled={() => setAgentCfg(m => ({...m, [activeAgentId]: {...m[activeAgentId], enabled: !(m[activeAgentId] && m[activeAgentId].enabled)}}))} onNewConvo={agentNewConvo} onOpenConvo={openAgentConvo} model={selModel} setModel={selectModel} models={models} onSend={sendToAgent} onStop={() => stopActiveAgentTurn(activeAgentId)} onRegen={regenAgent} onViewImage={setViewer} onSettings={() => setAgentSettingsOpen(true)} onAnswerNow={answerNow} onOpenActivity={setActivityMsg} activity={activityMsg} onCloseActivity={() => setActivityMsg(null)} xConnected={xConn.connected} xHandle={xConn.handle} onConnectX={() => setXConnectOpen(true)} onDisconnectX={() => { setXConn({connected:false, handle:''}); pushToast('X account disconnected'); }} ytConnected={ytConn.connected} ytHandle={ytConn.handle} onConnectYT={() => setYtConnectOpen(true)} onDisconnectYT={() => { setYtConn({connected:false, handle:''}); pushToast('YouTube account disconnected'); }} composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: draftApps, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
          </div>
        </div>
        <GlobalDock side={dockSide} locked={dockLocked} onLockedChange={setDockLocked} view={view} activeAgentId={activeAgentId} settingsOpen={settingsOpen}
          onNewChat={newChat} onSearch={() => setSearchOpen(true)} onNav={nav} onOpenAgent={openAgent}
          onSettings={() => { setSettingsTab('General'); setSettingsOpen(true); }}/>
        <SpotifyPlayer spotify={spotify} dockSide={dockSide} onReconnect={() => setSpotifyConnectOpen(true)}/>
        {menuChat && <ChatMenu chat={menuChat} projectName={menuChatProject ? menuChatProject.name : null} pos={menu} onAction={a => chatMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {menu && menu.type === 'chathead' && activeChat && <ChatHeadMenu chat={activeChat} projects={projects} pos={menu}
          onAction={a => {
            if (a === 'files') { setMenu(null); setFilesOpen(true); return; }
            chatMenuAction(activeChat.id, a);
          }}
          onMove={projId => moveToProject(activeChat.id, projId)}
          onNewProject={() => { pendingMoveRef.current = activeChat.id; setMenu(null); setCreateOpen(true); }}
          onClose={() => setMenu(null)}/>}
        {createOpen && <CreateProjectModal onCreate={createProject} onClose={() => setCreateOpen(false)}/>}
        {agentSettingsOpen && activeAgentId && <AgentSettingsModal agent={AGENTS.find(a => a.id === activeAgentId)} cfg={agentCfg[activeAgentId]} onClose={() => setAgentSettingsOpen(false)} onSave={c => { setAgentCfg(m => ({...m, [activeAgentId]: c})); setAgentSettingsOpen(false); }}/>}
        {menu && menu.type === 'project' && <ProjectMenu pos={menu} onAction={a => projectMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {searchOpen && <SearchOverlay chats={chats}
          onNewChat={() => { setSearchOpen(false); newChat(); }}
          onOpenChat={id => { setSearchOpen(false); openChat(id); }}
          onClose={() => setSearchOpen(false)}/>}
        {menu && menu.type === 'profile' && <ProfilePopover profile={profile} pos={menu}
          onEditProfile={() => { setMenu(null); setEditProfileOpen(true); }}
          onSettings={() => { setMenu(null); setSettingsTab('General'); setSettingsOpen(true); }}
          onPersonalization={() => { setMenu(null); setSettingsTab('Personalization'); setSettingsOpen(true); }}
          onAddAccount={() => { setMenu(null); pushToast('Add account \u2014 not in this preview'); }}
          onClose={() => setMenu(null)}/>}
        {settingsOpen && <SettingsModal theme={theme} initialTab={settingsTab} onTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')} dockPosition={dockPosition} onDockPosition={setDockPosition} dockLocked={dockLocked} onDockLocked={setDockLocked} model={selModel} models={models} onModel={selectModel} onProviderKey={saveProviderKey} backendSettings={backendSettings} apps={apps} automations={automations} memoryData={memoryData} spotify={spotify} onSpotifyConnect={() => setSpotifyConnectOpen(true)} onSpotifyDisconnect={disconnectSpotify}
          feeds={feeds} onToggleFeed={id => setFeeds(fs => fs.map(f => f.id === id ? {...f, on: !f.on} : f))}
          cu={cuEnabled} onCu={setCuEnabled}
          onMemoryChanged={refreshMemoryData}
          onClose={() => setSettingsOpen(false)}/>} 
        {spotifyConnectOpen && <SpotifyConnectModal onClose={() => setSpotifyConnectOpen(false)} onConnected={status => { setSpotify(status); setSpotifyConnectOpen(false); pushToast('Spotify connected'); }}/>}
        {viewer && <div className="lightbox" onClick={() => setViewer(null)}><img src={viewer} alt="attachment"/></div>}
        {editProfileOpen && <EditProfileModal profile={profile}
          onSave={p => { setProfile(pr => ({...pr, ...p})); setEditProfileOpen(false); }}
          onClose={() => setEditProfileOpen(false)}/>}
        {shortcutsOpen && <ShortcutsModal onClose={() => setShortcutsOpen(false)}/>}
        {customInstrOpen && <CustomInstructionsModal value={customInstr} onSave={v => { setCustomInstr(v); setCustomInstrOpen(false); pushToast('Custom instructions saved'); }} onClose={() => setCustomInstrOpen(false)}/>}
        {xConnectOpen && <XConnectModal onClose={() => setXConnectOpen(false)} onConnected={(h) => { setXConn({connected:true, handle:h}); setXConnectOpen(false); pushToast('X account connected'); }}/>}
        {ytConnectOpen && <YouTubeConnectModal onClose={() => setYtConnectOpen(false)} onConnected={(h) => { setYtConn({connected:true, handle:h}); setYtConnectOpen(false); pushToast('YouTube account connected'); }}/>}
        {toast && <div className="toast">{toast}</div>}
      </div>
    </div>
  );
};

const SHORTCUTS = {
  App: [
    ['Go to Home', ['Ctrl', 'Shift', 'H']],
    ['Open new chat', ['Ctrl', 'Shift', 'O']],
    ['Show shortcuts', ['Ctrl', '/']],
    ['Search chats', ['Ctrl', 'K']],
    ['Open settings', ['Ctrl', ',']],
    ['Go to Library', ['Ctrl', 'Shift', 'L']],
    ['Go to Ledger', ['Ctrl', 'Shift', 'G']],
    ['Go to Skills', ['Ctrl', 'Shift', 'K']],
    ['Go to Memory', ['Ctrl', 'Shift', 'E']],
    ['Toggle dev mode', ['Ctrl', '.']],
    ['Toggle sidebar', ['Ctrl', 'Shift', 'S']],
    ['Set custom instructions', ['Ctrl', 'Shift', 'I']],
    ['Copy last code block', ['Ctrl', 'Shift', ';']],
    ['Delete chat', ['Ctrl', 'Shift', '\u232B']],
  ],
  Composer: [
    ['Send message or stop answering', ['\u21B5']],
    ['Select model', ['Ctrl', 'Shift', 'M']],
    ['Toggle dictation', ['Ctrl', 'Shift', 'D']],
    ['Voice mode', ['Ctrl', 'Shift', 'V']],
    ['Add photos & files', ['Ctrl', 'U']],
  ],
};
const ShortcutsModal = ({onClose}) => (
  <React.Fragment>
    <div className="backdrop dim" onClick={onClose}/>
    <div className="modal sc-modal">
      <button className="set-close" title="Close (Esc)" onClick={onClose}><I d="M6 6l12 12M18 6L6 18" size={16}/></button>
      <div className="m-title" style={{marginBottom: 16}}>Keyboard shortcuts</div>
      {Object.keys(SHORTCUTS).map(grp => (
        <div key={grp} className="sc-group">
          <div className="sc-grp-h">{grp}</div>
          {SHORTCUTS[grp].map((row, i) => (
            <div key={i} className="sc-row">
              <span className="sc-label">{row[0]}</span>
              <span className="sc-keys">{row[1].map((k, j) => <kbd key={j} className="kbd">{k}</kbd>)}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  </React.Fragment>
);
const CustomInstructionsModal = ({value, onSave, onClose}) => {
  const [v, setV] = useState(value);
  return (
    <React.Fragment>
      <div className="backdrop dim" onClick={onClose}/>
      <div className="modal" style={{width: 480}}>
        <button className="set-close" title="Close (Esc)" onClick={onClose}><I d="M6 6l12 12M18 6L6 18" size={16}/></button>
        <div className="m-title" style={{marginBottom: 6}}>Custom instructions</div>
        <div className="agent-bar-tag" style={{marginBottom: 14}}>What should Vellum know about you, and how would you like it to respond?</div>
        <textarea className="agent-ta" rows={5} placeholder="e.g. Be concise. Skip the preamble. I work in product design." value={v} onChange={e => setV(e.target.value)} autoFocus/>
        <div className="m-actions" style={{marginTop: 14}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={() => onSave(v)}>Save</button>
        </div>
      </div>
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
