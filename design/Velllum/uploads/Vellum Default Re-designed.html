const Composer = ({text, setText, model, setModel, models = MODELS, onSend, busy, ph, drop = 'up', library, projects, onOpenLibrary, onOpenProject, onViewImage, apps, appSel = [], onToggleSel, onConnectApp, onOpenAgent}) => {
  const [attach, setAttach] = useState([]);
  const [modelOpen, setModelOpen] = useState(false);
  const [mic, setMic] = useState(false);
  const [voiceState, setVoiceState] = useState('idle'); // idle | connecting | listening
  const voiceRef = useRef({timers: []});
  const VOICE_SCRIPT = 'Hello, how are you doing today? Can you help me set up a project for next week?';
  const endVoice = () => { voiceRef.current.timers.forEach(clearTimeout); voiceRef.current.timers = []; setVoiceState('idle'); };
  const startVoice = () => {
    if (voiceState !== 'idle') { endVoice(); return; }
    setText('');
    setVoiceState('connecting');
    const t1 = setTimeout(() => {
      setVoiceState('listening');
      const words = VOICE_SCRIPT.split(' ');
      let acc = '';
      words.forEach((w, i) => {
        const t = setTimeout(() => { acc = acc ? acc + ' ' + w : w; setText(acc); if (taRef.current) taRef.current.focus(); }, 900 + i * 230);
        voiceRef.current.timers.push(t);
      });
    }, 1700);
    voiceRef.current.timers.push(t1);
  };
  useEffect(() => () => { voiceRef.current.timers.forEach(clearTimeout); }, []);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'V' || e.key === 'v')) { e.preventDefault(); startVoice(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [voiceState]);
  const [searchMode, setSearchMode] = useState(false);
  const [searchScope, setSearchScope] = useState('Instant');
  const [scopeOpen, setScopeOpen] = useState(false);
  const [slashIdx, setSlashIdx] = useState(0);
  const [plusOpen, setPlusOpen] = useState(false);
  const [appsOpen, setAppsOpen] = useState(false);
  const [libOpen, setLibOpen] = useState(false);
  const [pickOpen, setPickOpen] = useState(false);
  const [ghOpen, setGhOpen] = useState(false);
  const [slashDismissed, setSlashDismissed] = useState(false);
  const [phIdx, setPhIdx] = useState(0);
  const fileRef = useRef(null);
  const taRef = useRef(null);
  const cpillRef = useRef(null);
  const [glow, setGlow] = useState(false);
  useEffect(() => {
    if (!glow) return;
    let raf, ang = 0, last = performance.now();
    const loop = (now) => { ang = (ang + (now - last) * 0.13) % 360; last = now; if (cpillRef.current) cpillRef.current.style.setProperty('--a', ang.toFixed(1) + 'deg'); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [glow]);
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') { setPlusOpen(false); setAppsOpen(false); setModelOpen(false); setLibOpen(false); setPickOpen(false); setGhOpen(false); setSlashDismissed(true); } };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  useEffect(() => {
    const onCmd = e => {
      if (e.detail === 'model') setModelOpen(true);
      else if (e.detail === 'addfiles') { if (fileRef.current) fileRef.current.click(); }
      else if (e.detail === 'dictation') setMic(m => !m);
    };
    window.addEventListener('vellum-composer', onCmd);
    return () => window.removeEventListener('vellum-composer', onCmd);
  }, []);
  const slashMatch = text.match(/(?:^|\s)\/(\S*)$/);
  const hasSlash = !!slashMatch;
  const prevSlash = useRef(false);
  useEffect(() => {
    if (!hasSlash || !prevSlash.current) setSlashDismissed(false);
    prevSlash.current = hasSlash;
  }, [text]);
  const slashOpen = hasSlash && !slashDismissed;
  const slashQ = hasSlash ? slashMatch[1].toLowerCase() : '';
  const stripSlash = () => setText(t => t.replace(/\/\S*$/, ''));
  const slashHits = SLASH_ITEMS.filter(it => it.label.toLowerCase().includes(slashQ));
  const slashApps = (apps || []).filter(a => a.name.toLowerCase().includes(slashQ));
  const slashAgents = AGENTS.filter(a => a.name.toLowerCase().includes(slashQ));
  const slashProj = (!slashQ || 'projects'.includes(slashQ)) && (projects || []).length > 0;
  const slashFlat = [...slashHits.map(it => ({type: 'slash', it})), ...slashAgents.map(a => ({type: 'agent', a})), ...slashApps.map(a => ({type: 'app', a})), ...(slashProj ? [{type: 'proj'}] : [])];
  const enableSearch = () => { setSearchMode(true); setText(''); setSlashDismissed(true); };
  const runSlash = i => {
    const r = slashFlat[i]; if (!r) return;
    if (r.type === 'slash') { if (r.it.run === 'file') { stripSlash(); fileRef.current.click(); } else if (r.it.run === 'web') { enableSearch(); } else { setSlashDismissed(true); } }
    else if (r.type === 'agent') { stripSlash(); setSlashDismissed(true); if (onOpenAgent) onOpenAgent(r.a.id); }
    else if (r.type === 'app') { const a = r.a; if (a.state === 'ready') onToggleSel(a.id); else if (onConnectApp) onConnectApp(a.id); stripSlash(); }
    else { setSlashDismissed(true); }
  };
  useEffect(() => { setSlashIdx(0); }, [text]);
  useEffect(() => {
    if (!slashOpen) return;
    const onDown = e => {
      const inMenu = e.target.closest && e.target.closest('.slash-menu');
      const inTa = taRef.current && taRef.current.contains(e.target);
      if (!inMenu && !inTa) setSlashDismissed(true);
    };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [slashOpen]);
  useEffect(() => {
    if (text || ph) return;
    const t = setInterval(() => setPhIdx(i => (i + 1) % PLACEHOLDERS.length), 3000);
    return () => clearInterval(t);
  }, [text, ph]);
  useEffect(() => {
    const ta = taRef.current;
    if (ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; }
  }, [text]);
  const send = () => {
    if (!text.trim() || busy) return;
    onSend(text.trim(), attach);
    setText(''); setAttach([]);
  };
  return (
    <div className="composer-wrap">
      {voiceState !== 'idle' && (
        <div className="voice-status">{voiceState === 'connecting' ? 'Connecting to voice' : 'Start talking'}</div>
      )}
      <div className={'cpill' + (glow ? ' glowing' : '') + (voiceState !== 'idle' ? ' voicing' : '')} ref={cpillRef}>
        {attach.length > 0 && (
          <div className="attach-strip">
            {attach.map((a, i) => a.url ? (
              <span key={i} className="att-img" onClick={() => onViewImage && onViewImage(a.url)}>
                <img src={a.url} alt={a.name}/>
                <button className="att-x" onClick={e => { e.stopPropagation(); setAttach(at => at.filter((_, j) => j !== i)); }}><I d="M6 6l12 12M18 6L6 18" size={10}/></button>
              </span>
            ) : (
              <span key={i} className="att-card">
                <span className="att-ic"><IcFile size={16}/></span>
                <span style={{minWidth: 0}}>
                  <span className="a-name" style={{display: 'block'}}>{a.name}</span>
                  <span className="a-kind">File</span>
                </span>
                <button className="att-x" onClick={() => setAttach(at => at.filter((_, j) => j !== i))}><I d="M6 6l12 12M18 6L6 18" size={10}/></button>
              </span>
            ))}
          </div>
        )}
        <div className="ta-wrap">
          <textarea ref={taRef} rows={1} value={text}
            onFocus={() => setGlow(true)} onBlur={() => setGlow(false)}
            onChange={e => setText(e.target.value)}
            onKeyDown={e => {
              if (slashOpen && slashFlat.length) {
                if (e.key === 'ArrowDown') { e.preventDefault(); setSlashIdx(i => (i + 1) % slashFlat.length); return; }
                if (e.key === 'ArrowUp') { e.preventDefault(); setSlashIdx(i => (i - 1 + slashFlat.length) % slashFlat.length); return; }
                if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) { e.preventDefault(); runSlash(slashIdx); return; }
              }
              if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
            }}/>
          {!text && (voiceState !== 'idle'
            ? <span className="ph-anim" style={{animation: 'none'}}>Type</span>
            : searchMode
            ? <span className="ph-anim" key="search">Search the web</span>
            : ph
              ? <span className="ph-anim" style={{animation: 'none'}}>{ph}</span>
              : <span className="ph-anim" key={phIdx}>{PLACEHOLDERS[phIdx]}</span>)}
        </div>
        <div className="crow crow-rel">
          <input ref={fileRef} type="file" multiple style={{display: 'none'}}
            onChange={e => {
              const files = [...(e.target.files || [])];
              if (files.length) setAttach(at => [...at, ...files.map(f => ({
                name: f.name, size: fmtSize(f.size), kind: kindOf(f.name),
                url: f.type && f.type.startsWith('image/') ? URL.createObjectURL(f) : null, fresh: true,
              }))]);
              e.target.value = '';
            }}/>
          <button className="cbtn" title="Add" onClick={() => setPlusOpen(true)}><IcPlus/></button>
          {searchMode && (
            <button className="search-pill" title="Turn off web search" onClick={() => setSearchMode(false)}>
              <span className="sp-globe"><IcGlobe size={14}/></span>
              <span className="sp-x"><IcX size={13}/></span>
              <span className="sp-label">Search</span>
            </button>
          )}
          {plusOpen && <PlusMenu library={library || []} projects={projects || []} drop={drop} onWeb={() => { setPlusOpen(false); enableSearch(); }}
            onAttachFile={() => { setPlusOpen(false); fileRef.current.click(); }}
            onAttachRecent={it => { setPlusOpen(false); setAttach(at => [...at, {name: it.name, size: it.size, kind: it.kind, url: null, fresh: false}]); }}
            onOpenLibrary={() => { setPlusOpen(false); setLibOpen(true); }}
            onOpenProject={id => { setPlusOpen(false); onOpenProject && onOpenProject(id); }}
            onClose={() => setPlusOpen(false)}/>}
          {apps && (() => {
            const onApps = apps.filter(a => appSel.includes(a.id));
            return (
              <React.Fragment>
                {onApps.length === 1 && (() => {
                  const a = onApps[0];
                  const Ic = APP_ICONS[a.id] || IcGrid;
                  return (
                    <button className="app-chip" title={a.name}
                      onClick={() => a.id === 'github' ? setGhOpen(true) : setPickOpen(true)}>
                      <span className="sb-ic" title="Disconnect" onClick={e => { e.stopPropagation(); onToggleSel(a.id); }}><IcXCircle size={14}/></span>
                      <span className="sb-ic"><Ic size={14}/></span>{a.name}<IcChevD size={11}/>
                    </button>
                  );
                })()}
                {onApps.length > 1 && (
                  <button className="app-chip" title="Selected apps" onClick={() => setPickOpen(true)}>
                    <span className="sb-ic"><IcGrid size={14}/></span>{onApps.length} apps<IcChevD size={11}/>
                  </button>
                )}
                {appsOpen && <AppsDrop apps={apps} sel={appSel} drop={drop} onToggle={onToggleSel} onConnect={onConnectApp} onClose={() => setAppsOpen(false)}/>}
                {pickOpen && onApps.length > 0 && <AppsPicker apps={onApps} drop={drop} onToggle={onToggleSel}
                  onGitHub={() => { setPickOpen(false); setGhOpen(true); }} onClose={() => setPickOpen(false)}/>}
                {ghOpen && <GitHubPanel drop={drop} onClose={() => setGhOpen(false)}/>}
              </React.Fragment>
            );
          })()}
          {slashOpen && <SlashMenu q={slashQ} drop={drop} activeIdx={slashIdx} onWeb={enableSearch} onAgent={id => { stripSlash(); setSlashDismissed(true); if (onOpenAgent) onOpenAgent(id); }}
            apps={apps} appSel={appSel} projects={projects}
            onFile={() => { stripSlash(); fileRef.current.click(); }}
            onApp={id => {
              const a = (apps || []).find(x => x.id === id);
              if (a && a.state === 'ready') onToggleSel(id); else if (onConnectApp) onConnectApp(id);
              stripSlash();
            }}
            onProject={id => { stripSlash(); onOpenProject && onOpenProject(id); }}
            onDismiss={() => setSlashDismissed(true)}/>}
          <div className="cspace"/>
          {searchMode
            ? <button className="model-pill" onClick={() => setScopeOpen(o => !o)} title="Search depth"><span className="model-num">{searchScope}</span><IcChevD size={12}/></button>
            : <button className="model-pill" onClick={() => setModelOpen(true)}><span className="model-num">{modelLabel(model, models)}</span><IcChevD size={12}/></button>}
          <button className={'cbtn' + (mic ? ' mic-on' : '')} title={mic ? 'Stop dictation (Ctrl+Shift+D)' : 'Dictation (Ctrl+Shift+D)'} onClick={() => setMic(m => !m)}><IcMic/></button>
          {voiceState === 'idle' && (text.trim()
            ? <button className="csend" disabled={busy} title="Send" onClick={send}><IcSend size={15}/></button>
            : <button className="csend voice-btn" title="Use Voice  ·  Ctrl + Shift + V" onClick={startVoice}><IcVoice size={15}/></button>)}
          {voiceState === 'connecting' && (
            <button className="voice-pill voice-pill-cancel" onClick={endVoice} title="Cancel"><span className="voice-spin"/>Cancel</button>)}
          {voiceState === 'listening' && (
            <button className="voice-pill voice-pill-end" onClick={endVoice} title="End voice"><span className="voice-dots"><i/><i/><i/></span>End</button>)}
      {modelOpen && <ModelDrop model={model} models={models} drop={drop} onPick={m => { setModel(m); setModelOpen(false); }} onClose={() => setModelOpen(false)}/>}
          {scopeOpen && <Popover className={'model-drop scope-drop' + (drop === 'down' ? ' down' : '')} onClose={() => setScopeOpen(false)}>
            <div className="drop-lbl"><span>Search depth</span></div>
            {['Instant', 'Standard', 'Deep'].map(s => (
              <div key={s} className="drop-item" onClick={() => { setSearchScope(s); setScopeOpen(false); }}>
                <span>{s}</span>{searchScope === s && <span className="drop-check"><IcCheck size={13}/></span>}
              </div>
            ))}
          </Popover>}
        </div>
      </div>
      {searchMode && !text && (
        <div className="trending">
          <div className="trend-head">Trending &amp; recent</div>
          {TRENDING.map((t, i) => (
            <button key={i} className="trend-row" onClick={() => { setText(t); if (taRef.current) taRef.current.focus(); }}>
              <span className="trend-ic"><IcTrendUp size={15}/></span>{t}
            </button>
          ))}
        </div>
      )}
      {libOpen && <LibPickModal library={library || []}
        onPick={it => { setLibOpen(false); setAttach(at => [...at, {name: it.name, size: it.size, kind: it.kind, url: null, fresh: false}]); }}
        onClose={() => setLibOpen(false)}/>}
    </div>
  );
};

const MsgActions = ({msg, onRegen}) => {
  const [copied, setCopied] = useState(false);
  const [vote, setVote] = useState(null);
  const copy = () => {
    try { navigator.clipboard.writeText(msg.text); } catch {}
    setCopied(true); setTimeout(() => setCopied(false), 1200);
  };
  return (
    <div className="act-row">
      <button className="act-btn" title="Copy" onClick={copy}><IcCopy size={14}/></button>
      {copied && <span className="copied">copied</span>}
      <button className={'act-btn' + (vote === 'up' ? ' on' : '')} title="Good" onClick={() => setVote(v => v === 'up' ? null : 'up')}><IcThumbUp size={14}/></button>
      <button className={'act-btn' + (vote === 'down' ? ' on' : '')} title="Not right" onClick={() => setVote(v => v === 'down' ? null : 'down')}><IcThumbDown size={14}/></button>
      <button className="act-btn" title="Share — not in this preview"><IcShare size={14}/></button>
      <button className="act-btn" title="Regenerate" onClick={onRegen}><IcRefresh size={14}/></button>
    </div>
  );
};

const MessageMeta = ({msg}) => (

const TYPING_LINES = ["Ready when you are.", "What should we get into?", "Pick up where you left off.", "Where would you like to start?", "Tell me what you need."];
const TypingGreet = () => {
  const [idx, setIdx] = useState(0);
  const [sub, setSub] = useState(0);
  const [del, setDel] = useState(false);
  useEffect(() => {
    const full = TYPING_LINES[idx];
    if (!del && sub === full.length) { const t = setTimeout(() => setDel(true), 2400); return () => clearTimeout(t); }
    if (del && sub === 0) { setDel(false); setIdx(i => (i + 1) % TYPING_LINES.length); return; }
    const t = setTimeout(() => setSub(s => s + (del ? -1 : 1)), del ? 28 : 56);
    return () => clearTimeout(t);
  }, [sub, del, idx]);
  const text = TYPING_LINES[idx].slice(0, sub);
  return (
    <div className="land-greet typed">
      <span>{text.slice(0, -1)}</span>
      <span key={sub} className="typed-new">{text.slice(-1)}</span>
      <span className="typed-caret"></span>
    </div>
  );
};

const LibraryView = ({library, setLibrary}) => {
  const [q, setQ] = useState('');
  const [tab, setTab] = useState('All');
  const [mode, setMode] = useState('list');
  const [newOpen, setNewOpen] = useState(false);
  const [itemMenu, setItemMenu] = useState(null);   // {id, x, y}
  const [renamingId, setRenamingId] = useState(null);
  const [draft, setDraft] = useState('');
  const fileRef = useRef(null);

  const items = library.filter(it => {
    if (tab === 'Images' && it.kind !== 'image') return false;
    if (tab === 'Files' && it.kind === 'image') return false;
    return it.name.toLowerCase().includes(q.toLowerCase());
  });

  const addUpload = f => {
    setLibrary(lib => [{id: uid(), name: f.name, kind: kindOf(f.name), size: fmtSize(f.size), modified: 'Today'}, ...lib]);
  };
  const addNote = () => {
    const id = uid();
    setLibrary(lib => [{id, name: 'untitled note', kind: 'note', size: '0 KB', modified: 'Today'}, ...lib]);
    setMode('list'); setTab('All'); setRenamingId(id); setDraft('untitled note');
  };
  const commitRename = id => {
    if (draft.trim()) setLibrary(lib => lib.map(it => it.id === id ? {...it, name: draft.trim()} : it));
    setRenamingId(null);
  };
  const menuAction = (id, action) => {
    setItemMenu(null);
    if (action === 'delete') setLibrary(lib => lib.filter(it => it.id !== id));
    if (action === 'rename') {
      const it = library.find(x => x.id === id);
      setRenamingId(id); setDraft(it ? it.name : '');
      setMode('list');
    }
  };

  return (
    <div className="page">
      <div className="page-inner">
        <div className="page-head">
          <div className="page-title">Library</div>
          <div className="lib-search">
            <span className="sb-ic"><IcSearch size={13}/></span>
            <input placeholder="Search library" value={q} onChange={e => setQ(e.target.value)}/>
          </div>
          <div style={{position: 'relative'}}>
            <input ref={fileRef} type="file" style={{display: 'none'}}
              onChange={e => { const f = e.target.files && e.target.files[0]; if (f) addUpload(f); e.target.value = ''; }}/>
            <button className="new-btn" onClick={() => setNewOpen(true)}>New<IcChevD size={12}/></button>
            {newOpen && (
              <Popover className="ctx-menu" style={{position: 'absolute', right: 0, top: 38, left: 'auto'}} onClose={() => setNewOpen(false)}>
                <div className="ctx-item" onClick={() => { setNewOpen(false); fileRef.current.click(); }}><span className="sb-ic"><IcUpload size={14}/></span>Upload</div>
                <div className="ctx-item" onClick={() => { setNewOpen(false); addNote(); }}><span className="sb-ic"><IcNote size={14}/></span>Note</div>
              </Popover>
            )}
          </div>
        </div>
        <div className="tab-row">
          {['All', 'Images', 'Files'].map(t => (
            <button key={t} className={'tab' + (tab === t ? ' on' : '')} onClick={() => setTab(t)}>{t}</button>
          ))}
          <div className="tab-spacer"/>
          <button className="icon-tgl" title="Filter — not in this preview"><IcFilter size={15}/></button>
          <button className={'icon-tgl' + (mode === 'grid' ? ' on' : '')} title="Grid view" onClick={() => setMode('grid')}><IcGrid size={15}/></button>
          <button className={'icon-tgl' + (mode === 'list' ? ' on' : '')} title="List view" onClick={() => setMode('list')}><IcList size={15}/></button>
        </div>
        {mode === 'list' ? (
          <div className="ltable">
            <div className="lth"><span>Name</span><span>Modified ↓</span><span>Size</span><span/></div>
            {items.map(it => (
              <div key={it.id} className="ltr">
                <div className="lt-name">
                  <KindIcon kind={it.kind}/>
                  {renamingId === it.id
                    ? <input className="rename-input" autoFocus value={draft}
                        onChange={e => setDraft(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') commitRename(it.id); if (e.key === 'Escape') setRenamingId(null); }}

                <span className="lt-dim">{it.size}</span>

  );

const PDrop = ({value, options, onChange, width=214}) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => { if(!open) return; const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h); }, [open]);
  const cur = options.find(o => o.v === value) || options[0];
  return (
    <span className="pdrop" ref={ref}>

      {open && <div className="pdrop-menu" style={{width}}>
        {options.map(o => (

        ))}
      </div>}
    </span>
  );
};

                  <div className="sm-row-div"/>
                  <div className="sm-row-meta">Saved on {m.date} from a <span className="sm-row-chat">chat</span>.</div>
                </div>}
              </div>
            </div>
          ))}
          {filtered.length === 0 && <div className="sm-empty">No saved memories.</div>}
        </div>
      </div>
    </React.Fragment>
  );
};

  const [agentCfg, setAgentCfg] = useState(() => Object.fromEntries(AGENTS.map(a => [a.id, {model: DEFAULT_MODEL, autonomy: 'ask', tone: '', enabled: true, memory: true}])));
  const [createOpen, setCreateOpen] = useState(false);

  const [library, setLibrary] = useState(SEED_LIBRARY);
  const [projects, setProjects] = useState([]);

  const [skills, setSkills] = useState(SEED_SKILLS);
  const [memory, setMemory] = useState(SEED_MEMORY);
  const [feeds, setFeeds] = useState(SEED_FEEDS);
  const [selModel, setSelModel] = useState(DEFAULT_MODEL);
  const [models, setModels] = useState(MODELS);
  const [backendSettings, setBackendSettings] = useState(null);
  const [apps, setApps] = useState(SEED_APPS);
  const [automations, setAutomations] = useState([]);
  const [subagents, setSubagents] = useState([]);
  const [draftApps, setDraftApps] = useState([]);
  const [filesOpen, setFilesOpen] = useState(false);
  const threadRef = useRef({});
  const pendingMoveRef = useRef(null);
  const [navTick, setNavTick] = useState(0);
  const hist = useRef({stack: [{view: 'chat', chat: null, proj: null}], idx: 0, silent: false});
  useEffect(() => {
    const h = hist.current;
    if (h.silent) { h.silent = false; return; }
    const s = {view, chat: activeChatId, proj: activeProjectId};
    const cur = h.stack[h.idx];
    if (cur && cur.view === s.view && cur.chat === s.chat && cur.proj === s.proj) return;
    h.stack = h.stack.slice(0, h.idx + 1);
    h.stack.push(s);
    h.idx++;
    setNavTick(t => t + 1);
  }, [view, activeChatId, activeProjectId]);
  const navGo = dir => {
    const h = hist.current;
    const ni = h.idx + dir;
    if (ni < 0 || ni >= h.stack.length) return;
    h.idx = ni; h.silent = true;
    const s = h.stack[ni];
    setView(s.view); setActiveChatId(s.chat); setActiveProjectId(s.proj);
    setNavTick(t => t + 1);
  };
  const canBack = hist.current.idx > 0;
  const canFwd = hist.current.idx < hist.current.stack.length - 1;
  const [secOpen, setSecOpen] = useState({projects: true, recents: true, agents: true});
  const [viewer, setViewer] = useState(null);
  const [expandedProj, setExpandedProj] = useState({});
  const toggleSec = k => setSecOpen(s => ({...s, [k]: !s[k]}));
  const toggleProj = id => setExpandedProj(e => ({...e, [id]: !e[id]}));
  const [cuEnabled, setCuEnabled] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [settingsTab, setSettingsTab] = useState('General');
  const [menu, setMenu] = useState(null);          // {type:'chat'|'project'|'profile', id?, x, y}
  const [renamingId, setRenamingId] = useState(null);
  const [projRenamingId, setProjRenamingId] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [editProfileOpen, setEditProfileOpen] = useState(false);
  const [devMode, setDevMode] = useState(false);
  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  const [customInstrOpen, setCustomInstrOpen] = useState(false);
  const [customInstr, setCustomInstr] = useState('');
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const shortcutRef = useRef(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const [conv, modelData, settingsData, pluginData, skillsData, automationData, subagentData] = await Promise.all([
          API.conversations.list(),
          API.settings.models(),
          API.settings.get(),
          API.plugins.list(),
          API.plugins.skills(),
          API.automations.list(),
          API.runtimes.subagents(),
        ]);
        if (!alive) return;
        if (conv && Array.isArray(conv.conversations)) {
          setChats(conv.conversations);
          conv.conversations.forEach(c => { if (c.id && c.thread_id) threadRef.current[c.id] = c.thread_id; });
        }
        if (modelData && Array.isArray(modelData.models)) {
          const liveModels = modelData.models.map(m => ({id: m.id, label: m.label || m.id}));
          if (liveModels.length) {
            MODELS = liveModels;
            setModels(liveModels);
          }
          if (modelData.active && modelData.active.id) setSelModel(modelData.active.id);
        }
        if (settingsData) setBackendSettings(settingsData);
        if (pluginData && Array.isArray(pluginData.plugins)) {
          setApps(pluginData.plugins.map(p => ({id: p.id, name: p.name, state: p.configured ? 'ready' : 'off', note: p.notes || p.status})));
        }
        if (skillsData && skillsData.skills) setSkills(skillsData.skills);
        if (automationData && Array.isArray(automationData.automations)) setAutomations(automationData.automations);
        if (subagentData && Array.isArray(subagentData.subagents)) setSubagents(subagentData.subagents);
      } catch (err) {
        console.warn('Vellum backend metadata load failed', err);
      }
    })();
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    const onKey = e => {
      if (e.key === 'Escape') { setMenu(null); setSearchOpen(false); setEditProfileOpen(false); setRenamingId(null); setProjRenamingId(null); setCreateOpen(false); setSettingsOpen(false); setViewer(null); setFilesOpen(false); setShortcutsOpen(false); setCustomInstrOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const newChat = () => { setView('chat'); setActiveChatId(null); setMenu(null); };
  const openChat = id => { setView('chat'); setActiveChatId(id); setMenu(null); };
  const nav = v => { setView(v); setMenu(null); };
  const openAgent = id => { setView('agent'); setActiveAgentId(id); setMenu(null); };
  const agentNewConvo = () => setActiveConvo(a => ({...a, [activeAgentId]: null}));
  const openAgentConvo = cid => setActiveConvo(a => ({...a, [activeAgentId]: cid}));
  const streamAgentReply = (agentId, convoId, msgId, full) => {
    let i = 0;
    const tick = () => {
      i += 3;
      const done = i >= full.length;
      setAgentConvos(ac => ({...ac, [agentId]: (ac[agentId] || []).map(cv => cv.id === convoId ? {...cv, messages: cv.messages.map(m => m.id === msgId ? {...m, text: full.slice(0, i), streaming: !done} : m)} : cv)}));
      if (!done) timers.current[msgId] = setTimeout(tick, 22);
    };
    timers.current[msgId] = setTimeout(tick, 400);
  };
  const updateAgentConvo = (agentId, convoId, mapper) => {
    setAgentConvos(ac => ({
      ...ac,
      [agentId]: (ac[agentId] || []).map(cv => cv.id === convoId ? mapper(cv) : cv),
    }));
  };
  const streamBackendAgentReply = async (agent, convoId, assistantId, message) => {
    const routedMessage = agent && agent.name ? `${agent.name}: ${message}` : message;
    try {
      await API.chat.stream(
        {message: routedMessage, thread_id: convoId, model: selModel, store: true},
        {
          activity: (activity, tools) => updateAgentConvo(agent.id, convoId, cv => ({...cv, messages: cv.messages.map(m => m.id === assistantId ? {...m, activity, tools, streaming: true} : m)})),
          sources: sources => updateAgentConvo(agent.id, convoId, cv => ({...cv, messages: cv.messages.map(m => m.id === assistantId ? {...m, sources, streaming: true} : m)})),
          delta: text => updateAgentConvo(agent.id, convoId, cv => ({...cv, messages: cv.messages.map(m => m.id === assistantId ? {...m, text, streaming: true} : m)})),
          error: error => updateAgentConvo(agent.id, convoId, cv => ({...cv, messages: cv.messages.map(m => m.id === assistantId ? {...m, text: 'Backend error: ' + error, streaming: false} : m)})),
          done: final => updateAgentConvo(agent.id, convoId, cv => ({
            ...cv,
            messages: cv.messages.map(m => m.id === assistantId ? {...m, text: final.text || m.text || 'No response.', sources: final.sources || m.sources || [], tools: final.tools || m.tools || [], activity: final.activity || m.activity || [], streaming: false} : m),
          })),
        }
      );
    } catch (err) {
      updateAgentConvo(agent.id, convoId, cv => ({...cv, messages: cv.messages.map(m => m.id === assistantId ? {...m, text: 'Backend unreachable. Start the Vellum API and try again.', streaming: false} : m)}));
    }
  };
  const sendToAgent = (text, attach) => {
    const ag = AGENTS.find(a => a.id === activeAgentId);
    if (!ag) return;
    const userMsg = {id: uid(), role: 'user', text, attachments: attach};
    const reply = agentReply(ag, text);
    const aMsg = {id: uid(), role: 'assistant', text: '', full: reply, streaming: true, activity: [], sources: [], tools: []};
    let cid = activeConvo[ag.id];
    if (!cid) {
      cid = uid();
      const title = (text.trim().replace(/\s+/g, ' ').slice(0, 42)) || 'New conversation';
      setAgentConvos(ac => ({...ac, [ag.id]: [{id: cid, title, when: 'now', messages: [userMsg, aMsg]}, ...(ac[ag.id] || [])]}));
      setActiveConvo(a => ({...a, [ag.id]: cid}));
    } else {
      setAgentConvos(ac => ({...ac, [ag.id]: (ac[ag.id] || []).map(cv => cv.id === cid ? {...cv, messages: [...cv.messages, userMsg, aMsg]} : cv)}));
    }
    if (FEATURE_FLAGS.realChat) streamBackendAgentReply(ag, cid, aMsg.id, text);
    else streamAgentReply(ag.id, cid, aMsg.id, reply);
  };
  const regenAgent = (msgId) => {
    const ag = AGENTS.find(a => a.id === activeAgentId);
    if (!ag) return;
    const cid = activeConvo[ag.id];
    const convo = (agentConvos[ag.id] || []).find(c => c.id === cid);
    if (!convo) return;
    const idx = convo.messages.findIndex(m => m.id === msgId);
    const prevUser = [...convo.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
    const reply = agentReply(ag, prevUser ? prevUser.text : '');
    setAgentConvos(ac => ({...ac, [ag.id]: ac[ag.id].map(cv => cv.id === cid ? {...cv, messages: cv.messages.map(m => m.id === msgId ? {...m, text: '', full: reply, streaming: true} : m)} : cv)}));
    if (FEATURE_FLAGS.realChat) streamBackendAgentReply(ag, cid, msgId, prevUser ? prevUser.text : '');
    else streamAgentReply(ag.id, cid, msgId, reply);
  };

  const chatMenuAction = (id, action) => {
    setMenu(null);
    if (action === 'rename') {
      const chat = chats.find(c => c.id === id);
      setSidebarPinned(true);
      setSecOpen(s => ({...s, projects: true, recents: true}));
      if (chat && chat.projectId) setExpandedProj(e => ({...e, [chat.projectId]: true}));
      setRenamingId(id);
      return;
    }
    if (action === 'share') return;
    setChats(cs => {
      if (action === 'pin') return cs.map(c => c.id === id ? {...c, pinned: !c.pinned} : c);
      if (action === 'archive') return cs.map(c => c.id === id ? {...c, archived: true} : c);
      if (action === 'delete') return cs.filter(c => c.id !== id);
      if (action === 'removeproj') return cs.map(c => c.id === id ? {...c, projectId: null} : c);
      return cs;
    });
    if (FEATURE_FLAGS.realConversations) {
      if (action === 'delete') API.conversations.remove(id).catch(() => {});
      else if (action === 'pin') {
        const chat = chats.find(c => c.id === id);
        API.conversations.patch(id, {pinned: !(chat && chat.pinned)}).catch(() => {});
      } else if (action === 'archive') API.conversations.patch(id, {archived: true}).catch(() => {});
      else if (action === 'removeproj') API.conversations.patch(id, {projectId: null}).catch(() => {});
    }
    if ((action === 'archive' || action === 'delete') && activeChatId === id) setActiveChatId(null);
  };

  const renameChat = (id, title) => {
    setRenamingId(null);
    if (title && title.trim()) {
      setChats(cs => cs.map(c => c.id === id ? {...c, title: title.trim()} : c));
      if (FEATURE_FLAGS.realConversations) API.conversations.patch(id, {title: title.trim()}).catch(() => {});
    }
  };

  const newProject = () => { setMenu(null); setCreateOpen(true); };
  const openProject = id => { setActiveProjectId(id); setView('project'); setMenu(null); };
  const moveToProject = (chatId, projId) => {
    setChats(cs => cs.map(c => c.id === chatId ? {...c, projectId: projId} : c));
    setExpandedProj(e => ({...e, [projId]: true}));
    setMenu(null);
  };
  const createProject = ({name, memory}) => {
    const id = uid();
    setProjects(ps => [{id, name, updated: 'Today', memory, sources: []}, ...ps]);
    setExpandedProj(e => ({...e, [id]: true}));
    setCreateOpen(false);
    if (pendingMoveRef.current) {
      moveToProject(pendingMoveRef.current, id);
      pendingMoveRef.current = null;
    } else {
      openProject(id);
    }
  };
  const projectMenuAction = (id, action) => {
    setMenu(null);
    if (action === 'share') return;
    if (action === 'rename') { setProjRenamingId(id); setSidebarPinned(true); return; }
    if (action === 'delete') {
      setProjects(ps => ps.filter(p => p.id !== id));
      setChats(cs => cs.map(c => c.projectId === id ? {...c, projectId: null} : c));
      if (activeProjectId === id && view === 'project') setView('projects');
    }
  };
  const approveSkill = id => setSkills(sk => {
    const s = sk.proposed.find(x => x.id === id);
    if (!s) return sk;
    return {...sk, proposed: sk.proposed.filter(x => x.id !== id),
      active: [{...s, uses: 0, last: 'Today'}, ...sk.active]};
  });
  const retireSkill = id => setSkills(sk => {
    const s = sk.active.find(x => x.id === id);
    if (!s) return sk;
    return {...sk, active: sk.active.filter(x => x.id !== id), retired: [s, ...sk.retired]};
  });
  const forgetFact = id => setMemory(ms => ms.filter(m => m.id !== id));
  const restoreChat = id => {
    setChats(cs => cs.map(c => c.id === id ? {...c, archived: false} : c));
    if (FEATURE_FLAGS.realConversations) API.conversations.patch(id, {archived: false}).catch(() => {});
  };
  const deleteChat = id => {
    setChats(cs => cs.filter(c => c.id !== id));
    if (FEATURE_FLAGS.realConversations) API.conversations.remove(id).catch(() => {});
  };

  const addSource = (projId, file) => {
    const item = {id: uid(), name: file.name, kind: kindOf(file.name), size: fmtSize(file.size), modified: 'Today'};
    setProjects(ps => ps.map(p => p.id === projId ? {...p, sources: [item, ...p.sources], updated: 'Today'} : p));
    setLibrary(lib => [{...item, id: uid()}, ...lib]);
  };
  const renameProject = (id, name) => {
    setProjRenamingId(null);
    if (name && name.trim()) setProjects(ps => ps.map(p => p.id === id ? {...p, name: name.trim()} : p));
  };

  const openProfileMenu = e => {
    const r = e.currentTarget.getBoundingClientRect();
    setMenu({type: 'profile', x: r.left, y: r.top});
  };

  const timers = useRef({});
  useEffect(() => () => Object.values(timers.current).forEach(clearTimeout), []);

  const streamReply = (chatId, msgId, full) => {
    let i = 0;
    const tick = () => {
      i += 3;
      const done = i >= full.length;
      setChats(cs => cs.map(c => c.id === chatId
        ? {...c, messages: c.messages.map(m => m.id === msgId ? {...m, text: full.slice(0, i), streaming: !done} : m)}
        : c));
      if (!done) timers.current[msgId] = setTimeout(tick, 22);
    };
    timers.current[msgId] = setTimeout(tick, 400);
  };

  const saveConversation = conversation => {
    if (!FEATURE_FLAGS.realConversations || !conversation) return;
    API.conversations.save(conversation).catch(err => console.warn('conversation save failed', err));
  };

  const updateChat = (chatId, mapper, persist = false) => {
    setChats(cs => cs.map(c => {
      if (c.id !== chatId) return c;
      const next = mapper(c);
      if (persist) setTimeout(() => saveConversation(next), 0);
      return next;
    }));
  };

  const streamBackendReply = async (chatId, assistantId, message, threadId) => {
    try {
      await API.chat.stream(
        {message, thread_id: threadId || chatId, model: selModel, store: true},
        {
          meta: meta => {
            if (meta.thread_id) {
              threadRef.current[chatId] = meta.thread_id;
              updateChat(chatId, c => ({...c, thread_id: meta.thread_id}));
            }
          },
          activity: (activity, tools) => updateChat(chatId, c => ({
            ...c,
            messages: c.messages.map(m => m.id === assistantId ? {...m, activity, tools, streaming: true} : m),
          })),
          sources: sources => updateChat(chatId, c => ({
            ...c,
            messages: c.messages.map(m => m.id === assistantId ? {...m, sources, streaming: true} : m),
          })),
          delta: text => updateChat(chatId, c => ({
            ...c,
            messages: c.messages.map(m => m.id === assistantId ? {...m, text, streaming: true} : m),
          })),
          error: error => updateChat(chatId, c => ({
            ...c,
            messages: c.messages.map(m => m.id === assistantId ? {...m, text: 'Backend error: ' + error, streaming: false} : m),
          }), true),
          done: final => updateChat(chatId, c => ({
            ...c,
            thread_id: final.thread_id || threadRef.current[chatId] || c.thread_id || chatId,
            messages: c.messages.map(m => m.id === assistantId ? {
              ...m,
              text: final.text || m.text || 'No response.',
              sources: final.sources || m.sources || [],
              tools: final.tools || m.tools || [],
              activity: final.activity || m.activity || [],
              streaming: false,
            } : m),
          }), true),
        }
      );
    } catch (err) {
      updateChat(chatId, c => ({
        ...c,
        messages: c.messages.map(m => m.id === assistantId ? {...m, text: 'Backend unreachable. Start the Vellum API and try again.', streaming: false} : m),
      }), true);
    }
  };

  const sendMessage = (text, attach, opts = {}) => {
    let chatId = opts.forceNew ? null : activeChatId;
    const userMsg = {id: uid(), role: 'user', text, attachments: attach};
    const reply = vellumReply(text);
    const aMsg = {id: uid(), role: 'assistant', text: '', full: reply, streaming: true};
    const freshAttach = (attach || []).filter(a => a.fresh);
    if (freshAttach.length) {
      setLibrary(lib => [
        ...freshAttach.map(a => ({id: uid(), name: a.name, kind: a.kind || kindOf(a.name), size: a.size, modified: 'Today'})),
        ...lib,
      ]);
    }
    if (!chatId) {
      chatId = uid();
      const title = text.length > 28 ? text.slice(0, 28).trimEnd() + '…' : text;
      const record = {id: chatId, thread_id: chatId, title, pinned: false, archived: false, projectId: opts.projectId || null, created: 'Today', appIds: [...draftApps], messages: [userMsg, aMsg]};
      setChats(cs => [record, ...cs]);
      saveConversation(record);
      setDraftApps([]);
      setActiveChatId(chatId);
    } else {
      setChats(cs => cs.map(c => c.id === chatId ? {...c, messages: [...c.messages, userMsg, aMsg]} : c));
    }
    if (FEATURE_FLAGS.realChat) streamBackendReply(chatId, aMsg.id, text, threadRef.current[chatId]);
    else streamReply(chatId, aMsg.id, reply);
  };

  const sendInProject = projId => (text, attach) => {
    sendMessage(text, attach, {forceNew: true, projectId: projId});
    setExpandedProj(e => ({...e, [projId]: true}));
    setView('chat');
  };

  const regenerate = (msgId) => {
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;
    const idx = chat.messages.findIndex(m => m.id === msgId);
    const prevUser = [...chat.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
    const old = chat.messages[idx];
    const reply = vellumReply(prevUser ? prevUser.text : '', old.full);
    setChats(cs => cs.map(c => c.id === chat.id
      ? {...c, messages: c.messages.map(m => m.id === msgId ? {...m, text: '', full: reply, streaming: true} : m)}
      : c));
    if (FEATURE_FLAGS.realChat) streamBackendReply(chat.id, msgId, prevUser ? prevUser.text : '', threadRef.current[chat.id] || chat.thread_id);
    else streamReply(chat.id, msgId, reply);
  };

  useEffect(() => {
    const h = e => shortcutRef.current && shortcutRef.current(e);
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  const menuChat = menu && menu.type === 'chat' ? chats.find(c => c.id === menu.id) : null;
  const menuChatProject = menuChat && menuChat.projectId ? projects.find(p => p.id === menuChat.projectId) : null;
  const activeChat = chats.find(c => c.id === activeChatId) || null;

  const pushToast = msg => { setToast(msg); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(null), 2200); };
  const selectModel = async id => {
    setSelModel(id);
    if (!FEATURE_FLAGS.realModels) return;
    try { await API.settings.setActiveModel(id); }
    catch (err) { pushToast('Model switch failed'); }
  };
  const copyLastCodeBlock = () => {
    let msgs = [];
    if (view === 'agent' && activeAgentId) { const cv = (agentConvos[activeAgentId] || []).find(c => c.id === activeConvo[activeAgentId]); msgs = cv ? cv.messages : []; }
    else if (activeChat) msgs = activeChat.messages || [];
    const joined = msgs.map(m => m.text || '').join('\n');
    const blocks = joined.match(/```[\s\S]*?```/g);
    if (blocks && blocks.length) {
      const code = blocks[blocks.length - 1].replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
      if (navigator.clipboard) navigator.clipboard.writeText(code);
      pushToast('Last code block copied');
    } else pushToast('No code block found');
  };
  const deleteActiveChat = () => {
    if (view === 'chat' && activeChat) { deleteChat(activeChat.id); newChat(); pushToast('Chat deleted'); }
    else if (view === 'agent' && activeAgentId && activeConvo[activeAgentId]) { const cid = activeConvo[activeAgentId]; setAgentConvos(ac => ({...ac, [activeAgentId]: (ac[activeAgentId] || []).filter(c => c.id !== cid)})); agentNewConvo(); pushToast('Conversation deleted'); }
    else pushToast('No chat to delete');
  };
  shortcutRef.current = e => {
    const mod = e.ctrlKey || e.metaKey;
    if (!mod || e.altKey) return;
    const c = e.code;
    if (e.shiftKey) {
      if (c === 'KeyO') { e.preventDefault(); newChat(); }
      else if (c === 'KeyH') { e.preventDefault(); newChat(); }
      else if (c === 'KeyS') { e.preventDefault(); setSidebarPinned(p => !p); }
      else if (c === 'KeyI') { e.preventDefault(); setCustomInstrOpen(true); }
      else if (c === 'KeyL') { e.preventDefault(); nav('library'); }
      else if (c === 'KeyG') { e.preventDefault(); nav('ledger'); }
      else if (c === 'KeyK') { e.preventDefault(); nav('skills'); }
      else if (c === 'KeyE') { e.preventDefault(); nav('memory'); }
      else if (c === 'KeyM') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'model'})); }
      else if (c === 'KeyD') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'dictation'})); }
      else if (c === 'Semicolon') { e.preventDefault(); copyLastCodeBlock(); }
      else if (c === 'Backspace') { e.preventDefault(); deleteActiveChat(); }
      return;
    }
    if (c === 'Comma') { e.preventDefault(); setSettingsOpen(true); }
    else if (c === 'KeyK') { e.preventDefault(); setSearchOpen(true); }
    else if (c === 'KeyU') { e.preventDefault(); window.dispatchEvent(new CustomEvent('vellum-composer', {detail: 'addfiles'})); }
    else if (c === 'Slash') { e.preventDefault(); setShortcutsOpen(s => !s); }
    else if (c === 'Period') { e.preventDefault(); setDevMode(d => !d); pushToast(devMode ? 'Dev mode off' : 'Dev mode on'); }
    else if (c === 'BracketLeft') { e.preventDefault(); if (canBack) navGo(-1); }
    else if (c === 'BracketRight') { e.preventDefault(); if (canFwd) navGo(1); }
  };

  // per-chat app selection — landing/new-chat and project composers draw on a draft pool
  const selTargetIsChat = view === 'chat' && !!activeChat;
  const currentSel = selTargetIsChat ? (activeChat.appIds || []) : draftApps;
  const toggleSel = id => {
    if (selTargetIsChat) {
      setChats(cs => cs.map(c => {
        if (c.id !== activeChat.id) return c;
        const cur = c.appIds || [];
        return {...c, appIds: cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id]};
      }));
    } else {
      setDraftApps(cur => cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id]);
    }
  };
  const connectApp = id => {
    setApps(as => as.map(a => a.id === id ? {...a, state: 'ready'} : a));
    if (!currentSel.includes(id)) toggleSel(id);
  };
  const activeChatProject = activeChat && activeChat.projectId ? projects.find(p => p.id === activeChat.projectId) : null;
  const activeProject = projects.find(p => p.id === activeProjectId) || null;

  return (
    <div className="stage" onMouseMove={e => { const r = e.currentTarget.getBoundingClientRect(); e.currentTarget.style.setProperty('--mx', (e.clientX - r.left) + 'px'); e.currentTarget.style.setProperty('--my', (e.clientY - r.top) + 'px'); }}>
      <div className="bg-orb orb1"></div>
      <div className="bg-orb orb2"></div>
      <div className="bg-orb orb3"></div>
      <div className="cursor-glow"></div>
      <div className="win">
        <div className="titlebar">
          <button className="tbtn" title="Back" disabled={!canBack} onClick={() => navGo(-1)}
            style={{opacity: canBack ? 1 : .35, marginRight: 1}}><I d="M15 18l-6-6 6-6" size={15}/></button>
          <button className="tbtn" title="Forward" disabled={!canFwd} onClick={() => navGo(1)}
            style={{opacity: canFwd ? 1 : .35, marginRight: 4}}><I d="M9 6l6 6-6 6" size={15}/></button>
          <div className="menu"><span>File</span><span>Edit</span><span>View</span><span className="menu-help" onClick={() => setShortcutsOpen(true)}>Help</span></div>
          <div className="tb-right">
            {devMode && <span className="dev-badge" title="Dev mode (Ctrl+.)">DEV</span>}
            <button className="tbtn" title={theme==='dark' ? 'Light mode' : 'Dark mode'}
              onClick={() => setTheme(theme==='dark' ? 'light' : 'dark')}>
              {theme==='dark' ? <IcSun/> : <IcMoon/>}
            </button>
            <div className="wc"><I d="M5 12h14"/></div>
            <div className="wc"><I size={13}><rect x="5" y="5" width="14" height="14" rx="2"/></I></div>
            <div className="wc close"><I d="M6 6l12 12M18 6L6 18"/></div>
          </div>
        </div>
        <div className="body">
          {sidebarPinned && <Sidebar chats={chats} projects={projects} activeChatId={activeChatId} view={view}
                renamingId={renamingId} projRenamingId={projRenamingId} profile={profile}
                secOpen={secOpen} expandedProj={expandedProj} onToggleSec={toggleSec} onToggleProj={toggleProj}
                onTogglePin={() => setSidebarPinned(p => !p)} pinned={sidebarPinned} onNewChat={newChat} onSearch={() => setSearchOpen(true)}
                onNav={nav} onOpenChat={openChat} onOpenAgent={openAgent} activeAgentId={activeAgentId}
                onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
                onRename={renameChat} onProfile={openProfileMenu}
                onNewProject={newProject}
                onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}
                onProjectRename={renameProject} onOpenProject={openProject}/>}

          {!sidebarPinned && <Rail view={view} profile={profile} chats={chats} projects={projects} menuOpen={!!menu}
            onExpand={() => setSidebarPinned(true)} onNewChat={newChat} onSearch={() => setSearchOpen(true)}
            onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
            onNav={nav} onProfile={openProfileMenu} onOpenChat={openChat} activeAgentId={activeAgentId} onOpenAgent={openAgent}
            onNewProject={newProject} onOpenProject={openProject}
            onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}/>}

          <div className="main">
            {view === 'chat' && <ChatView chat={activeChat} project={activeChatProject} model={selModel} setModel={selectModel} models={models} onSend={sendMessage} onRegen={regenerate}
              onViewImage={setViewer}
              filesOpen={filesOpen} onCloseFiles={() => setFilesOpen(false)}
              onHeadMenu={e => setMenu({type: 'chathead', x: e.clientX, y: e.clientY})}
              composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: currentSel, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
            {view === 'library' && <LibraryView library={library} setLibrary={setLibrary}/>}
            {view === 'projects' && <ProjectsView projects={projects} chats={chats} onNewProject={newProject} onOpenProject={openProject}/>}
            {view === 'project' && activeProject && <ProjectPage project={activeProject} chats={chats}
              model={selModel} setModel={selectModel} models={models}
              onSend={sendInProject(activeProject.id)} onOpenChat={openChat}
              onAddSource={f => addSource(activeProject.id, f)}
              onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
              onViewImage={setViewer}
              composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: currentSel, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
            {view === 'project' && !activeProject && <div className="placeholder">project not found</div>}
            {view === 'ledger' && <LedgerView/>}
            {view === 'skills' && <SkillsView skills={skills} onApprove={approveSkill} onRetire={retireSkill}/>}
            {view === 'memory' && <MemoryView memory={memory} onForget={forgetFact}/>}
            {view === 'archive' && <ArchiveView chats={chats} onRestore={restoreChat} onDelete={deleteChat}/>}
            {view === 'agent' && activeAgentId && <AgentView agent={AGENTS.find(a => a.id === activeAgentId)} convos={agentConvos[activeAgentId] || []} activeConvoId={activeConvo[activeAgentId] || null} enabled={!agentCfg[activeAgentId] || agentCfg[activeAgentId].enabled} onToggleEnabled={() => setAgentCfg(m => ({...m, [activeAgentId]: {...m[activeAgentId], enabled: !(m[activeAgentId] && m[activeAgentId].enabled)}}))} onNewConvo={agentNewConvo} onOpenConvo={openAgentConvo} model={selModel} setModel={selectModel} models={models} onSend={sendToAgent} onRegen={regenAgent} onViewImage={setViewer} onSettings={() => setAgentSettingsOpen(true)} composerExtras={{library, projects, onOpenLibrary: () => nav('library'), onOpenProject: openProject, apps, appSel: draftApps, onToggleSel: toggleSel, onConnectApp: connectApp, onOpenAgent: openAgent}}/>}
          </div>
        </div>
        {menuChat && <ChatMenu chat={menuChat} projectName={menuChatProject ? menuChatProject.name : null} pos={menu} onAction={a => chatMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {menu && menu.type === 'chathead' && activeChat && <ChatHeadMenu chat={activeChat} projects={projects} pos={menu}
          onAction={a => {
            if (a === 'files') { setMenu(null); setFilesOpen(true); return; }
            chatMenuAction(activeChat.id, a);
          }}
          onMove={projId => moveToProject(activeChat.id, projId)}
          onNewProject={() => { pendingMoveRef.current = activeChat.id; setMenu(null); setCreateOpen(true); }}
          onClose={() => setMenu(null)}/>}
        {createOpen && <CreateProjectModal onCreate={createProject} onClose={() => setCreateOpen(false)}/>}
        {agentSettingsOpen && activeAgentId && <AgentSettingsModal agent={AGENTS.find(a => a.id === activeAgentId)} cfg={agentCfg[activeAgentId]} onClose={() => setAgentSettingsOpen(false)} onSave={c => { setAgentCfg(m => ({...m, [activeAgentId]: c})); setAgentSettingsOpen(false); }}/>}
        {menu && menu.type === 'project' && <ProjectMenu pos={menu} onAction={a => projectMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {searchOpen && <SearchOverlay chats={chats}
          onNewChat={() => { setSearchOpen(false); newChat(); }}
          onOpenChat={id => { setSearchOpen(false); openChat(id); }}
          onClose={() => setSearchOpen(false)}/>}
        {menu && menu.type === 'profile' && <ProfilePopover profile={profile} pos={menu}
          onEditProfile={() => { setMenu(null); setEditProfileOpen(true); }}
          onSettings={() => { setMenu(null); setSettingsTab('General'); setSettingsOpen(true); }}
          onPersonalization={() => { setMenu(null); setSettingsTab('Personalization'); setSettingsOpen(true); }}
          onAddAccount={() => { setMenu(null); pushToast('Add account \u2014 not in this preview'); }}
          onClose={() => setMenu(null)}/>}
        {settingsOpen && <SettingsModal theme={theme} initialTab={settingsTab} onTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')} model={selModel} models={models} onModel={selectModel} backendSettings={backendSettings} apps={apps} automations={automations}
          feeds={feeds} onToggleFeed={id => setFeeds(fs => fs.map(f => f.id === id ? {...f, on: !f.on} : f))}
          cu={cuEnabled} onCu={setCuEnabled}
          onClose={() => setSettingsOpen(false)}/>}
        {viewer && <div className="lightbox" onClick={() => setViewer(null)}><img src={viewer} alt="attachment"/></div>}
        {editProfileOpen && <EditProfileModal profile={profile}
          onSave={p => { setProfile(pr => ({...pr, ...p})); setEditProfileOpen(false); }}
          onClose={() => setEditProfileOpen(false)}/>}
        {shortcutsOpen && <ShortcutsModal onClose={() => setShortcutsOpen(false)}/>}
        {customInstrOpen && <CustomInstructionsModal value={customInstr} onSave={v => { setCustomInstr(v); setCustomInstrOpen(false); pushToast('Custom instructions saved'); }} onClose={() => setCustomInstrOpen(false)}/>}
        {toast && <div className="toast">{toast}</div>}
      </div>
    </div>
  );
};

const SHORTCUTS = {
  App: [
    ['Go to Home', ['Ctrl', 'Shift', 'H']],
    ['Open new chat', ['Ctrl', 'Shift', 'O']],
    ['Show shortcuts', ['Ctrl', '/']],
    ['Search chats', ['Ctrl', 'K']],
    ['Open settings', ['Ctrl', ',']],
    ['Go to Library', ['Ctrl', 'Shift', 'L']],
    ['Go to Ledger', ['Ctrl', 'Shift', 'G']],
    ['Go to Skills', ['Ctrl', 'Shift', 'K']],
    ['Go to Memory', ['Ctrl', 'Shift', 'E']],
    ['Toggle dev mode', ['Ctrl', '.']],
    ['Toggle sidebar', ['Ctrl', 'Shift', 'S']],
    ['Set custom instructions', ['Ctrl', 'Shift', 'I']],
    ['Copy last code block', ['Ctrl', 'Shift', ';']],
    ['Delete chat', ['Ctrl', 'Shift', '\u232B']],
  ],
  Composer: [
    ['Send message or stop answering', ['\u21B5']],
    ['Select model', ['Ctrl', 'Shift', 'M']],
    ['Toggle dictation', ['Ctrl', 'Shift', 'D']],
    ['Voice mode', ['Ctrl', 'Shift', 'V']],
    ['Add photos & files', ['Ctrl', 'U']],
  ],
};
const ShortcutsModal = ({onClose}) => (
  <React.Fragment>
    <div className="backdrop dim" onClick={onClose}/>
    <div className="modal sc-modal">
      <button className="set-close" title="Close (Esc)" onClick={onClose}><I d="M6 6l12 12M18 6L6 18" size={16}/></button>
      <div className="m-title" style={{marginBottom: 16}}>Keyboard shortcuts</div>
      {Object.keys(SHORTCUTS).map(grp => (
        <div key={grp} className="sc-group">
          <div className="sc-grp-h">{grp}</div>
          {SHORTCUTS[grp].map((row, i) => (
            <div key={i} className="sc-row">
              <span className="sc-label">{row[0]}</span>
              <span className="sc-keys">{row[1].map((k, j) => <kbd key={j} className="kbd">{k}</kbd>)}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  </React.Fragment>
);
const CustomInstructionsModal = ({value, onSave, onClose}) => {
  const [v, setV] = useState(value);
  return (
    <React.Fragment>
      <div className="backdrop dim" onClick={onClose}/>
      <div className="modal" style={{width: 480}}>
        <button className="set-close" title="Close (Esc)" onClick={onClose}><I d="M6 6l12 12M18 6L6 18" size={16}/></button>
        <div className="m-title" style={{marginBottom: 6}}>Custom instructions</div>
        <div className="agent-bar-tag" style={{marginBottom: 14}}>What should Vellum know about you, and how would you like it to respond?</div>
        <textarea className="agent-ta" rows={5} placeholder="e.g. Be concise. Skip the preamble. I work in product design." value={v} onChange={e => setV(e.target.value)} autoFocus/>
        <div className="m-actions" style={{marginTop: 14}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={() => onSave(v)}>Save</button>
        </div>
      </div>
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
