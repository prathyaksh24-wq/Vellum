const GALAXY_VERTEX_SHADER = `
attribute vec2 uv;
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 0, 1);
}
`;

const GALAXY_FRAGMENT_SHADER = `
precision highp float;
uniform float uTime;
uniform vec3 uResolution;
uniform vec2 uFocal;
uniform vec2 uRotation;
uniform float uStarSpeed;
uniform float uDensity;
uniform float uHueShift;
uniform float uSpeed;
uniform vec2 uMouse;
uniform float uGlowIntensity;
uniform float uSaturation;
uniform bool uMouseRepulsion;
uniform float uTwinkleIntensity;
uniform float uRotationSpeed;
uniform float uRepulsionStrength;
uniform float uMouseActiveFactor;
uniform float uAutoCenterRepulsion;
uniform bool uTransparent;
varying vec2 vUv;

#define NUM_LAYER 4.0
#define STAR_COLOR_CUTOFF 0.2
#define MAT45 mat2(0.7071, -0.7071, 0.7071, 0.7071)
#define PERIOD 3.0

float Hash21(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float tri(float x) { return abs(fract(x) * 2.0 - 1.0); }
float tris(float x) {
  float t = fract(x);
  return 1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0));
}
float trisn(float x) {
  float t = fract(x);
  return 2.0 * (1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0))) - 1.0;
}
vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}
float Star(vec2 uv, float flare) {
  float d = length(uv);
  float m = (0.05 * uGlowIntensity) / d;
  float rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));
  m += rays * flare * uGlowIntensity;
  uv *= MAT45;
  rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));
  m += rays * 0.3 * flare * uGlowIntensity;
  m *= smoothstep(1.0, 0.2, d);
  return m;
}
vec3 StarLayer(vec2 uv) {
  vec3 col = vec3(0.0);
  vec2 gv = fract(uv) - 0.5;
  vec2 id = floor(uv);
  for (int y = -1; y <= 1; y++) {
    for (int x = -1; x <= 1; x++) {
      vec2 offset = vec2(float(x), float(y));
      vec2 si = id + vec2(float(x), float(y));
      float seed = Hash21(si);
      float size = fract(seed * 345.32);
      float glossLocal = tri(uStarSpeed / (PERIOD * seed + 1.0));
      float flareSize = smoothstep(0.9, 1.0, size) * glossLocal;
      float red = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 1.0)) + STAR_COLOR_CUTOFF;
      float blu = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 3.0)) + STAR_COLOR_CUTOFF;
      float grn = min(red, blu) * seed;
      vec3 base = vec3(red, grn, blu);
      float hue = atan(base.g - base.r, base.b - base.r) / (2.0 * 3.14159) + 0.5;
      hue = fract(hue + uHueShift / 360.0);
      float sat = length(base - vec3(dot(base, vec3(0.299, 0.587, 0.114)))) * uSaturation;
      float val = max(max(base.r, base.g), base.b);
      base = hsv2rgb(vec3(hue, sat, val));
      vec2 pad = vec2(
        tris(seed * 34.0 + uTime * uSpeed / 10.0),
        tris(seed * 38.0 + uTime * uSpeed / 30.0)
      ) - 0.5;
      float star = Star(gv - offset - pad, flareSize);
      float twinkle = trisn(uTime * uSpeed + seed * 6.2831) * 0.5 + 1.0;
      twinkle = mix(1.0, twinkle, uTwinkleIntensity);
      star *= twinkle;
      col += star * size * base;
    }
  }
  return col;
}
void main() {
  vec2 focalPx = uFocal * uResolution.xy;
  vec2 uv = (vUv * uResolution.xy - focalPx) / uResolution.y;
  vec2 mouseNorm = uMouse - vec2(0.5);
  if (uAutoCenterRepulsion > 0.0) {
    vec2 centerUV = vec2(0.0, 0.0);
    float centerDist = length(uv - centerUV);
    vec2 repulsion = normalize(uv - centerUV) * (uAutoCenterRepulsion / (centerDist + 0.1));
    uv += repulsion * 0.05;
  } else if (uMouseRepulsion) {
    vec2 mousePosUV = (uMouse * uResolution.xy - focalPx) / uResolution.y;
    float mouseDist = length(uv - mousePosUV);
    vec2 repulsion = normalize(uv - mousePosUV) * (uRepulsionStrength / (mouseDist + 0.1));
    uv += repulsion * 0.05 * uMouseActiveFactor;
  } else {
    vec2 mouseOffset = mouseNorm * 0.1 * uMouseActiveFactor;
    uv += mouseOffset;
  }
  float autoRotAngle = uTime * uRotationSpeed;
  mat2 autoRot = mat2(cos(autoRotAngle), -sin(autoRotAngle), sin(autoRotAngle), cos(autoRotAngle));
  uv = autoRot * uv;
  uv = mat2(uRotation.x, -uRotation.y, uRotation.y, uRotation.x) * uv;
  vec3 col = vec3(0.0);
  for (float i = 0.0; i < 1.0; i += 1.0 / NUM_LAYER) {
    float depth = fract(i + uStarSpeed * uSpeed);
    float scale = mix(20.0 * uDensity, 0.5 * uDensity, depth);
    float fade = depth * smoothstep(1.0, 0.9, depth);
    col += StarLayer(uv * scale + i * 453.32) * fade;
  }
  if (uTransparent) {
    float alpha = length(col);
    alpha = smoothstep(0.0, 0.3, alpha);
    alpha = min(alpha, 1.0);
    gl_FragColor = vec4(col, alpha);
  } else {
    gl_FragColor = vec4(col, 1.0);
  }
}
`;

const GalaxyBackground = ({
  focal=GALAXY_FOCAL,
  rotation=GALAXY_ROTATION,
  starSpeed=0.32,
  density=0.82,
  hueShift=140,
  speed=0.55,
  mouseInteraction=true,
  glowIntensity=0.22,
  saturation=0.16,
  mouseRepulsion=true,
  repulsionStrength=1.35,
  twinkleIntensity=0.2,
  rotationSpeed=0.025,
  autoCenterRepulsion=0,
  transparent=true
}) => {
  const ctnDom = useRef(null);
  useEffect(() => {
    let disposed = false;
    let cleanup = () => {};
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    loadOgl().then(({Renderer, Program, Mesh, Color, Triangle}) => {
      const ctn = ctnDom.current;
      if (disposed || !ctn) return;
      const renderer = new Renderer({alpha:transparent, premultipliedAlpha:false, dpr:Math.min(window.devicePixelRatio || 1, 1.5)});
      const gl = renderer.gl;
      if (transparent) {
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.clearColor(0, 0, 0, 0);
      } else {
        gl.clearColor(0, 0, 0, 1);
      }

      const targetMousePos = {x:0.5,y:0.5};
      const smoothMousePos = {x:0.5,y:0.5};
      let targetMouseActive = 0;
      let smoothMouseActive = 0;
      let program;
      let animateId = 0;
      const interactionRoot = ctn.closest('.stage') || ctn;

      const resize = () => {
        const width = Math.max(1, ctn.offsetWidth);
        const height = Math.max(1, ctn.offsetHeight);
        renderer.setSize(width, height);
        if (program) program.uniforms.uResolution.value = new Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height);
      };
      resize();
      const geometry = new Triangle(gl);
      program = new Program(gl, {
        vertex:GALAXY_VERTEX_SHADER,
        fragment:GALAXY_FRAGMENT_SHADER,
        uniforms:{
          uTime:{value:0},
          uResolution:{value:new Color(gl.canvas.width,gl.canvas.height,gl.canvas.width/gl.canvas.height)},
          uFocal:{value:new Float32Array(focal)},
          uRotation:{value:new Float32Array(rotation)},
          uStarSpeed:{value:starSpeed},
          uDensity:{value:density},
          uHueShift:{value:hueShift},
          uSpeed:{value:speed},
          uMouse:{value:new Float32Array([0.5,0.5])},
          uGlowIntensity:{value:glowIntensity},
          uSaturation:{value:saturation},
          uMouseRepulsion:{value:mouseRepulsion},
          uTwinkleIntensity:{value:twinkleIntensity},
          uRotationSpeed:{value:rotationSpeed},
          uRepulsionStrength:{value:repulsionStrength},
          uMouseActiveFactor:{value:0},
          uAutoCenterRepulsion:{value:autoCenterRepulsion},
          uTransparent:{value:transparent}
        }
      });
      const mesh = new Mesh(gl,{geometry,program});
      gl.canvas.setAttribute('aria-hidden','true');
      gl.canvas.setAttribute('role','presentation');
      ctn.appendChild(gl.canvas);
      ctn.dataset.galaxyStatus = 'ready';

      const renderFrame = t => {
        if (disposed) return;
        program.uniforms.uTime.value = t * 0.001;
        program.uniforms.uStarSpeed.value = (t * 0.001 * starSpeed) / 10;
        smoothMousePos.x += (targetMousePos.x - smoothMousePos.x) * 0.05;
        smoothMousePos.y += (targetMousePos.y - smoothMousePos.y) * 0.05;
        smoothMouseActive += (targetMouseActive - smoothMouseActive) * 0.05;
        program.uniforms.uMouse.value[0] = smoothMousePos.x;
        program.uniforms.uMouse.value[1] = smoothMousePos.y;
        program.uniforms.uMouseActiveFactor.value = smoothMouseActive;
        renderer.render({scene:mesh});
      };
      const update = t => {
        renderFrame(t);
        animateId = requestAnimationFrame(update);
      };
      if (reducedMotion) renderer.render({scene:mesh});
      else animateId = requestAnimationFrame(update);

      const handleMouseMove = event => {
        const rect = ctn.getBoundingClientRect();
        targetMousePos.x = (event.clientX - rect.left) / rect.width;
        targetMousePos.y = 1 - (event.clientY - rect.top) / rect.height;
        targetMouseActive = 1;
      };
      const handleMouseLeave = () => { targetMouseActive = 0; };
      if (mouseInteraction && !reducedMotion) {
        interactionRoot.addEventListener('mousemove',handleMouseMove,{passive:true});
        interactionRoot.addEventListener('mouseleave',handleMouseLeave,{passive:true});
      }
      const resizeObserver = typeof ResizeObserver === 'function' ? new ResizeObserver(resize) : null;
      resizeObserver?.observe(ctn);
      window.addEventListener('resize',resize,{passive:true});

      cleanup = () => {
        cancelAnimationFrame(animateId);
        resizeObserver?.disconnect();
        window.removeEventListener('resize',resize);
        interactionRoot.removeEventListener('mousemove',handleMouseMove);
        interactionRoot.removeEventListener('mouseleave',handleMouseLeave);
        if (ctn.contains(gl.canvas)) ctn.removeChild(gl.canvas);
        gl.getExtension('WEBGL_lose_context')?.loseContext();
      };
      if (disposed) cleanup();
    }).catch(() => {
      if (ctnDom.current) ctnDom.current.dataset.galaxyStatus = 'fallback';
    });

    return () => {
      disposed = true;
      cleanup();
    };
  }, [focal,rotation,starSpeed,density,hueShift,speed,mouseInteraction,glowIntensity,saturation,mouseRepulsion,repulsionStrength,twinkleIntensity,rotationSpeed,autoCenterRepulsion,transparent]);

  return <div ref={ctnDom} className="galaxy-container" aria-hidden="true"/>;
};

let dockLastHiddenAt = 0;
const DockTooltip = ({content, side='top', children, delay=120}) => {
  const [open, setOpen] = useState(false);
  const timer = useRef(null);
  const show = () => {
    clearTimeout(timer.current);
    const warm = Date.now() - dockLastHiddenAt < 300;
    timer.current = setTimeout(() => setOpen(true), warm ? 0 : delay);
  };
  const hide = () => {
    clearTimeout(timer.current);
    if (open) dockLastHiddenAt = Date.now();
    setOpen(false);
  };
  useEffect(() => () => clearTimeout(timer.current), []);
  return (
    <span className="dock-tooltip-wrap" onMouseEnter={show} onMouseLeave={hide} onFocus={show} onBlur={hide}>
      {children}
      {open && <span role="tooltip" className={`dock-tooltip ${side}`}>{content}</span>}
    </span>
  );
};

const Dock = ({children, side='top', size=44, className=''}) => (
  <div className={`dock ${side === 'left' || side === 'right' ? 'vertical' : ''} ${className}`.trim()} style={{'--dock-size': `${size}px`}} role="toolbar" aria-label="Quick actions">
    {children}
  </div>
);

const DockItem = ({children, onClick, active=false, ariaLabel, tooltip, tooltipSide='top'}) => {
  const button = (
    <button type="button" className="dock-item" onClick={onClick} aria-label={ariaLabel} aria-pressed={active || undefined}>
      {active && <span className="dock-item-pill" aria-hidden="true"/>}
      {children}
    </button>
  );
  return tooltip ? <DockTooltip content={tooltip} side={tooltipSide}>{button}</DockTooltip> : button;
};

const DockSeparator = () => <span className="dock-separator" aria-hidden="true"/>;

const GlobalDock = ({side, locked, onLockedChange, view, activeAgentId, settingsOpen, onNewChat, onSearch, onNav, onOpenAgent, onSettings}) => {
  const [near, setNear] = useState(false);
  const [agentsOpen, setAgentsOpen] = useState(false);
  const closeTimer = useRef(null);
  const rootRef = useRef(null);
  const wasLocked = useRef(locked);
  const openDock = () => { clearTimeout(closeTimer.current); setNear(true); };
  const closeDock = () => {
    clearTimeout(closeTimer.current);
    closeTimer.current = setTimeout(() => {
      if (!locked && !agentsOpen) setNear(false);
    }, 360);
  };
  useEffect(() => () => clearTimeout(closeTimer.current), []);
  useEffect(() => {
    if (locked) {
      clearTimeout(closeTimer.current);
      setNear(true);
    } else if (wasLocked.current && !rootRef.current?.matches(':hover')) {
      clearTimeout(closeTimer.current);
      closeTimer.current = setTimeout(() => setNear(false), 360);
    }
    wasLocked.current = locked;
  }, [locked]);
  useEffect(() => {
    const closeAgents = event => {
      if (rootRef.current && !rootRef.current.contains(event.target)) setAgentsOpen(false);
    };
    document.addEventListener('pointerdown', closeAgents);
    return () => document.removeEventListener('pointerdown', closeAgents);
  }, []);
  const visible = locked || near || agentsOpen;
  const tooltipSide = side;
  const run = action => { setAgentsOpen(false); action(); };
  return (
    <div ref={rootRef} className={`dock-layer ${visible ? 'open' : ''}`} data-dock-side={side} data-dock-locked={locked ? 'true' : 'false'}>
      <div className={`dock-reveal-zone ${side}`} aria-hidden="true" onMouseEnter={openDock} onMouseLeave={closeDock}/>
      <button type="button" className={`dock-handle ${side}`} aria-label="Show dock" onMouseEnter={openDock} onMouseLeave={closeDock} onFocus={openDock} onBlur={closeDock} onClick={openDock}/>
      <div className={`dock-shell ${side}`} onMouseEnter={openDock} onMouseLeave={closeDock}>
        <Dock side={side}>
          <DockItem ariaLabel="New chat" tooltip="New chat" tooltipSide={tooltipSide} active={view === 'chat'} onClick={() => run(onNewChat)}><IcPencilSq size={18}/></DockItem>
          <DockItem ariaLabel="Search chats" tooltip="Search" tooltipSide={tooltipSide} onClick={() => run(onSearch)}><IcSearch size={18}/></DockItem>
          <DockItem ariaLabel="Library" tooltip="Library" tooltipSide={tooltipSide} active={view === 'library'} onClick={() => run(() => onNav('library'))}><IcLibrary size={18}/></DockItem>
          <DockItem ariaLabel="Coding" tooltip="Coding" tooltipSide={tooltipSide} onClick={() => run(() => window.location.assign('vellum-workspace.html'))}><IcTerminal size={18}/></DockItem>
          <DockSeparator/>
          <span className="dock-tooltip-wrap">
            <DockItem ariaLabel="Agents" tooltip="Agents" tooltipSide={tooltipSide} active={view === 'agent' || agentsOpen} onClick={() => { openDock(); setAgentsOpen(open => !open); }}><I d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M2.5 20a6.5 6.5 0 0 1 13 0 M16 3.2a3 3 0 0 1 0 5.6 M21.5 20a6.5 6.5 0 0 0-4.5-6.2" size={18}/></DockItem>
            {agentsOpen && <div className={`dock-flyout ${side}`} onMouseEnter={openDock} onMouseLeave={closeDock}>
              <div className="dock-fly-head">Agents</div>
              {AGENTS.map(agent => <button type="button" key={agent.id} className={`dock-agent ${view === 'agent' && activeAgentId === agent.id ? 'active' : ''}`} onClick={() => run(() => onOpenAgent(agent.id))}>
                <span className="sb-ic"><agent.icon size={15}/></span><span>{agent.name}</span>{view === 'agent' && activeAgentId === agent.id && <span className="dock-agent-check"><IcCheck size={13}/></span>}
              </button>)}
            </div>}
          </span>
          <DockItem ariaLabel="Settings" tooltip="Settings" tooltipSide={tooltipSide} active={settingsOpen} onClick={() => run(onSettings)}><IcSettings size={18}/></DockItem>
          <DockItem ariaLabel={locked ? 'Auto-hide dock' : 'Keep dock visible'} tooltip={locked ? 'Auto-hide dock' : 'Keep dock visible'} tooltipSide={tooltipSide} active={locked} onClick={() => onLockedChange(!locked)}><IcPin size={17}/></DockItem>
        </Dock>
      </div>
    </div>
  );
};
/* closes on a document-level outside mousedown ? no click-eating backdrop,
   so one click both dismisses the open menu and lands on the next target */
const Popover = ({className, style, onClose, children, portal}) => {
  const ref = useRef(null);
  const closeRef = useRef(onClose);
  closeRef.current = onClose;
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) closeRef.current(); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const node = <div ref={ref} className={className} style={style}>{children}</div>;
  return portal ? ReactDOM.createPortal(node, document.body) : node;
};

const clampMenuPosition = (pos, width = 220, height = 220) => {
  const x = Number(pos && pos.x) || 0;
  const y = Number(pos && pos.y) || 0;
  const preferredX = pos && pos.preferLeft ? pos.x - width - 10 : x;
  return {
    left: Math.max(12, Math.min(preferredX, window.innerWidth - width - 12)),
    top: Math.max(12, Math.min(y, window.innerHeight - height - 12)),
  };
};

const ChatRow = ({chat, active, renaming, nested, onOpen, onMenu, onRename}) => {
  const [draft, setDraft] = useState(chat.title);
  useEffect(() => { if (renaming) setDraft(chat.title); }, [renaming]);
  if (renaming) {
    return (
      <div className={'chat-row active' + (nested ? ' nested' : '')}>
        <input className="rename-input" autoFocus value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') onRename(draft); if (e.key === 'Escape') onRename(null); }}
          onBlur={() => onRename(draft)}/>
      </div>
    );
  }
  return (
    <div className={'chat-row' + (active ? ' active' : '') + (nested ? ' nested' : '')} onClick={onOpen}>
      {chat.pinned && <span className="chat-pin"><IcPin size={12}/></span>}

        onClick={e => { e.stopPropagation(); onMenu(e); }}><IcDots size={14}/></button>
    </div>
  );
};

  const wrapRef = useRef(null);
  const closeTimer = useRef(null);
  const openFly = () => { clearTimeout(closeTimer.current); setHover(true); };
  const closeFly = () => { closeTimer.current = setTimeout(() => setHover(false), 90); };
  useEffect(() => {
    if (keepOpen && hover) setStick(true);
    if (!keepOpen) setStick(false);
  }, [keepOpen, hover]);
  const open = hover || stick;
  useEffect(() => {
    if (open && wrapRef.current) {
      const r = wrapRef.current.getBoundingClientRect();
      const below = window.innerHeight - r.top;
      setPos(below < 300 ? { left: r.right + 6, bottom: window.innerHeight - r.bottom } : { left: r.right + 6, top: r.top });
    }
  }, [open]);
  return (
    <div className="rail-wrap" ref={wrapRef} onMouseEnter={openFly} onMouseLeave={closeFly}>
      {btn}
      {open && pos && ReactDOM.createPortal(
        <div className="flyout rail-flyout" style={pos} onMouseEnter={openFly} onMouseLeave={closeFly}>{children}</div>,
        document.body)}
    </div>
  );
};

const vellumReply = (text, exclude) => {
  const q = text.trim().replace(/\s+/g, ' ').slice(0, 60);
  const bucket = REPLY_BUCKETS.find(b => b.test.test(text));
  const pool = bucket.variants.filter(v => v.replace('{q}', q) !== exclude);
  const pick = pool[0] || bucket.variants[0];
  return pick.replace('{q}', q);
};

const ModelDrop = ({model, models = MODELS, drop, onPick, onClose}) => {
  const [q, setQ] = useState('');
  const [idx, setIdx] = useState(0);
  const listRef = useRef(null);
  const hits = models.filter(m => !q || m.label.toLowerCase().includes(q.toLowerCase()) || m.id.toLowerCase().includes(q.toLowerCase()));
  useEffect(() => { setIdx(0); }, [q]);
  useEffect(() => {
    const p = listRef.current; if (!p) return;
    const el = p.querySelector('.drop-item.active'); if (!el) return;
    const top = el.offsetTop, bot = top + el.offsetHeight;
    if (top < p.scrollTop) p.scrollTop = top;
    else if (bot > p.scrollTop + p.clientHeight) p.scrollTop = bot - p.clientHeight;
  }, [idx]);
  const onKey = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setIdx(i => Math.min(i + 1, hits.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); if (hits[idx]) onPick(hits[idx].id); }
  };
  return (
    <Popover className={'model-drop select-motion' + (drop === 'down' ? ' down' : '')} onClose={onClose}>
      <div className="drop-lbl"><span>Model</span></div>
      <input className="model-search" autoFocus placeholder="Search models" value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey}/>
      <div className="model-list" ref={listRef}>
        {hits.map((m, i) => (
          <div key={m.id} className={'drop-item' + (i === idx ? ' active' : '')} onClick={() => onPick(m.id)} onMouseEnter={() => setIdx(i)}>
            <span style={{overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{m.label}</span>
            {model === m.id && <span className="drop-check"><IcCheck size={13}/></span>}

        ))}
        {hits.length === 0 && <div className="s-none">No matches.</div>}

  );
};

function sourceName(s) {
  if (!s) return 'source';
  const domain = (s.domain || s.dom || '').replace(/^www\./, '');
  return s.provider_label || s.pub || prettyProvider(domain) || s.title || s.url || 'source';
}

function sourceFavicon(s) {
  if (!s) return '';
  if (s.favicon_url || s.logo_url) return s.favicon_url || s.logo_url;
  const domain = s.domain || s.dom || (s.url || '').replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
  return domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
}

function prettyProvider(domain) {
  const clean = (domain || '').toLowerCase().replace(/^www\./, '');
  const labels = {
    'bbc.com': 'BBC',
    'espn.com': 'ESPN',
    'fifa.com': 'FIFA',
    'formula1.com': 'Formula 1',
    'foxsports.com': 'FOX Sports',
    'instagram.com': 'Instagram',
    'nba.com': 'NBA',
    'nbcsports.com': 'NBC Sports',
    'reddit.com': 'Reddit',
    'skysports.com': 'Sky Sports',
    'theguardian.com': 'The Guardian',
    'usatoday.com': 'USA Today',
    'x.com': 'X',
    'twitter.com': 'X',
    'sports.yahoo.com': 'Yahoo Sports',
    'yahoo.com': 'Yahoo',
    'youtube.com': 'YouTube',
  };
  if (labels[clean]) return labels[clean];
  if (clean.endsWith('.espn.com')) return 'ESPN';
  if (clean.endsWith('.yahoo.com')) return 'Yahoo';
  if (clean.endsWith('.youtube.com')) return 'YouTube';
  return clean || '';
}

function traceElapsed(trace) {
  if (!trace) return 0;
  if (typeof trace.elapsedSeconds === 'number') return trace.elapsedSeconds;
  const start = trace.startedAt || Date.now();
  const end = trace.completedAt || Date.now();
  return Math.max(0, Math.round((end - start) / 1000));
}

function initialTrace() {
  const now = Date.now();
  return {
    status: 'thinking',
    startedAt: now,
    completedAt: null,
    elapsedSeconds: 0,
    steps: [{id: 'thinking', type: 'thinking', label: 'Thinking', detail: '', status: 'in_progress', at: now}],
    sources: [],
    tools: [],
  };
}

function errorTrace(message) {
  const now = Date.now();
  return {
    status: 'error',
    startedAt: now,
    completedAt: now,
    elapsedSeconds: 0,
    steps: [
      {id: 'thinking', type: 'thinking', label: 'Thinking', detail: '', status: 'completed', at: now},
      {id: 'error', type: 'error', label: 'Stream error', detail: message, status: 'failed', at: now},
    ],
    sources: [],
    tools: [],
  };
}

const TraceIcon = ({type, status}) => {
  if (type === 'source') return <IcGlobe size={15}/>;
  if (type === 'error' || status === 'failed') return <IcInfo size={15}/>;
  if (type === 'subagent_call') return <IcBrain size={15}/>;
  if (type === 'tool_call') return <IcSearch size={15}/>;
  return <IcGlobe size={15}/>;
};

const MessageTraceInline = ({msg, onOpenActivity}) => {
  const trace = msg.trace;
  const sources = (trace && trace.sources && trace.sources.length ? trace.sources : msg.sources) || [];
  const steps = (trace && trace.steps) || [];
  const visibleSteps = steps.filter(s => s.label && s.id !== 'thinking').slice(-3);
  const canOpen = onOpenActivity && (trace || sources.length || (msg.activity && msg.activity.length));
  const open = () => canOpen && onOpenActivity(msg.id);
  const stepIsActive = step => !['completed', 'failed', 'done'].includes(String(step && step.status || '').toLowerCase());
  if (!trace && !sources.length && !(msg.activity && msg.activity.length)) return null;
  return (
    <div className="turn-trace">
      {trace && (
        <button className="turn-thinking" onClick={open} title="Open activity">
          <span className={msg.streaming ? 'trace-glow' : ''}>{msg.streaming ? 'Thinking' : `Worked for ${traceElapsed(trace)}s`}</span>
          {!msg.streaming && <IcChevD size={12}/>}
        </button>
      )}
      {visibleSteps.map((step, i) => (
        <div key={step.id || i} className={'turn-line' + (msg.streaming && i === visibleSteps.length - 1 && stepIsActive(step) ? ' active' : '')}>
          <TraceIcon type={step.type} status={step.status}/>
          <span className={msg.streaming && i === visibleSteps.length - 1 && stepIsActive(step) ? 'turn-label trace-glow' : 'turn-label'}>{step.label}</span>
        </div>
      ))}
      {sources.length > 0 && (
        <div className="turn-source-row">
          {sources.slice(0, 4).map((s, i) => (
            <button key={s.url || i} className="source-pill" onClick={open} title={s.title || s.url}>
              {sourceFavicon(s) && <img src={sourceFavicon(s)} alt=""/>}
              <span>{sourceName(s)}</span>
            </button>
          ))}
          {sources.length > 4 && <button className="source-pill" onClick={open}>+{sources.length - 4} more</button>}
        </div>
      )}
    </div>
  );
};

const MessageMeta = ({msg, onOpenActivity}) => (

  const steps = (trace.steps || []).filter(s => s.label);
  return (
    <div className="activity-drawer">
      <div className="activity-head">

const Timeline = ({userMsgs}) => {
  const [open, setOpen] = useState(false);
  if (userMsgs.length < 2) return null;
  const jump = id => {
    const el = document.getElementById('m-' + id);
    const box = el && el.closest('.msgs');
    if (!el || !box) return;
    const top = el.offsetTop - 20;
    const bot = top + el.offsetHeight;
    if (top < box.scrollTop) box.scrollTop = top;
    else if (bot > box.scrollTop + box.clientHeight) box.scrollTop = bot - box.clientHeight;
  };
  return (
    <div className="timeline" onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {userMsgs.map(m => (
        <div key={m.id} className="tl-bar" style={{width: Math.min(22, 8 + Math.floor(m.text.length / 12))}}
          onClick={() => jump(m.id)}/>
      ))}
      {open && (
        <div className="tl-pop">
          <div className="tl-head">From the beginning</div>
          {userMsgs.map(m => (
            <div key={m.id} className="tl-row" onClick={() => jump(m.id)}>
              {m.text.length > 44 ? m.text.slice(0, 44).trimEnd() + '?' : m.text}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const TYPING_LINES = ["Ready when you are.", "What should we get into?", "Pick up where you left off.", "Where would you like to start?", "Tell me what you need."];
const TypingGreet = () => {
  const [idx, setIdx] = useState(0);
  const [sub, setSub] = useState(0);
  const [del, setDel] = useState(false);
  useEffect(() => {
    const full = TYPING_LINES[idx];
    if (!del && sub === full.length) { const t = setTimeout(() => setDel(true), 2400); return () => clearTimeout(t); }
    if (del && sub === 0) { setDel(false); setIdx(i => (i + 1) % TYPING_LINES.length); return; }
    const t = setTimeout(() => setSub(s => s + (del ? -1 : 1)), del ? 28 : 56);
    return () => clearTimeout(t);
  }, [sub, del, idx]);
  const text = TYPING_LINES[idx].slice(0, sub);
  return (
    <div className="land-greet typed">
      <span>{text.slice(0, -1)}</span>
      <span key={sub} className="typed-new">{text.slice(-1)}</span>
      <span className="typed-caret"></span>
    </div>
  );
};

const XConnectModal = ({onClose, onConnected}) => {
  const [status, setStatus] = useState(null);
  const [busy, setBusy] = useState('');
  const [error, setError] = useState('');
  const oauthStarted = useRef(false);
  const api = window.VellumApi;
  const loadStatus = async () => {
    try {
      const next = await api.client.request('/api/x/oauth/status');
      setStatus(next);
      if (oauthStarted.current && (next.x_api_connected || next.xai_connected)) {
        onConnected(next.x_api_connected ? 'X account connected' : 'SuperGrok connected');
      }
      return next;
    } catch (err) {
      setError(err.message || 'Could not read X connection status.');
      return null;
    }
  };
  useEffect(() => {
    loadStatus();
    const id = setInterval(loadStatus, 2200);
    const wake = () => loadStatus();
    const onMessage = e => {
      if (e.data && e.data.type === 'vellum:x-oauth-complete') loadStatus();
    };
    const onStorage = e => {
      if (e.key === 'vellum:x-oauth-complete') loadStatus();
    };
    window.addEventListener('focus', wake);
    window.addEventListener('message', onMessage);
    window.addEventListener('storage', onStorage);
    return () => {
      clearInterval(id);
      window.removeEventListener('focus', wake);
      window.removeEventListener('message', onMessage);
      window.removeEventListener('storage', onStorage);
    };
  }, []);
  const start = async (provider) => {
    setBusy(provider);
    setError('');
    try {
      const out = await api.client.request('/api/x/oauth/start', api.client.jsonOptions('POST', {provider}));
      oauthStarted.current = true;
      const popup = window.open(out.authorize_url, 'vellum_x_oauth_' + provider, 'popup,width=620,height=760');
      if (!popup) setError('Popup blocked. Allow popups for Vellum and try again.');
      const startedAt = Date.now();
      const poll = async () => {
        const next = await loadStatus();
        if (next && (next.x_api_connected || next.xai_connected)) return;
        if (Date.now() - startedAt < 180000) setTimeout(poll, 1800);
      };
      setTimeout(poll, 1200);
    } catch (err) {
      setError(err.message || 'Could not start OAuth.');
    } finally {
      setBusy('');
    }
  };
  const xaiOk = status && status.xai_connected;
  const xapiOk = status && status.x_api_connected;
  const xapiConfigured = status && status.x_api_configured;
  return (
    <React.Fragment>
      <div className="backdrop dim xc-backdrop" onClick={onClose}/>
      <div className="xc-win" role="dialog" aria-label="Connect X">
        <div className="xc-bar">
          <div className="xc-dots"><span className="xc-dot r" onClick={onClose} title="Close"/><span className="xc-dot y"/><span className="xc-dot g"/></div>
          <div className="xc-url"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>accounts.x.ai<span className="xc-url-path">/oauth</span></div>
          <button className="xc-close" onClick={onClose} aria-label="Close"><IcX size={15}/></button>
        </div>
        <div className="xc-body">
          <div className="xc-page">
            <div className="xc-logo"><XLogo size={30}/></div>
            <div className="xc-h">Connect X Agent</div>
            <div className="xc-sub">Use the real browser OAuth popup. Vellum saves refreshable tokens locally and never asks for your X password.</div>
            <div className="xc-perms" style={{marginTop:18}}>
              <div className="xc-perm"><IcCheck size={14}/>{xaiOk ? 'SuperGrok / xAI search connected' : 'Connect SuperGrok / xAI search for live X search'}</div>
              <div className="xc-perm"><IcCheck size={14}/>{xapiOk ? 'X API account actions connected' : 'Connect X API for posting, bookmarks, account reads, and media upload'}</div>
            </div>
            <button className="xc-btn" disabled={busy === 'xai' || xaiOk} onClick={() => start('xai')}>{xaiOk ? 'SuperGrok connected' : busy === 'xai' ? 'Opening SuperGrok OAuth...' : 'Connect SuperGrok'}</button>
            <button className="xc-cancel" disabled={!xapiConfigured || busy === 'xapi' || xapiOk} onClick={() => start('xapi')}>{xapiOk ? 'X account actions connected' : busy === 'xapi' ? 'Opening X OAuth...' : 'Connect X account actions'}</button>
            {!xapiConfigured && <div className="xc-note xc-note-sm">Set <b>X_API_CLIENT_ID</b> in .env to enable posting, bookmarks, and account actions. SuperGrok search can still connect above.</div>}
            {status && !status.private_reads_enabled && <div className="xc-note xc-note-sm">Private reads also require <b>X_TOOL_ALLOW_PRIVATE_READS=true</b>.</div>}
            {status && !status.posting_enabled && <div className="xc-note xc-note-sm">Posting also requires <b>X_TOOL_ALLOW_POSTS=true</b> plus per-action confirmation.</div>}
            {error && <div className="xc-note xc-note-sm" style={{color:'#ff7b72'}}>{error}</div>}
            <button className="xc-btn" style={{marginTop:12}} onClick={loadStatus}>Refresh status</button>
            {(xaiOk || xapiOk) && <button className="xc-cancel" onClick={() => onConnected(xapiOk ? 'X account connected' : 'SuperGrok connected')}>Use connected account</button>}
          </div>
        </div>
      </div>
    </React.Fragment>
  );
};

const STOPW = ['does','what','when','where','which','this','that','with','from','your','about','into','have','will','would','should','could','their','there','here','make','like','want','need','using','use'];
const inferLeadIn = (kw, q) => {
  const lower = (q || '').toLowerCase();
  if (/(latest|today|now|current|live|next|when|score|standings|injur|upload|posted|news)/.test(lower)) {
    return 'I am checking the latest available context for ' + kw + ' before answering.';
  }
  if (/(compare|difference|versus| vs |better|best)/.test(lower)) {
    return 'I am comparing the most relevant context around ' + kw + ' before giving you a clear answer.';
  }
  if (/(how|why|explain|what is|what are)/.test(lower)) {
    return 'I am working through the relevant context for ' + kw + ' so the answer is grounded and direct.';
  }
  return 'I am gathering the relevant context for ' + kw + ' before answering.';
};
const buildActivity = (text) => {
  const q = (text||'').trim().replace(/\s+/g,' ');
  const big = q.replace(/[^\w\s]/g,'').split(' ').filter(w => w.length > 3 && !STOPW.includes(w.toLowerCase()));
  const kw = big.slice(0,4).join(' ') || 'this topic';
  const short = big.slice(0,2).join(' ') || 'the topic';
  const dur = 13 + Math.floor(Math.random()*13);
  const refLines = [
    'Understanding the request around ' + short,
    'Waiting for live tool and source results',
    'Preparing an answer from the gathered context',
  ];
  const steps = [
    {kind:'search', title:'Checking live context for ' + kw, chips: [], more: 0},
    {kind:'eval', title:'Evaluating the request', text:'Waiting for backend tools, sub-agent routing, and source events before finalizing the answer.'},
    {kind:'done', title:'Worked for ' + dur + 's', text:'Done'},
  ];
  const leadIn = inferLeadIn(kw, q);
  return {refLines, steps, sources: [], duration: dur, leadIn};
};
const isCasualGreetingPrompt = text => {
  const normalized = String(text || '').trim().toLowerCase().replace(/[!?.\s]+$/g, '').replace(/\s+/g, ' ');
  if (!normalized || normalized.length > 42) return false;
  return /^(hi|hey|hello|yo|sup|gm|good morning|good afternoon|good evening|how are you|how are you doing|what's up|whats up|you there|are you there)$/.test(normalized);
};

});
const activitySeedForMode = (text) => FEATURE_FLAGS.realChat ? realActivitySeed(text) : buildActivity(text);

const Favicon = ({dom, src, source, size=14}) => {
  const [failed, setFailed] = useState(false);
  const candidate = src || sourceFavicon(source || {domain: dom, dom});
  const clean = (dom||'?').replace(/^www\./,'');
  const letter = clean.charAt(0).toUpperCase();
  const hue = [...clean].reduce((a,c)=>a+c.charCodeAt(0),0) % 360;
  if (candidate && !failed) {
    return <img className="favicon" src={candidate} alt="" width={size+5} height={size+5} style={{width:size+5, height:size+5}} onError={() => setFailed(true)}/>;
  }
  return <span className="favicon" style={{width:size+5, height:size+5, background:'hsl('+hue+' 52% 42%)', fontSize:size-2}}>{letter}</span>;
};

const activityDomain = item => {
  const src = item && item.source;
  return (src && (src.provider_label || src.domain || src.dom || src.title)) || item.name || '';
};
const activityIsDone = item => item && ['completed','done','failed'].includes(String(item.status||'').toLowerCase());
const THINKING_ROTATION_LABELS = ['Thinking', 'One sec', 'Checking context', 'Working through it', 'Cooking up your answer'];
const nextThinkingIndex = current => {
  if (THINKING_ROTATION_LABELS.length < 2) return 0;
  let next = Math.floor(Math.random() * THINKING_ROTATION_LABELS.length);
  if (next === current) next = (next + 1 + Math.floor(Math.random() * (THINKING_ROTATION_LABELS.length - 1))) % THINKING_ROTATION_LABELS.length;
  return next;
};
const isThinkingActivity = item => {
  const type = String(item && item.type || '').toLowerCase();
  const label = String(item && item.label || '').toLowerCase();
  return !item || type === 'thinking' || type === 'thinking_started' || label === 'thinking';
};
const isQuietAnswerActivity = item => {
  const type = String(item && item.type || '').toLowerCase();
  return isThinkingActivity(item) || type === 'final_answer_started' || type === 'final_answer_delta' || type === 'final_answer_completed';
};
const activityItemsForMsg = msg => {
  const raw = (msg.activity && msg.activity.length ? msg.activity : msg.steps) || [];
  return raw.map((item, i) => ({
    id: item.id || item.title || item.label || ('activity-'+i),
    type: item.type || item.kind || 'activity',
    label: item.label || item.title || item.name || 'Agent activity',
    detail: item.detail || item.text || '',
    status: item.status || (item.kind === 'done' ? 'completed' : 'in_progress'),
    source: item.source || null,
    name: item.name || '',
  })).filter(item => item.label);
};
const sourcesForMsg = msg => {
  const direct = Array.isArray(msg.sources) ? msg.sources : [];
  const fromActivity = activityItemsForMsg(msg).map(item => item.source).filter(Boolean);
  const seen = new Set();
  return [...direct, ...fromActivity].filter(source => {
    const key = source.url || source.domain || source.dom || source.title;
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
};
const ActivityStatus = ({item}) => {
  const [thinkingIndex, setThinkingIndex] = useState(0);
  const [typingText, setTypingText] = useState(THINKING_ROTATION_LABELS[0]);
  const thinking = isThinkingActivity(item);
  useEffect(() => {
    if (!thinking) {
      setThinkingIndex(0);
      setTypingText('');
      return undefined;
    }
    const id = setInterval(() => setThinkingIndex(i => nextThinkingIndex(i)), 2300);
    return () => clearInterval(id);
  }, [thinking]);
  useEffect(() => {
    if (!thinking) return undefined;
    const typingLabel = THINKING_ROTATION_LABELS[thinkingIndex] || THINKING_ROTATION_LABELS[0];
    setTypingText('');
    let cursor = 0;
    const id = setInterval(() => {
      cursor += 1;
      setTypingText(typingLabel.slice(0, cursor));
      if (cursor >= typingLabel.length) clearInterval(id);
    }, 42);
    return () => clearInterval(id);
  }, [thinking, thinkingIndex]);
  if (!item) return null;
  const label = (thinking ? (typingText || THINKING_ROTATION_LABELS[thinkingIndex]) : (item.label || 'Thinking')).replace(/\.+$/, '');
  return (
    <div className="activity-status" aria-live="polite">
      <span className="activity-icon"></span>
      <span className="activity-text">{label}</span>
    </div>
  );
};
const ActivityTimeline = ({msg}) => {
  if (!msg.streaming) return null;
  const items = activityItemsForMsg(msg);
  if (msg.suppressActivity && (!items.length || items.every(isQuietAnswerActivity))) return null;
  if (!items.length) return <div className="activity-inline"><ActivityStatus item={{label:'Thinking'}}/></div>;
  const active = [...items].reverse().find(item => !activityIsDone(item)) || items[items.length - 1];
  return (
    <div className="activity-inline">
      <ActivityStatus item={active}/>
    </div>
  );
};

//    Seeded catalogs because a sandboxed page cannot reach these registries; the desktop build proxies them live.
function makeRegistryAdapter({ id, label, color, catalog }){
  return { id, label, color, async search(query){
    const q = (query||'').trim().toLowerCase();
    await new Promise(r=>setTimeout(r, 260 + Math.random()*320));
    const rows = catalog.map(c=>mcp({...c, source:id}));
    if(!q) return rows;
    return rows.filter(c=> (c.name+' '+c.description+' '+c.category+' '+(c.tools||[]).join(' ')).toLowerCase().includes(q));
  } };
}

  const visible = catalog.filter(c=> srcFilter==='all' || c.source===srcFilter);

  function completeAuth(){ setWizard(w=>({...w, step:'keychain'})); setTimeout(()=> setWizard(w=> w?{...w, step:'register'}:w), 900); }
  function finishInstall(){ const c=wizard.connector; const entry={...c, state:'ready', installedAt:Date.now()};
    update({ installed:{...installed,[c.id]:entry}, audit:[mkAudit('installed', c, INSTALL_LABEL[c.install]+' ? '+c.authType), ...audit].slice(0,200) });
    setWizard(null); if((apps||[]).some(a=>a.id===c.id) && onConnect) onConnect(c.id); }

    setShowAdd(false); setCustom({ name:'', description:'', category:'Other', authType:'None', install:'npm', pkg:'', tools:'' }); startInstall(c); }
  const Card = (c)=>{ const tm=TRUST_META[c.trust]||TRUST_META.community; const srcObj=MCP_SOURCES.find(s=>s.id===c.source); const inst=installed[c.id];
    return (

        <div className="conn-desc">{c.description}</div>
        <div className="conn-tools">{(c.tools||[]).slice(0,4).map(t=> <span key={t} className="conn-tool">{t}</span>)}{(c.tools||[]).length>4 && <span className="conn-tool more">+{c.tools.length-4}</span>}</div>
        <div className="conn-actions">{inst ? <span className="conn-installed"><IcCheck size={13}/>{inst.state==='disabled'?'Disabled':'Installed'}</span> : <button className="conn-install-btn" onClick={()=>startInstall(c)}>Install</button>}</div>

      <div className="page-inner" style={{maxWidth: 880}}>
        <div className="page-head"><span className="page-head-ic"><IcGrid/></span><div><div className="page-title">Connectors</div><div className="page-sub">Browse MCP servers from external registries and install them into Vellum.</div></div></div>
        <div className="conn-tabs">{[['marketplace','Marketplace'],['installed','Installed ? '+installedList.length],['audit','Audit log']].map(([k,l])=>(<button key={k} className={'conn-tab'+(tab===k?' on':'')} onClick={()=>setTab(k)}>{l}</button>))}</div>
        {tab==='marketplace' && <React.Fragment>
          <div className="conn-toolbar"><div className="conn-search"><IcSearch size={15}/><input placeholder="Search connectors and tools" value={query} onChange={e=>setQuery(e.target.value)}/></div><button className="conn-addcustom" onClick={()=>setShowAdd(true)}><IcPlus size={15}/>Add custom MCP server</button></div>
          <div className="conn-srcfilter"><button className={'conn-srcchip'+(srcFilter==='all'?' on':'')} onClick={()=>setSrcFilter('all')}>All sources</button>{MCP_SOURCES.map(s=> <button key={s.id} className={'conn-srcchip'+(srcFilter===s.id?' on':'')} onClick={()=>setSrcFilter(s.id)}><span className="conn-srcdot" style={{background:s.color}}/>{s.label}</button>)}</div>
          {discovering ? <div className="conn-discovering"><span className="conn-spin"/>Discovering MCP servers across {MCP_SOURCES.length} registries?</div> : <div className="conn-grid">{visible.length ? visible.map(Card) : <div className="apps-empty">No connectors match your search.</div>}</div>}
        </React.Fragment>}
        {tab==='installed' && (installedList.length===0 ? <div className="apps-empty">No connectors installed yet. Browse the Marketplace to add one.</div> : <div className="conn-list">{installedList.map(c=>{ const on=c.state!=='disabled'; return (

      </div>
      {wizard && <InstallWizard wizard={wizard} onApprove={approveInstall} onAuth={completeAuth} onFinish={finishInstall} onCancel={()=>setWizard(null)}/>}

const CONNECTOR_STATUS_LABELS = {
  ready: 'Ready',
  missing_agent_reach: 'Install Agent-Reach',
  missing_twitter_cli: 'Install twitter-cli',
  not_authenticated: 'Authenticate X',
  error: 'Error',
  off: 'Not configured',
};
function connectorStatus(app){
  if (!app) return 'off';
  if (app.status) return app.status;
  return app.state === 'ready' || app.configured ? 'ready' : 'off';
}
function connectorSetupNote(app){
  const st = connectorStatus(app);
  if (st === 'missing_agent_reach') return 'Install Agent-Reach locally, then restart Vellum or refresh plugin health.';
  if (st === 'missing_twitter_cli') return 'Install and configure twitter-cli so Agent-Reach can use your local X session.';
  if (st === 'not_authenticated') return 'Authenticate the local X CLI session. Vellum will not use Grok OAuth for Agent-Reach actions.';
  if (st === 'error') return app.notes || 'The backend reported a connector error. Check the API logs for the sanitized reason.';
  if (st === 'ready') return app.notes || 'Ready for agent routing and tool use.';
  return app.notes || 'Connector is detected by the backend but is not configured yet.';
}
const BackendConnectorsView = ({apps = []}) => {
  const [query, setQuery] = useState('');

    category: a.category || (a.id === 'agent-reach' ? 'Connectors' : 'MCP'),

    const q = query.trim().toLowerCase();
    if (!q) return true;
    return (a.name + ' ' + a.id + ' ' + a.type + ' ' + a.category + ' ' + a.capabilities.join(' ')).toLowerCase().includes(q);
  });
  const ready = rows.filter(a => connectorStatus(a) === 'ready').length;
  return (
    <div className="page">

            return (
              <div key={app.id} className="conn-card">
                <div className="conn-card-top">
                  <span className="conn-ic"><ConnLogo c={app} size={20}/></span>
                  <div className="conn-card-head">
                    <div className="conn-name">{app.name || app.id}<span className={'conn-trust ' + (readyState ? 'verified' : st === 'error' ? 'unverified' : 'community')}><IcShield size={11}/>{statusText}</span></div>

                  {app.capabilities.length ? app.capabilities.slice(0, 8).map(t => <span key={t} className="conn-tool">{t}</span>) : <span className="conn-tool">No capabilities reported</span>}
                  {app.capabilities.length > 8 && <span className="conn-tool more">+{app.capabilities.length - 8}</span>}
                </div>
              </div>
            );
          }) : <div className="apps-empty">No backend connectors reported. Start the Vellum API, then refresh this page.</div>}
        </div>
      </div>
    </div>
  );
};

const cleanMemoryDisplayText = value => String(value || '')
  .replace(/\r/g, '')
  .replace(/\*\*/g, '')
  .replace(/`([^`]+)`/g, '$1')
  .replace(/\s+\|\s+/g, ' ')
  .replace(/\n{3,}/g, '\n\n')
  .trim();

const isMemoryOperationalNoise = value => {
  const text = String(value || '').toLowerCase();
  return !text ||
    text.includes('[vellum ui context:') ||
    text.includes('recency_hunger') ||
    text.includes('stochastic_kick') ||
    text.includes('below_threshold') ||
    text.includes('| component | raw | weighted |') ||
    (/^score:\s*\*?\*?\d/.test(text) && text.includes('season state')) ||
    (text.length < 180 && text.endsWith('?'));
};

const memorySectionFor = (kind, value) => {
  const text = String(value || '').toLowerCase();
  if (/computer-use|computer use|browser automation|playwright|desktop control/.test(text)) return 'Computer use and safety';
  if (/\bmodel\b|mcp server|langgraph|tool calling|multi-tool|orchestration/.test(text)) return 'Agent runtime';
  if (/\bmemory\b|obsidian|honcho|chromadb|fts5|reusable skills|playbooks/.test(text)) return 'Memory and knowledge';
  if (kind === 'project' || /\bproject\b|\bbuild(?:ing|s)?\b|\bdevelop(?:ing|ment)?\b|\bwork(?:ing|s)?\b/.test(text)) return 'Projects and work';
  if (kind === 'preference' || /\bprefers?\b|\blikes?\b|\bdislikes?\b|\bwants?\b/.test(text)) return 'Preferences';
  if (/\bgoal\b|\bplans?\b|\bpriority|\bdirection\b/.test(text)) return 'Goals and priorities';
  return 'About you';
};

const splitMemoryParagraphs = value => {
  const text = cleanMemoryDisplayText(value);
  if (text.length <= 430) return text ? [text] : [];
  const sentences = text.match(/[^.!?â€¦]+(?:[.!?â€¦]+|$)/g) || [text];
  const paragraphs = [];
  let current = '';
  sentences.forEach(sentence => {
    const next = (current + ' ' + sentence.trim()).trim();
    if (current && next.length > 430) {
      paragraphs.push(current);
      current = sentence.trim();
    } else {
      current = next;
    }
  });
  if (current) paragraphs.push(current);
  return paragraphs;
};

const buildMemorySummarySections = summary => {
  const raw = String((summary && summary.global_summary) || '').trim();
  if (!raw) return [];
  const markdownHeadings = raw.split(/\n(?=#{1,3}\s+)/).filter(Boolean);
  if (markdownHeadings.length > 1 || /^#{1,3}\s+/.test(raw)) {
    return markdownHeadings.map((block, index) => {
      const lines = block.split('\n');
      const headingMatch = lines[0].match(/^#{1,3}\s+(.+)$/);
      return {
        title: headingMatch ? cleanMemoryDisplayText(headingMatch[1]) : (index === 0 ? 'About you' : 'More context'),
        paragraphs: cleanMemoryDisplayText(headingMatch ? lines.slice(1).join('\n') : block).split(/\n\n+/).flatMap(splitMemoryParagraphs).filter(Boolean),
      };
    }).filter(section => section.paragraphs.length);
  }

  const records = raw.split(/\n(?=-\s+[a-z_-]+:\s*)/i).map(line => {
    const match = line.match(/^-\s+([a-z_-]+):\s*([\s\S]*)$/i);
    return {kind: match ? match[1].toLowerCase() : 'fact', text: cleanMemoryDisplayText(match ? match[2] : line)};
  }).filter(record => !isMemoryOperationalNoise(record.text));
  const groups = new Map();
  records.forEach(record => {
    splitMemoryParagraphs(record.text).forEach(paragraph => {
      const title = memorySectionFor(record.kind, paragraph);
      const values = groups.get(title) || [];
      if (!values.some(value => value.toLowerCase() === paragraph.toLowerCase())) values.push(paragraph);
      groups.set(title, values);
    });
  });
  const order = ['About you', 'Preferences', 'Goals and priorities', 'Projects and work', 'Computer use and safety', 'Agent runtime', 'Memory and knowledge'];
  return [...groups.entries()].sort((a, b) => {
    const ai = order.indexOf(a[0]);
    const bi = order.indexOf(b[0]);
    return (ai < 0 ? order.length : ai) - (bi < 0 ? order.length : bi);
  }).map(([title, paragraphs]) => ({title, paragraphs}));
};

const parseRecentMemoryRecord = memory => {
  const raw = String((memory && (memory.content || memory.text)) || '').replace(/\r/g, '');
  const conversation = (raw.match(/^Conversation:\s*(.+)$/m) || [])[1];
  const thread = (raw.match(/^Thread:\s*(.+)$/m) || [])[1];
  const questionMatch = raw.match(/^Q:\s*([\s\S]*?)(?=^A:\s*|(?![\s\S]))/m);
  const answerMatch = raw.match(/^A:\s*([\s\S]*?)(?=^Tools:\s*$|^Sources:\s*$|(?![\s\S]))/m);
  return {
    title: cleanMemoryDisplayText(conversation || (questionMatch && questionMatch[1]) || 'Recent conversation'),
    question: cleanMemoryDisplayText(questionMatch && questionMatch[1]),
    answer: cleanMemoryDisplayText(answerMatch && answerMatch[1]),
    thread: cleanMemoryDisplayText(thread || (memory && memory.source_thread_id) || ''),
  };
};

const SavedMemoriesCard = ({onClose, onChanged}) => {
  const [q, setQ] = useState('');
  const [items, setItems] = useState([]);
  const [archived, setArchived] = useState([]);
  const [recent, setRecent] = useState([]);
  const [tab, setTab] = useState('saved');
  const [menuOpen, setMenuOpen] = useState(false);
  const [autoManage, setAutoManage] = useState(true);
  const [rowMenu, setRowMenu] = useState(null);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [history, setHistory] = useState([]);
  const [busy, setBusy] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const load = async () => {
    setLoading(true);
    setError('');
    try {
      const [savedBody, archivedBody, summaryBody, settingsBody] = await Promise.all([
        API.settings.memorySaved(),
        API.settings.memoryEntries(),
        API.settings.memoryRecent(),
        API.settings.memorySettings(),
      ]);
      setItems(savedBody.entries || []);
      setArchived(archivedBody.entries || []);
      setRecent((summaryBody.entries || []).filter(item => item.kind === 'recent'));
      setHistory((summaryBody.summary && summaryBody.summary.audit_log) || []);
      setAutoManage(!settingsBody.settings || settingsBody.settings.dreaming_enabled !== false);
      if (onChanged) await onChanged();
    } catch (err) {
      setError('Memory backend unavailable.');
    } finally { setLoading(false); }
  };
  useEffect(() => { load(); }, []);
  const runAction = async action => {
    setBusy(true);
    setError('');
    try {
      await action();
      await load();
    } catch (err) {
      setError('Memory action failed.');
    } finally {
      setBusy(false);
      setRowMenu(null);
      setMenuOpen(false);
    }
  };
  const toggleAutoManage = async () => {
    const next = !autoManage;
    setAutoManage(next);
    try { await API.settings.updateMemorySettings({dreaming_enabled: next}); }
    catch (err) { setAutoManage(!next); setError('Could not update automatic memory management.'); }
  };
  const visibleSaved = items.filter(memory => !isMemoryOperationalNoise(memory && memory.text));
  const visibleArchived = archived.filter(memory => !isMemoryOperationalNoise(memory && memory.text));
  const visibleRecent = recent;
  const activeItems = tab === 'archived' ? visibleArchived : (tab === 'recent' ? visibleRecent : visibleSaved);
  const filtered = activeItems.filter(m => !q || String(m.text || '').toLowerCase().includes(q.toLowerCase()));
  return (
    <React.Fragment>
      <div className="backdrop dim mem-backdrop" onClick={onClose}/>
      <div className="sm-card" onClick={() => { setMenuOpen(false); setRowMenu(null); }}>
        <div className="sm-hd"><div className="sm-title">Saved memories</div><button className="mem-iconbtn" onClick={onClose}><IcX size={16}/></button></div>
        <div className="sm-toolbar" onClick={e => e.stopPropagation()}>
          <div className="sm-search"><IcSearch size={15}/><input placeholder="Search memories" value={q} onChange={e => setQ(e.target.value)}/></div>
          <button className="sm-tool" title="Refresh" disabled={busy} onClick={load}><IcRefresh size={16}/></button>
          <div className="sm-tool-wrap">
            <button className="sm-tool" onClick={() => setMenuOpen(o => !o)}><IcDots size={17}/></button>
            {menuOpen && <div className="sm-menu">
              <div className="sm-menu-row">Automatically manage<div className={'sw' + (autoManage ? ' on' : '')} role="switch" onClick={toggleAutoManage}/></div>
              <div className="sm-menu-item" onClick={() => { setHistoryOpen(h => !h); setMenuOpen(false); }}>View history</div>
              <div className="sm-menu-item" onClick={() => runAction(() => API.settings.memoryImportConversations())}>Import old chats</div>
            </div>}
          </div>
        </div>
        <div className="tab-row" style={{padding: '0 20px 12px'}}>
          <button className={'tab' + (tab === 'saved' ? ' on' : '')} onClick={() => setTab('saved')}>Saved ({visibleSaved.length})</button>
          <button className={'tab' + (tab === 'archived' ? ' on' : '')} onClick={() => setTab('archived')}>Old ({visibleArchived.length})</button>
          <button className={'tab' + (tab === 'recent' ? ' on' : '')} onClick={() => setTab('recent')}>Recent ({visibleRecent.length})</button>
        </div>
        {error && <div className="s-none">{error}</div>}
        {historyOpen && <div className="sm-list" style={{maxHeight: 150, borderBottom: '1px solid var(--line)'}} onClick={e => e.stopPropagation()}>
          {history.slice(0, 12).map(h => <div key={h.id} className="sm-row-meta">{h.event} - {h.detail}</div>)}
          {history.length === 0 && <div className="sm-empty">No memory history yet.</div>}
        </div>}
        <div className="sm-list" onClick={e => e.stopPropagation()}>
          {loading && <div className="sm-empty">Loading memories…</div>}
          {!loading && filtered.map(m => (
            <MemoryListRow key={m.id} memory={m} tab={tab} menuOpen={rowMenu === m.id}>
              <div className="sm-item-menu-wrap">
                <button className="sm-item-dots" onClick={() => setRowMenu(rowMenu === m.id ? null : m.id)}><IcDots size={16}/></button>
                {rowMenu === m.id && <div className="sm-row-menu" onClick={e => e.stopPropagation()}>
                  {tab === 'saved' && <div className="sm-row-del" onClick={() => {
                    const next = window.prompt('Update memory', m.text || '');
                    if (next !== null && next.trim()) runAction(() => API.settings.updateMemory(m.id, {text: next.trim()}));
                  }}><IcPenLine size={15}/>Edit</div>}
                  {tab === 'saved' && <div className="sm-row-del" onClick={() => runAction(() => API.settings.pinMemory(m.id, !m.pinned))}><IcCheck size={15}/>{m.pinned ? 'Unpin' : 'Pin'}</div>}
                  {tab === 'saved' && <div className="sm-row-del" onClick={() => runAction(() => API.settings.archiveMemory(m.id))}><IcArchive size={15}/>Archive</div>}
                  {tab !== 'recent' && <div className="sm-row-del" onClick={() => runAction(() => API.settings.deleteMemory(m.id))}><IcTrash size={15}/>Delete</div>}
                  <div className="sm-row-div"/>
                  <div className="sm-row-meta">{tab === 'archived' ? 'Archived' : (tab === 'recent' ? 'Indexed' : 'Saved')} {memoryEntryDate(m)} from <span className="sm-row-chat">{m.source_thread_id || 'chat'}</span>.</div>
                </div>}
              </div>
            </MemoryListRow>
          ))}
          {!loading && filtered.length === 0 && <div className="sm-empty">No {tab === 'archived' ? 'old' : (tab === 'recent' ? 'recent chat' : 'saved')} memories.</div>}
        </div>
      </div>
    </React.Fragment>
  );
};

const ACCENTS = [
  { id:'default', name:'Vellum', accent:'#988686', accent2:'#5c4e4e', swatch:['#988686','#b4a39f','#5c4e4e','#3a3433'] },
  { id:'blue-eclipse', name:'Blue eclipse', accent:'#505081', accent2:'#272757', swatch:['#272757','#8686AC','#505081','#0F0E47'] },
  { id:'winter-chill', name:'Winter chill', accent:'#4F7C82', accent2:'#0B2E33', swatch:['#B8E3E9','#93B1B5','#4F7C82','#0B2E33'] },
  { id:'autumn-leaves', name:'Autumn leaves', accent:'#DB9A39', accent2:'#614419', swatch:['#FFB343','#DB9A39','#B37E2E','#614419'] },
  { id:'eucalyptus', name:'Eucalyptus grove', accent:'#4B6E48', accent2:'#898989', swatch:['#B2AC88','#898989','#F2F0EF','#4B6E48'] },
  { id:'frozen-lake', name:'Frozen lake', accent:'#6D8196', accent2:'#000080', swatch:['#6D8196','#ADD8E6','#FFFAFA','#000080'] },
  { id:'siltstone', name:'Siltstone', accent:'#FFB16E', accent2:'#CCA25A', swatch:['#CBBD93','#FFF5B8','#FFB16E','#CCA25A'] },
  { id:'moonlight', name:'Under the moonlight', accent:'#5C5C99', accent2:'#292966', swatch:['#CCCCFF','#A3A3CC','#5C5C99','#292966'] },
  { id:'quiet-luxury', name:'Quiet luxury', accent:'#AD9C8E', accent2:'#D9BBB0', swatch:['#F7E6CA','#E8D59E','#D9BBB0','#AD9C8E'] },
  { id:'neon-noir', name:'Neon noir', accent:'#2CFF05', accent2:'#BF00FF', swatch:['#000000','#2CFF05','#BF00FF','#2D2D2D'] },
  { id:'cool-revival', name:'Cool revival', accent:'#00AEFF', accent2:'#00DE94', swatch:['#00FFFF','#00AEFF','#00DE94','#00FF52'] },
  { id:'matrix', name:'The matrix', accent:'#18e699', accent2:'#10540e', swatch:['#18e699','#1bbc68','#148526','#14250d'] },
];
function hexRgb(h){ h = (h || '#000000').replace('#',''); if (h.length === 3) h = h.split('').map(x=>x+x).join(''); const n = parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function relLum(h){ const [r,g,b] = hexRgb(h).map(v=>{ v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4); }); return 0.2126*r + 0.7152*g + 0.0722*b; }
function accentOn(h){ return relLum(h) > 0.5 ? '#14100f' : '#ffffff'; }
function accentRgba(h,a){ const [r,g,b] = hexRgb(h); return 'rgba('+r+','+g+','+b+','+a+')'; }
function applyAccent(id){
  const st = document.documentElement.style;
  const props = ['--ember','--accent2','--glow','--glow-soft','--grad','--onember','--accent-faded','--accent-deep','--accent-bg','--stage'];
  const a = ACCENTS.find(x=>x.id===id);
  if (!a || a.id === 'default') { props.forEach(p => st.removeProperty(p)); return; }
  const sorted = [...a.swatch].sort((x,y)=>relLum(y)-relLum(x));
  const bright = a.accent;
  const faded = sorted[1] || a.accent2;
  const deep = a.accent2;
  const back = sorted[sorted.length - 1] || a.accent2;
  st.setProperty('--ember', bright);
  st.setProperty('--accent2', deep);
  st.setProperty('--accent-faded', faded);
  st.setProperty('--accent-deep', deep);
  st.setProperty('--accent-bg', back);
  st.setProperty('--glow', accentRgba(bright, 0.34));
  st.setProperty('--glow-soft', accentRgba(bright, 0.15));
  st.setProperty('--grad', 'linear-gradient(135deg,'+bright+','+faded+')');
  st.setProperty('--onember', accentOn(bright));
  st.setProperty('--stage',
    'radial-gradient(1100px 740px at 13% -8%,'+accentRgba(faded,0.18)+',transparent 56%),' +
    'radial-gradient(1050px 720px at 93% 5%,'+accentRgba(deep,0.24)+',transparent 56%),' +
    'radial-gradient(900px 720px at 60% 112%,'+accentRgba(bright,0.10)+',transparent 60%),' +
    'linear-gradient(155deg,'+accentRgba(back,0.60)+' 0%,var(--bg) 58%,'+accentRgba(back,0.45)+' 100%)');
}

const SpotifyConnectModal = ({onClose, onConnected}) => {

      } catch (_) {}
    }, 1800);
    return () => clearInterval(timer);
  }, [waiting, onConnected]);
  const begin = async () => {
    const value = clientId.trim();

      setWaiting(true);
    } catch (err) {

          <div className="spotify-step"><span className="spotify-step-n">2</span><div className="spotify-step-copy" style={{width:'100%'}}><b>Paste the public Client ID</b>Vellum stores it with your local refresh token. It is never sent to the model.<div className="spotify-client-field"><label htmlFor="spotify-client-id">Spotify Client ID</label><input id="spotify-client-id" value={clientId} onChange={e => setClientId(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') begin(); }} autoComplete="off" spellCheck="false" placeholder="Your Spotify Client ID"/></div></div></div>

      </div>

  );
};

const fmtSpotifyTime = ms => {
  const seconds = Math.max(0, Math.floor((Number(ms) || 0) / 1000));
  return Math.floor(seconds / 60) + ':' + String(seconds % 60).padStart(2, '0');
};

const SpotifyPlayer = ({spotify, dockSide='top', onReconnect}) => {
  const connected = !!(spotify && spotify.connected);
  const [player, setPlayer] = useState(null);
  const [open, setOpen] = useState(false);
  const [error, setError] = useState('');
  const timerRef = useRef(null);
  const stoppedRef = useRef(false);
  const refresh = async details => {
    try {
      const next = await SpotifyAPI.player(!!details);
      setPlayer(prev => ({...(prev || {}),...next,devices:next.devices || (prev && prev.devices) || [],queue:next.queue || (prev && prev.queue) || []}));
      setError('');
      return next;
    } catch (err) {
      const message = err && err.message ? err.message : 'Spotify is unavailable.';
      setError(message);
      if (/not connected|authorization/i.test(message)) onReconnect();
      throw err;
    }
  };
  useEffect(() => {
    if (!connected) { setPlayer(null); setOpen(false); return; }
    stoppedRef.current = false;
    const schedule = delay => { clearTimeout(timerRef.current); timerRef.current = setTimeout(tick, delay); };
    const tick = async () => {
      if (stoppedRef.current) return;
      if (document.visibilityState !== 'visible') { schedule(5000); return; }
      try {
        const next = await refresh(false);
        schedule(next && next.is_playing ? 5000 : 15000);
      } catch (err) {
        schedule(/rate|429/i.test(err && err.message || '') ? 30000 : 15000);
      }
    };
    const onVisibility = () => { if (document.visibilityState === 'visible') { clearTimeout(timerRef.current); tick(); } };
    document.addEventListener('visibilitychange', onVisibility);
    tick();
    return () => { stoppedRef.current = true; clearTimeout(timerRef.current); document.removeEventListener('visibilitychange', onVisibility); };
  }, [connected]);
  useEffect(() => { if (connected && open) refresh(true).catch(() => {}); }, [connected, open]);
  useEffect(() => {
    if (!connected) return;
    const onAgentAction = () => refresh(open).catch(() => {});
    window.addEventListener('vellum:spotify-player-refresh', onAgentAction);
    return () => window.removeEventListener('vellum:spotify-player-refresh', onAgentAction);
  }, [connected, open]);
  if (!connected) return null;
  const isPlaying = !!(player && player.is_playing);
  const track = player && player.track;
  const artists = player && Array.isArray(player.artists) ? player.artists.join(', ') : '';
  const run = async body => {
    try { await SpotifyAPI.action(body); await refresh(open); }
    catch (err) { setError(err && err.message ? err.message : 'Spotify action failed.'); }
  };
  const toggle = event => { event.stopPropagation(); run({action:isPlaying ? 'pause' : 'play'}); };
  const repeatNext = !player || player.repeat === 'off' ? 'context' : player.repeat === 'context' ? 'track' : 'off';
  return (
    <div className={'spotify-player-shell side-' + dockSide}>
      <div className="spotify-player-pill" role="button" tabIndex="0" aria-label="Open Spotify player" onClick={() => setOpen(v => !v)} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setOpen(v => !v); } }}>
        {player && player.artwork_url ? <img className="spotify-art" src={player.artwork_url} alt=""/> : <span className="spotify-art spotify-art-fallback"><I d="M9 18V5l10-2v13M9 9l10-2M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6M16 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6" size={17}/></span>}
        <span className="spotify-now"><b>{track ? track.name : 'Spotify idle'}</b><span>{artists || (player && player.device && player.device.name) || 'Open Spotify on a device'}</span></span>
        <button className="spotify-mini-btn primary" aria-label={isPlaying ? 'Pause Spotify' : 'Play Spotify'} title={isPlaying ? 'Pause' : 'Play'} onClick={toggle}>{isPlaying ? <I d="M9 6v12M15 6v12" size={14}/> : <I><path d="M8 5l11 7-11 7z" fill="currentColor" stroke="none"/></I>}</button>
        <button className="spotify-mini-btn" aria-label="Next Spotify track" title="Next" onClick={e => { e.stopPropagation(); run({action:'next'}); }}><I d="M6 5l9 7-9 7V5zM18 5v14" size={14}/></button>
      </div>
      {open && <div className="spotify-player-panel">
        <div className="spotify-panel-track">
          {player && player.artwork_url ? <img className="spotify-art" src={player.artwork_url} alt=""/> : <span className="spotify-art spotify-art-fallback"><I d="M9 18V5l10-2v13M6 21a3 3 0 1 0 0-6" size={20}/></span>}
          <div className="spotify-panel-copy"><b>{track ? track.name : 'Nothing playing'}</b><span>{artists || 'Choose music in Spotify or ask Vellum'}</span></div>
        </div>
        <div className="spotify-progress"><input className="spotify-range" aria-label="Spotify playback position" type="range" min="0" max={Math.max(1,player && player.duration_ms || 1)} value={Math.min(player && player.progress_ms || 0,player && player.duration_ms || 1)} onChange={e => setPlayer(p => ({...(p || {}),progress_ms:Number(e.target.value)}))} onMouseUp={e => run({action:'seek',position_ms:Number(e.currentTarget.value)})} onTouchEnd={e => run({action:'seek',position_ms:Number(e.currentTarget.value)})}/><div className="spotify-times"><span>{fmtSpotifyTime(player && player.progress_ms)}</span><span>{fmtSpotifyTime(player && player.duration_ms)}</span></div></div>
        <div className="spotify-controls">
          <button className={'spotify-control' + (player && player.shuffle ? ' on' : '')} aria-label="Toggle shuffle" title="Shuffle" onClick={() => run({action:'set_shuffle',shuffle:!(player && player.shuffle)})}><I d="M16 3h5v5M4 20l16-16M4 4l5 5M15 15l6 6M16 21h5v-5" size={15}/></button>
          <button className="spotify-control" aria-label="Previous track" title="Previous" onClick={() => run({action:'previous'})}><I d="M18 5l-9 7 9 7V5zM6 5v14" size={16}/></button>
          <button className="spotify-control primary" aria-label={isPlaying ? 'Pause' : 'Play'} onClick={() => run({action:isPlaying ? 'pause' : 'play'})}>{isPlaying ? <I d="M9 6v12M15 6v12" size={17}/> : <I><path d="M8 5l11 7-11 7z" fill="currentColor" stroke="none"/></I>}</button>
          <button className="spotify-control" aria-label="Next track" title="Next" onClick={() => run({action:'next'})}><I d="M6 5l9 7-9 7V5zM18 5v14" size={16}/></button>

      const saved = (savedBody && Array.isArray(savedBody.memories || savedBody.entries)) ? (savedBody.memories || savedBody.entries) : ((summary && Array.isArray(summary.saved_memories)) ? summary.saved_memories : []);
      const recent = (summary && Array.isArray(summary.recent_context)) ? summary.recent_context : [];
      setMemoryData({

        entries: recent,

        archived: (archivedBody && Array.isArray(archivedBody.memories || archivedBody.entries)) ? (archivedBody.memories || archivedBody.entries) : [],

  async function maybeRunDreaming() {
    try {
      const memorySettings = await API.settings.memorySettings().catch(() => ({settings: null}));

      const last = Number(localStorage.getItem('vellum-last-dreaming-run') || 0);
      const sixHours = 6 * 60 * 60 * 1000;
      if (last && Date.now() - last < sixHours) return;
      localStorage.setItem('vellum-last-dreaming-run', String(Date.now()));
      await API.settings.memoryDreamingRun();
      await refreshMemoryData();
    } catch (err) {

  const streamAgentReply = (agentId, convoId, msgId, data) => {
    const payload = typeof data === 'string' ? {answer:data, ...buildActivity(data)} : data;
    startAgentTurnPhases(agentId, convoId, msgId, payload);
    let i = 0;
    const startAnswer = () => {
      finishTurn(msgId);
      const tick = () => {
        i += 3;
        const done = i >= payload.answer.length;
        updateAgentTurn(agentId, convoId, msgId, m => ({
          ...m,
          text: payload.answer.slice(0, i),
          phase: done ? 'done' : 'answering',
          refShown:(m.refLines || []).length,
          streaming: !done,
        }));
        if (!done) timers.current[msgId] = setTimeout(tick, 22);
      };
      tick();
    };
    turnCtl.current[msgId].startAnswer = startAnswer;
    turnCtl.current[msgId].timers.push(setTimeout(startAnswer, 2600));
  };
  const updateAgentConvo = (agentId, convoId, mapper) => {

  const streamBackendAgentReply = async (agent, convoId, assistantId, message, attachments = [], opts = {}) => {
    const routedMessage = agent && agent.name
      ? `[Vellum UI context: the user is currently chatting in the ${agent.name} view. Answer normally and allow casual conversation. Use ${agent.name} as a specialist tool only when it is actually useful for this request.]\n\n${message}`
      : message;
    const completedSpotifyTools = new Set();
    try {
      await API.chat.stream(
        {message: routedMessage, thread_id: convoId, model: selModel, store: true, attachments, force_web_search: !!opts.forceWebSearch},
        {
          controller: controller => {
            const ctl = turnCtl.current[assistantId] || {agentId: agent.id, convoId, timers: []};
            ctl.agentId = agent.id;
            ctl.convoId = convoId;
            ctl.controller = controller;
            turnCtl.current[assistantId] = ctl;
          },
          trace: trace => {
            const liveSources = normalizeSources(trace.sources || []);
            updateAgentTurn(agent.id, convoId, assistantId, m => ({
              ...m,
              sources: liveSources.length ? liveSources : m.sources,
              steps: liveSources.length ? activityFromSources(liveSources, m.steps) : stepsFromActivity(trace.steps, m.steps),
              refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : refLinesFromActivity(trace.steps, m.refLines)),
              tools: trace.tools || m.tools || [],
              phase: FEATURE_FLAGS.realChat ? m.phase : (m.phase === 'thinking' ? 'refs' : m.phase),
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, liveSources.length ? 2 : 1),
              streaming: true,
            }));
          },
          activity: (activity, tools) => {
            activity.forEach(item => {
              const key = item && (item.id || item.name);
              if (key && String(item.name || '').startsWith('spotify_') && item.status === 'completed' && !completedSpotifyTools.has(key)) {
                completedSpotifyTools.add(key);
                window.dispatchEvent(new CustomEvent('vellum:spotify-player-refresh'));
              }
            });
            updateAgentTurn(agent.id, convoId, assistantId, m => ({
              ...m,
              activity,
              tools,
              steps: stepsFromActivity(activity, m.steps),
              refLines: FEATURE_FLAGS.realChat ? [] : refLinesFromActivity(activity, m.refLines),
              phase: FEATURE_FLAGS.realChat ? m.phase : (m.phase === 'thinking' ? 'refs' : m.phase),
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, 1),
              streaming: true,
            }));
          },
          sources: sources => {
            const liveSources = normalizeSources(sources);
            updateAgentTurn(agent.id, convoId, assistantId, m => ({
              ...m,
              sources: liveSources.length ? liveSources : m.sources,
              steps: liveSources.length ? activityFromSources(liveSources, m.steps) : m.steps,
              refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : m.refLines),
              phase: FEATURE_FLAGS.realChat ? m.phase : 'refs',
              refShown: FEATURE_FLAGS.realChat ? 0 : Math.max(m.refShown || 0, liveSources.length ? 2 : 1),
              streaming: true,
            }));
          },
          delta: text => {
            finishTurn(assistantId);
            updateAgentTurn(agent.id, convoId, assistantId, m => ({
              ...m,
              text,
              phase: 'answering',
              refShown: FEATURE_FLAGS.realChat ? 0 : (m.refLines || []).length,
              refLines: FEATURE_FLAGS.realChat ? [] : m.refLines,
              leadIn: FEATURE_FLAGS.realChat ? '' : m.leadIn,
              streaming: true,
            }));
          },
          error: error => {
            finishTurn(assistantId);
            updateAgentTurn(agent.id, convoId, assistantId, m => ({...m, text: 'Backend error: ' + error, phase:'done', streaming: false}));
          },
          done: final => {
            finishTurn(assistantId);
            const liveSources = normalizeSources(final.sources || []);
            updateAgentTurn(agent.id, convoId, assistantId, m => ({
              ...m,
              text: final.text || m.text || 'No response.',
              sources: liveSources.length ? liveSources : m.sources || [],
              steps: liveSources.length ? activityFromSources(liveSources, m.steps) : m.steps,
              refLines: FEATURE_FLAGS.realChat ? [] : (liveSources.length ? refLinesFromSources(liveSources, m.refLines) : m.refLines),
              tools: final.tools || m.tools || [],
              activity: final.activity || m.activity || [],
              phase: 'done',
              refShown: FEATURE_FLAGS.realChat ? 0 : (m.refLines || []).length,
              leadIn: FEATURE_FLAGS.realChat ? '' : m.leadIn,
              streaming: false,
            }));
          },
        }
      );
    } catch (err) {
      finishTurn(assistantId);
      const aborted = err && (err.name === 'AbortError' || String(err.message || '').toLowerCase().includes('abort'));
      updateAgentTurn(agent.id, convoId, assistantId, m => ({...m, text: aborted ? (m.text || 'Stopped.') : 'Backend unreachable. Start the Vellum API and try again.', phase:'done', streaming: false}));
    }
  };
  const sendToAgent = (text, attach, opts = {}) => {
    const ag = AGENTS.find(a => a.id === activeAgentId);
    if (!ag) return;
    const userMsg = {id: uid(), role: 'user', text, attachments: attach};
    const reply = agentReply(ag, text);
    const act = activitySeedForMode(text);
    const aMsg = {id: uid(), role: 'assistant', text: '', full: reply, streaming: true, activity: [], sources: act.sources, tools: [], phase:'thinking', refShown:0, refLines:act.refLines, steps:act.steps, duration:act.duration, leadIn:act.leadIn, suppressActivity: !!act.suppressActivity};
    let cid = activeConvo[ag.id];
    if (!cid) {
      cid = uid();
      const title = (text.trim().replace(/\s+/g, ' ').slice(0, 42)) || 'New conversation';
      setAgentConvos(ac => ({...ac, [ag.id]: [{id: cid, title, when: 'now', messages: [userMsg, aMsg]}, ...(ac[ag.id] || [])]}));
      setActiveConvo(a => ({...a, [ag.id]: cid}));

    if (FEATURE_FLAGS.realChat) {
      streamBackendAgentReply(ag, cid, aMsg.id, messageForBackend(text, attach, null), attach, opts);

      streamAgentReply(ag.id, cid, aMsg.id, {...act, answer: reply});

  };
