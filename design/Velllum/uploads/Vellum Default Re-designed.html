<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vellum — Default Mode (preview)</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="api/client.js"></script>
<script src="api/chat.js"></script>
<script src="api/conversations.js"></script>
<script src="api/plugins.js"></script>
<script src="api/automations.js"></script>
<script src="api/settings.js"></script>
<script src="api/runtimes.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0908;--panel:rgba(255,255,255,.028);--tb:rgba(0,0,0,.42);--line:rgba(255,255,255,.075);--line2:rgba(255,255,255,.13);
  --txt:#d1d0d0;--txt2:#f2f0f0;--dim:#928a88;--dim2:#6f6664;
  --ember:#988686;--accent2:#5c4e4e;--glow:rgba(152,134,134,.38);
  --grad:linear-gradient(120deg,#988686 0%,#5c4e4e 100%);
  --hover:rgba(255,255,255,.05);--active:rgba(255,255,255,.09);--bubble:rgba(255,255,255,.05);--modal:#1a1717;--input:rgba(255,255,255,.045);
  --glass:rgba(16,13,13,.62);
  --glass-win:rgba(9,8,8,.72);--glass-bar:rgba(0,0,0,.45);--glass-side:rgba(255,255,255,.022);--menu-solid:#1b1819;
  --stage:radial-gradient(1100px 740px at 13% -8%,rgba(152,134,134,.16),transparent 56%),radial-gradient(1050px 720px at 93% 5%,rgba(92,78,78,.20),transparent 56%),radial-gradient(900px 720px at 60% 122%,rgba(152,134,134,.08),transparent 55%),linear-gradient(155deg,#0c0b0a 0%,#070605 60%,#050404 100%);
  --winborder:rgba(255,255,255,.11);--shadow:0 50px 140px rgba(0,0,0,.74);--scroll:rgba(255,255,255,.14);
  --onember:#ffffff;--danger:#f08a8a;
  --font-d:"Clash Grotesk","Poppins","Helvetica Neue",system-ui,sans-serif;
  --font-m:"Spline Sans Mono",ui-monospace,Consolas,monospace;
}
[data-theme="light"]{
  --bg:#f2f0f0;--panel:rgba(255,255,255,.55);--tb:rgba(255,255,255,.52);--line:rgba(20,14,14,.10);--line2:rgba(20,14,14,.16);
  --txt:#2b2727;--txt2:#0d0b0b;--dim:#6c6464;--dim2:#a59c9c;
  --ember:#7a6a6a;--accent2:#5c4e4e;--glow:rgba(122,106,106,.30);
  --grad:linear-gradient(120deg,#7a6a6a 0%,#5c4e4e 100%);
  --hover:rgba(20,14,14,.05);--active:rgba(20,14,14,.09);--bubble:rgba(255,255,255,.65);--modal:rgba(253,252,252,.98);--input:rgba(255,255,255,.62);
  --glass:rgba(255,255,255,.72);
  --glass-win:rgba(244,242,242,.66);--glass-bar:rgba(255,255,255,.52);--glass-side:rgba(255,255,255,.34);--menu-solid:#fdfcfc;
  --stage:radial-gradient(1100px 740px at 13% -8%,rgba(122,106,106,.18),transparent 56%),radial-gradient(1050px 720px at 93% 5%,rgba(92,78,78,.15),transparent 56%),linear-gradient(155deg,#efedec 0%,#e9e6e6 60%,#e4e0e0 100%);
  --winborder:rgba(255,255,255,.80);--shadow:0 40px 120px rgba(30,30,40,.22);--scroll:rgba(10,10,14,.18);
  --onember:#ffffff;--danger:#cf4540;
}
html,body{height:100%}
body{background:#050404;color:var(--txt);font-family:"Lexend","Helvetica Neue",Helvetica,system-ui,sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100vh}
.stage{height:100vh;padding:20px;background:var(--stage);position:relative;overflow:hidden}
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:26px 26px;-webkit-mask-image:radial-gradient(circle at 50% 28%,#000 22%,transparent 78%);mask-image:radial-gradient(circle at 50% 28%,#000 22%,transparent 78%);opacity:.6}
[data-theme="light"] .stage::after{background-image:radial-gradient(rgba(20,45,70,.07) 1px,transparent 1px)}
.win{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;background:var(--glass-win);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid var(--winborder);border-radius:18px;overflow:hidden;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.13)}
/* titlebar */
.titlebar{position:relative;display:flex;align-items:center;height:38px;background:var(--glass-bar);border-bottom:1px solid var(--line);padding-left:12px;flex-shrink:0}
.appmark{width:15px;height:15px;border-radius:5px;background:var(--grad);margin-right:10px;box-shadow:0 0 12px var(--glow)}
.menu{display:flex;gap:2px;font-size:12.5px;color:var(--dim);position:absolute;left:50%;transform:translateX(-50%)}
.menu span{padding:3px 8px;border-radius:5px;cursor:default}
.menu span:hover{background:var(--hover);color:var(--txt)}
.tb-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:var(--dim)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:4px;padding-right:8px}
.tbtn{width:28px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:6px;cursor:pointer;background:none;border:none}
.tbtn:hover{background:var(--hover);color:var(--txt2)}
.wc{width:28px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:5px;cursor:default}
.wc:hover{background:var(--hover)}.wc.close:hover{background:#c0392b;color:#fff}
/* body */
.body{flex:1;display:flex;min-height:0;position:relative}
/* sidebar — expanded */
.sidebar{width:260px;background:var(--glass-side);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;padding:10px 8px 8px;overflow:hidden}
.sidebar.overlay{position:absolute;top:0;left:0;height:100%;z-index:120;transform:translateX(-102%);transition:transform .24s cubic-bezier(.4,0,.2,1);background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);box-shadow:0 30px 70px rgba(0,0,0,.55)}
.sidebar.overlay.open{transform:translateX(0)}
.sb-trigger{position:absolute;top:0;left:0;width:16px;height:100%;z-index:80}
.tbtn.on{background:var(--active);color:var(--ember)}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 10px}
.wordmark{font-size:16px;color:var(--txt2);letter-spacing:-.01em}
.wordmark em{color:var(--ember);font-style:italic}
.sb-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:8px;color:var(--txt);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-row:hover{background:var(--hover)}
.sb-row.active{background:var(--active);color:var(--txt2)}
.sb-row .sb-ic{color:var(--dim);flex-shrink:0;display:flex}
.sb-row.active .sb-ic{color:var(--txt)}
.sb-sec{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:16px 9px 6px;flex-shrink:0}
.sec-chev{display:flex;color:var(--dim2);background:none;border:none;cursor:pointer;padding:2px;border-radius:4px;transition:transform .2s,color .15s}
.sec-chev:hover{color:var(--txt)}
.sec-chev.closed{transform:rotate(-90deg)}
.sb-scroll{flex:1;overflow-y:auto;min-height:0}
.sb-list{}
.fold{position:relative;width:16px;height:16px;flex-shrink:0;cursor:pointer}
.fold>span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .18s,transform .25s;color:var(--dim)}
.fold:hover>span{color:var(--ember)}
.fold .f-open{opacity:0;transform:rotate(-8deg) scale(.85)}
.fold.on .f-open{opacity:1;transform:none}
.fold.on .f-closed{opacity:0;transform:rotate(8deg) scale(.85)}
.chat-row{position:relative;display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;color:var(--txt);font-size:12.5px;cursor:pointer}
.chat-row:hover{background:var(--hover)}
.chat-row.active{background:var(--active);color:var(--txt2)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-pin{color:var(--dim);display:flex;flex-shrink:0}
.chat-dots{display:none;background:none;border:none;color:var(--dim);cursor:pointer;border-radius:5px;padding:2px;flex-shrink:0}
.chat-row:hover .chat-dots{display:flex}
.chat-dots:hover{color:var(--txt2);background:var(--active)}
.rename-input{flex:1;background:var(--input);border:1px solid var(--line2);border-radius:5px;color:var(--txt2);font:inherit;font-size:12.5px;padding:2px 6px;outline:none;min-width:0}
.sb-empty{padding:8px 9px;color:var(--dim2);font-size:12px;font-style:italic}
.chat-row.nested{margin-left:22px}
.crumb{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:12.5px;color:var(--dim);border-bottom:1px solid var(--line);flex-shrink:0}
/* project page */
.proj-head{display:flex;align-items:center;gap:12px;margin-top:6px}
.proj-head .sb-ic{color:var(--dim);display:flex}
.proj-name{font-size:24px;color:var(--txt2);letter-spacing:-.02em}
.proj-mem{font-size:11px;color:var(--dim);border:1px solid var(--line2);border-radius:12px;padding:2px 9px}
.proj-comp{display:flex;justify-content:center;margin:20px 0 24px}
.src-card{border:1.5px dashed var(--line2);border-radius:14px;padding:44px 30px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.src-icons{display:flex;gap:6px;margin-bottom:8px}
.src-icons .kind-ic{width:34px;height:34px}
.src-title{font-size:15px;color:var(--txt2);font-weight:500}
.src-sub{font-size:12.5px;color:var(--dim);max-width:400px;line-height:1.5}
.src-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2)}
.src-row .lt-dim{margin-left:auto}
.proj-chat-row{display:flex;align-items:center;gap:11px;padding:11px 10px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2);cursor:pointer;border-radius:8px}
.proj-chat-row:hover{background:var(--hover)}
.proj-empty{padding:60px 20px;text-align:center}
.proj-empty .pe-t{font-size:14.5px;color:var(--txt2);margin-bottom:5px}
.proj-empty .pe-s{font-size:12.5px;color:var(--dim)}
/* create project modal */
.hintcard{display:flex;gap:10px;align-items:flex-start;background:var(--hover);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:16px}
.hintcard .sb-ic{color:var(--dim);display:flex;margin-top:1px}
.gear-pop{position:absolute;right:14px;top:50px;z-index:70;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;width:268px;box-shadow:0 14px 50px rgba(0,0,0,.45)}
.gp-head{font-size:12px;color:var(--dim);padding:7px 10px 2px}
.gp-note{font-size:11px;color:var(--dim2);padding:0 10px 6px}
.gp-item{padding:8px 10px;border-radius:8px;cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.gp-item:hover{background:var(--hover)}
.gp-item b{font-size:12.5px;color:var(--txt2);font-weight:500;display:block;margin-bottom:1px}
.gp-item p{font-size:11.5px;color:var(--dim);line-height:1.45}
.btn.primary:disabled{background:var(--line2);border-color:var(--line2);color:var(--dim);cursor:not-allowed;filter:none}
/* ledger */
.led-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.led-card{border:1px solid var(--line);border-radius:13px;padding:16px}
.led-k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.led-v{font-size:21px;color:var(--txt2);letter-spacing:-.02em}
.led-v small{font-size:12.5px;color:var(--dim);margin-left:7px}
.led-row{display:flex;align-items:baseline;gap:10px;padding:7px 2px;font-size:13px;color:var(--txt)}
.led-row .rn{color:var(--dim2);font-style:italic;width:22px}
.led-row .lv{margin-left:auto;color:var(--dim);font-size:12.5px}
.quiet-foot{margin-top:22px;font-size:12px;color:var(--dim2);font-style:italic}
/* skills */
.skill-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.skill-card .sk-meta{flex:1;min-width:0}
.skill-card h4{font-size:13.5px;color:var(--txt2);font-weight:500;margin-bottom:3px}
.skill-card p{font-size:12px;color:var(--dim)}
.skill-card .trig{color:var(--ember)}
/* memory */
.mem-cat{font-size:10px;color:var(--dim);border:1px solid var(--line2);border-radius:10px;padding:1px 8px;flex-shrink:0;text-transform:lowercase;letter-spacing:.02em}
.mem-sub{font-size:13px;color:var(--dim);line-height:1.55;margin:-4px 2px 20px;max-width:580px}
.mem-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.mem-stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.ms-n{font-family:var(--font-d);font-size:21px;color:var(--txt2);letter-spacing:-.01em;font-weight:600;line-height:1}
.ms-l{font-size:11px;color:var(--dim);margin-top:5px}
.mem-filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px}
.mem-fpill{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 9px;border:1px solid var(--line2);border-radius:18px;background:var(--glass);color:var(--txt);font:inherit;font-size:12px;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.mem-fpill:hover{color:var(--txt2);border-color:var(--dim2)}
.mem-fpill.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 14px var(--glow)}
.mem-fpill .mf-ic{display:flex;opacity:.9}
.mf-c{font-size:10px;opacity:.75;background:color-mix(in srgb,var(--txt) 10%,transparent);border-radius:8px;padding:0 6px;min-width:17px;text-align:center;line-height:16px}
.mem-fpill.on .mf-c{background:rgba(255,255,255,.24);opacity:1}
.mem-group{margin-bottom:24px}
.mem-group-head{display:flex;align-items:center;gap:9px;font-family:var(--font-d);font-size:13.5px;font-weight:600;color:var(--txt2);margin-bottom:11px;letter-spacing:-.005em}
.mem-src-ic{display:flex;width:25px;height:25px;align-items:center;justify-content:center;border-radius:7px;background:var(--grad);color:#fff;box-shadow:0 2px 9px var(--glow)}
.mem-group-c{font-size:11px;color:var(--dim);font-weight:400;font-family:"Lexend",sans-serif}
.mem-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:10px}
.mem-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px 14px;transition:border-color .18s,transform .18s,box-shadow .18s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.mem-card:hover{border-color:var(--line2);transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.16)}
.mem-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mem-when{font-size:10.5px;color:var(--dim2)}
.mem-card-text{font-size:12.5px;color:var(--txt);line-height:1.5}
.mem-forget{position:absolute;top:9px;right:9px;width:24px;height:24px;display:none;align-items:center;justify-content:center;border:none;background:var(--hover);color:var(--dim);border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
.mem-card:hover .mem-forget{display:flex}
.mem-forget:hover{background:var(--active);color:var(--danger)}
/* archive */
.arc-row{display:flex;align-items:center;gap:11px;padding:10px 8px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2)}
.arc-row .arc-act{margin-left:auto;display:flex;gap:7px}
/* settings modal */
.set-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;width:660px;max-width:94vw;height:min(460px,86vh);background:var(--modal);border:1px solid var(--line2);border-radius:16px;box-shadow:0 30px 100px rgba(0,0,0,.55);display:flex;overflow:hidden}
.set-nav{width:170px;border-right:1px solid var(--line);padding:14px 8px;flex-shrink:0}
.set-nav .sn-title{font-size:14px;color:var(--txt2);font-weight:500;padding:2px 10px 12px}
.set-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--txt);font-size:12.5px;cursor:pointer}
.set-item:hover{background:var(--hover)}
.set-item.on{background:var(--active);color:var(--txt2)}
.set-body{flex:1;padding:20px 22px;overflow-y:auto;min-width:0}
.set-h{font-size:14px;color:var(--txt2);font-weight:500;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt)}
.set-row .sr-sub{display:block;font-size:11.5px;color:var(--dim);margin-top:2px}
.set-row .sr-end{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.set-note{font-size:11.5px;color:var(--dim2);font-style:italic;margin-top:14px}
.sw{width:34px;height:19px;border-radius:11px;background:var(--line2);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.sw::after{content:"";position:absolute;left:2.5px;top:2.5px;width:14px;height:14px;border-radius:50%;background:var(--bg);transition:left .15s}
.sw.on{background:var(--ember)}
.sw.on::after{left:17.5px}
.pdrop{position:relative;display:inline-flex}
.pdrop-btn{display:flex;align-items:center;gap:6px;background:var(--input);border:1px solid var(--line2);border-radius:8px;padding:6px 11px;color:var(--txt2);font:inherit;font-size:12.5px;cursor:pointer;white-space:nowrap}
.pdrop-btn:hover{border-color:var(--dim2)}
.pdrop-menu{position:absolute;top:calc(100% + 5px);right:0;background:var(--menu-solid);border:1px solid var(--line2);border-radius:11px;padding:5px;z-index:30;box-shadow:0 16px 50px rgba(0,0,0,.5);max-height:300px;overflow-y:auto}
.pdrop-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:8px 10px;border-radius:8px;cursor:pointer}
.pdrop-item:hover{background:var(--hover)}
.pdrop-il{display:flex;flex-direction:column;gap:1px;min-width:0}
.pdrop-label{font-size:13px;color:var(--txt2)}
.pdrop-sub{font-size:11px;color:var(--dim)}
.pdrop-check{color:var(--txt2);display:flex;flex-shrink:0}
.pers-sub{font-size:13px;color:var(--txt2);font-weight:500;margin:20px 0 2px;display:flex;flex-direction:column;gap:2px}
.pers-sub-note{font-size:11.5px;color:var(--dim);font-weight:400}
.pers-h{font-size:14px;color:var(--txt2);font-weight:500;margin:26px 0 8px;padding-top:18px;border-top:1px solid var(--line)}
.pers-field{display:flex;flex-direction:column;gap:7px;padding:12px 2px;border-bottom:1px solid var(--line)}
.pers-field label{font-size:13px;color:var(--txt2)}
.pers-field input,.pers-ta{background:var(--input);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;color:var(--txt2);font:inherit;font-size:13px;outline:none}
.pers-field input:focus,.pers-ta:focus{border-color:color-mix(in srgb,var(--ember) 45%,var(--line2))}
.pers-field input::placeholder,.pers-ta::placeholder{color:var(--dim2)}
.pers-ta{min-height:46px;resize:vertical;line-height:1.5}
.pop-acct{position:relative}
.pop-acct-meta{display:flex;flex-direction:column;line-height:1.25;flex:1;min-width:0}
.pop-acct-plan{font-size:11px;color:var(--dim)}
.pop-acct-chev{margin-left:auto;color:var(--dim);display:flex}
.pop-submenu{position:absolute;left:calc(100% + 8px);top:-6px;width:228px;background:var(--modal);border:1px solid var(--line2);border-radius:13px;padding:6px;box-shadow:0 18px 60px rgba(0,0,0,.5);z-index:60}
.avatar.sm{width:24px;height:24px;font-size:10px}
.mem-link{color:var(--ember);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.mem-link:hover{filter:brightness(1.15)}
.mem-backdrop{z-index:78}
.memsum-card,.sm-card{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:80;width:680px;max-width:94vw;height:min(620px,88vh);background:var(--modal);border:1px solid var(--line2);border-radius:18px;display:flex;flex-direction:column;box-shadow:0 30px 90px rgba(0,0,0,.55);overflow:hidden}
.mem-card-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px}
.mem-card-title{font-family:var(--font-d);font-size:18px;font-weight:600;color:var(--txt2);display:flex;align-items:baseline;gap:10px}
.mem-card-upd{font-size:12px;color:var(--dim);font-weight:400;font-family:var(--font-ui)}
.mem-card-acts{display:flex;align-items:center;gap:4px}
.mem-menu-wrap{position:relative;display:flex}
.mem-iconbtn{width:32px;height:32px;border-radius:8px;border:none;background:none;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s}
.mem-iconbtn:hover{background:var(--hover);color:var(--txt2)}
.mem-menu{position:absolute;top:calc(100% + 6px);right:0;width:252px;background:var(--menu-solid);border:1px solid var(--line2);border-radius:12px;padding:6px;z-index:5;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.mem-menu-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;font-size:13.5px;color:var(--txt);cursor:pointer}
.mem-menu-item:hover{background:var(--hover);color:var(--txt2)}
.mem-menu-item.danger{color:var(--danger)}
.mem-menu-item.danger:hover{background:color-mix(in srgb,var(--danger) 12%,transparent)}
.mem-card-body{flex:1;overflow-y:auto;padding:4px 24px 16px}
.mem-sec{margin-bottom:22px}
.mem-sec-h{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--txt2);margin-bottom:8px}
.mem-sec-t{font-size:14px;line-height:1.7;color:var(--txt)}
.mem-card-foot{padding:12px 18px 18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
.mem-add-input{flex:1;background:var(--input);border:1px solid var(--line2);border-radius:22px;padding:12px 16px;color:var(--txt2);font:inherit;font-size:14px;outline:none}
.mem-add-input:focus{border-color:color-mix(in srgb,var(--ember) 45%,var(--line2))}
.mem-add-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--ember);color:var(--onember);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:filter .15s}
.mem-add-btn:hover{filter:brightness(1.1)}
.sm-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px}
.sm-title{font-family:var(--font-d);font-size:18px;font-weight:600;color:var(--txt2)}
.sm-toolbar{display:flex;align-items:center;gap:8px;padding:8px 20px 12px;position:relative}
.sm-search{flex:1;display:flex;align-items:center;gap:9px;background:var(--input);border:1px solid var(--line2);border-radius:22px;padding:9px 14px;color:var(--dim)}
.sm-search input{flex:1;background:none;border:none;outline:none;color:var(--txt2);font:inherit;font-size:13.5px}
.sm-tool{width:34px;height:34px;border-radius:8px;border:none;background:none;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s}
.sm-tool:hover{background:var(--hover);color:var(--txt2)}
.sm-tool-wrap{position:relative;display:flex}
.sm-menu{position:absolute;top:calc(100% + 6px);right:0;width:232px;background:var(--menu-solid);border:1px solid var(--line2);border-radius:12px;padding:6px;z-index:6;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.sm-menu-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;font-size:13.5px;color:var(--txt2)}
.sm-menu-item{padding:9px 11px;border-radius:8px;font-size:13.5px;color:var(--txt);cursor:pointer}
.sm-menu-item:hover{background:var(--hover);color:var(--txt2)}
.sm-menu-item.danger{color:var(--danger)}
.sm-menu-item.danger:hover{background:color-mix(in srgb,var(--danger) 12%,transparent)}
.sm-list{flex:1;overflow-y:auto;padding:0 8px 12px}
.sm-item{position:relative;display:flex;align-items:flex-start;gap:10px;padding:15px 12px;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.55;color:var(--txt)}
.sm-item-text{flex:1;min-width:0}
.sm-item-menu-wrap{position:relative;flex-shrink:0}
.sm-item-dots{width:28px;height:28px;border-radius:7px;border:none;background:none;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .12s,background .15s,color .15s}
.sm-item:hover .sm-item-dots,.sm-item.menu-open .sm-item-dots{opacity:1}
.sm-item-dots:hover{background:var(--hover);color:var(--txt2)}
.sm-row-menu{position:absolute;top:calc(100% + 4px);right:0;width:238px;background:var(--menu-solid);border:1px solid var(--line2);border-radius:12px;padding:6px;z-index:8;box-shadow:0 16px 50px rgba(0,0,0,.5)}
.sm-row-del{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;font-size:13.5px;color:var(--danger);cursor:pointer}
.sm-row-del:hover{background:color-mix(in srgb,var(--danger) 12%,transparent)}
.sm-row-div{height:1px;background:var(--line);margin:5px 4px}
.sm-row-meta{padding:7px 11px 8px;font-size:12px;color:var(--dim);line-height:1.5}
.sm-row-chat{color:var(--ember);text-decoration:underline;cursor:pointer}
.sm-empty{padding:40px;text-align:center;color:var(--dim2);font-size:13px}
.cu-pill{font-size:11.5px;border:1px solid var(--line2);border-radius:14px;padding:3px 11px;color:var(--dim)}
.cu-pill.on{border-color:var(--ember);color:var(--ember);background:color-mix(in srgb,var(--ember) 9%,transparent)}
/* profile row */
.profile-row{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:14px;cursor:pointer;margin:8px 4px 2px;border:1px solid var(--line);background:var(--glass-side);backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);box-shadow:0 4px 18px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.05);transition:border-color .28s,background .28s,box-shadow .28s,transform .28s cubic-bezier(.34,1.4,.64,1)}
.profile-row:hover{background:var(--hover);border-color:color-mix(in srgb,var(--ember) 30%,var(--line2));transform:translateY(-1px);box-shadow:0 9px 28px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.07)}
.profile-row .avatar{box-shadow:0 0 0 1px rgba(255,255,255,.08),0 3px 12px var(--glow);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.profile-row:hover .avatar{transform:scale(1.06) rotate(-3deg)}
.profile-row .p-edit{transition:transform .3s cubic-bezier(.34,1.56,.64,1),color .2s}
.profile-row:hover .p-edit{transform:rotate(-12deg) scale(1.12);color:var(--txt2)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--grad);color:var(--onember);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.p-meta{flex:1;min-width:0}
.p-name{font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-plan{font-size:11px;color:var(--dim)}
.p-edit{color:var(--dim);display:flex}
/* sidebar — rail */
.rail{width:52px;background:var(--glass-side);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:10px 0 10px;gap:8px;overflow:hidden}
.rail-scroll{flex:1;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;gap:2px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.rail-scroll::-webkit-scrollbar{width:0;height:0}
.rail-logo{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:8px}
.rail-logo:hover{background:var(--hover)}
.rail-dot{width:15px;height:15px;border-radius:4px;background:var(--grad)}
.rail-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none}
.rail-btn:hover{background:var(--hover);color:var(--txt2)}
.rail-btn.active{background:var(--active);color:var(--txt2)}
.rail-grow{flex:1}
.rail-wrap{position:relative;width:100%;display:flex;justify-content:center}
.flyout{position:absolute;left:46px;top:-4px;z-index:60;width:248px;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
.rail-flyout{position:fixed;left:auto;top:auto;max-height:72vh;overflow-y:auto}
.fly-head{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px 4px}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
.main-sb-toggle{position:absolute;top:11px;left:12px;z-index:45;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:var(--hover);color:var(--dim);border-radius:9px;cursor:pointer;transition:background .18s,color .18s,transform .18s}
.main-sb-toggle:hover{background:var(--active);color:var(--txt2);transform:translateY(-1px)}
.main-sb-toggle.on{color:var(--ember)}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-style:italic}
/* landing */
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:40px 24px}
.land-mark{font-size:34px;color:var(--txt2);letter-spacing:-.02em}
.land-mark em{color:var(--ember);font-style:italic}
.land-greet{font-size:19px;color:var(--txt);font-style:italic;margin-top:-14px}
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{display:flex;align-items:center;gap:7px;padding:7px 15px;border:1px solid var(--line2);border-radius:20px;font-size:12.5px;color:var(--txt);cursor:pointer;background:var(--glass);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);font-family:inherit}
.chip:hover{background:var(--hover);border-color:var(--dim2)}
.chip .sb-ic{color:var(--dim);display:flex}
/* composer */
.composer-wrap{width:100%;max-width:680px;flex-shrink:0;position:relative;z-index:5}
.composer-dock{padding:0 24px 18px;display:flex;justify-content:center;flex-shrink:0}
.cpill{background:var(--glass);backdrop-filter:blur(20px) saturate(165%);-webkit-backdrop-filter:blur(20px) saturate(165%);border:1px solid var(--line2);border-radius:24px;padding:8px 10px 8px 8px;display:flex;flex-direction:column;gap:6px;box-shadow:0 10px 34px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.10)}
.cpill:focus-within{border-color:var(--ember);box-shadow:0 0 0 3px color-mix(in srgb,var(--ember) 14%,transparent)}
.attach-strip{display:flex;gap:6px;flex-wrap:wrap;padding:2px 4px 0}
.attach-chip{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt);border:1px solid var(--line2);background:var(--hover);border-radius:8px;padding:3px 8px}
.attach-chip .ax{cursor:pointer;color:var(--dim)}
.attach-chip .ax:hover{color:var(--danger)}
.crow{display:flex;align-items:flex-end;gap:6px}
.cbtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none;flex-shrink:0}
.cbtn:hover{background:var(--hover);color:var(--txt2)}
.cpill textarea{width:100%;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:14px;resize:none;min-height:24px;max-height:160px;padding:6px 2px;line-height:1.5;display:block}
.ta-wrap{flex:1;position:relative;min-width:0}
.ph-anim{position:absolute;left:10px;top:8px;color:var(--dim);font-style:italic;font-size:14px;line-height:1.5;pointer-events:none;animation:phIn .55s ease}
@keyframes phIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.mode-chip{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--dim);cursor:pointer;padding:5px 8px;border-radius:14px;background:none;border:none;font-family:inherit;flex-shrink:0}
.mode-chip:hover{background:var(--hover);color:var(--txt)}
.csend{width:34px;height:34px;border-radius:50%;border:none;background:var(--ember);color:var(--onember);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.csend:hover{filter:brightness(1.08)}
.csend:disabled{background:var(--line2);color:var(--dim);cursor:not-allowed}
/* voice mode */
.voice-status{position:absolute;left:0;right:0;bottom:calc(100% + 18px);text-align:center;font-family:var(--font-d);font-weight:500;font-size:19px;letter-spacing:-.01em;color:var(--txt2);opacity:1;pointer-events:none}
@keyframes vsIn{from{opacity:.2;transform:translateY(7px)}to{opacity:1;transform:none}}
.cpill.voicing{border-color:color-mix(in srgb,var(--ember) 38%,var(--line2));box-shadow:0 0 0 3px color-mix(in srgb,var(--ember) 10%,transparent)}
.csend.voice-btn{background:var(--grad);color:#fff}
.voice-pill{display:flex;align-items:center;gap:7px;height:34px;padding:0 15px 0 13px;border-radius:17px;border:none;cursor:pointer;font:inherit;font-size:13.5px;font-weight:500;flex-shrink:0;transition:filter .15s,transform .12s,box-shadow .2s}
.voice-pill:active{transform:scale(.95)}
.voice-pill-cancel{background:var(--menu-solid);border:1px solid var(--line2);color:var(--txt2)}
.voice-pill-cancel:hover{background:var(--active)}
.voice-pill-end{background:var(--grad);color:#fff;box-shadow:0 4px 16px var(--glow)}
.voice-pill-end:hover{filter:brightness(1.08);transform:translateY(-1px)}
.voice-spin{width:14px;height:14px;border-radius:50%;border:2px solid color-mix(in srgb,var(--txt2) 22%,transparent);border-top-color:var(--ember);animation:vspin .7s linear infinite;flex-shrink:0}
@keyframes vspin{to{transform:rotate(360deg)}}
.voice-dots{display:flex;align-items:center;gap:3px}
.voice-dots i{width:4px;height:4px;border-radius:50%;background:#fff;animation:vdot 1s ease-in-out infinite}
.voice-dots i:nth-child(2){animation-delay:.16s}
.voice-dots i:nth-child(3){animation-delay:.32s}
@keyframes vdot{0%,100%{opacity:.45;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@media (prefers-reduced-motion:reduce){.voice-spin,.voice-dots i{animation:none}}
.landing:has(.cpill.voicing) .land-greet{opacity:0!important;transition:opacity .2s ease}
.landing:has(.cpill.voicing) .land-mark{opacity:.45!important;transition:opacity .25s ease}
.crow-rel{position:relative}
.mode-menu{position:absolute;right:44px;bottom:42px;z-index:30;background:var(--modal);border:1px solid var(--line2);border-radius:10px;padding:5px;min-width:130px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
/* plus menu */
.plus-menu{position:absolute;left:0;bottom:46px;z-index:50;width:236px;border:1px solid var(--line2);border-radius:14px;padding:6px;background:var(--modal);box-shadow:0 14px 50px rgba(0,0,0,.4)}
.plus-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--txt);font-size:13.5px;cursor:pointer;position:relative}
.plus-item:hover{background:var(--hover);color:var(--txt2)}
.plus-item .sb-ic{color:var(--dim);display:flex}
.plus-item.dim{color:var(--dim)}
.plus-item .p-arr{margin-left:auto;color:var(--dim2);display:flex}
.plus-div{height:1px;background:var(--line);margin:5px 6px}
.plus-sub{position:absolute;left:calc(100% - 4px);top:-6px;z-index:60;width:256px;border:1px solid var(--line2);border-radius:14px;padding:6px;background:var(--modal);box-shadow:0 14px 50px rgba(0,0,0,.4)}
.sub-head{font-size:11px;color:var(--dim2);padding:8px 11px 4px;text-transform:uppercase;letter-spacing:.05em}
.recent-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;cursor:pointer}
.recent-row:hover{background:var(--hover)}
.recent-row .r-name{font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-row .r-date{font-size:11px;color:var(--dim)}
/* attachments */
.att-card{display:flex;align-items:center;gap:10px;background:var(--hover);border:1px solid var(--line2);border-radius:13px;padding:8px 12px;position:relative;max-width:250px}
.att-card .att-ic{width:34px;height:34px;border-radius:9px;background:var(--grad);color:var(--onember);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.att-card .a-name{font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.att-card .a-kind{font-size:11px;color:var(--dim)}
.att-x{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:var(--txt2);color:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;padding:0}
.att-img{position:relative;width:56px;height:56px;border-radius:11px;border:1px solid var(--line2);cursor:zoom-in;flex-shrink:0}
.att-img img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px}
.msg-att-img{width:130px;height:96px;border-radius:12px;overflow:hidden;border:1px solid var(--line2);cursor:zoom-in}
.msg-att-img img{width:100%;height:100%;object-fit:cover;display:block}
/* lightbox */
.lightbox{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .15s ease}
.lightbox img{max-width:82vw;max-height:82vh;border-radius:14px;box-shadow:0 30px 100px rgba(0,0,0,.6)}
/* two-row composer */
.cpill > .ta-wrap{width:100%;padding:2px 8px 0}
.cspace{flex:1}
.plus-menu.down,.apps-drop.down,.model-drop.down{bottom:auto;top:46px}
/* slash menu — compact, scrollable, never clips */
.slash-menu{position:absolute;left:34px;bottom:46px;z-index:50;width:232px;max-height:300px;overflow-y:auto;border:1px solid var(--line2);border-radius:14px;padding:4px;background:var(--modal);box-shadow:0 14px 50px rgba(0,0,0,.4)}
.slash-menu.down{bottom:auto;top:46px}
.slash-menu .plus-item{padding:7px 10px;font-size:13px;gap:9px}
/* chat header + files panel */
.chat-head{position:absolute;top:8px;right:14px;z-index:25;display:flex;align-items:center;gap:4px}
.ch-share{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:14px;background:none;border:none;color:var(--dim);font:inherit;font-size:12.5px;cursor:pointer}
.ch-share:hover{background:var(--hover);color:var(--txt)}
.thread-wrap{flex:1;display:flex;min-height:0}
.thread-col{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.files-panel{width:300px;border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;background:var(--glass-side)}
.fp-head{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
.fp-head span{flex:1;font-family:var(--font-d);font-weight:600;font-size:14.5px;color:var(--txt2)}
.fp-body{flex:1;overflow-y:auto;padding:10px}
.fp-empty{color:var(--dim);font-size:12.5px;padding:14px 6px}
.fp-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px;cursor:default}
.fp-row:hover{background:var(--hover)}
.fp-row .r-name{font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* add-from-library modal */
.libpick{position:fixed;left:50%;top:12%;transform:translateX(-50%);z-index:70;width:560px;max-width:92vw;max-height:80vh;border:1px solid var(--line2);border-radius:16px;padding:18px 0 8px;background:var(--modal);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.lp-head{display:flex;align-items:center;padding:0 18px 10px}
.lp-head span{flex:1;font-family:var(--font-d);font-weight:600;font-size:16.5px;color:var(--txt2)}
.lp-search{width:calc(100% - 36px);margin:0 18px 6px;background:transparent;border:none;border-bottom:1px solid var(--line);padding:8px 0;font:inherit;font-size:14px;color:var(--txt2);outline:none}
.lp-search::placeholder{color:var(--dim)}
.lp-list{max-height:min(340px,56vh);overflow-y:auto;padding:8px 10px}
/* project chat rows */
.pcr-main{flex:1;min-width:0}
.pcr-title{font-size:13.5px;color:var(--txt2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcr-snip{font-size:12px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcr-date{font-size:12px;color:var(--dim);flex-shrink:0}
.proj-chat-row:hover .pcr-date{display:none}
.pcr-dots{display:none}
.proj-chat-row:hover .pcr-dots{display:flex}
/* apps / connectors */
.app-chip{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:14px;background:none;border:1px solid var(--line2);color:var(--txt);font:inherit;font-size:12.5px;cursor:pointer;flex-shrink:0}
.app-chip:hover{background:var(--hover);color:var(--txt2)}
.app-chip .sb-ic{display:flex;color:var(--txt)}
.apps-drop{position:absolute;left:40px;bottom:46px;z-index:50;width:246px;border:1px solid var(--line2);border-radius:14px;padding:6px;background:var(--modal);box-shadow:0 14px 50px rgba(0,0,0,.4)}
.app-row{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:9px}
.app-row:hover{background:var(--hover)}
.app-row .a-nm{flex:1;font-size:13.5px;color:var(--txt2)}
.app-act{font-size:12px;color:var(--dim);cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 4px}
.app-act:hover{color:var(--ember)}
/* model picker (ported from vellum-workspace.html) */
.model-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:14px;background:none;border:none;color:var(--dim);font:inherit;font-size:12px;cursor:pointer;flex-shrink:0}
.model-pill:hover{background:var(--hover);color:var(--txt)}
.model-num{font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-drop{position:absolute;right:44px;bottom:44px;z-index:50;width:232px;border:1px solid var(--line2);border-radius:12px;padding-bottom:4px;box-shadow:0 14px 50px rgba(0,0,0,.4);background:var(--modal)}
.drop-lbl{font-size:10.5px;color:var(--dim2);padding:9px 13px 4px;letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.model-sync{color:var(--ember);cursor:pointer;text-transform:none;letter-spacing:0}
.model-search{width:calc(100% - 18px);margin:2px 9px 4px;background:var(--input);border:1px solid var(--line2);border-radius:7px;padding:5px 9px;color:var(--txt2);font:inherit;font-size:12px;outline:none}
.model-search::placeholder{color:var(--dim2)}
.model-list{max-height:240px;overflow-y:auto}
.drop-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 13px;cursor:pointer;color:var(--txt);font-size:12.5px}
.drop-item:hover{background:var(--hover);color:var(--txt2)}
.drop-check{color:var(--ember);display:flex}
.drop-item.manage{border-top:1px solid var(--line);color:var(--ember);margin-top:3px}
/* thread */
.msgs{flex:1;overflow-y:auto;padding:26px 24px 10px;display:flex;flex-direction:column;align-items:center}
.msgs-inner{width:100%;max-width:680px;display:flex;flex-direction:column;gap:18px}
.bubble-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.bubble{max-width:78%;background:var(--bubble);border:1px solid var(--line);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:16px;padding:9px 14px;font-size:13.5px;color:var(--txt2);white-space:pre-wrap;line-height:1.55}
.areply{font-size:14px;line-height:1.7;color:var(--txt);white-space:pre-wrap}
.msg-activity{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0 4px}
.msg-act{font-size:11.5px;color:var(--dim);border:1px solid var(--line);border-radius:12px;padding:3px 8px;background:var(--glass)}
.msg-sources{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0 2px}
.msg-src{display:inline-flex;align-items:center;gap:6px;max-width:210px;border:1px solid var(--line);border-radius:12px;padding:3px 8px;color:var(--txt);text-decoration:none;background:var(--glass);font-size:11.5px}
.msg-src img{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.msg-src span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shimmer{background:linear-gradient(90deg,var(--dim) 0%,var(--txt2) 18%,var(--ember) 38%,var(--txt2) 58%,var(--dim) 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sh 2.4s linear infinite;filter:drop-shadow(0 0 8px var(--glow))}
@keyframes sh{to{background-position:-240% center}}
[data-theme="light"] .shimmer{background:none;-webkit-background-clip:initial;background-clip:initial;color:var(--txt);-webkit-text-fill-color:var(--txt);animation:none;filter:none}
.act-row{display:flex;gap:2px;margin-top:2px}
.act-btn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:6px;cursor:pointer;background:none;border:none}
.act-btn:hover{background:var(--hover);color:var(--txt2)}
.act-btn.on{color:var(--ember)}
.copied{font-size:11px;color:var(--dim);align-self:center;padding:0 6px}
/* conversation timeline */
.timeline{position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:6px;align-items:flex-end;padding:10px 8px}
.tl-bar{height:2.5px;border-radius:2px;background:var(--dim2);transition:background .15s}
.timeline:hover .tl-bar{background:var(--dim)}
.tl-pop{position:absolute;right:28px;top:50%;transform:translateY(-50%);width:270px;max-height:320px;overflow-y:auto;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
.tl-head{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:5px 10px 3px}
.tl-row{padding:7px 10px;border-radius:7px;font-size:12.5px;color:var(--txt);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-row:hover{background:var(--hover)}
/* popovers + overlays */
.backdrop{position:fixed;inset:0;z-index:40}
.backdrop.dim{background:rgba(0,0,0,.45)}
[data-theme="light"] .backdrop.dim{background:rgba(60,50,35,.3)}
.ctx-menu{position:fixed;z-index:50;background:var(--modal);border:1px solid var(--line2);border-radius:11px;padding:5px;min-width:190px;box-shadow:0 14px 50px rgba(0,0,0,.4);font-size:13px}
.ctx-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;color:var(--txt);cursor:pointer}
.ctx-item:hover{background:var(--hover)}
.ctx-item .sb-ic{color:var(--dim);display:flex}
.ctx-item.danger{color:var(--danger)}
.ctx-item.dim{color:var(--dim)}
.ctx-item.danger .sb-ic{color:var(--danger)}
.ctx-div{height:1px;background:var(--line);margin:5px 4px}
.ctx-hint{font-size:11px;color:var(--dim2);padding:2px 10px 6px;font-style:italic}
.ctx-check{margin-left:auto;color:var(--ember);display:flex}
/* search overlay */
.search-card{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:50;width:560px;max-width:90vw;background:var(--modal);border:1px solid var(--line2);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.search-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);outline:none;color:var(--txt2);font:inherit;font-size:14px;padding:14px 16px}
.search-input::placeholder{color:var(--dim)}
.s-list{max-height:320px;overflow-y:auto;padding:7px}
.s-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--txt);font-size:13px;cursor:pointer}
.s-row:hover{background:var(--hover)}
.s-row .sb-ic{color:var(--dim);display:flex}
.s-none{padding:14px;color:var(--dim2);font-size:12.5px;font-style:italic;text-align:center}
/* pages (library/projects) */
.page{flex:1;overflow-y:auto;padding:34px 40px}
.page-inner{max-width:860px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-title{font-size:26px;color:var(--txt2);letter-spacing:-.02em;flex:1}
.lib-search{display:flex;align-items:center;gap:8px;background:var(--input);border:1px solid var(--line2);border-radius:18px;padding:7px 13px;width:230px}
.lib-search input{flex:1;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:12.5px;min-width:0}
.lib-search input::placeholder{color:var(--dim)}
.lib-search .sb-ic{color:var(--dim);display:flex}
.new-btn{display:flex;align-items:center;gap:6px;background:var(--txt2);color:var(--bg);border:none;border-radius:18px;padding:8px 14px;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer}
.new-btn:hover{filter:brightness(.94)}
.tab-row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:16px;font-size:12.5px;color:var(--txt);cursor:pointer;background:none;border:none;font-family:inherit}
.tab:hover{background:var(--hover)}
.tab.on{background:var(--active);color:var(--txt2)}
.tab-spacer{flex:1}
.icon-tgl{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none}
.icon-tgl:hover{background:var(--hover);color:var(--txt2)}
.icon-tgl.on{background:var(--active);color:var(--txt2)}
.ltable{width:100%}
.lth{display:grid;grid-template-columns:1fr 160px 90px 30px;gap:10px;padding:8px 10px;font-size:12px;color:var(--dim);border-bottom:1px solid var(--line)}
.ltr{display:grid;grid-template-columns:1fr 160px 90px 30px;gap:10px;padding:10px;align-items:center;border-bottom:1px solid var(--line);border-radius:8px;cursor:default;position:relative}
.ltr:hover{background:var(--hover)}
.lt-name{display:flex;align-items:center;gap:11px;min-width:0;color:var(--txt2);font-size:13px}
.lt-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kind-ic{width:30px;height:30px;border-radius:8px;background:var(--active);display:flex;align-items:center;justify-content:center;color:var(--dim);flex-shrink:0}
.kind-ic.image{color:#7aa874}.kind-ic.pdf{color:#cf6b5d}.kind-ic.code{color:#8aa4c8}.kind-ic.diff{color:#c8a04a}.kind-ic.note{color:var(--dim)}
.lt-dim{font-size:12.5px;color:var(--dim)}
.ltr .chat-dots{display:none}
.ltr:hover .chat-dots{display:flex}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.ltile{border:1px solid var(--line);border-radius:12px;padding:14px;cursor:default}
.ltile:hover{background:var(--hover);border-color:var(--line2)}
.ltile .kind-ic{width:38px;height:38px;margin-bottom:10px}
.ltile .t-name{font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ltile .t-mod{font-size:11px;color:var(--dim);margin-top:3px}
/* projects */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.pcard{border:1px solid var(--line);border-radius:13px;padding:16px;cursor:pointer}
.pcard:hover{background:var(--hover);border-color:var(--line2)}
.pcard .sb-ic{color:var(--ember);display:flex;margin-bottom:10px}
.pcard h3{font-size:14px;color:var(--txt2);font-weight:500;margin-bottom:4px}
.pcard p{font-size:12px;color:var(--dim)}
/* profile popover */
.pop{position:fixed;z-index:50;background:var(--modal);border:1px solid var(--line2);border-radius:13px;padding:6px;width:250px;box-shadow:0 18px 60px rgba(0,0,0,.45);font-size:13px}
.pop-email{font-size:11.5px;color:var(--dim);padding:8px 11px 4px}
.pop-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:8px;color:var(--txt);cursor:pointer}
.pop-row:hover{background:var(--hover)}
.pop-row .sb-ic{color:var(--dim);display:flex}
.pop-row .avatar{width:24px;height:24px;font-size:9.5px}
.pop-row.dim{color:var(--dim)}
/* edit profile modal */
.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;width:440px;max-width:92vw;background:var(--modal);border:1px solid var(--line2);border-radius:16px;padding:24px;box-shadow:0 30px 100px rgba(0,0,0,.55)}
.m-title{font-size:16px;color:var(--txt2);font-weight:500;margin-bottom:20px}
.m-avatar-wrap{display:flex;justify-content:center;margin-bottom:22px}
.m-avatar{position:relative;width:96px;height:96px;border-radius:50%;background:var(--grad);color:var(--onember);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:600;font-family:var(--font-d);border:2px solid var(--line2)}
.m-cam{position:absolute;right:-2px;bottom:2px;width:28px;height:28px;border-radius:50%;background:var(--active);border:1px solid var(--line2);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer}
.m-field{border:1px solid var(--line2);border-radius:10px;padding:8px 12px;margin-bottom:12px}
.m-field label{display:block;font-size:11px;color:var(--dim);margin-bottom:2px}
.m-field input{width:100%;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:13.5px}
.m-help{font-size:11.5px;color:var(--dim);text-align:center;margin:6px 0 18px}
.m-actions{display:flex;justify-content:flex-end;gap:9px}
.btn{padding:8px 18px;border-radius:18px;border:1px solid var(--line2);background:none;color:var(--txt);font:inherit;font-size:12.5px;cursor:pointer}
.btn:hover{background:var(--hover)}
.btn:disabled{color:var(--dim);cursor:not-allowed;background:none}
.btn.primary{background:var(--ember);border-color:var(--ember);color:var(--onember)}
.btn.primary:hover{filter:brightness(1.08)}
/* ── modern visual system (addendum E) ── */
.wordmark{font-family:var(--font-d);font-weight:600;font-size:17px}
.wordmark em{font-style:normal}
.land-mark{font-family:var(--font-d);font-weight:600;font-size:42px;letter-spacing:-.03em;background:linear-gradient(105deg,var(--txt2) 16%,var(--ember) 50%,var(--accent2) 84%);-webkit-background-clip:text;background-clip:text;color:transparent}
.land-mark em{color:inherit;font-style:normal}
.land-greet{font-family:var(--font-d);font-style:normal;font-weight:500;font-size:22px;color:var(--txt2)}
.page-title,.proj-name,.m-title,.sn-title,.src-title,.pe-t{font-family:var(--font-d);font-weight:600;letter-spacing:-.02em}
.set-h{font-family:var(--font-d);font-weight:600}
.led-v{font-family:var(--font-m);letter-spacing:-.01em}
.mem-stats{font-family:var(--font-m);font-size:11px}
.ph-anim{font-style:normal}
.ctx-menu,.pop,.flyout,.gear-pop,.mode-menu,.model-drop,.plus-menu,.plus-sub,.apps-drop,.slash-menu{background:var(--menu-solid);border-color:var(--line2);animation:popIn .18s ease}
.libpick{background:var(--menu-solid);border-color:var(--line2);animation:lpIn .18s ease}
@keyframes lpIn{from{transform:translateX(-50%) translateY(8px)}to{transform:translateX(-50%) translateY(0)}}
.modal,.set-modal,.search-card,.tl-pop{background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);animation:fadeIn .18s ease}
@keyframes popIn{from{transform:translateY(6px) scale(.985)}to{transform:none}}
@keyframes fadeIn{from{opacity:0}}
.main{background:radial-gradient(820px 460px at 82% -18%,color-mix(in srgb,var(--accent2) 11%,transparent),transparent 60%),radial-gradient(720px 520px at -6% 112%,color-mix(in srgb,var(--ember) 9%,transparent),transparent 60%)}
.csend{background:var(--grad);box-shadow:0 4px 16px var(--glow)}
.csend:disabled{background:var(--line2)}
.btn.primary{background:var(--grad);border-color:transparent}
.btn.primary:disabled{background:var(--line2)}
.sb-row,.chat-row,.rail-btn,.tab,.act-btn,.cbtn,.tbtn,.icon-tgl,.set-item,.pop-row,.ctx-item{transition:background .15s,color .15s}
::selection{background:color-mix(in srgb,var(--ember) 30%,transparent)}
/* sizing pass (addendum G) */
body{font-size:14px}
.wordmark{font-size:18px}
.menu{font-size:13px}
.sb-row{font-size:14px;padding:8px 10px}
.chat-row{font-size:13.5px;padding:7px 10px}
.sb-sec{font-size:11px}
.p-name{font-size:13px}
.p-plan{font-size:11.5px}
.cpill textarea{font-size:15px}
.ph-anim{font-size:15px}
.chip{font-size:13.5px;padding:8px 17px}
.areply{font-size:15px}
.bubble{font-size:14.5px}
.ctx-item{font-size:13.5px;padding:8px 11px}
.pop-row{font-size:13.5px}
.s-row{font-size:13.5px}
.tab{font-size:13.5px;padding:7px 15px}
.lt-name{font-size:13.5px}
.drop-item{font-size:13px}
.plus-item{font-size:14px}
.app-chip{font-size:13px}
.recent-row .r-name{font-size:13.5px}
.set-item{font-size:13.5px}
.set-row{font-size:13.5px}
.proj-chat-row{font-size:13.5px}
.led-row{font-size:13.5px}
.mem-row{font-size:13.5px}
.arc-row{font-size:13.5px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:5px}::-webkit-scrollbar-track{background:transparent}
/* ── motion (addendum H) ── */
@media (prefers-reduced-motion:no-preference){
  .landing > *{animation:landRise .6s cubic-bezier(.2,.7,.2,1) both}
  .landing > *:nth-child(1){animation-delay:.04s}
  .landing > *:nth-child(2){animation-delay:.10s}
  .landing > *:nth-child(3){animation-delay:.17s}
  .landing > *:nth-child(4){animation-delay:.24s}
  .land-mark{background-size:220% auto;animation:landRise .6s cubic-bezier(.2,.7,.2,1) both,markPan 9s ease-in-out .7s infinite}
  .bubble-wrap,.areply{animation:msgIn .34s cubic-bezier(.2,.7,.2,1) both}
  .appmark,.rail-dot{animation:glowPulse 5.5s ease-in-out infinite}
}
@keyframes landRise{from{transform:translateY(14px)}to{transform:none}}
@keyframes markPan{0%,100%{background-position:0% center}50%{background-position:100% center}}
@keyframes msgIn{from{transform:translateY(8px)}to{transform:none}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px var(--glow)}50%{box-shadow:0 0 19px var(--glow)}}
/* interactive feedback */
.cbtn,.tbtn,.act-btn,.icon-tgl,.mode-chip,.app-chip,.model-pill,.rail-btn,.sb-row,.chat-row,.tab,.chip,.btn,.new-btn,.plus-item,.app-row,.drop-item,.set-item,.ctx-item,.pop-row{transition:background .16s,color .16s,border-color .16s,transform .13s,box-shadow .18s,filter .16s}
.cbtn:active,.tbtn:active,.act-btn:active,.icon-tgl:active,.rail-btn:active{transform:scale(.9)}
.csend{transition:filter .15s,transform .15s,box-shadow .22s}
.csend:hover:not(:disabled){transform:translateY(-1px) scale(1.05)}
.csend:active:not(:disabled){transform:scale(.92)}
.chip:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--ember) 50%,var(--line2));box-shadow:0 8px 22px rgba(0,0,0,.26),0 0 0 1px color-mix(in srgb,var(--ember) 24%,transparent)}
.chip:active{transform:translateY(0) scale(.97)}
.btn:active,.new-btn:active{transform:scale(.97)}
.btn.primary:hover{transform:translateY(-1px)}
.app-chip:active,.mode-chip:active,.model-pill:active,.tab:active{transform:scale(.96)}
.plus-item:active,.app-row:active,.drop-item:active,.ctx-item:active,.pop-row:active{transform:scale(.985)}
/* \u2500\u2500 agents (addendum I) \u2500\u2500 */
.agent-ava{display:flex;align-items:center;justify-content:center;color:#fff;background:var(--grad);border-radius:11px;flex-shrink:0;box-shadow:0 4px 16px var(--glow),inset 0 1px 0 rgba(255,255,255,.18)}
.agent-ava.lg{width:64px;height:64px;border-radius:19px;margin-bottom:4px}
.agent-ava.md{width:40px;height:40px;border-radius:13px}
.agent-ava.sm{width:28px;height:28px;border-radius:9px;box-shadow:0 2px 8px var(--glow)}
.agent-row-ic{color:var(--ember)}
.sb-row.agent-row.active .agent-row-ic{color:inherit}
.agent-blurb{max-width:440px;text-align:center;color:var(--dim);font-size:13.5px;line-height:1.55;margin-top:-6px}
.landing .land-greet{white-space:nowrap}
/* \u2500\u2500 motion + animated icons (addendum J) \u2500\u2500 */
.bg-orb{position:absolute;z-index:0;border-radius:50%;filter:blur(60px);pointer-events:none;opacity:.55;will-change:transform}
.orb1{width:340px;height:340px;left:4%;top:-6%;background:radial-gradient(circle at 30% 30%,var(--ember),transparent 70%)}
.orb2{width:420px;height:420px;right:-4%;top:8%;background:radial-gradient(circle at 60% 40%,var(--accent2),transparent 70%)}
.orb3{width:300px;height:300px;left:38%;bottom:-12%;background:radial-gradient(circle at 50% 50%,var(--ember),transparent 72%);opacity:.4}
[data-theme="light"] .bg-orb{opacity:.62;mix-blend-mode:multiply;filter:blur(50px)}
[data-theme="light"] .orb1{background:radial-gradient(circle at 30% 30%,#8a7575,transparent 70%)}
[data-theme="light"] .orb2{background:radial-gradient(circle at 60% 40%,#6b5a5a,transparent 70%)}
[data-theme="light"] .orb3{background:radial-gradient(circle at 50% 50%,#7d6a6a,transparent 72%);opacity:.5}

/* closes on a document-level outside mousedown — no click-eating backdrop,
   so one click both dismisses the open menu and lands on the next target */
const Popover = ({className, style, onClose, children, portal}) => {
  const ref = useRef(null);
  const closeRef = useRef(onClose);
  closeRef.current = onClose;
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) closeRef.current(); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const node = <div ref={ref} className={className} style={style}>{children}</div>;
  return portal ? ReactDOM.createPortal(node, document.body) : node;
};

const ChatRow = ({chat, active, renaming, nested, onOpen, onMenu, onRename}) => {
  const [draft, setDraft] = useState(chat.title);
  useEffect(() => { if (renaming) setDraft(chat.title); }, [renaming]);
  if (renaming) {
    return (
      <div className={'chat-row active' + (nested ? ' nested' : '')}>
        <input className="rename-input" autoFocus value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') onRename(draft); if (e.key === 'Escape') onRename(null); }}
          onBlur={() => onRename(draft)}/>
      </div>
    );
  }
  return (
    <div className={'chat-row' + (active ? ' active' : '') + (nested ? ' nested' : '')} onClick={onOpen}>
      {chat.pinned && <span className="chat-pin"><IcPin size={12}/></span>}
      <span className="chat-title">{chat.title}</span>
      <button className="chat-dots" title="Options"
        onClick={e => { e.stopPropagation(); onMenu(e); }}><IcDots size={14}/></button>
    </div>
  );

const RailFly = ({btn, keepOpen, children}) => {
  const [hover, setHover] = useState(false);
  const [stick, setStick] = useState(false);
  const [pos, setPos] = useState(null);
  const wrapRef = useRef(null);
  const closeTimer = useRef(null);
  const openFly = () => { clearTimeout(closeTimer.current); setHover(true); };
  const closeFly = () => { closeTimer.current = setTimeout(() => setHover(false), 90); };
  useEffect(() => {
    if (keepOpen && hover) setStick(true);
    if (!keepOpen) setStick(false);
  }, [keepOpen, hover]);
  const open = hover || stick;
  useEffect(() => {
    if (open && wrapRef.current) {
      const r = wrapRef.current.getBoundingClientRect();
      const below = window.innerHeight - r.top;
      setPos(below < 300 ? { left: r.right + 6, bottom: window.innerHeight - r.bottom } : { left: r.right + 6, top: r.top });
    }
  }, [open]);
  return (
    <div className="rail-wrap" ref={wrapRef} onMouseEnter={openFly} onMouseLeave={closeFly}>
      {btn}
      {open && pos && ReactDOM.createPortal(
        <div className="flyout rail-flyout" style={pos} onMouseEnter={openFly} onMouseLeave={closeFly}>{children}</div>,
        document.body)}
    </div>
  );
};

const vellumReply = (text, exclude) => {
  const q = text.trim().replace(/\s+/g, ' ').slice(0, 60);
  const bucket = REPLY_BUCKETS.find(b => b.test.test(text));
  const pool = bucket.variants.filter(v => v.replace('{q}', q) !== exclude);
  const pick = pool[0] || bucket.variants[0];
  return pick.replace('{q}', q);
};

const ModelDrop = ({model, models = MODELS, drop, onPick, onClose}) => {
  const [q, setQ] = useState('');
  const [idx, setIdx] = useState(0);
  const listRef = useRef(null);
  const hits = models.filter(m => !q || m.label.toLowerCase().includes(q.toLowerCase()) || m.id.toLowerCase().includes(q.toLowerCase()));
  useEffect(() => { setIdx(0); }, [q]);
  useEffect(() => {
    const p = listRef.current; if (!p) return;
    const el = p.querySelector('.drop-item.active'); if (!el) return;
    const top = el.offsetTop, bot = top + el.offsetHeight;
    if (top < p.scrollTop) p.scrollTop = top;
    else if (bot > p.scrollTop + p.clientHeight) p.scrollTop = bot - p.clientHeight;
  }, [idx]);
  const onKey = e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setIdx(i => Math.min(i + 1, hits.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); if (hits[idx]) onPick(hits[idx].id); }
  };
  return (
    <Popover className={'model-drop' + (drop === 'down' ? ' down' : '')} onClose={onClose}>
      <div className="drop-lbl"><span>Model</span><span className="model-sync" title="Sync is not in this preview">\u21BB Sync</span></div>
      <input className="model-search" autoFocus placeholder="Search models" value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey}/>
      <div className="model-list" ref={listRef}>
        {hits.map((m, i) => (
          <div key={m.id} className={'drop-item' + (i === idx ? ' active' : '')} onClick={() => onPick(m.id)} onMouseEnter={() => setIdx(i)}>
            <span style={{overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{m.label}</span>
            {model === m.id && <span className="drop-check"><IcCheck size={13}/></span>}
          </div>
        ))}
        {hits.length === 0 && <div className="s-none">No matches.</div>}
      </div>
      <div className="drop-item manage" title="Key management is not in this preview"><span>Manage models &amp; keys\u2026</span></div>
    </Popover>
  );
};

                <span className="sb-ic"><Ic size={15}/></span>{a.name}
                {(appSel || []).includes(a.id) && <span className="ctx-check"><IcCheck size={13}/></span>}
              </div>
            );

          {projHit && (() => { idx++; const ai = idx; return (

                <span className="p-arr">{projects.length}&nbsp;<IcChevR size={13}/></span>

};
