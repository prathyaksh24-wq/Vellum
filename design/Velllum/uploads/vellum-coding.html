<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vellum — Coding Assistant (preview)</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--panel:#101011;--panel2:#0c0c0d;--line:#1c1c1e;--line2:#242427;--txt:#d7d7d7;--dim:#6a6a6a;--dim2:#4a4a4a;--ember:#e35d2b;--ok:#5a8f5a;--add:#2c4a32;--del:#4a2c2c}
html,body{height:100%}
body{background:#000;color:var(--txt);font-family:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100vh}
.stage{height:100vh;padding:18px;background:radial-gradient(1200px 600px at 70% -10%,#1a120e,#000 60%)}
.win{height:100%;display:flex;flex-direction:column;background:var(--bg);border:1px solid #202022;border-radius:12px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6)}
/* titlebar */
.titlebar{display:flex;align-items:center;height:38px;background:#0a0a0b;border-bottom:1px solid #161618;padding-left:10px;flex-shrink:0}
.appmark{width:15px;height:15px;border-radius:4px;background:radial-gradient(circle at 35% 30%,#f6a25f,#e35d2b);margin-right:8px}
.navbtns{display:flex;gap:1px;margin-right:8px}
.navbtn{display:flex;align-items:center;justify-content:center;width:26px;height:24px;border-radius:6px;background:transparent;border:none;color:#7a7a7a;cursor:pointer}
.navbtn:hover{background:#1c1c1e;color:#cfcfcf}
.menu{display:flex;gap:2px;font-size:12.5px;color:#8a8a8a}
.menu span{padding:3px 8px;border-radius:5px;cursor:default}
.menu span:hover{background:#161618;color:#ccc}
.tb-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#666}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding-right:10px}
.wc{width:28px;height:22px;display:flex;align-items:center;justify-content:center;color:#888;border-radius:5px;cursor:default}
.wc:hover{background:#1c1c1e}.wc.close:hover{background:#c0392b;color:#fff}
/* body */
.body{flex:1;display:flex;min-height:0}
.sidebar{width:248px;background:var(--panel2);border-right:1px solid #191919;display:flex;flex-direction:column;flex-shrink:0;padding:10px 8px}
.sb-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;color:#bdbdbd;font-size:13px;cursor:pointer}
.sb-row:hover{background:#151516}
.sb-sec{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:14px 9px 5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;color:#9a9a9a;font-size:12.5px;cursor:pointer}
.sb-item:hover{background:#151516;color:#cfcfcf}
.sb-item.active{background:#19191b;color:#eee}
.sb-grow{flex:1}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);border-top-left-radius:18px;border-left:1px solid #1a1a1c;border-top:1px solid #1a1a1c}
/* coding home */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px}
.home-title{font-size:24px;color:#e6e6e6;letter-spacing:-.02em}
.home-sub{color:var(--dim);font-size:13px;margin-top:-12px}
.seg{display:flex;background:#111;border:1px solid var(--line2);border-radius:10px;padding:3px}
.seg button{background:transparent;border:none;color:#9a9a9a;font:inherit;font-size:13px;padding:7px 18px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px}
.seg button.on{background:#222;color:#fff}
.health{display:flex;gap:18px;font-size:12px;color:var(--dim)}
.health b{color:#bcbcbc;font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}
.dot.g{background:#5a8f5a}.dot.a{background:#caa24a}
.home-cards{display:flex;gap:14px}
.hcard{width:230px;background:#101011;border:1px solid var(--line2);border-radius:13px;padding:16px;cursor:pointer;transition:border-color .12s,background .12s}
.hcard:hover{border-color:#36363a;background:#131315}
.hcard .hc-ic{color:var(--ember);margin-bottom:10px}
.hcard h3{font-size:14px;color:#e2e2e2;font-weight:500;margin-bottom:4px}
.hcard p{font-size:12px;color:var(--dim);line-height:1.5}
.recents{width:100%;max-width:476px}
.recent{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-top:8px;cursor:pointer;font-size:12.5px;color:#b6b6b6}
.recent:hover{border-color:#2e2e30;background:#111}
.recent .r-meta{margin-left:auto;color:var(--dim2);font-size:11px}
/* session */
.sess{flex:1;display:flex;min-height:0}
.chatcol{flex:1;display:flex;flex-direction:column;min-width:0}
.strip{display:flex;align-items:center;gap:14px;padding:8px 16px;border-bottom:1px solid var(--line);font-size:11.5px;color:var(--dim);flex-shrink:0;background:#0b0b0c}
.strip .s-k{color:#8a8a8a}.strip .s-v{color:#cdcdcd}
.pill{padding:2px 8px;border-radius:20px;border:1px solid var(--line2);font-size:11px;color:#bbb}
.pill.elev{border-color:#5a3320;color:#e8915a;background:#1c1109}
.msgs{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.umsg{align-self:flex-end;max-width:78%;background:#19191b;border:1px solid var(--line2);border-radius:13px;padding:9px 13px;font-size:13.5px;color:#e4e4e4}
.amsg{font-size:13.5px;line-height:1.65;color:#d2d2d2;white-space:pre-wrap}
.shimmer{background:linear-gradient(90deg,#8a8a8a 0%,#fff 18%,#e35d2b 38%,#ffe2c8 52%,#fff 72%,#8a8a8a 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sh 2.4s linear infinite}
@keyframes sh{to{background-position:-240% center}}
.working{display:flex;align-items:center;gap:9px;color:var(--dim);font-size:12.5px}
.composer{border-top:1px solid var(--line);padding:12px 16px;flex-shrink:0;background:#0b0b0c}
.cbox{background:#111113;border:1px solid var(--line2);border-radius:12px;padding:9px 12px}
.cbox textarea{width:100%;background:transparent;border:none;outline:none;color:#e4e4e4;font:inherit;font-size:13.5px;resize:none;min-height:24px}
.cfoot{display:flex;align-items:center;gap:8px;margin-top:8px}
.cctl{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#9a9a9a;border:1px solid var(--line2);border-radius:8px;padding:4px 9px;cursor:pointer;background:#0e0e10}
.cctl:hover{border-color:#36363a}
.cspace{flex:1}
.sbtn{width:32px;height:32px;border-radius:9px;border:none;background:var(--ember);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sbtn:disabled{background:#2a2a2c;color:#666;cursor:not-allowed}
.sbtn.stop{background:#222;color:#ddd}
/* workspace */
.ws{width:430px;border-left:1px solid #191919;display:flex;flex-direction:column;flex-shrink:0;background:#0b0b0c}
.wsbar{display:flex;align-items:center;gap:2px;padding:7px 8px;border-bottom:1px solid var(--line);overflow-x:auto}
.wstab{display:flex;align-items:center;gap:6px;font-size:12px;color:#8a8a8a;padding:5px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;border:1px solid transparent}
.wstab:hover{background:#141416}
.wstab.on{background:#19191b;color:#e6e6e6;border-color:var(--line2)}
.wstab .badge{font-size:9.5px;background:#2a2a2c;color:#bbb;border-radius:8px;padding:0 5px}
.wsbody{flex:1;overflow-y:auto;min-height:0}
/* files */
.tree{padding:8px 6px;font-size:12.5px}
.trow{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:6px;color:#a8a8a8;cursor:pointer}
.trow:hover{background:#151517}.trow.sel{background:#19191b;color:#eee}
.trow .ed{width:6px;height:6px;border-radius:50%;background:var(--ember);margin-left:auto}
.fview{padding:10px 14px;font-family:"Geist Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#bcbcbc;white-space:pre;line-height:1.6;overflow-x:auto}
.fview .fv-h{color:var(--dim);font-size:11px;margin-bottom:8px;font-family:inherit}
/* terminal */
.term{padding:12px 14px;font-family:"Geist Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.65}
.term .t-cmd{color:#e6e6e6}.term .t-cmd::before{content:"$ ";color:var(--ember)}
.term .t-out{color:#9a9a9a;white-space:pre-wrap}
.term .t-ok{color:#6fae6f}.term .t-err{color:#d07a6a}
/* runlog */
.rlog{padding:8px 10px;font-size:12px}
.rrow{display:flex;align-items:center;gap:9px;padding:5px 6px;border-bottom:1px solid #131315}
.rrow .r-t{color:var(--dim2);font-size:10.5px;width:42px;flex-shrink:0;font-family:ui-monospace,monospace}
.rtag{font-size:10px;padding:1px 7px;border-radius:6px;flex-shrink:0;font-family:ui-monospace,monospace}
.rtag.start{background:#10221c;color:#5fb89a}.rtag.reason{background:#1a1726;color:#a78bfa}
.rtag.read{background:#101d2e;color:#5b9bd5}.rtag.edit{background:#2a1d10;color:#e8932b}
.rtag.cmd{background:#241024;color:#c87bd0}.rtag.out{background:#171717;color:#999}
.rtag.final{background:#10221c;color:#5fb89a}.rtag.done{background:#141414;color:#888}.rtag.stop{background:#2a1212;color:#d07a6a}
.r-lbl{color:#c4c4c4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-dim{color:var(--dim);margin-left:4px}
/* diff */
.diff{padding:10px 0;font-family:"Geist Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.d-file{color:#d6d6d6;font-size:12px;padding:6px 14px;border-bottom:1px solid var(--line);background:#0e0e10}
.d-hunk{color:#5b9bd5;padding:4px 14px;font-size:11px;background:#0b0f14}
.d-line{padding:1px 14px;white-space:pre;line-height:1.55}
.d-add{background:#0f1c12;color:#8fce97}.d-add::before{content:"+ "}
.d-del{background:#1c0f0f;color:#d8978c}.d-del::before{content:"- "}
.d-ctx{color:#7a7a7a}.d-ctx::before{content:"  "}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim2);font-size:12.5px;gap:6px;padding:30px;text-align:center}
.browser-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line)}
.browser-url{flex:1;background:#0e0e10;border:1px solid var(--line2);border-radius:18px;padding:5px 12px;font-size:12px;color:#9a9a9a}
.browser-page{padding:30px;text-align:center;color:var(--dim)}
.spin{width:13px;height:13px;border:1.5px solid #2a2a2a;border-top-color:var(--ember);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#222;border-radius:5px}::-webkit-scrollbar-track{background:transparent}
</style>
</head>

/* ─── sample repo ─── */
const SAMPLE_FILES = [
  {path:"cli.py", content:'import argparse\nfrom core import TodoStore\n\ndef cmd_add(store, args):\n    store.add(args.title)\n    print("added:", args.title)\n\ndef cmd_list(store, args):\n    for i, t in enumerate(store.all(), 1):\n        mark = "x" if t.done else " "\n        print(f"{i}. [{mark}] {t.title}")\n\ndef cmd_done(store, args):\n    store.mark_done(args.index)\n    print("done:", args.index)\n\ndef main():\n    p = argparse.ArgumentParser(prog="todo")\n    sub = p.add_subparsers()\n    pa = sub.add_parser("add"); pa.add_argument("title"); pa.set_defaults(fn=cmd_add)\n    pl = sub.add_parser("list"); pl.set_defaults(fn=cmd_list)\n    pd = sub.add_parser("done"); pd.add_argument("index", type=int); pd.set_defaults(fn=cmd_done)\n    args = p.parse_args()\n    store = TodoStore.load()\n    args.fn(store, args)\n    store.save()\n\nif __name__ == "__main__":\n    main()\n'},
  {path:"core.py", content:'from dataclasses import dataclass\nfrom storage import read_json, write_json\n\n@dataclass\nclass Todo:\n    title: str\n    done: bool = False\n\nclass TodoStore:\n    def __init__(self, items):\n        self.items = items\n\n    @classmethod\n    def load(cls):\n        return cls([Todo(**d) for d in read_json()])\n\n    def add(self, title):\n        self.items.append(Todo(title))\n\n    def all(self):\n        return self.items\n\n    def mark_done(self, index):\n        self.items[index].done = True\n\n    def save(self):\n        write_json([t.__dict__ for t in self.items])\n'},
  {path:"storage.py", content:'import json, os\n\nPATH = os.path.expanduser("~/.todo.json")\n\ndef read_json():\n    if not os.path.exists(PATH):\n        return []\n    with open(PATH) as f:\n        return json.load(f)\n\ndef write_json(data):\n    with open(PATH, "w") as f:\n        json.dump(data, f, indent=2)\n'},

const SC_FIX_BUG = {

  steps:[

    {delay:900, kind:"edit", path:"tests/test_cli.py", isNew:true, newContent:'from core import TodoStore\n\ndef test_add_then_list():\n    s = TodoStore([])\n    s.add("write report")\n    s.add("call sam")\n    titles = [t.title for t in s.all()]\n    assert titles == ["write report", "call sam"]\n\ndef test_done_marks_item():\n    s = TodoStore([])\n    s.add("ship it")\n    s.mark_done(1)\n    assert s.all()[0].done is True\n', hunks:[

        {type:"add",text:"    assert s.all()[0].title == \"write report\""},
        {type:"add",text:"def test_done_marks_item():"},
        {type:"add",text:"    s = TodoStore([]); s.add(\"ship it\"); s.mark_done(1)"},
        {type:"add",text:"    assert s.all()[0].done is True"},
      ]},
    ]},
    {delay:700, kind:"cmd", cmd:"pytest -q"},
    {delay:700, kind:"out", text:"....\n=== 4 passed in 0.10s ===", ok:true},
    {delay:500, kind:"final", text:"Added `tests/test_cli.py` with two cases covering add→list and done. Full suite passes (4 passed)."},
  ],
};
const SC_GENERIC = {
  id:"generic", title:"General change",
  match:()=>true,
  steps:[
    {delay:500, kind:"reason", label:"Survey the repo", text:"Let me look at the entry point and core module to ground the change."},
    {delay:700, kind:"read", path:"cli.py"},
    {delay:600, kind:"read", path:"core.py"},
    {delay:900, kind:"edit", path:"core.py", hunks:[
      {header:"@@ class TodoStore @@", lines:[
        {type:"ctx",text:"    def all(self):"},
        {type:"ctx",text:"        return self.items"},
        {type:"add",text:""},
        {type:"add",text:"    def pending(self):"},
        {type:"add",text:"        return [t for t in self.items if not t.done]"},
      ]},
    ]},
    {delay:700, kind:"cmd", cmd:"pytest -q"},
    {delay:700, kind:"out", text:"..\n=== 2 passed in 0.08s ===", ok:true},
    {delay:500, kind:"final", text:"Made a focused change in `core.py` and kept the suite green. Tell me if you'd like me to extend it further."},
  ],
};
const SCENARIOS = [SC_ADD_FLAG, SC_FIX_BUG, SC_WRITE_TEST];
function pickScenario(task){ return SCENARIOS.find(s=>s.match(task)) || SC_GENERIC; }

/* ─── provider dialects ─── */
function dialect(provider){
  return provider==="codex" ? {
    name:"Codex", idPfx:"thread_", sandbox:{read:"read_only",write:"workspace_write",full:"full_access"},
    label:{start:"thread.started", reason:"reasoning", read:"tool: read_file", edit:"tool: apply_patch", cmd:"command: exec", out:"command.output", final:"assistant.final", done:"turn.completed", stop:"turn.aborted"},
  } : {
    name:"Claude Code", idPfx:"sess_", sandbox:{read:"read-only",write:"acceptEdits",full:"bypassPermissions"},
    label:{start:"system.init", reason:"thinking", read:"tool_use: Read", edit:"tool_use: Edit", cmd:"tool_use: Bash", out:"tool_result", final:"assistant.final", done:"result", stop:"aborted"},
  };
}
const ACCESS = [{id:"read",label:"read-only"},{id:"write",label:"workspace-write"},{id:"full",label:"full-access"}];
function rid(pfx){ return pfx + Math.random().toString(16).slice(2,8); }
const sleep = (ms)=> new Promise(r=>setTimeout(r, ms));

/* ─── recents (emulated) ─── */
const RECENTS = [
  {provider:"codex", cwd:"~/todo-cli", title:"Add a --json flag", age:"2h ago"},
  {provider:"claude", cwd:"~/notes-api", title:"Fix failing auth test", age:"yesterday"},
  {provider:"codex", cwd:"~/vellum", title:"Wire memory recall", age:"3d ago"},
];

/* ═══════════ App ═══════════ */
function App(){
  const [view, setView] = useState("home");     // home | session
  const [provider, setProvider] = useState("codex");
  const [access, setAccess] = useState("write");
  const [cwd, setCwd] = useState("");
  const [sessionId, setSessionId] = useState("");
  const [status, setStatus] = useState("idle");  // idle | running | done | error
  const [messages, setMessages] = useState([]);
  const [events, setEvents] = useState([]);
  const [edited, setEdited] = useState({});
  const [extraFiles, setExtraFiles] = useState([]);
  const [diffs, setDiffs] = useState([]);
  const [terminal, setTerminal] = useState([]);
  const [tab, setTab] = useState("runlog");
  const [openFile, setOpenFile] = useState("cli.py");
  const [accessOpen, setAccessOpen] = useState(false);
  const cancelRef = useRef(false);
  const logRef = useRef(null);

  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [events]);

  function openProject(){
    const d = dialect(provider);
    setCwd("~/todo-cli"); setSessionId(rid(d.idPfx)); setStatus("idle");
    setMessages([]); setEvents([]); setEdited({}); setExtraFiles([]); setDiffs([]); setTerminal([]);
    setTab("runlog"); setOpenFile("cli.py"); setView("session");
  }
  function resume(r){
    setProvider(r.provider); const d = dialect(r.provider);
    setCwd(r.cwd); setSessionId(rid(d.idPfx)); setStatus("idle");
    setMessages([{role:"user",text:r.title},{role:"assistant",text:"(resumed) "+r.title+" — ready to continue.",streaming:false}]);
    setEvents([]); setEdited({}); setExtraFiles([]); setDiffs([]); setTerminal([]); setView("session");
  }
  function backHome(){ setView("home"); }

  const allFiles = SAMPLE_FILES.concat(extraFiles);
  const accessLabel = (ACCESS.find(a=>a.id===access)||{}).label;

  async function runTurn(task){
    if(status==="running") return;
    const d = dialect(provider);
    setStatus("running"); cancelRef.current=false; setTab("runlog");
    setMessages(m=>[...m, {role:"user",text:task}, {role:"assistant",text:"",streaming:true}]);
    let elapsed = 0;
    const ev = (kind,label,detail)=>{ setEvents(e=>[...e, {id:rid("evt_"), t:"+"+elapsed.toFixed(1)+"s", kind, label, detail}]); };
    // session start
    ev("start", d.label.start, provider==="codex" ? ("sandbox: "+d.sandbox[access]+" · "+sessionId) : ("permission: "+d.sandbox[access]+" · "+sessionId));
    const scen = pickScenario(task);
    let prose = "";
    for(const step of scen.steps){
      if(cancelRef.current){ ev("stop", d.label.stop, "stopped by user"); setStatus("idle"); setMessages(m=>m.map((x,i)=> i===m.length-1?{...x,streaming:false,text:prose||"(stopped)"}:x)); cancelRef.current=false; return; }
      await sleep(step.delay); elapsed += step.delay/1000;
      if(step.kind==="reason"){ ev("reason", d.label.reason, step.label); if(step.text){ prose += (prose?"\n\n":"")+step.text; setMessages(m=>m.map((x,i)=> i===m.length-1?{...x,text:prose}:x)); } }
      else if(step.kind==="read"){ ev("read", d.label.read, step.path); }
      else if(step.kind==="edit"){
        const adds = step.hunks.reduce((n,h)=>n+h.lines.filter(l=>l.type==="add").length,0);
        const dels = step.hunks.reduce((n,h)=>n+h.lines.filter(l=>l.type==="del").length,0);
        ev("edit", d.label.edit, step.path+"  (+"+adds+" −"+dels+")");
        setEdited(e=>({...e,[step.path]:true}));
        setDiffs(ds=>[...ds, {path:step.path, hunks:step.hunks}]);
        if(step.isNew){ setExtraFiles(f=> f.find(x=>x.path===step.path)?f:[...f,{path:step.path, content:step.newContent||""}]); }
      }
      else if(step.kind==="cmd"){ ev("cmd", d.label.cmd, step.cmd); setTerminal(t=>[...t,{type:"cmd",text:step.cmd}]); }
      else if(step.kind==="out"){ ev("out", d.label.out, step.ok?"ok":"non-zero exit"); setTerminal(t=>[...t,{type:"out",text:step.text,ok:step.ok}]); }
      else if(step.kind==="final"){ ev("final", d.label.final, "response ready"); prose = step.text; setMessages(m=>m.map((x,i)=> i===m.length-1?{...x,text:step.text,streaming:false}:x)); }
    }
    ev("done", d.label.done, "turn complete");
    setStatus("done"); setTab("diff");
  }
  function stop(){ cancelRef.current = true; }

  return (
    <div className="stage">
      <div className="win">
        {/* titlebar */}
        <div className="titlebar">
          <span className="appmark"/>
          <div className="navbtns">
            <button className="navbtn" title="Sidebar"><IcSidebar size={15}/></button>
            <button className="navbtn" title="Back" onClick={backHome}><IcChevL size={16}/></button>
            <button className="navbtn" title="Forward"><IcChevR size={16}/></button>
          </div>
          <div className="menu">{["File","Edit","View","Window","Help"].map(m=><span key={m}>{m}</span>)}</div>
          <div className="tb-title">{view==="session"? (dialect(provider).name+" · "+cwd) : "Vellum — Coding"}</div>
          <div className="tb-right"><span className="wc">—</span><span className="wc">▢</span><span className="wc close">✕</span></div>
        </div>
        {/* body */}
        <div className="body">
          <div className="sidebar">
            <div className="sb-row" onClick={backHome}><IcEdit size={15}/><span>New chat</span></div>
            <div className="sb-row"><IcSearch size={15}/><span>Search</span></div>
            <div className="sb-row"><IcPlugin size={15}/><span>Plugins</span></div>
            <div className="sb-sec">Projects</div>
            <div className="sb-item" onClick={openProject}><IcFolder size={14}/><span>todo-cli</span></div>
            <div className="sb-item"><IcFolder size={14}/><span>vellum</span></div>
            <div className="sb-sec">Recent sessions</div>
            {RECENTS.map((r,i)=>(<div key={i} className="sb-item" onClick={()=>resume(r)}><IcClock size={13}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</span></div>))}
            <div className="sb-grow"/>
            <div className="sb-item"><span className="dot a"/><span>Backend: preview mode</span></div>
          </div>
          <div className="main">
            {view==="home"
              ? <CodingHome provider={provider} setProvider={setProvider} onOpen={openProject} onResume={resume}/>
              : <Session {...{provider,cwd,sessionId,status,access,accessLabel,accessOpen,setAccessOpen,setAccess,messages,events,edited,diffs,terminal,allFiles,tab,setTab,openFile,setOpenFile,runTurn,stop,logRef}}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

function CodingHome({provider, setProvider, onOpen, onResume}){
  return (
    <div className="home">
      <div style={{textAlign:"center"}}>
        <div className="home-title">Coding Assistant</div>
        <div className="home-sub" style={{marginTop:6}}>Pick a provider and open a project to start.</div>
      </div>
      <div className="seg">
        <button className={provider==="codex"?"on":""} onClick={()=>setProvider("codex")}><IcTerminal size={14}/>Codex</button>
        <button className={provider==="claude"?"on":""} onClick={()=>setProvider("claude")}><IcTasks size={14}/>Claude Code</button>
      </div>
      <div className="health">
        <span><span className="dot g"/>Codex <b>available</b></span>
        <span><span className="dot g"/>Claude Code <b>available</b></span>
        <span><span className="dot a"/>Backend <b>preview mode</b></span>
      </div>
      <div className="home-cards">
        <div className="hcard" onClick={onOpen}>
          <div className="hc-ic"><IcFolderOpen size={22}/></div>
          <h3>Open project</h3>
          <p>Open the <b>todo-cli</b> sample repo and start a {dialect(provider).name} session.</p>
        </div>
        <div className="hcard" onClick={()=>onResume(RECENTS[0])}>
          <div className="hc-ic"><IcClock size={22}/></div>
          <h3>Resume session</h3>
          <p>Continue your most recent coding session where you left off.</p>
        </div>
      </div>
      <div className="recents">
        <div className="sb-sec" style={{padding:"4px 2px"}}>Recent sessions</div>
        {RECENTS.map((r,i)=>(
          <div key={i} className="recent" onClick={()=>onResume(r)}>
            {r.provider==="codex"?<IcTerminal size={14}/>:<IcTasks size={14}/>}
            <span>{r.title}</span>
            <span className="r-meta">{dialect(r.provider).name} · {r.cwd} · {r.age}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Session(p){
  const d = dialect(p.provider);
  const TABS = [
    {id:"files", label:"Files", ic:<IcFile size={13}/>},
    {id:"terminal", label:"Terminal", ic:<IcTerminal size={13}/>, n:p.terminal.length},
    {id:"browser", label:"Browser", ic:<IcGlobe size={13}/>},
    {id:"runlog", label:"Run Log", ic:<IcTasks size={13}/>, n:p.events.length},
    {id:"diff", label:"Diff", ic:<IcDiff size={13}/>, n:p.diffs.length},
  ];
  const [task, setTask] = useState("");
  function submit(){ const t=task.trim(); if(!t||p.status==="running") return; p.runTurn(t); setTask(""); }
  return (
    <div className="sess">
      <div className="chatcol">
        <div className="strip">
          <span><span className="s-k">provider</span> <span className="s-v">{d.name}</span></span>
          <span><span className="s-k">cwd</span> <span className="s-v">{p.cwd}</span></span>
          <span><span className={"pill"+(p.access==="full"?" elev":"")}>{p.accessLabel}</span></span>
          <span><span className="s-k">{p.provider==="codex"?"thread":"session"}</span> <span className="s-v">{p.sessionId}</span></span>
          <span style={{marginLeft:"auto"}}>{p.status==="running"?<span className="working"><Spin/>running</span>:<span className="s-k">{p.status}</span>}</span>
        </div>
        <div className="msgs">
          {p.messages.length===0 && <div className="empty"><IcTerminal size={20}/><div>Describe a coding task — e.g. <b>"add a --json flag to list"</b>, <b>"fix the failing test"</b>, or <b>"write tests for core"</b>.</div></div>}
          {p.messages.map((m,i)=> m.role==="user"
            ? <div key={i} className="umsg">{m.text}</div>
            : <div key={i} className="amsg">{m.streaming && !m.text ? <span className="working"><Spin/><span className="shimmer">{d.name} is working</span></span> : (m.streaming ? <span className="shimmer">{m.text}</span> : m.text)}</div>)}
        </div>
        <div className="composer">
          <div className="cbox">
            <textarea rows={2} placeholder={"Ask "+d.name+" to make a change…"} value={task}
              onChange={e=>setTask(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); submit(); } }}/>
            <div className="cfoot">
              <span className="cctl">{p.provider==="codex"?<IcTerminal size={12}/>:<IcTasks size={12}/>}{d.name}</span>
              <div style={{position:"relative"}}>
                <span className="cctl" onClick={()=>p.setAccessOpen(v=>!v)}>{p.accessLabel} ▾</span>
                {p.accessOpen && <div style={{position:"absolute",bottom:30,left:0,background:"#161618",border:"1px solid #2a2a2d",borderRadius:9,padding:5,zIndex:30,width:160}}>
                  {ACCESS.map(a=><div key={a.id} className="cctl" style={{border:"none",margin:1,justifyContent:"flex-start"}} onClick={()=>{p.setAccess(a.id);p.setAccessOpen(false);}}>{a.label}</div>)}
                </div>}
              </div>
              <div className="cspace"/>
              {p.status==="running"
                ? <button className="sbtn stop" onClick={p.stop} title="Stop"><IcStop size={13}/></button>
                : <button className="sbtn" onClick={submit} disabled={!task.trim()} title="Send"><IcSend size={14}/></button>}
            </div>
          </div>
        </div>
      </div>
      <div className="ws">
        <div className="wsbar">
          {TABS.map(t=>(
            <div key={t.id} className={"wstab"+(p.tab===t.id?" on":"")} onClick={()=>p.setTab(t.id)}>
              {t.ic}<span>{t.label}</span>{t.n>0 && <span className="badge">{t.n}</span>}
            </div>
          ))}
        </div>
        <div className="wsbody" ref={p.tab==="runlog"?p.logRef:null}>
          {p.tab==="files" && <FilesTab files={p.allFiles} edited={p.edited} open={p.openFile} setOpen={p.setOpenFile}/>}
          {p.tab==="terminal" && <TerminalTab lines={p.terminal}/>}
          {p.tab==="browser" && <BrowserTab/>}
          {p.tab==="runlog" && <RunLogTab events={p.events}/>}
          {p.tab==="diff" && <DiffTab diffs={p.diffs}/>}
        </div>
      </div>
    </div>
  );
}

function buildTree(files){
  const root = {};
  files.forEach(f=>{
    const parts = f.path.split("/");
    let node = root;
    parts.forEach((seg,i)=>{
      if(i===parts.length-1){ node[seg] = {__file:f.path}; }
      else { node[seg] = node[seg] || {}; node = node[seg]; }
    });
  });
  return root;
}
function TreeNode({node, name, depth, edited, open, setOpen}){
  if(node.__file!==undefined){
    const path = node.__file;
    return <div className={"trow"+(open===path?" sel":"")} style={{paddingLeft:8+depth*14}} onClick={()=>setOpen(path)}>
      <IcFile size={13}/><span>{name}</span>{edited[path] && <span className="ed" title="edited"/>}
    </div>;
  }
  const keys = Object.keys(node).sort((a,b)=>{ const af=node[a].__file!==undefined, bf=node[b].__file!==undefined; return (af?1:0)-(bf?1:0) || a.localeCompare(b); });
  return <React.Fragment>
    {name && <div className="trow" style={{paddingLeft:8+depth*14,color:"#8a8a8a"}}><IcFolder size={13}/><span>{name}</span></div>}
    {keys.map(k=><TreeNode key={k} node={node[k]} name={k} depth={name?depth+1:depth} edited={edited} open={open} setOpen={setOpen}/>)}
  </React.Fragment>;
}
function FilesTab({files, edited, open, setOpen}){
  const tree = buildTree(files);
  const cur = files.find(f=>f.path===open);
  return <div style={{display:"flex",height:"100%"}}>
    <div className="tree" style={{width:170,borderRight:"1px solid #161618",flexShrink:0,overflowY:"auto"}}>
      <TreeNode node={tree} name="" depth={0} edited={edited} open={open} setOpen={setOpen}/>
    </div>
    <div className="fview" style={{flex:1,overflowY:"auto"}}>
      <div className="fv-h">{open}{edited[open] && "  · edited"}</div>
      {cur ? cur.content : "select a file"}
    </div>
  </div>;
}
function TerminalTab({lines}){
  if(!lines.length) return <div className="empty"><IcTerminal size={20}/><div>No commands run yet.</div></div>;
  return <div className="term">{lines.map((l,i)=> l.type==="cmd"
    ? <div key={i} className="t-cmd">{l.text}</div>
    : <div key={i} className={"t-out "+(l.ok?"t-ok":(l.ok===false?"t-err":""))}>{l.text}</div>)}</div>;
}
function BrowserTab(){
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div className="browser-bar"><IcChevL size={14}/><IcChevR size={14}/><div className="browser-url">http://localhost:8000</div></div>
    <div className="browser-page"><div style={{marginTop:40}}><IcGlobe size={30}/><div style={{marginTop:12,color:"#888"}}>Local dev server preview</div><div style={{marginTop:4,fontSize:11,color:"#555"}}>(emulated — no live page in preview)</div></div></div>
  </div>;
}
function RunLogTab({events}){
  if(!events.length) return <div className="empty"><IcTasks size={20}/><div>Run events stream here once you send a task.</div></div>;
  return <div className="rlog">{events.map(e=>(
    <div key={e.id} className="rrow">
      <span className="r-t">{e.t}</span>
      <span className={"rtag "+e.kind}>{e.label}</span>
      <span className="r-lbl">{e.detail}</span>
    </div>
  ))}</div>;
}
function DiffTab({diffs}){
  if(!diffs.length) return <div className="empty"><IcDiff size={20}/><div>No file changes yet.</div></div>;
  return <div className="diff">{diffs.map((df,i)=>(
    <div key={i}>
      <div className="d-file">{df.path}</div>
      {df.hunks.map((h,j)=>(
        <div key={j}>
          <div className="d-hunk">{h.header}</div>
          {h.lines.map((l,k)=><div key={k} className={"d-line d-"+l.type}>{l.text}</div>)}
        </div>
      ))}
    </div>
  ))}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
