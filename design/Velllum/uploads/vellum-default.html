<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vellum — Default Mode (preview)</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f13;--panel:#0a0d10;--tb:#090c0f;--line:#1b2026;--line2:#262d35;
  --txt:#cfd6dd;--txt2:#eef2f6;--dim:#6f7b87;--dim2:#49525c;
  --ember:#2de0a7;--accent2:#19b9e8;--glow:rgba(45,224,167,.45);
  --hover:#141920;--active:#1a212a;--bubble:#171d25;--modal:#10151b;--input:#11161d;
  --glass:rgba(16,21,27,.85);
  --stage:radial-gradient(1100px 620px at 75% -12%,#0e2a23,#04070a 62%);
  --winborder:#1d242c;--shadow:0 40px 120px rgba(0,0,0,.65);--scroll:#222a33;
  --onember:#04231a;--danger:#ff6b5e;
  --font-d:"Bricolage Grotesque","Segoe UI",system-ui,sans-serif;
  --font-m:"Spline Sans Mono",ui-monospace,Consolas,monospace;
}
[data-theme="light"]{
  --bg:#f7f9fa;--panel:#f0f3f5;--tb:#eceff2;--line:#dde3e8;--line2:#cbd3da;
  --txt:#3a424b;--txt2:#14181d;--dim:#8a939c;--dim2:#b6bec6;
  --ember:#0aa881;--accent2:#0f8fbd;--glow:rgba(10,168,129,.35);
  --hover:#e7ebee;--active:#dfe5e9;--bubble:#e9edf0;--modal:#ffffff;--input:#ffffff;
  --glass:rgba(255,255,255,.88);
  --stage:radial-gradient(1100px 620px at 75% -12%,#d4efe4,#dde4e9 62%);
  --winborder:#c9d1d8;--shadow:0 40px 120px rgba(40,60,70,.25);--scroll:#cbd3da;
  --onember:#ffffff;--danger:#d6473a;
}
html,body{height:100%}
body{background:#000;color:var(--txt);font-family:"Schibsted Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100vh}
.stage{height:100vh;padding:18px;background:var(--stage)}
.win{height:100%;display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--winborder);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
/* titlebar */
.titlebar{position:relative;display:flex;align-items:center;height:38px;background:var(--tb);border-bottom:1px solid var(--line);padding-left:12px;flex-shrink:0}
.appmark{width:15px;height:15px;border-radius:4px;background:linear-gradient(135deg,var(--ember),var(--accent2));margin-right:10px}
.menu{display:flex;gap:2px;font-size:12.5px;color:var(--dim)}
.menu span{padding:3px 8px;border-radius:5px;cursor:default}
.menu span:hover{background:var(--hover);color:var(--txt)}
.tb-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:var(--dim)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:4px;padding-right:8px}
.tbtn{width:28px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:6px;cursor:pointer;background:none;border:none}
.tbtn:hover{background:var(--hover);color:var(--txt2)}
.wc{width:28px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:5px;cursor:default}
.wc:hover{background:var(--hover)}.wc.close:hover{background:#c0392b;color:#fff}
/* body */
.body{flex:1;display:flex;min-height:0}
/* sidebar — expanded */
.sidebar{width:260px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;padding:10px 8px 8px}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 10px}
.wordmark{font-size:16px;color:var(--txt2);letter-spacing:-.01em}
.wordmark em{color:var(--ember);font-style:italic}
.sb-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:8px;color:var(--txt);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-row:hover{background:var(--hover)}
.sb-row.active{background:var(--active);color:var(--txt2)}
.sb-row .sb-ic{color:var(--dim);flex-shrink:0;display:flex}
.sb-row.active .sb-ic{color:var(--txt)}
.sb-sec{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:16px 9px 6px;flex-shrink:0}
.sec-chev{display:flex;color:var(--dim2);background:none;border:none;cursor:pointer;padding:2px;border-radius:4px;transition:transform .2s,color .15s}
.sec-chev:hover{color:var(--txt)}
.sec-chev.closed{transform:rotate(-90deg)}
.sb-scroll{flex:1;overflow-y:auto;min-height:0}
.sb-list{}
.fold{position:relative;width:16px;height:16px;flex-shrink:0;cursor:pointer}
.fold>span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .18s,transform .25s;color:var(--dim)}
.fold:hover>span{color:var(--ember)}
.fold .f-open{opacity:0;transform:rotate(-8deg) scale(.85)}
.fold.on .f-open{opacity:1;transform:none}
.fold.on .f-closed{opacity:0;transform:rotate(8deg) scale(.85)}
.chat-row{position:relative;display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;color:var(--txt);font-size:12.5px;cursor:pointer}
.chat-row:hover{background:var(--hover)}
.chat-row.active{background:var(--active);color:var(--txt2)}
.chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-pin{color:var(--dim);display:flex;flex-shrink:0}
.chat-dots{display:none;background:none;border:none;color:var(--dim);cursor:pointer;border-radius:5px;padding:2px;flex-shrink:0}
.chat-row:hover .chat-dots{display:flex}
.chat-dots:hover{color:var(--txt2);background:var(--active)}
.rename-input{flex:1;background:var(--input);border:1px solid var(--line2);border-radius:5px;color:var(--txt2);font:inherit;font-size:12.5px;padding:2px 6px;outline:none;min-width:0}
.sb-empty{padding:8px 9px;color:var(--dim2);font-size:12px;font-style:italic}
.chat-row.nested{margin-left:22px}
.crumb{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:12.5px;color:var(--dim);border-bottom:1px solid var(--line);flex-shrink:0}
/* project page */
.proj-head{display:flex;align-items:center;gap:12px;margin-top:6px}
.proj-head .sb-ic{color:var(--dim);display:flex}
.proj-name{font-size:24px;color:var(--txt2);letter-spacing:-.02em}
.proj-mem{font-size:11px;color:var(--dim);border:1px solid var(--line2);border-radius:12px;padding:2px 9px}
.proj-comp{display:flex;justify-content:center;margin:20px 0 24px}
.src-card{border:1.5px dashed var(--line2);border-radius:14px;padding:44px 30px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.src-icons{display:flex;gap:6px;margin-bottom:8px}
.src-icons .kind-ic{width:34px;height:34px}
.src-title{font-size:15px;color:var(--txt2);font-weight:500}
.src-sub{font-size:12.5px;color:var(--dim);max-width:400px;line-height:1.5}
.src-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2)}
.src-row .lt-dim{margin-left:auto}
.proj-chat-row{display:flex;align-items:center;gap:11px;padding:11px 10px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2);cursor:pointer;border-radius:8px}
.proj-chat-row:hover{background:var(--hover)}
.proj-empty{padding:60px 20px;text-align:center}
.proj-empty .pe-t{font-size:14.5px;color:var(--txt2);margin-bottom:5px}
.proj-empty .pe-s{font-size:12.5px;color:var(--dim)}
/* create project modal */
.hintcard{display:flex;gap:10px;align-items:flex-start;background:var(--hover);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:16px}
.hintcard .sb-ic{color:var(--dim);display:flex;margin-top:1px}
.gear-pop{position:absolute;right:14px;top:50px;z-index:70;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;width:268px;box-shadow:0 14px 50px rgba(0,0,0,.45)}
.gp-head{font-size:12px;color:var(--dim);padding:7px 10px 2px}
.gp-note{font-size:11px;color:var(--dim2);padding:0 10px 6px}
.gp-item{padding:8px 10px;border-radius:8px;cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.gp-item:hover{background:var(--hover)}
.gp-item b{font-size:12.5px;color:var(--txt2);font-weight:500;display:block;margin-bottom:1px}
.gp-item p{font-size:11.5px;color:var(--dim);line-height:1.45}
.btn.primary:disabled{background:var(--line2);border-color:var(--line2);color:var(--dim);cursor:not-allowed;filter:none}
/* ledger */
.led-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.led-card{border:1px solid var(--line);border-radius:13px;padding:16px}
.led-k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.led-v{font-size:21px;color:var(--txt2);letter-spacing:-.02em}
.led-v small{font-size:12.5px;color:var(--dim);margin-left:7px}
.led-row{display:flex;align-items:baseline;gap:10px;padding:7px 2px;font-size:13px;color:var(--txt)}
.led-row .rn{color:var(--dim2);font-style:italic;width:22px}
.led-row .lv{margin-left:auto;color:var(--dim);font-size:12.5px}
.quiet-foot{margin-top:22px;font-size:12px;color:var(--dim2);font-style:italic}
/* skills */
.skill-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.skill-card .sk-meta{flex:1;min-width:0}
.skill-card h4{font-size:13.5px;color:var(--txt2);font-weight:500;margin-bottom:3px}
.skill-card p{font-size:12px;color:var(--dim)}
.skill-card .trig{color:var(--ember)}
/* memory */
.mem-row{display:flex;align-items:center;gap:11px;padding:10px 6px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt)}
.mem-cat{font-size:10.5px;color:var(--dim);border:1px solid var(--line2);border-radius:10px;padding:1px 8px;flex-shrink:0;text-transform:lowercase}
.mem-row .chat-dots{display:flex;margin-left:auto}
.mem-stats{font-size:12px;color:var(--dim);margin:14px 2px 0}
/* archive */
.arc-row{display:flex;align-items:center;gap:11px;padding:10px 8px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt2)}
.arc-row .arc-act{margin-left:auto;display:flex;gap:7px}
/* settings modal */
.set-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;width:660px;max-width:94vw;height:440px;background:var(--modal);border:1px solid var(--line2);border-radius:16px;box-shadow:0 30px 100px rgba(0,0,0,.55);display:flex;overflow:hidden}
.set-nav{width:170px;border-right:1px solid var(--line);padding:14px 8px;flex-shrink:0}
.set-nav .sn-title{font-size:14px;color:var(--txt2);font-weight:500;padding:2px 10px 12px}
.set-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--txt);font-size:12.5px;cursor:pointer}
.set-item:hover{background:var(--hover)}
.set-item.on{background:var(--active);color:var(--txt2)}
.set-body{flex:1;padding:20px 22px;overflow-y:auto;min-width:0}
.set-h{font-size:14px;color:var(--txt2);font-weight:500;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt)}
.set-row .sr-sub{display:block;font-size:11.5px;color:var(--dim);margin-top:2px}
.set-row .sr-end{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.set-note{font-size:11.5px;color:var(--dim2);font-style:italic;margin-top:14px}
.sw{width:34px;height:19px;border-radius:11px;background:var(--line2);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.sw::after{content:"";position:absolute;left:2.5px;top:2.5px;width:14px;height:14px;border-radius:50%;background:var(--bg);transition:left .15s}
.sw.on{background:var(--ember)}
.sw.on::after{left:17.5px}
.cu-pill{font-size:11.5px;border:1px solid var(--line2);border-radius:14px;padding:3px 11px;color:var(--dim)}
.cu-pill.on{border-color:var(--ember);color:var(--ember);background:color-mix(in srgb,var(--ember) 9%,transparent)}
/* profile row */
.profile-row{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;margin-top:6px;border-top:1px solid var(--line);border-radius:0;padding-top:11px}
.profile-row:hover{background:var(--hover)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--accent2));color:#06281e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.p-meta{flex:1;min-width:0}
.p-name{font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-plan{font-size:11px;color:var(--dim)}
.p-edit{color:var(--dim);display:flex}
/* sidebar — rail */
.rail{width:52px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:10px 0 12px;gap:2px}
.rail-logo{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:8px}
.rail-logo:hover{background:var(--hover)}
.rail-dot{width:15px;height:15px;border-radius:4px;background:linear-gradient(135deg,var(--ember),var(--accent2))}
.rail-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none}
.rail-btn:hover{background:var(--hover);color:var(--txt2)}
.rail-btn.active{background:var(--active);color:var(--txt2)}
.rail-grow{flex:1}
.rail-wrap{position:relative;width:100%;display:flex;justify-content:center}
.flyout{position:absolute;left:46px;top:-4px;z-index:60;width:248px;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
.fly-head{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:6px 10px 4px}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);position:relative}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-style:italic}
/* landing */
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:40px 24px}
.land-mark{font-size:34px;color:var(--txt2);letter-spacing:-.02em}
.land-mark em{color:var(--ember);font-style:italic}
.land-greet{font-size:19px;color:var(--txt);font-style:italic;margin-top:-14px}
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.chip{display:flex;align-items:center;gap:7px;padding:7px 15px;border:1px solid var(--line2);border-radius:20px;font-size:12.5px;color:var(--txt);cursor:pointer;background:none;font-family:inherit}
.chip:hover{background:var(--hover);border-color:var(--dim2)}
.chip .sb-ic{color:var(--dim);display:flex}
/* composer */
.composer-wrap{width:100%;max-width:680px;flex-shrink:0}
.composer-dock{padding:0 24px 18px;display:flex;justify-content:center;flex-shrink:0}
.cpill{background:var(--input);border:1px solid var(--line2);border-radius:24px;padding:8px 10px 8px 8px;display:flex;flex-direction:column;gap:6px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.cpill:focus-within{border-color:var(--ember);box-shadow:0 0 0 3px color-mix(in srgb,var(--ember) 14%,transparent)}
.attach-strip{display:flex;gap:6px;flex-wrap:wrap;padding:2px 4px 0}
.attach-chip{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt);border:1px solid var(--line2);background:var(--hover);border-radius:8px;padding:3px 8px}
.attach-chip .ax{cursor:pointer;color:var(--dim)}
.attach-chip .ax:hover{color:var(--danger)}
.crow{display:flex;align-items:flex-end;gap:6px}
.cbtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none;flex-shrink:0}
.cbtn:hover{background:var(--hover);color:var(--txt2)}
.cpill textarea{width:100%;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:14px;resize:none;min-height:24px;max-height:160px;padding:6px 2px;line-height:1.5;display:block}
.ta-wrap{flex:1;position:relative;min-width:0}
.ph-anim{position:absolute;left:2px;top:6px;color:var(--dim);font-style:italic;font-size:14px;line-height:1.5;pointer-events:none;animation:phIn .55s ease}
@keyframes phIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.mode-chip{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--dim);cursor:pointer;padding:5px 8px;border-radius:14px;background:none;border:none;font-family:inherit;flex-shrink:0}
.mode-chip:hover{background:var(--hover);color:var(--txt)}
.csend{width:34px;height:34px;border-radius:50%;border:none;background:var(--ember);color:var(--onember);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.csend:hover{filter:brightness(1.08)}
.csend:disabled{background:var(--line2);color:var(--dim);cursor:not-allowed}
.crow-rel{position:relative}
.mode-menu{position:absolute;right:44px;bottom:42px;z-index:30;background:var(--modal);border:1px solid var(--line2);border-radius:10px;padding:5px;min-width:130px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
/* model picker (ported from vellum-workspace.html) */
.model-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:14px;background:none;border:none;color:var(--dim);font:inherit;font-size:12px;cursor:pointer;flex-shrink:0}
.model-pill:hover{background:var(--hover);color:var(--txt)}
.model-num{font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-drop{position:absolute;right:44px;bottom:44px;z-index:30;width:232px;border:1px solid var(--line2);border-radius:12px;padding-bottom:4px;box-shadow:0 14px 50px rgba(0,0,0,.4);background:var(--modal)}
.drop-lbl{font-size:10.5px;color:var(--dim2);padding:9px 13px 4px;letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.model-sync{color:var(--ember);cursor:pointer;text-transform:none;letter-spacing:0}
.model-search{width:calc(100% - 18px);margin:2px 9px 4px;background:var(--input);border:1px solid var(--line2);border-radius:7px;padding:5px 9px;color:var(--txt2);font:inherit;font-size:12px;outline:none}
.model-search::placeholder{color:var(--dim2)}
.model-list{max-height:240px;overflow-y:auto}
.drop-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 13px;cursor:pointer;color:var(--txt);font-size:12.5px}
.drop-item:hover{background:var(--hover);color:var(--txt2)}
.drop-check{color:var(--ember);display:flex}
.drop-item.manage{border-top:1px solid var(--line);color:var(--ember);margin-top:3px}
/* thread */
.msgs{flex:1;overflow-y:auto;padding:26px 24px 10px;display:flex;flex-direction:column;align-items:center}
.msgs-inner{width:100%;max-width:680px;display:flex;flex-direction:column;gap:18px}
.bubble-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.bubble{max-width:78%;background:var(--bubble);border-radius:16px;padding:9px 14px;font-size:13.5px;color:var(--txt2);white-space:pre-wrap;line-height:1.55}
.areply{font-size:14px;line-height:1.7;color:var(--txt);white-space:pre-wrap}
.shimmer{background:linear-gradient(90deg,var(--dim) 0%,var(--txt2) 18%,var(--ember) 38%,var(--txt2) 58%,var(--dim) 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sh 2.4s linear infinite;filter:drop-shadow(0 0 8px var(--glow))}
@keyframes sh{to{background-position:-240% center}}
[data-theme="light"] .shimmer{background:none;-webkit-background-clip:initial;background-clip:initial;color:var(--txt);-webkit-text-fill-color:var(--txt);animation:none;filter:none}
.act-row{display:flex;gap:2px;margin-top:2px}
.act-btn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--dim);border-radius:6px;cursor:pointer;background:none;border:none}
.act-btn:hover{background:var(--hover);color:var(--txt2)}
.act-btn.on{color:var(--ember)}
.copied{font-size:11px;color:var(--dim);align-self:center;padding:0 6px}
/* conversation timeline */
.timeline{position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:6px;align-items:flex-end;padding:10px 8px}
.tl-bar{height:2.5px;border-radius:2px;background:var(--dim2);transition:background .15s}
.timeline:hover .tl-bar{background:var(--dim)}
.tl-pop{position:absolute;right:28px;top:50%;transform:translateY(-50%);width:270px;max-height:320px;overflow-y:auto;background:var(--modal);border:1px solid var(--line2);border-radius:12px;padding:6px;box-shadow:0 14px 50px rgba(0,0,0,.4)}
.tl-head{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;padding:5px 10px 3px}
.tl-row{padding:7px 10px;border-radius:7px;font-size:12.5px;color:var(--txt);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-row:hover{background:var(--hover)}
/* popovers + overlays */
.backdrop{position:fixed;inset:0;z-index:40}
.backdrop.dim{background:rgba(0,0,0,.45)}
[data-theme="light"] .backdrop.dim{background:rgba(60,50,35,.3)}
.ctx-menu{position:fixed;z-index:50;background:var(--modal);border:1px solid var(--line2);border-radius:11px;padding:5px;min-width:190px;box-shadow:0 14px 50px rgba(0,0,0,.4);font-size:13px}
.ctx-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;color:var(--txt);cursor:pointer}
.ctx-item:hover{background:var(--hover)}
.ctx-item .sb-ic{color:var(--dim);display:flex}
.ctx-item.danger{color:var(--danger)}
.ctx-item.danger .sb-ic{color:var(--danger)}
.ctx-div{height:1px;background:var(--line);margin:5px 4px}
.ctx-hint{font-size:11px;color:var(--dim2);padding:2px 10px 6px;font-style:italic}
.ctx-check{margin-left:auto;color:var(--ember);display:flex}
/* search overlay */
.search-card{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:50;width:560px;max-width:90vw;background:var(--modal);border:1px solid var(--line2);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.search-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);outline:none;color:var(--txt2);font:inherit;font-size:14px;padding:14px 16px}
.search-input::placeholder{color:var(--dim)}
.s-list{max-height:320px;overflow-y:auto;padding:7px}
.s-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--txt);font-size:13px;cursor:pointer}
.s-row:hover{background:var(--hover)}
.s-row .sb-ic{color:var(--dim);display:flex}
.s-none{padding:14px;color:var(--dim2);font-size:12.5px;font-style:italic;text-align:center}
/* pages (library/projects) */
.page{flex:1;overflow-y:auto;padding:34px 40px}
.page-inner{max-width:860px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-title{font-size:26px;color:var(--txt2);letter-spacing:-.02em;flex:1}
.lib-search{display:flex;align-items:center;gap:8px;background:var(--input);border:1px solid var(--line2);border-radius:18px;padding:7px 13px;width:230px}
.lib-search input{flex:1;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:12.5px;min-width:0}
.lib-search input::placeholder{color:var(--dim)}
.lib-search .sb-ic{color:var(--dim);display:flex}
.new-btn{display:flex;align-items:center;gap:6px;background:var(--txt2);color:var(--bg);border:none;border-radius:18px;padding:8px 14px;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer}
.new-btn:hover{filter:brightness(.94)}
.tab-row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:16px;font-size:12.5px;color:var(--txt);cursor:pointer;background:none;border:none;font-family:inherit}
.tab:hover{background:var(--hover)}
.tab.on{background:var(--active);color:var(--txt2)}
.tab-spacer{flex:1}
.icon-tgl{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;background:none;border:none}
.icon-tgl:hover{background:var(--hover);color:var(--txt2)}
.icon-tgl.on{background:var(--active);color:var(--txt2)}
.ltable{width:100%}
.lth{display:grid;grid-template-columns:1fr 160px 90px 30px;gap:10px;padding:8px 10px;font-size:12px;color:var(--dim);border-bottom:1px solid var(--line)}
.ltr{display:grid;grid-template-columns:1fr 160px 90px 30px;gap:10px;padding:10px;align-items:center;border-bottom:1px solid var(--line);border-radius:8px;cursor:default;position:relative}
.ltr:hover{background:var(--hover)}
.lt-name{display:flex;align-items:center;gap:11px;min-width:0;color:var(--txt2);font-size:13px}
.lt-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kind-ic{width:30px;height:30px;border-radius:8px;background:var(--active);display:flex;align-items:center;justify-content:center;color:var(--dim);flex-shrink:0}
.kind-ic.image{color:#7aa874}.kind-ic.pdf{color:#cf6b5d}.kind-ic.code{color:#8aa4c8}.kind-ic.diff{color:#c8a04a}.kind-ic.note{color:var(--dim)}
.lt-dim{font-size:12.5px;color:var(--dim)}
.ltr .chat-dots{display:none}
.ltr:hover .chat-dots{display:flex}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.ltile{border:1px solid var(--line);border-radius:12px;padding:14px;cursor:default}
.ltile:hover{background:var(--hover);border-color:var(--line2)}
.ltile .kind-ic{width:38px;height:38px;margin-bottom:10px}
.ltile .t-name{font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ltile .t-mod{font-size:11px;color:var(--dim);margin-top:3px}
/* projects */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.pcard{border:1px solid var(--line);border-radius:13px;padding:16px;cursor:pointer}
.pcard:hover{background:var(--hover);border-color:var(--line2)}
.pcard .sb-ic{color:var(--ember);display:flex;margin-bottom:10px}
.pcard h3{font-size:14px;color:var(--txt2);font-weight:500;margin-bottom:4px}
.pcard p{font-size:12px;color:var(--dim)}
/* profile popover */
.pop{position:fixed;z-index:50;background:var(--modal);border:1px solid var(--line2);border-radius:13px;padding:6px;width:250px;box-shadow:0 18px 60px rgba(0,0,0,.45);font-size:13px}
.pop-email{font-size:11.5px;color:var(--dim);padding:8px 11px 4px}
.pop-row{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:8px;color:var(--txt);cursor:pointer}
.pop-row:hover{background:var(--hover)}
.pop-row .sb-ic{color:var(--dim);display:flex}
.pop-row .avatar{width:24px;height:24px;font-size:9.5px}
.pop-row.dim{color:var(--dim)}
/* edit profile modal */
.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;width:440px;max-width:92vw;background:var(--modal);border:1px solid var(--line2);border-radius:16px;padding:24px;box-shadow:0 30px 100px rgba(0,0,0,.55)}
.m-title{font-size:16px;color:var(--txt2);font-weight:500;margin-bottom:20px}
.m-avatar-wrap{display:flex;justify-content:center;margin-bottom:22px}
.m-avatar{position:relative;width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--accent2));color:#06281e;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:600;font-family:var(--font-d);border:2px solid var(--line2)}
.m-cam{position:absolute;right:-2px;bottom:2px;width:28px;height:28px;border-radius:50%;background:var(--active);border:1px solid var(--line2);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer}
.m-field{border:1px solid var(--line2);border-radius:10px;padding:8px 12px;margin-bottom:12px}
.m-field label{display:block;font-size:11px;color:var(--dim);margin-bottom:2px}
.m-field input{width:100%;background:transparent;border:none;outline:none;color:var(--txt2);font:inherit;font-size:13.5px}
.m-help{font-size:11.5px;color:var(--dim);text-align:center;margin:6px 0 18px}
.m-actions{display:flex;justify-content:flex-end;gap:9px}
.btn{padding:8px 18px;border-radius:18px;border:1px solid var(--line2);background:none;color:var(--txt);font:inherit;font-size:12.5px;cursor:pointer}
.btn:hover{background:var(--hover)}
.btn:disabled{color:var(--dim);cursor:not-allowed;background:none}
.btn.primary{background:var(--ember);border-color:var(--ember);color:var(--onember)}
.btn.primary:hover{filter:brightness(1.08)}
/* ── modern visual system (addendum E) ── */
.wordmark{font-family:var(--font-d);font-weight:600;font-size:17px}
.wordmark em{font-style:normal}
.land-mark{font-family:var(--font-d);font-weight:700;font-size:42px;letter-spacing:-.04em;background:linear-gradient(100deg,var(--txt2) 25%,var(--ember) 62%,var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.land-mark em{color:inherit;font-style:normal}
.land-greet{font-family:var(--font-d);font-style:normal;font-weight:500;font-size:22px;color:var(--txt2)}
.page-title,.proj-name,.m-title,.sn-title,.src-title,.pe-t{font-family:var(--font-d);font-weight:600;letter-spacing:-.02em}
.set-h{font-family:var(--font-d);font-weight:600}
.led-v{font-family:var(--font-m);letter-spacing:-.01em}
.mem-stats{font-family:var(--font-m);font-size:11px}
.ph-anim{font-style:normal}
.ctx-menu,.pop,.flyout,.gear-pop,.mode-menu,.model-drop{background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);animation:popIn .18s ease}
.modal,.set-modal,.search-card,.tl-pop{background:var(--glass);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);animation:fadeIn .18s ease}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(.985)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}}
.main{background:radial-gradient(820px 460px at 82% -18%,color-mix(in srgb,var(--ember) 7%,transparent),transparent 65%),var(--bg)}
.csend{background:linear-gradient(135deg,var(--ember),var(--accent2))}
.csend:disabled{background:var(--line2)}
.btn.primary{background:linear-gradient(135deg,var(--ember),var(--accent2));border-color:transparent}
.btn.primary:disabled{background:var(--line2)}
.sb-row,.chat-row,.rail-btn,.tab,.act-btn,.cbtn,.tbtn,.icon-tgl,.set-item,.pop-row,.ctx-item{transition:background .15s,color .15s}
::selection{background:color-mix(in srgb,var(--ember) 30%,transparent)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:5px}::-webkit-scrollbar-track{background:transparent}
</style>

const KIND_BY_EXT = { png:'image', jpg:'image', jpeg:'image', gif:'image', webp:'image', svg:'image',
  pdf:'pdf', diff:'diff', patch:'diff', html:'code', js:'code', jsx:'code', ts:'code', py:'code', css:'code', json:'code', mjs:'code' };
const kindOf = (name) => KIND_BY_EXT[(name.split('.').pop() || '').toLowerCase()] || 'note';
const fmtSize = (b) => b >= 1048576 ? (b/1048576).toFixed(1) + ' MB' : (b/1024).toFixed(b < 10240 ? 2 : 1) + ' KB';

const REPLY_BUCKETS = [
  { test: /read|book|library|novel|author|essay/i, variants: [
    'Your library has a few threads on this. "{q}" sits close to what you marked in Meditations — the passages on attention. Start there, then the winter reading list.',
    'Two notes in your library touch this. The nearer one is filed under on stillness. Read it once more before adding anything new.',
  ]},
  { test: /code|build|bug|app|feature|deploy|ship/i, variants: [
    'Building belongs in the coding room — that preview has the full bench. Briefly: "{q}" is one slice, not three. Cut it to the part that ships today.',
    'The coding mode handles this better. For now: name the smallest change that makes "{q}" true, and do only that.',
  ]},
  { test: /./, variants: [
    'On "{q}" — a few words. The question is quieter than it looks. What you are actually deciding is what to leave out. Decide that first.',
    '"{q}" has two halves: the part you can act on this week, and the part that is weather. Keep the first. File the second.',
  ]},
];
const vellumReply = (text, exclude) => {
  const q = text.trim().replace(/\s+/g, ' ').slice(0, 60);
  const bucket = REPLY_BUCKETS.find(b => b.test.test(text));
  const pool = bucket.variants.filter(v => v.replace('{q}', q) !== exclude);
  const pick = pool[0] || bucket.variants[0];
  return pick.replace('{q}', q);
};

const Composer = ({text, setText, model, setModel, onSend, busy, ph}) => {
  const [attach, setAttach] = useState([]);
  const [modelOpen, setModelOpen] = useState(false);
  const [phIdx, setPhIdx] = useState(0);
  const fileRef = useRef(null);
  const taRef = useRef(null);
  useEffect(() => {
    if (text || ph) return;
    const t = setInterval(() => setPhIdx(i => (i + 1) % PLACEHOLDERS.length), 3000);
    return () => clearInterval(t);
  }, [text, ph]);
  useEffect(() => {
    const ta = taRef.current;
    if (ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; }
  }, [text]);
  const send = () => {
    if (!text.trim() || busy) return;
    onSend(text.trim(), attach);
    setText(''); setAttach([]);
  };
  return (
    <div className="composer-wrap">
      <div className="cpill">
        {attach.length > 0 && (
          <div className="attach-strip">
            {attach.map((a, i) => (
              <span key={i} className="attach-chip"><IcFile size={12}/>{a.name}
                <span className="ax" onClick={() => setAttach(at => at.filter((_, j) => j !== i))}><I d="M6 6l12 12M18 6L6 18" size={11}/></span>
              </span>
            ))}
          </div>
        )}
        <div className="crow crow-rel">
          <input ref={fileRef} type="file" style={{display: 'none'}}
            onChange={e => {
              const f = e.target.files && e.target.files[0];
              if (f) setAttach(at => [...at, {name: f.name, size: fmtSize(f.size)}]);
              e.target.value = '';
            }}/>
          <button className="cbtn" title="Attach — files land in your Library" onClick={() => fileRef.current.click()}><IcPlus/></button>
          <div className="ta-wrap">
            <textarea ref={taRef} rows={1} value={text}
              onChange={e => setText(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}/>
            {!text && (ph
              ? <span className="ph-anim" style={{animation: 'none'}}>{ph}</span>
              : <span className="ph-anim" key={phIdx}>{PLACEHOLDERS[phIdx]}</span>)}
          </div>

const MsgActions = ({msg, onRegen}) => {
  const [copied, setCopied] = useState(false);
  const [vote, setVote] = useState(null);
  const copy = () => {
    try { navigator.clipboard.writeText(msg.text); } catch {}
    setCopied(true); setTimeout(() => setCopied(false), 1200);
  };
  return (
    <div className="act-row">
      <button className="act-btn" title="Copy" onClick={copy}><IcCopy size={14}/></button>
      {copied && <span className="copied">copied</span>}
      <button className={'act-btn' + (vote === 'up' ? ' on' : '')} title="Good" onClick={() => setVote(v => v === 'up' ? null : 'up')}><IcThumbUp size={14}/></button>
      <button className={'act-btn' + (vote === 'down' ? ' on' : '')} title="Not right" onClick={() => setVote(v => v === 'down' ? null : 'down')}><IcThumbDown size={14}/></button>

      <button className="act-btn" title="Regenerate" onClick={onRegen}><IcRefresh size={14}/></button>
    </div>

};

const Timeline = ({userMsgs}) => {
  const [open, setOpen] = useState(false);
  if (userMsgs.length < 2) return null;
  const jump = id => {
    const el = document.getElementById('m-' + id);
    if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
  };
  return (
    <div className="timeline" onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {userMsgs.map(m => (
        <div key={m.id} className="tl-bar" style={{width: Math.min(22, 8 + Math.floor(m.text.length / 12))}}
          onClick={() => jump(m.id)}/>
      ))}
      {open && (
        <div className="tl-pop">
          <div className="tl-head">From the beginning</div>
          {userMsgs.map(m => (
            <div key={m.id} className="tl-row" onClick={() => jump(m.id)}>
              {m.text.length > 44 ? m.text.slice(0, 44).trimEnd() + '…' : m.text}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const LibraryView = ({library, setLibrary}) => {
  const [q, setQ] = useState('');
  const [tab, setTab] = useState('All');
  const [mode, setMode] = useState('list');
  const [newOpen, setNewOpen] = useState(false);
  const [itemMenu, setItemMenu] = useState(null);   // {id, x, y}
  const [renamingId, setRenamingId] = useState(null);
  const [draft, setDraft] = useState('');
  const fileRef = useRef(null);

  const items = library.filter(it => {
    if (tab === 'Images' && it.kind !== 'image') return false;
    if (tab === 'Files' && it.kind === 'image') return false;
    return it.name.toLowerCase().includes(q.toLowerCase());
  });

  const addUpload = f => {
    setLibrary(lib => [{id: uid(), name: f.name, kind: kindOf(f.name), size: fmtSize(f.size), modified: 'Today'}, ...lib]);
  };
  const addNote = () => {
    const id = uid();
    setLibrary(lib => [{id, name: 'untitled note', kind: 'note', size: '0 KB', modified: 'Today'}, ...lib]);
    setMode('list'); setTab('All'); setRenamingId(id); setDraft('untitled note');
  };
  const commitRename = id => {
    if (draft.trim()) setLibrary(lib => lib.map(it => it.id === id ? {...it, name: draft.trim()} : it));
    setRenamingId(null);
  };
  const menuAction = (id, action) => {
    setItemMenu(null);
    if (action === 'delete') setLibrary(lib => lib.filter(it => it.id !== id));
    if (action === 'rename') {
      const it = library.find(x => x.id === id);
      setRenamingId(id); setDraft(it ? it.name : '');
      setMode('list');
    }
  };

  return (
    <div className="page">
      <div className="page-inner">
        <div className="page-head">
          <div className="page-title">Library</div>
          <div className="lib-search">
            <span className="sb-ic"><IcSearch size={13}/></span>
            <input placeholder="Search library" value={q} onChange={e => setQ(e.target.value)}/>
          </div>
          <div style={{position: 'relative'}}>
            <input ref={fileRef} type="file" style={{display: 'none'}}
              onChange={e => { const f = e.target.files && e.target.files[0]; if (f) addUpload(f); e.target.value = ''; }}/>
            <button className="new-btn" onClick={() => setNewOpen(true)}>New<IcChevD size={12}/></button>
            {newOpen && (
              <React.Fragment>
                <div className="backdrop" onClick={() => setNewOpen(false)}/>
                <div className="ctx-menu" style={{position: 'absolute', right: 0, top: 38, left: 'auto'}}>
                  <div className="ctx-item" onClick={() => { setNewOpen(false); fileRef.current.click(); }}><span className="sb-ic"><IcUpload size={14}/></span>Upload</div>
                  <div className="ctx-item" onClick={() => { setNewOpen(false); addNote(); }}><span className="sb-ic"><IcNote size={14}/></span>Note</div>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
        <div className="tab-row">
          {['All', 'Images', 'Files'].map(t => (
            <button key={t} className={'tab' + (tab === t ? ' on' : '')} onClick={() => setTab(t)}>{t}</button>
          ))}
          <div className="tab-spacer"/>
          <button className="icon-tgl" title="Filter — not in this preview"><IcFilter size={15}/></button>
          <button className={'icon-tgl' + (mode === 'grid' ? ' on' : '')} title="Grid view" onClick={() => setMode('grid')}><IcGrid size={15}/></button>
          <button className={'icon-tgl' + (mode === 'list' ? ' on' : '')} title="List view" onClick={() => setMode('list')}><IcList size={15}/></button>
        </div>
        {mode === 'list' ? (
          <div className="ltable">
            <div className="lth"><span>Name</span><span>Modified ↓</span><span>Size</span><span/></div>
            {items.map(it => (
              <div key={it.id} className="ltr">
                <div className="lt-name">
                  <KindIcon kind={it.kind}/>
                  {renamingId === it.id
                    ? <input className="rename-input" autoFocus value={draft}
                        onChange={e => setDraft(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') commitRename(it.id); if (e.key === 'Escape') setRenamingId(null); }}
                        onBlur={() => commitRename(it.id)}/>
                    : <span>{it.name}</span>}
                </div>
                <span className="lt-dim">{it.modified}</span>
                <span className="lt-dim">{it.size}</span>
                <button className="chat-dots" title="Options" onClick={e => setItemMenu({id: it.id, x: e.clientX, y: e.clientY})}><IcDots size={14}/></button>
              </div>
            ))}
            {items.length === 0 && <div className="s-none">Nothing here.</div>}
          </div>
        ) : (
          <div className="lgrid">
            {items.map(it => (
              <div key={it.id} className="ltile">
                <KindIcon kind={it.kind}/>
                <div className="t-name">{it.name}</div>
                <div className="t-mod">{it.modified} · {it.size}</div>
              </div>
            ))}
            {items.length === 0 && <div className="s-none">Nothing here.</div>}
          </div>
        )}
        {itemMenu && <LibItemMenu pos={itemMenu} onAction={a => menuAction(itemMenu.id, a)} onClose={() => setItemMenu(null)}/>}
      </div>
    </div>
  );
};

            <div className="gp-item" onClick={() => { setMem('default'); setGear(false); }}>
              <div style={{flex: 1}}><b>Default</b><p>Project can access memories from outside chats, and vice versa.</p></div>
              {mem === 'default' && <span className="ctx-check"><IcCheck size={14}/></span>}
            </div>
            <div className="gp-item" onClick={() => { setMem('project-only'); setGear(false); }}>
              <div style={{flex: 1}}><b>Project-only</b><p>Project can only access its own memories. Its memories are hidden from outside chats.</p></div>
              {mem === 'project-only' && <span className="ctx-check"><IcCheck size={14}/></span>}
            </div>
          </div>
        )}
        <div className="m-field">
          <label>Project name</label>
          <input placeholder="Copenhagen Trip" autoFocus value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') create(); }}/>
        </div>
        <div className="hintcard">
          <span className="sb-ic"><IcSparkle size={14}/></span>
          Projects keep chats, files, and custom instructions in one place. Use them for ongoing work, or just to keep things tidy.
        </div>
        <div className="m-actions">
          <button className="btn primary" disabled={!name.trim()} onClick={create}>Create project</button>
        </div>
      </div>
    </React.Fragment>
  );
};

/* ─── profile ─── */
const ProfilePopover = ({profile, pos, onEditProfile, onSettings, onClose}) => {
  const Row = ({icon, label, hint}) => (
    <div className={'pop-row' + (hint ? ' dim' : '')} title={hint ? 'not in this preview' : undefined}>
      <span className="sb-ic">{icon}</span>{label}
    </div>
  );
  return (
    <React.Fragment>
      <div className="backdrop" onClick={onClose}/>
      <div className="pop" style={{left: Math.max(8, pos.x), bottom: window.innerHeight - pos.y + 8}}>
        <div className="pop-email">{profile.email}</div>
        <div className="pop-row">
          <div className="avatar">{initials(profile.displayName)}</div>
          {profile.displayName}
          <span className="ctx-check"><IcCheck size={14}/></span>
        </div>
        <Row icon={<IcUserPlus size={15}/>} label="Add account" hint/>
        <div className="ctx-div"/>
        <Row icon={<IcSparkle size={15}/>} label="Upgrade plan" hint/>
        <Row icon={<IcPenLine size={15}/>} label="Personalization" hint/>
        <div className="pop-row" onClick={onEditProfile}>
          <span className="sb-ic"><I size={15}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></I></span>Profile
        </div>
        <div className="pop-row" onClick={onSettings}>
          <span className="sb-ic"><IcSettings size={15}/></span>Settings
        </div>
        <div className="ctx-div"/>
        <Row icon={<IcHelp size={15}/>} label="Help" hint/>
        <Row icon={<IcLogout size={15}/>} label="Log out" hint/>
        <div className="ctx-hint">dim rows are not in this preview</div>
      </div>
    </React.Fragment>
  );
};

const EditProfileModal = ({profile, onSave, onClose}) => {
  const [name, setName] = useState(profile.displayName);
  const [user, setUser] = useState(profile.username);
  return (
    <React.Fragment>
      <div className="backdrop dim" onClick={onClose}/>
      <div className="modal">
        <div className="m-title">Edit profile</div>
        <div className="m-avatar-wrap">
          <div className="m-avatar">
            {initials(name || profile.displayName)}
            <div className="m-cam" title="Photo upload is not in this preview"><IcCamera/></div>
          </div>
        </div>
        <div className="m-field">
          <label>Display name</label>
          <input value={name} onChange={e => setName(e.target.value)} autoFocus/>
        </div>
        <div className="m-field">
          <label>Username</label>
          <input value={user} onChange={e => setUser(e.target.value)}/>
        </div>
        <div className="m-help">Your profile helps people recognize you in group chats.</div>
        <div className="m-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={() => onSave({displayName: name.trim() || profile.displayName, username: user.trim() || profile.username})}>Save</button>
        </div>
      </div>
    </React.Fragment>
  );
};

/* ─── settings modal ─── */
const SettingsModal = ({theme, onTheme, feeds, onToggleFeed, cu, onCu, onClose}) => {
  const [tab, setTab] = useState('General');
  const SECTIONS = [
    {k: 'General', ic: <IcSettings size={14}/>},
    {k: 'Reflections', ic: <IcNote size={14}/>},
    {k: 'Saved', ic: <IcArchive size={14}/>},
    {k: 'Feeds', ic: <IcGlobe size={14}/>},
    {k: 'Computer use', ic: <IcTerminal size={14}/>},
  ];
  return (
    <React.Fragment>
      <div className="backdrop dim" onClick={onClose}/>
      <div className="set-modal">
        <div className="set-nav">
          <div className="sn-title">Settings</div>
          {SECTIONS.map(s => (
            <div key={s.k} className={'set-item' + (tab === s.k ? ' on' : '')} onClick={() => setTab(s.k)}>
              <span className="sb-ic">{s.ic}</span>{s.k}
            </div>
          ))}
        </div>
        <div className="set-body">
          {tab === 'General' && (
            <React.Fragment>
              <div className="set-h">General</div>
              <div className="set-row">Theme
                <span className="sr-end">
                  <button className="btn" onClick={onTheme}>{theme === 'dark' ? 'Switch to light' : 'Switch to dark'}</button>
                </span>
              </div>
              <div className="set-row">Plan<span className="sr-end"><span className="cu-pill">Private</span></span></div>
              <div className="set-row">App<span className="sr-end"><span style={{color: 'var(--dim)', fontSize: 12}}>vellum — preview</span></span></div>
            </React.Fragment>
          )}
          {tab === 'Reflections' && (
            <React.Fragment>
              <div className="set-h">Reflections</div>
              {SEED_REFLECTIONS.map(r => (
                <div key={r.id} className="set-row" style={{alignItems: 'flex-start'}}>
                  <div><span style={{color: 'var(--dim)', fontSize: 11.5}}>{r.kind} · {r.date}</span><span className="sr-sub" style={{color: 'var(--txt)', fontSize: 12.5}}>{r.text}</span></div>
                </div>
              ))}
              <div className="set-note">Written at 2:00. Read when you like.</div>
            </React.Fragment>
          )}
          {tab === 'Saved' && (
            <React.Fragment>
              <div className="set-h">Saved</div>
              {SEED_SAVED.map(s => (
                <div key={s.id} className="set-row" style={{alignItems: 'flex-start'}}>
                  <div><span style={{color: 'var(--dim)', fontSize: 11.5}}>{s.date}</span><span className="sr-sub" style={{color: 'var(--txt)', fontSize: 12.5}}>{s.text}</span></div>
                </div>
              ))}
              <div className="set-note">Responses you chose to keep. Filed under Agent/Saved.</div>
            </React.Fragment>
          )}
          {tab === 'Feeds' && (
            <React.Fragment>
              <div className="set-h">Feeds</div>
              {feeds.map(f => (
                <div key={f.id} className="set-row">
                  <div>{f.name}<span className="sr-sub">{f.sub}</span></div>
                  <span className="sr-end">
                    <div className={'sw' + (f.on ? ' on' : '')} role="switch" aria-checked={f.on} onClick={() => onToggleFeed(f.id)}/>
                  </span>
                </div>
              ))}
              <div className="set-note">Preview — switches hold state, nothing is fetched.</div>
            </React.Fragment>
          )}
          {tab === 'Computer use' && (
            <React.Fragment>
              <div className="set-h">Computer use</div>
              <div className="set-row">Session
                <span className="sr-end">
                  <span className={'cu-pill' + (cu ? ' on' : '')}>{cu ? 'active · Ctrl+Alt+Esc to stop' : 'standing down'}</span>
                </span>
              </div>
              <div className="set-row">
                <span className="sr-end" style={{marginLeft: 0}}>
                  <button className="btn primary" disabled={cu} onClick={() => onCu(true)}>Enable</button>
                  <button className="btn" disabled={!cu} onClick={() => onCu(false)}>Stand down</button>
                </span>
              </div>
              <div className="set-note">Preview — no real session starts. The desktop glow belongs to the Tauri shell.</div>
            </React.Fragment>
          )}
        </div>
      </div>
    </React.Fragment>
  );
};

/* ─── app ─── */
const App = () => {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('vellum-theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('vellum-theme', theme); } catch {}
  }, [theme]);

  const [sidebar, setSidebar] = useState('open');
  const [view, setView] = useState('chat');
  const [activeChatId, setActiveChatId] = useState(null);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [createOpen, setCreateOpen] = useState(false);
  const [chats, setChats] = useState(SEED_CHATS);
  const [library, setLibrary] = useState(SEED_LIBRARY);
  const [projects, setProjects] = useState(SEED_PROJECTS);
  const [profile, setProfile] = useState(PROFILE_DEFAULT);
  const [skills, setSkills] = useState(SEED_SKILLS);
  const [memory, setMemory] = useState(SEED_MEMORY);
  const [feeds, setFeeds] = useState(SEED_FEEDS);
  const [selModel, setSelModel] = useState(DEFAULT_MODEL);
  const [secOpen, setSecOpen] = useState({projects: true, recents: true});
  const [expandedProj, setExpandedProj] = useState({});
  const toggleSec = k => setSecOpen(s => ({...s, [k]: !s[k]}));
  const toggleProj = id => setExpandedProj(e => ({...e, [id]: !e[id]}));
  const [cuEnabled, setCuEnabled] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [menu, setMenu] = useState(null);          // {type:'chat'|'project'|'profile', id?, x, y}
  const [renamingId, setRenamingId] = useState(null);
  const [projRenamingId, setProjRenamingId] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [editProfileOpen, setEditProfileOpen] = useState(false);

  useEffect(() => {
    const onKey = e => {
      if (e.key === 'Escape') { setMenu(null); setSearchOpen(false); setEditProfileOpen(false); setRenamingId(null); setProjRenamingId(null); setCreateOpen(false); setSettingsOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const newChat = () => { setView('chat'); setActiveChatId(null); setMenu(null); };
  const openChat = id => { setView('chat'); setActiveChatId(id); setMenu(null); };
  const nav = v => { setView(v); setMenu(null); };

  const chatMenuAction = (id, action) => {
    setMenu(null);
    if (action === 'rename') { setRenamingId(id); return; }
    if (action === 'share') return;
    setChats(cs => {
      if (action === 'pin') return cs.map(c => c.id === id ? {...c, pinned: !c.pinned} : c);
      if (action === 'archive') return cs.map(c => c.id === id ? {...c, archived: true} : c);
      if (action === 'delete') return cs.filter(c => c.id !== id);
      if (action === 'removeproj') return cs.map(c => c.id === id ? {...c, projectId: null} : c);
      return cs;
    });
    if ((action === 'archive' || action === 'delete') && activeChatId === id) setActiveChatId(null);
  };

  const renameChat = (id, title) => {
    setRenamingId(null);
    if (title && title.trim()) setChats(cs => cs.map(c => c.id === id ? {...c, title: title.trim()} : c));
  };

  const newProject = () => { setMenu(null); setCreateOpen(true); };
  const openProject = id => { setActiveProjectId(id); setView('project'); setMenu(null); };
  const createProject = ({name, memory}) => {
    const id = uid();
    setProjects(ps => [{id, name, updated: 'Today', memory, sources: []}, ...ps]);
    setExpandedProj(e => ({...e, [id]: true}));
    setCreateOpen(false);
    openProject(id);
  };
  const projectMenuAction = (id, action) => {
    setMenu(null);
    if (action === 'share') return;
    if (action === 'rename') { setProjRenamingId(id); setSidebar('open'); return; }
    if (action === 'delete') {
      setProjects(ps => ps.filter(p => p.id !== id));
      setChats(cs => cs.map(c => c.projectId === id ? {...c, projectId: null} : c));
      if (activeProjectId === id && view === 'project') setView('projects');
    }
  };
  const approveSkill = id => setSkills(sk => {
    const s = sk.proposed.find(x => x.id === id);
    if (!s) return sk;
    return {...sk, proposed: sk.proposed.filter(x => x.id !== id),
      active: [{...s, uses: 0, last: 'Today'}, ...sk.active]};
  });
  const retireSkill = id => setSkills(sk => {
    const s = sk.active.find(x => x.id === id);
    if (!s) return sk;
    return {...sk, active: sk.active.filter(x => x.id !== id), retired: [s, ...sk.retired]};
  });
  const forgetFact = id => setMemory(ms => ms.filter(m => m.id !== id));
  const restoreChat = id => setChats(cs => cs.map(c => c.id === id ? {...c, archived: false} : c));
  const deleteChat = id => setChats(cs => cs.filter(c => c.id !== id));

  const addSource = (projId, file) => {
    const item = {id: uid(), name: file.name, kind: kindOf(file.name), size: fmtSize(file.size), modified: 'Today'};
    setProjects(ps => ps.map(p => p.id === projId ? {...p, sources: [item, ...p.sources], updated: 'Today'} : p));
    setLibrary(lib => [{...item, id: uid()}, ...lib]);
  };
  const renameProject = (id, name) => {
    setProjRenamingId(null);
    if (name && name.trim()) setProjects(ps => ps.map(p => p.id === id ? {...p, name: name.trim()} : p));
  };

  const openProfileMenu = e => {
    const r = e.currentTarget.getBoundingClientRect();
    setMenu({type: 'profile', x: r.left, y: r.top});
  };

  const timers = useRef({});
  useEffect(() => () => Object.values(timers.current).forEach(clearTimeout), []);

  const streamReply = (chatId, msgId, full) => {
    let i = 0;
    const tick = () => {
      i += 3;
      const done = i >= full.length;
      setChats(cs => cs.map(c => c.id === chatId
        ? {...c, messages: c.messages.map(m => m.id === msgId ? {...m, text: full.slice(0, i), streaming: !done} : m)}
        : c));
      if (!done) timers.current[msgId] = setTimeout(tick, 22);
    };
    timers.current[msgId] = setTimeout(tick, 400);
  };

  const sendMessage = (text, attach, opts = {}) => {
    let chatId = opts.forceNew ? null : activeChatId;
    const userMsg = {id: uid(), role: 'user', text, attachments: attach};
    const reply = vellumReply(text);
    const aMsg = {id: uid(), role: 'assistant', text: '', full: reply, streaming: true};
    if (attach && attach.length) {
      setLibrary(lib => [
        ...attach.map(a => ({id: uid(), name: a.name, kind: kindOf(a.name), size: a.size, modified: 'Today'})),
        ...lib,
      ]);
    }
    if (!chatId) {
      chatId = uid();
      const title = text.length > 28 ? text.slice(0, 28).trimEnd() + '…' : text;
      setChats(cs => [{id: chatId, title, pinned: false, archived: false, projectId: opts.projectId || null, messages: [userMsg, aMsg]}, ...cs]);
      setActiveChatId(chatId);
    } else {
      setChats(cs => cs.map(c => c.id === chatId ? {...c, messages: [...c.messages, userMsg, aMsg]} : c));
    }
    streamReply(chatId, aMsg.id, reply);
  };

  const sendInProject = projId => (text, attach) => {
    sendMessage(text, attach, {forceNew: true, projectId: projId});
    setExpandedProj(e => ({...e, [projId]: true}));
    setView('chat');
  };

  const regenerate = (msgId) => {
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;
    const idx = chat.messages.findIndex(m => m.id === msgId);
    const prevUser = [...chat.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
    const old = chat.messages[idx];
    const reply = vellumReply(prevUser ? prevUser.text : '', old.full);
    setChats(cs => cs.map(c => c.id === chat.id
      ? {...c, messages: c.messages.map(m => m.id === msgId ? {...m, text: '', full: reply, streaming: true} : m)}
      : c));
    streamReply(chat.id, msgId, reply);
  };

  const menuChat = menu && menu.type === 'chat' ? chats.find(c => c.id === menu.id) : null;
  const menuChatProject = menuChat && menuChat.projectId ? projects.find(p => p.id === menuChat.projectId) : null;
  const activeChat = chats.find(c => c.id === activeChatId) || null;
  const activeChatProject = activeChat && activeChat.projectId ? projects.find(p => p.id === activeChat.projectId) : null;
  const activeProject = projects.find(p => p.id === activeProjectId) || null;

  return (
    <div className="stage">
      <div className="win">
        <div className="titlebar">
          <div className="appmark"/>
          <div className="menu"><span>File</span><span>Edit</span><span>View</span><span>Help</span></div>
          <div className="tb-title">vellum — preview</div>
          <div className="tb-right">
            <button className="tbtn" title={theme==='dark' ? 'Light mode' : 'Dark mode'}
              onClick={() => setTheme(theme==='dark' ? 'light' : 'dark')}>
              {theme==='dark' ? <IcSun/> : <IcMoon/>}
            </button>
            <div className="wc"><I d="M5 12h14"/></div>
            <div className="wc"><I size={13}><rect x="5" y="5" width="14" height="14" rx="2"/></I></div>
            <div className="wc close"><I d="M6 6l12 12M18 6L6 18"/></div>
          </div>
        </div>
        <div className="body">
          {sidebar === 'open'
            ? <Sidebar chats={chats} projects={projects} activeChatId={activeChatId} view={view}
                renamingId={renamingId} projRenamingId={projRenamingId} profile={profile}
                secOpen={secOpen} expandedProj={expandedProj} onToggleSec={toggleSec} onToggleProj={toggleProj}
                onCollapse={() => setSidebar('rail')} onNewChat={newChat} onSearch={() => setSearchOpen(true)}
                onNav={nav} onOpenChat={openChat}
                onChatMenu={(id, e) => setMenu({type: 'chat', id, x: e.clientX, y: e.clientY})}
                onRename={renameChat} onProfile={openProfileMenu}
                onNewProject={newProject}
                onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}
                onProjectRename={renameProject} onOpenProject={openProject}/>
            : <Rail view={view} profile={profile} chats={chats} projects={projects}
                onExpand={() => setSidebar('open')} onNewChat={newChat}
                onSearch={() => setSearchOpen(true)} onNav={nav} onProfile={openProfileMenu}
                onOpenChat={openChat} onNewProject={newProject}
                onProjectMenu={(id, e) => setMenu({type: 'project', id, x: e.clientX, y: e.clientY})}
                onOpenProject={openProject}/>}
          <div className="main">
            {view === 'chat' && <ChatView chat={activeChat} project={activeChatProject} model={selModel} setModel={setSelModel} onSend={sendMessage} onRegen={regenerate}/>}
            {view === 'library' && <LibraryView library={library} setLibrary={setLibrary}/>}
            {view === 'projects' && <ProjectsView projects={projects} chats={chats} onNewProject={newProject} onOpenProject={openProject}/>}
            {view === 'project' && activeProject && <ProjectPage project={activeProject} chats={chats}
              model={selModel} setModel={setSelModel}
              onSend={sendInProject(activeProject.id)} onOpenChat={openChat}
              onAddSource={f => addSource(activeProject.id, f)}/>}
            {view === 'project' && !activeProject && <div className="placeholder">project not found</div>}
            {view === 'ledger' && <LedgerView/>}
            {view === 'skills' && <SkillsView skills={skills} onApprove={approveSkill} onRetire={retireSkill}/>}
            {view === 'memory' && <MemoryView memory={memory} onForget={forgetFact}/>}
            {view === 'archive' && <ArchiveView chats={chats} onRestore={restoreChat} onDelete={deleteChat}/>}
          </div>
        </div>
        {menuChat && <ChatMenu chat={menuChat} projectName={menuChatProject ? menuChatProject.name : null} pos={menu} onAction={a => chatMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {createOpen && <CreateProjectModal onCreate={createProject} onClose={() => setCreateOpen(false)}/>}
        {menu && menu.type === 'project' && <ProjectMenu pos={menu} onAction={a => projectMenuAction(menu.id, a)} onClose={() => setMenu(null)}/>}
        {searchOpen && <SearchOverlay chats={chats}
          onNewChat={() => { setSearchOpen(false); newChat(); }}
          onOpenChat={id => { setSearchOpen(false); openChat(id); }}
          onClose={() => setSearchOpen(false)}/>}
        {menu && menu.type === 'profile' && <ProfilePopover profile={profile} pos={menu}
          onEditProfile={() => { setMenu(null); setEditProfileOpen(true); }}
          onSettings={() => { setMenu(null); setSettingsOpen(true); }}
          onClose={() => setMenu(null)}/>}
        {settingsOpen && <SettingsModal theme={theme} onTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
          feeds={feeds} onToggleFeed={id => setFeeds(fs => fs.map(f => f.id === id ? {...f, on: !f.on} : f))}
          cu={cuEnabled} onCu={setCuEnabled}
          onClose={() => setSettingsOpen(false)}/>}
        {editProfileOpen && <EditProfileModal profile={profile}
          onSave={p => { setProfile(pr => ({...pr, ...p})); setEditProfileOpen(false); }}
          onClose={() => setEditProfileOpen(false)}/>}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
