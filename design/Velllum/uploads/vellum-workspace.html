<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vellum Workspace</title>

<!-- React + Babel (CDN). Double-click this file to run. -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Geist+Mono:wght@300;400;500&family=Karla:wght@400;700&display=swap');

:root{
  --heading-font:'Fraunces',serif;
  --body-font:'Karla',sans-serif;
  --workspace-green:#a7f3bd;
  --workspace-green-muted:#68a97b;
  --workspace-panel:#020704;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:var(--body-font);background:#050507;color:#d8d8d8;font-size:13px;-webkit-font-smoothing:antialiased}
.heading,h1,h2,h3,.landing-title,.runtime-empty-title{font-family:var(--heading-font)}
.body-text{font-family:var(--body-font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
button,input,textarea,select{font-family:var(--body-font)}

/* Stage / backdrop */
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.desktop-bg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(120% 90% at 50% -10%, rgba(227,93,43,.07), transparent 45%),radial-gradient(80% 70% at 85% 110%, rgba(80,70,120,.05), transparent 50%),linear-gradient(180deg,#0a0a0e 0%,#070709 60%,#050506 100%)}
.desktop-bg::after{content:"";position:absolute;inset:0;opacity:.35;background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);background-size:22px 22px;mask-image:radial-gradient(circle at 50% 40%, #000 30%, transparent 80%)}
.bg-orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4;z-index:0;pointer-events:none}

/* Window */
.window{position:relative;z-index:2;display:flex;flex-direction:column;overflow:hidden;background:#0d0d0d;animation:winIn .45s cubic-bezier(.2,.7,.2,1);transition:width .22s ease,height .22s ease,border-radius .22s ease}
.win-float{width:min(1340px,94vw);height:min(862px,92vh);border-radius:12px;border:1px solid #232326;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 40px 120px rgba(0,0,0,.7),0 8px 30px rgba(0,0,0,.55)}
.win-max{width:100vw;height:100vh;border-radius:0;border:none;box-shadow:none}
@keyframes winIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}

/* Chrome */
.chrome{display:flex;flex-direction:column;height:100%;min-height:0}
.window-body{flex:1;min-height:0;position:relative;overflow:hidden;background:#0d0d0d}
.drag-region{-webkit-app-region:drag}
.chrome-toggle{display:flex;align-items:center;gap:2px;background:#141416;border:1px solid #232326;border-radius:8px;padding:2px;flex-shrink:0}
.chrome-toggle button{border:none;background:transparent;color:#6a6a6e;width:27px;height:22px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.chrome-toggle button:hover{color:#bbb}
.chrome-toggle button.active{background:#2a2a2e;color:#ededed}
.win-ctrls{display:flex;align-items:stretch;height:100%}
.win-ctrl{width:44px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#9a9a9a;cursor:pointer;transition:background .12s,color .12s}
.win-ctrl:hover{background:#1d1d1f;color:#eee}
.win-ctrl.wc-close:hover{background:#e3402f;color:#fff}
.win-ctrl svg{display:block}
.chrome-browser .bz-tabs{display:flex;align-items:flex-end;height:38px;background:#070708;padding-left:8px;gap:2px;border-bottom:1px solid #161618}
.bz-tab{display:flex;align-items:center;gap:8px;height:30px;padding:0 11px;border-radius:9px 9px 0 0;background:#0d0d0d;color:#bbb;font-size:12px;max-width:230px;cursor:default;border:1px solid #1c1c1f;border-bottom:none;position:relative;top:1px}
.bz-fav{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f6a25f,#e35d2b);flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.bz-tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bz-x{margin-left:4px;color:#666;font-size:12px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer}
.bz-x:hover{background:#222;color:#ddd}
.bz-newtab{width:28px;height:28px;border:none;background:transparent;color:#666;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;align-self:center;margin-bottom:2px}
.bz-newtab:hover{background:#161618;color:#bbb}
.bz-tabsfill{flex:1;height:100%}
.bz-toolbar{display:flex;align-items:center;gap:6px;height:42px;background:#0d0d0d;padding:0 10px;border-bottom:1px solid #161618}
.bz-nav{width:30px;height:30px;border:none;background:transparent;color:#777;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.bz-nav:hover{background:#1a1a1c;color:#ccc}
.bz-nav.dim{color:#3c3c3c;cursor:default}
.bz-omni{flex:1;display:flex;align-items:center;gap:9px;height:30px;background:#161618;border:1px solid #232326;border-radius:16px;padding:0 13px;color:#9a9a9a;font-size:12.5px;cursor:text;min-width:0}
.bz-omni .bz-url{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bz-omni .bz-host{color:#ddd}
.bz-iconbtn{width:30px;height:30px;border:none;background:transparent;color:#888;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.bz-iconbtn:hover{background:#1a1a1c;color:#ccc}
.bz-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#e35d2b,#7a4cf0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0}
.chrome-desktop .ws-titlebar{display:flex;align-items:center;height:36px;background:#0a0a0b;padding-left:10px;border-bottom:1px solid #161618;position:relative}
.wt-appmark{width:15px;height:15px;border-radius:4px;background:radial-gradient(circle at 35% 30%,#f6a25f,#e35d2b);margin-right:9px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.wt-navbtns{display:flex;align-items:center;gap:1px;margin-right:8px;-webkit-app-region:no-drag}
.wt-navbtn{display:flex;align-items:center;justify-content:center;width:26px;height:24px;border-radius:6px;background:transparent;border:none;color:#7a7a7a;cursor:pointer;transition:background .12s,color .12s}
.wt-navbtn:hover{background:#1c1c1e;color:#cfcfcf}
.wt-menu{display:flex;align-items:center;gap:2px;margin-left:4px}
.wt-mi{padding:3px 9px;border-radius:5px;color:#aaa;font-size:12.5px;cursor:default;transition:background .12s,color .12s}
.wt-mi:hover{background:#1c1c1f;color:#eee}
.wt-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#666;pointer-events:none;white-space:nowrap}
.wt-right{margin-left:auto;display:flex;align-items:center;gap:8px;height:100%}
.wt-right .chrome-toggle{margin-right:6px}

/* Workspace root */
.workspace{display:flex;height:100%;width:100%;overflow:hidden;position:relative;background:#0d0d0d}
.sb-trigger{position:absolute;top:0;left:0;width:14px;height:100%;z-index:90}
.sidebar{position:absolute;top:0;left:0;width:272px;height:100%;background:#0c0c0d;border-right:1px solid #191919;z-index:120;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .18s cubic-bezier(.4,0,.2,1);box-shadow:0 0 40px rgba(0,0,0,.5)}
.sidebar.open{transform:translateX(0)}
.sb-top{padding:8px 10px 6px;display:flex;flex-direction:column;gap:1px}
.sb-nav-btn{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#888;font-size:13px;transition:background .12s,color .12s;border:none;background:none;width:100%;text-align:left}
.sb-nav-btn:hover{background:#181818;color:#ddd}
.sb-nav-kbd{margin-left:auto}
.sb-section{padding:10px 10px 4px}
.sb-section-lbl{font-size:11px;color:#484848;font-weight:500;letter-spacing:.06em;padding:2px 10px 6px;text-transform:uppercase}
.proj-row{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:6px;cursor:pointer;color:#888;font-size:13px;transition:background .12s,color .12s}
.proj-row:hover,.proj-row.open{color:#ccc}
.chat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 4px 28px;border-radius:6px;cursor:pointer;color:#777;font-size:12.5px;transition:background .12s,color .12s;gap:6px}
.chat-row:hover{background:#181818;color:#ccc}
.chat-row.active{background:#1c1c1c;color:#ddd}
.chat-row-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.chat-row-age{font-size:11px;color:#444;flex-shrink:0}
.chat-row-actions{display:none;align-items:center;gap:1px;flex-shrink:0}
.chat-row:hover .chat-row-age{display:none}
.chat-row:hover .chat-row-actions{display:flex}
.cr-act{border:none;background:none;color:#888;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.cr-act:hover{color:#fff;background:#2a2a2a}
.confirm-btn{border:1px solid rgba(227,93,43,.45);background:rgba(227,93,43,.14);color:#e35d2b;border-radius:6px;font-size:11px;padding:2px 9px;cursor:pointer;flex-shrink:0}
.confirm-btn:hover{background:rgba(227,93,43,.24)}
.sb-add-proj{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:2px 6px;border:1px dashed #2a2a2a;border-radius:7px;color:#666;font-size:12.5px;cursor:pointer}
.sb-add-proj:hover{color:#ccc;border-color:#3a3a3a;background:#141414}
.proj-file{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 22px;color:#777;font-size:12px;cursor:pointer;border-radius:6px}
.proj-file:hover{background:#181818;color:#ccc}
.proj-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-row-actions{display:none;align-items:center;gap:1px;flex-shrink:0}
.proj-row:hover .proj-row-actions{display:flex}
.pr-act{border:none;background:none;color:#888;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.pr-act:hover{color:#fff;background:#2a2a2a}
.proj-nochats{font-size:12px;color:#3a3a3a;padding:3px 10px 3px 28px}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-box{width:380px;max-width:90%;background:#161618;border:1px solid #2a2a2e;border-radius:13px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.8)}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:16px;color:#eee;font-weight:500}
.modal-x{cursor:pointer;color:#666;display:flex}.modal-x:hover{color:#ddd}
.modal-sub{font-size:12.5px;color:#666;margin-top:3px}
.modal-input{width:100%;margin-top:14px;background:#0f0f10;border:1px solid #2a2a2e;border-radius:9px;padding:10px 12px;color:#eee;font-size:13.5px;font-family:var(--body-font);outline:none}
.modal-input:focus{border-color:#3a3a40}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal-btn{border:1px solid #2a2a2e;background:#1c1c1f;color:#ccc;border-radius:8px;padding:7px 16px;font-size:12.5px;cursor:pointer}
.modal-btn:hover{background:#242428}
.modal-btn.primary{background:#e8e8e8;color:#111;border-color:#e8e8e8}
.modal-btn.primary:hover{background:#fff}
.compute-modal{width:580px;max-width:94%;max-height:84vh;overflow-y:auto}
.cm-sec{margin-top:18px}
.cm-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cm-sec-hd > span{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.cm-scan{border:1px solid #2a2a2e;background:#1c1c1f;color:#ddd;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer}
.cm-scan:hover{background:#242428}
.cm-hint{font-size:12px;color:#666;line-height:1.5}
.cm-specs{display:flex;flex-wrap:wrap;gap:7px}
.cm-chip{display:flex;flex-direction:column;gap:2px;background:#121214;border:1px solid #242427;border-radius:9px;padding:8px 12px;min-width:96px}
.cm-chip b{color:#6a6a6a;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.cm-chip span{color:#ddd;font-size:13px}
.cm-note{font-size:11px;color:#555;margin-top:8px;line-height:1.5}
.cm-reco{border-radius:11px;padding:13px 14px;border:1px solid #242427;background:#121214}
.cm-reco.capable{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.05)}
.cm-reco.modest{border-color:rgba(227,93,43,.3);background:rgba(227,93,43,.05)}
.cm-reco.cloud{border-color:rgba(91,155,213,.3);background:rgba(91,155,213,.05)}
.cm-reco-t{font-size:13.5px;color:#e6e6e6;font-weight:500;margin-bottom:4px}
.cm-reco-b{font-size:12px;color:#888;line-height:1.55}
.cm-dl{margin-top:11px;border:none;background:#e8e8e8;color:#111;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer}
.cm-dl:hover{background:#fff}
.cm-prov{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #1a1a1c}
.cm-prov:last-child{border-bottom:none}
.cm-prov-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid #3a3a3e;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cm-prov-radio.on{border-color:#e35d2b}
.cm-prov-radio.on::after{content:"";width:8px;height:8px;border-radius:50%;background:#e35d2b}
.cm-prov-main{flex:1;min-width:0}
.cm-prov-name{font-size:13px;color:#ddd}
.cm-prov-sub{font-size:11px;color:#666;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-key{display:flex;align-items:center;gap:7px;background:#0f0f10;border:1px solid #242427;border-radius:8px;padding:5px 10px;width:188px;flex-shrink:0}
.cm-key input{flex:1;background:transparent;border:none;outline:none;color:#ccc;font-size:11.5px;font-family:'Geist Mono',monospace;min-width:0}
.cm-key input::placeholder{color:#444}
.cm-key-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
.cm-key-dot.on{background:#4ade80}
.att-row{display:flex;flex-wrap:wrap;gap:6px}
.att-row.att-compose{padding:10px 14px 0}
.att-chip{display:flex;align-items:center;gap:6px;background:#1a1a1c;border:1px solid #29292d;border-radius:9px;padding:4px 7px;font-size:11.5px;color:#bbb;max-width:200px;min-height:32px}
.att-chip img{width:24px;height:24px;border-radius:4px;object-fit:cover;flex-shrink:0}
.att-chip .att-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-x{cursor:pointer;color:#666;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;background:none;padding:2px;border-radius:4px}
.att-x:hover{color:#ddd}
.spinner{width:13px;height:13px;border:1.5px solid #2a2a2a;border-top-color:#e35d2b;border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.sb-bottom{border-top:1px solid #191919;padding:6px 10px 8px;position:relative}
.sb-settings-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;color:#777;font-size:13px;transition:background .12s,color .12s}
.sb-settings-row:hover{background:#181818;color:#ccc}
.kbd{font-size:10px;color:#3a3a3a;background:#161616;border:1px solid #222;border-radius:3px;padding:1px 5px;font-family:'Geist Mono',monospace}
.core-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;color:#777;font-size:12.5px;cursor:pointer;transition:background .12s,color .12s}
.core-row:hover{background:#181818;color:#ccc}
.core-count{margin-left:auto;font-size:11px;color:#444}
.settings-pop{position:absolute;bottom:46px;left:10px;width:230px;background:#161616;border:1px solid #222;border-radius:10px;overflow:hidden;z-index:300;box-shadow:0 8px 40px rgba(0,0,0,.7)}
.sp-hdr{padding:10px 14px 8px;border-bottom:1px solid #222}
.sp-email{font-size:12px;color:#999}
.sp-role{font-size:11px;color:#484848;margin-top:2px}
.sp-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:#888;font-size:12.5px}
.sp-item:hover{background:#1e1e1e;color:#ddd}
.sp-item-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;color:#888;font-size:12.5px}
.sp-item-row:hover{background:#1e1e1e;color:#ddd}
.sp-div{height:1px;background:#1e1e1e;margin:2px 0}
.usage-inner{padding:2px 14px 8px}
.usage-line{display:flex;justify-content:space-between;font-size:11.5px;color:#666;padding:2px 0}
.usage-sub{font-size:11px;color:#444}
.upgrade-link{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#666;cursor:pointer;padding:3px 0}
.upgrade-link:hover{color:#aaa}

/* Main */
.main{flex:1;display:flex;overflow:hidden;min-width:0;transition:margin-left .18s cubic-bezier(.4,0,.2,1)}
.main.desk-inset{border-top-left-radius:22px;border-top:1px solid #202022;border-left:1px solid #202022}
.main.desk-inset .chat-pane{border-top-left-radius:22px}
.proj-picker{position:absolute;top:34px;left:24px;min-width:248px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:11px;padding:4px;box-shadow:0 16px 50px rgba(0,0,0,.75);z-index:300}
.pp-search{display:flex;align-items:center;gap:8px;padding:7px 10px 9px;color:#666;border-bottom:1px solid #232326;margin-bottom:4px}
.pp-search input{flex:1;background:transparent;border:none;outline:none;color:#ccc;font-size:12.5px;font-family:var(--body-font)}
.pp-search input::placeholder{color:#555}
.pp-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#cfcfcf;font-size:12.5px;position:relative}
.pp-item:hover{background:#2a2a2e;color:#fff}
.pp-l{display:flex;align-items:center;gap:9px}
.pp-submenu{position:absolute;left:100%;top:-4px;margin-left:6px;min-width:212px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:11px;padding:4px;box-shadow:0 16px 50px rgba(0,0,0,.75);z-index:310}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#0d0d0d;position:relative}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;min-height:42px;flex-shrink:0;gap:8px;position:relative;z-index:5}
.tb-left{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.tb-title{font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-more{display:flex;align-items:center;padding:4px 5px;border-radius:5px;cursor:pointer;color:#444;transition:color .12s,background .12s;flex-shrink:0}
.tb-more:hover{color:#888;background:#181818}
.tb-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icon-btn{display:flex;align-items:center;padding:5px;border-radius:5px;cursor:pointer;color:#484848;transition:color .12s,background .12s;border:none;background:none;line-height:1}
.icon-btn:hover{color:#999;background:#181818}
.icon-btn.on{color:#bbb;background:#1c1c1c}
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:28px}
.landing-title{font-size:25px;color:#ddd;font-weight:400;letter-spacing:-.03em;text-align:center}
.landing-subtitle{margin-top:7px;color:#555;font-size:13px;text-align:center}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:12px 0 4px;display:flex;flex-direction:column;transition:padding-right .18s ease}
.msg-wrap{padding:3px 20px}
.msg-text{color:#ccc;font-size:13.5px;line-height:1.65;letter-spacing:-.01em}
.user-msg{align-self:flex-end;max-width:78%;margin:8px 20px;background:#1a1a1c;border:1px solid #242427;border-radius:13px 13px 4px 13px;padding:9px 13px;color:#e2e2e2;font-size:13.5px;line-height:1.55;animation:fadeUp .18s ease}
.sys-line{display:flex;align-items:center;gap:6px;color:#444;font-size:12px;padding:3px 20px}
.sys-dot{width:5px;height:5px;border-radius:50%;background:#2a2a2a;flex-shrink:0}
.sys-cmd{font-size:12px;color:#484848}
.icode{display:inline;background:#1c1c1c;border:1px solid #252525;border-radius:4px;padding:1px 6px;font-family:'Geist Mono',monospace;font-size:11.5px;color:#e09a4a}
.tdot{width:5px;height:5px;border-radius:50%;background:#e35d2b;display:inline-block;animation:tpulse 1.4s ease infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
.working-line{display:flex;align-items:center;gap:9px;padding:6px 20px}
.glow-text{font-size:13px;font-weight:500;background:linear-gradient(90deg,#5f5f5f 0%,#fff 22%,#e35d2b 42%,#ffd9b8 55%,#fff 74%,#5f5f5f 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 2s linear infinite}
.streaming-text{font-size:13.5px;line-height:1.65;background:linear-gradient(90deg,#9a9a9a 0%,#fff 18%,#e35d2b 38%,#ffe2c8 52%,#fff 72%,#9a9a9a 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 2.6s linear infinite}
.caret{display:inline-block;width:7px;height:14px;background:#e35d2b;margin-left:3px;border-radius:1px;vertical-align:text-bottom;box-shadow:0 0 7px rgba(227,93,43,.8);animation:blink 1.05s step-end infinite}
@keyframes shimmer{0%{background-position:140% center}100%{background-position:-140% center}}
@keyframes blink{50%{opacity:0}}
.spawn-block{margin:3px 20px;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:9px 12px}
.spawn-hdr{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;margin-bottom:5px}
.spawn-created{font-size:12px;color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.spawn-agent{color:#d0d0d0;font-weight:500}
.spawn-instr{font-size:11px;color:#484848;font-family:'Geist Mono',monospace;line-height:1.4}
.close-hdr{display:flex;align-items:center;gap:6px;font-size:12px;color:#444;padding:3px 20px;cursor:pointer}
.close-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#484848;padding:1px 20px 1px 30px}
.learning-inline{margin:7px 20px;background:#101010;border:1px solid #232323;border-radius:10px;padding:10px 12px}
.learning-inline-kicker{font-size:10.5px;color:#e35d2b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.learning-inline-title{font-size:13px;color:#bbb;margin-bottom:3px}
.learning-inline-body{font-size:12px;color:#666;line-height:1.5}

/* Studio composer */
.input-wrap{padding:12px 14px 14px;flex-shrink:0;position:relative;z-index:30;transition:padding-right .18s ease}
.input-box{position:relative;z-index:1;background:#121213;border:1px solid #242427;border-radius:21px;overflow:hidden;transition:border-color .18s,box-shadow .18s;box-shadow:0 16px 42px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.025)}
.input-box:focus-within{border-color:#35353a;box-shadow:0 18px 48px rgba(0,0,0,.28),0 0 0 3px rgba(255,255,255,.018),inset 0 1px 0 rgba(255,255,255,.04)}
.input-ta{width:100%;min-height:74px;max-height:220px;background:transparent;border:none;outline:none;color:#e1e1e3;font-size:15.5px;font-family:var(--body-font);padding:17px 18px 7px;resize:none;line-height:1.5;letter-spacing:-.012em}
.input-ta::placeholder{color:#505055}
.input-footer{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 11px;gap:12px}
.input-lft{display:flex;align-items:center;gap:5px;min-width:0}
.input-rgt{display:flex;align-items:center;gap:5px;flex-shrink:0}
.input-box .icon-btn{width:30px;height:30px;align-items:center;justify-content:center;border-radius:50%;color:#66666c}
.input-box .icon-btn:hover,.input-box .icon-btn.on{color:#d4d4d7;background:#1d1d20}
.pill{display:flex;align-items:center;gap:5px;min-height:30px;padding:4px 10px;border-radius:999px;background:#18181a;border:1px solid #232326;cursor:pointer;color:#8a8a90;font-size:11.5px;transition:border-color .12s,color .12s,background .12s;white-space:nowrap}
.pill:hover{border-color:#343439;color:#d0d0d3;background:#1b1b1e}
.pill:disabled{cursor:not-allowed;opacity:.58}
.pill.accent{color:#d9d9dc;border-color:#27272b;background:#18181a}
.agent-pill-label{font-weight:550;color:#e2e2e4}
.agent-access{color:#696970;font-size:10.5px;margin-left:1px}
.model-pill{display:flex;align-items:center;gap:5px;min-height:30px;padding:4px 9px;border-radius:999px;background:transparent;border:1px solid transparent;cursor:pointer;color:#77777e;font-size:11.5px;transition:border-color .12s,color .12s,background .12s}
.model-pill:hover{border-color:#29292d;background:#18181a;color:#b7b7bc}
.model-pill[aria-disabled="true"]{cursor:default}
.model-num{font-weight:600;color:#d1d1d4;font-size:11.5px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-search{width:100%;background:#0f0f10;border:1px solid #242427;border-radius:7px;padding:5px 9px;color:#ccc;font-size:12px;font-family:var(--body-font);outline:none;margin:2px 0 4px}
.model-search::placeholder{color:#444}
.model-list{max-height:260px;overflow-y:auto}
.model-sync{font-size:11px;color:#e35d2b;cursor:pointer}
.model-sync:hover{color:#f6824f}
.send-btn{display:flex;align-items:center;justify-content:center;width:31px;height:31px;border-radius:50%;background:#d8d8d8;cursor:pointer;border:none;color:#0d0d0d;transition:background .12s,transform .12s;flex-shrink:0}
.send-btn:hover{background:#fff;transform:translateY(-1px)}
.send-btn:disabled{background:#2a2a2a;color:#555;cursor:default;transform:none}
.stop-btn{display:flex;align-items:center;justify-content:center;width:31px;height:31px;border-radius:50%;background:#d8d8d8;border:none;cursor:pointer;color:#111;transition:background .12s,transform .12s;flex-shrink:0}
.stop-btn:hover{background:#fff;transform:scale(.97)}
.composer-queue{position:relative;z-index:0;margin:0 17px -5px;padding:8px 11px 10px;min-height:42px;border:1px solid #242427;border-bottom-color:#1b1b1d;border-radius:16px 16px 7px 7px;background:#101011;box-shadow:0 12px 32px rgba(0,0,0,.18)}
.queue-item{display:flex;align-items:center;gap:8px;min-width:0;color:#77777d;font-size:11.5px}
.queue-kicker{display:flex;align-items:center;gap:5px;color:#55555b;font:10px 'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.queue-kicker i{width:5px;height:5px;border-radius:50%;background:#e35d2b;box-shadow:0 0 8px rgba(227,93,43,.42)}
.queue-text{min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#9a9aa0}
.queue-action{border:none;background:none;color:#5f5f65;font:11px var(--body-font);cursor:pointer;padding:4px 5px;border-radius:6px}
.queue-action:hover{color:#d0d0d3;background:#1b1b1e}
.queue-icon{display:flex;align-items:center;justify-content:center;border:none;background:none;color:#4f4f55;cursor:pointer;padding:4px;border-radius:6px}
.queue-icon:hover{color:#c7c7cb;background:#1b1b1e}
.voice-live{color:#e35d2b!important;background:rgba(227,93,43,.1)!important;box-shadow:0 0 0 1px rgba(227,93,43,.2) inset}
.composer-hint{position:absolute;right:17px;bottom:1px;color:#3f3f44;font-size:10px;white-space:nowrap}
.menu-item .provider-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px rgba(78,154,101,.28)}
@media(max-width:720px){.input-ta{font-size:14.5px;padding:15px 15px 6px}.input-footer{padding:6px 9px 9px}.agent-access,.model-pill>span:not(.model-num){display:none}.input-wrap{padding-left:9px;padding-right:9px}.composer-queue{margin-left:12px;margin-right:12px}.pill{padding-left:8px;padding-right:8px}}
.proj-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;background:#181818;border:1px solid #1e1e1e;color:#555;font-size:11.5px;cursor:pointer}

/* Menus */
.menu-pop{position:absolute;background:#161618;border:1px solid #242427;border-radius:10px;overflow:visible;z-index:200;min-width:210px;box-shadow:0 12px 44px rgba(0,0,0,.7);padding:4px}
.menu-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;color:#bbb;font-size:12.5px;transition:background .12s}
.menu-item:hover{background:#202024}
.menu-item-l{display:flex;align-items:center;gap:9px}
.menu-sec{padding:7px 10px 3px;font-size:10px;color:#4a4a4a;letter-spacing:.07em;text-transform:uppercase}
.toggle{width:30px;height:17px;border-radius:999px;background:#2a2a2e;position:relative;transition:background .15s;flex-shrink:0}
.toggle.on{background:#e35d2b}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .15s}
.toggle.on::after{transform:translateX(13px)}
.plug-ic{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.submenu{position:absolute;left:100%;bottom:0;top:auto;margin-left:6px;background:#161618;border:1px solid #242427;border-radius:10px;min-width:210px;box-shadow:0 12px 44px rgba(0,0,0,.7);padding:4px;z-index:210}
/* desktop menu bar dropdowns */
.wt-mi{position:relative}
.wt-mi.open{background:#1c1c1f;color:#eee}
.menubar-drop{position:absolute;top:26px;left:0;min-width:218px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:600}
.menubar-item{display:flex;align-items:center;justify-content:space-between;gap:28px;padding:6px 10px;border-radius:6px;color:#cfcfcf;font-size:12.5px;cursor:default;white-space:nowrap}
.menubar-item:hover{background:#2a2a2e;color:#fff}
.menubar-item.dim{color:#555}.menubar-item.dim:hover{background:transparent;color:#555}
.menubar-k{color:#666;font-size:11.5px;font-family:'Geist Mono',monospace}
.menubar-sep{height:1px;background:#2a2a2e;margin:4px 6px}
/* sidebar section header menus */
.sb-section-hd{display:flex;align-items:center;padding:2px 10px 6px;position:relative}
.sb-section-hd .sb-section-lbl{padding:0;flex:1}
.sb-hd-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .12s}
.sb-section-hd:hover .sb-hd-actions{opacity:1}
.sb-hd-btn{border:none;background:none;color:#666;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.sb-hd-btn:hover{color:#ccc;background:#1c1c1c}
.sb-opt-menu{position:absolute;top:24px;left:10px;min-width:200px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:200}
.sb-opt-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 10px;border-radius:6px;color:#cfcfcf;font-size:12.5px;cursor:pointer;position:relative}
.sb-opt-item:hover{background:#2a2a2e;color:#fff}
.sb-opt-l{display:flex;align-items:center;gap:9px}
.sb-submenu{position:absolute;left:100%;top:-4px;margin-left:6px;min-width:190px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:210}
.resize-h{width:6px;flex-shrink:0;cursor:col-resize;position:relative;z-index:30;background:transparent}
.model-drop{position:absolute;bottom:60px;z-index:320;display:flex;gap:3px}
.drop-panel{background:#181818;border:1px solid #232323;border-radius:8px;overflow:hidden;min-width:158px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.drop-lbl{font-size:10.5px;color:#484848;padding:7px 13px 2px;letter-spacing:.05em;text-transform:uppercase}
.drop-item{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;cursor:pointer;color:#888;font-size:12.5px}
.drop-item:hover{background:#222;color:#ddd}
.drop-item.sel{color:#ddd}
.drop-check{color:#e35d2b;font-size:12px}

/* Slash menu */
.slash-pop{position:absolute;bottom:70px;left:14px;width:calc(100% - 28px);max-height:360px;overflow-y:auto;background:#1c1c1e;border:1px solid #2a2a2d;border-radius:12px;z-index:220;box-shadow:0 18px 55px rgba(0,0,0,.8);padding:6px}
.slash-item{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
.slash-item.hi,.slash-item:hover{background:#2c2c2f}
.slash-ic{color:#9a9a9a;display:flex;flex-shrink:0}
.slash-name{font-size:13px;color:#ededed;font-weight:450;flex-shrink:0}
.slash-desc{font-size:12px;color:#7e7e7e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slash-tag{margin-left:auto;font-size:11px;color:#6a6a6a;flex-shrink:0;padding-left:12px}
.slash-sec{font-size:11px;color:#6a6a6a;padding:8px 12px 4px}

/* Progress floating card (inside chat) */
.prog-float{position:absolute;top:54px;right:18px;bottom:18px;border:1px solid #2a2a2d;border-radius:14px;background:#101011;overflow-y:auto;z-index:8;box-shadow:0 18px 50px rgba(0,0,0,.5);animation:popIn .16s ease}
.prog-empty-card{position:absolute;top:64px;right:24px;width:min(300px,calc(100% - 48px));border:1px solid #2a2a2d;border-radius:16px;background:#242424;padding:16px 18px;z-index:7;box-shadow:0 18px 50px rgba(0,0,0,.45)}
.prog-empty-card .prog-sec{padding:0 0 16px;border-bottom:1px solid #3a3a3a;margin-bottom:16px}
.prog-empty-card .prog-sec:last-child{padding-bottom:0;border-bottom:none;margin-bottom:0}
.prog-empty-text{font-size:13px;color:#aaa;line-height:1.5}
.prog-sec{padding:13px 14px;border-bottom:1px solid #191919}
.prog-sec:last-child{border-bottom:none}
.prog-title{font-size:11px;color:#555;font-weight:500;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
.task-lbl{font-size:12px;color:#666;line-height:1.45}
.task-lbl.done{color:#888}
.show-more{color:#444;font-size:12px;cursor:pointer;padding:4px 0;transition:color .12s}
.show-more:hover{color:#888}
.out-file{display:flex;align-items:center;gap:6px;padding:3px 0;color:#666;font-size:12px;cursor:pointer;transition:color .12s}
.out-file:hover{color:#aaa}
.sa-row{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer}
.sa-row:hover .sa-name{color:#fff}
.sa-name{font-size:12.5px;color:#cfcfcf;flex-shrink:0;transition:color .12s}
.sa-working{font-size:11px;color:#555}
.sa-stat{margin-left:auto;display:flex;gap:6px;font-family:'Geist Mono',monospace;font-size:11px}
.sa-add{color:#4ade80}.sa-rem{color:#f87171}
.sources-row{display:flex;align-items:center;justify-content:space-between;color:#555;font-size:12.5px;cursor:pointer;padding:3px 0;transition:color .12s}
.sources-row:hover{color:#aaa}

/* Memory cards */
.memory-card{background:#121212;border:1px solid #202020;border-radius:9px;padding:9px 10px;margin:6px 0;cursor:pointer;transition:border-color .12s,background .12s}
.memory-card:hover{background:#171717;border-color:#2b2b2b}
.memory-title{font-size:12.5px;color:#bbb;line-height:1.35}
.memory-meta{font-size:10.5px;color:#e35d2b;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.memory-reason{font-size:11.5px;color:#606060;line-height:1.45;margin-top:4px}
.learn-card{background:#121212;border:1px solid #222;border-radius:9px;padding:9px 10px;margin:6px 0}
.learn-title{font-size:12.5px;color:#bbb;margin-bottom:3px}
.learn-body{font-size:11.5px;color:#606060;line-height:1.45}
.learn-conf{font-size:10.5px;color:#e35d2b;margin-top:6px;text-transform:uppercase;letter-spacing:.05em}

/* Workspace column */
.sub-panel{display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#0d0d0d;flex-shrink:0;position:relative}
.workspace-bar{display:flex;align-items:center;border-bottom:1px solid #191919;padding:5px 6px;min-height:41px;background:#0f0f0f;flex-shrink:0;gap:4px;overflow-x:auto;position:relative}
.workspace-bar::-webkit-scrollbar{height:0}
.workspace-tab{display:flex;align-items:center;gap:6px;border:1px solid transparent;background:transparent;color:#555;border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s,border-color .12s}
.workspace-tab:hover{color:#aaa;background:#181818}
.workspace-tab.active{color:#d8d8d8;background:#151515;border-color:#272727}
.workspace-tab-icon{font-size:11.5px;color:#777;display:flex;align-items:center}
.workspace-tab-x{display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:4px;opacity:.4;transition:opacity .12s,background .12s}
.workspace-tab-x:hover{opacity:1;background:#262626}
.tab-add-btn{display:flex;align-items:center;padding:5px;border-radius:6px;cursor:pointer;color:#3a3a3a;transition:color .12s,background .12s}
.tab-add-btn:hover{color:#888;background:#181818}
.tabs-right{margin-left:auto;display:flex;align-items:center;gap:2px;flex-shrink:0}
.plus-drop{position:absolute;top:42px;left:6px;background:#181818;border:1px solid #232323;border-radius:8px;overflow:hidden;z-index:80;min-width:212px;box-shadow:0 8px 28px rgba(0,0,0,.65);padding:3px}
.plus-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer;color:#999;font-size:12.5px}
.plus-item:hover{background:#222;color:#ddd}
.plus-item-l{display:flex;align-items:center;gap:8px}
.plus-sec{padding:7px 10px 2px;font-size:10px;color:#484848;letter-spacing:.06em;text-transform:uppercase}
.plus-file{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#666;font-size:12px}
.plus-file:hover{background:#222;color:#ddd}
.workspace-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;background:#0d0d0d}

/* Launcher (new tab) */
.launcher{padding:16px}
.launch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.launch-card{background:#0f0f10;border:1px solid #1e1e20;border-radius:12px;padding:24px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.launch-card:hover{background:#151517;border-color:#2a2a2d}
.launch-ic{color:#cfcfcf;margin-bottom:2px}
.launch-title{font-size:13px;color:#e2e2e2}
.launch-sub{font-size:11px;color:#666}
.launch-sec{font-size:10.5px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:18px 2px 6px}
.launch-doc{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:9px;cursor:pointer;transition:background .12s}
.launch-doc:hover{background:#161618}
.launch-doc-ic{width:32px;height:32px;border-radius:7px;background:#15151a;border:1px solid #232326;display:flex;align-items:center;justify-content:center;color:#888;flex-shrink:0}
.launch-doc-name{font-size:12.5px;color:#cfcfcf}
.launch-doc-sub{font-size:11px;color:#555;margin-top:1px}

.drawer-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid #191919;background:#0f0f0f;flex-shrink:0}
.drawer-title{display:flex;align-items:center;gap:8px;color:#ddd;font-size:13.5px}
.drawer-sub{font-size:11.5px;color:#555;margin-top:3px}
.drawer-section-title{font-size:10.5px;color:#555;font-weight:500;margin:13px 14px 4px;letter-spacing:.06em;text-transform:uppercase}
.status-pill{font-size:10px;color:#555;border:1px solid #262626;border-radius:999px;padding:3px 7px;background:#151515;text-transform:capitalize;white-space:nowrap}
.status-pill.running{color:#e35d2b;border-color:rgba(227,93,43,.35);background:rgba(227,93,43,.08)}
.status-pill.complete{color:#4ade80;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08)}

/* Provider-neutral coding API. The UI only consumes Vellum events; provider SDK
   details stay behind the local backend adapter boundary. */
function parseCodingSseBlocks(text){
  return String(text||"").replace(/\r\n/g,"\n").split("\n\n").map(x=>x.trim()).filter(Boolean).map(block=>{
    let event="message"; const data=[];
    block.split("\n").forEach(line=>{ if(line.startsWith("event:")) event=line.slice(6).trim(); else if(line.startsWith("data:")) data.push(line.slice(5).trim()); });
    const raw=data.join("");
    return {event,data:raw?JSON.parse(raw):null};
  });
}
function createCodingApi(apiBase){
  const base=String(apiBase||"http://127.0.0.1:8000").replace(/\/+$/,"");
  async function json(path,init){
    const response=await fetch(base+path,init);
    const body=await response.json().catch(()=>({}));
    if(!response.ok) throw new Error(body.detail||body.message||("HTTP "+response.status));
    return body;
  }
  return {
    health:()=>json("/api/coding/health"),
    sessions:()=>json("/api/coding/sessions"),
    session:(id)=>json("/api/coding/sessions/"+encodeURIComponent(id)),
    createSession:(body)=>json("/api/coding/sessions",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}),
    events:(id,afterSequence=0)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/events?after_sequence="+encodeURIComponent(afterSequence)),
    checkpoints:(id)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/checkpoints"),
    checkpoint:(id,checkpointId)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/checkpoints/"+encodeURIComponent(checkpointId)),
    rewind:(id,checkpointId,phase="after",confirmDiscard=false)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/rewind/"+encodeURIComponent(checkpointId),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phase,confirm_discard:confirmDiscard})}),
    projectTree:(root)=>json("/api/coding/projects/tree?root="+encodeURIComponent(root)),
    projectFile:(root,path)=>json("/api/coding/projects/file?root="+encodeURIComponent(root)+"&path="+encodeURIComponent(path)),
    stop:(id)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/stop",{method:"POST"}),
    closeSession:(id,discardChanges=false)=>json("/api/coding/sessions/"+encodeURIComponent(id)+"/close",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({discard_changes:discardChanges})}),
    async runTurn(id,prompt,onEvent,{signal,maxRuntimeSeconds=1800,maxProviderEvents=10000}={}){
      const response=await fetch(base+"/api/coding/sessions/"+encodeURIComponent(id)+"/turns/stream",{
        method:"POST",signal,headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt,max_runtime_seconds:maxRuntimeSeconds,max_provider_events:maxProviderEvents})
      });
      if(!response.ok){ const body=await response.json().catch(()=>({})); throw new Error(body.detail||body.message||("HTTP "+response.status)); }
      if(!response.body){ parseCodingSseBlocks(await response.text()).forEach(onEvent); return; }
      const reader=response.body.getReader(), decoder=new TextDecoder(); let buffer="";
      while(true){
        const chunk=await reader.read(); if(chunk.done) break;
        buffer+=decoder.decode(chunk.value,{stream:true});
        const parts=buffer.split("\n\n"); buffer=parts.pop()||"";
        parts.forEach(part=>parseCodingSseBlocks(part+"\n\n").forEach(onEvent));
      }
      buffer+=decoder.decode(); if(buffer.trim()) parseCodingSseBlocks(buffer+"\n\n").forEach(onEvent);
    }
  };
}

function SideRays({speed=2.7,rayColor1="#EAB308",rayColor2="#96c8ff",intensity=1.9,spread=2.1,origin="top-right",tilt=6,saturation=1.5,blend=.75,falloff=1.6,opacity=1}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d",{alpha:true});
    let frame=0,raf=0,width=0,height=0,dpr=1;
    const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const hexToRgb=(hex)=>{ const value=hex.replace("#",""); const full=value.length===3?value.split("").map(c=>c+c).join(""):value; const number=parseInt(full,16); return [(number>>16)&255,(number>>8)&255,number&255]; };
    const boost=(rgb)=>rgb.map(v=>Math.min(255,Math.round(128+(v-128)*saturation)));
    const c1=boost(hexToRgb(rayColor1)),c2=boost(hexToRgb(rayColor2));
    function resize(){
      const rect=canvas.getBoundingClientRect();
      dpr=Math.min(window.devicePixelRatio||1,2); width=Math.max(1,rect.width); height=Math.max(1,rect.height);
      canvas.width=Math.round(width*dpr); canvas.height=Math.round(height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    function paint(now=0){
      ctx.clearRect(0,0,width,height);
      const ox=origin.includes("right")?width:0, oy=origin.includes("bottom")?height:0;
      const diagonal=Math.hypot(width,height)*1.18;
      ctx.save(); ctx.translate(ox,oy); ctx.rotate((tilt*Math.PI)/180); ctx.globalCompositeOperation="screen";
      const count=13;
      for(let i=0;i<count;i++){
        const phase=(reduced?0:now*.00019*speed)+i*.83;
        const angle=(.62+(i/(count-1))*.92*spread)+Math.sin(phase)*.045;
        const beam=Math.max(22,(width*.018+i%3*7)*spread);
        const rgb=i%2?c1:c2;
        const alpha=Math.min(.34,(.035+(i%4)*.018)*intensity*blend*opacity);
        ctx.save(); ctx.rotate(angle); ctx.beginPath(); ctx.moveTo(0,-beam*.1); ctx.lineTo(diagonal,beam*1.35); ctx.lineTo(diagonal,-beam*1.35); ctx.closePath();
        const grad=ctx.createLinearGradient(0,0,diagonal,0);
        grad.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`);
        grad.addColorStop(Math.min(.82,.26/falloff+.18),`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha*.62})`);
        grad.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
        ctx.fillStyle=grad; ctx.filter=`blur(${9+(i%3)*5}px)`; ctx.fill(); ctx.restore();
      }
      ctx.restore();
      if(!reduced){frame++;raf=requestAnimationFrame(paint);}
    }
    const observer=new ResizeObserver(()=>{resize();paint(performance.now());}); observer.observe(canvas); resize(); paint(performance.now());
    return ()=>{observer.disconnect();cancelAnimationFrame(raf);};
  },[speed,rayColor1,rayColor2,intensity,spread,origin,tilt,saturation,blend,falloff,opacity]);
  return <canvas ref={canvasRef} className="side-rays-canvas" aria-hidden="true"/>;
}

function PixelSprite({ name, color, px=2 }){
  const rows = SPRITES[name] || SPRITES.robot;
  const cells = [];
  rows.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ if(row[x]!==" ") cells.push(<rect key={x+"_"+y} x={x*px} y={y*px} width={px} height={px}/>); } });
  const w = (rows[0]||"").length*px, h = rows.length*px;
  return <svg width={w} height={h} viewBox={"0 0 "+w+" "+h} fill={color} style={{display:"block"}}>{cells}</svg>;
}

const VPROTO = {
  uuid(){ try{ return crypto.randomUUID(); }catch(e){ return "id-"+Math.random().toString(36).slice(2); } },
  tag(parent, sub){ return "agent:"+parent+":subagent:"+sub; },
  masterTag(turnId){ return "agent:master:turn:"+turnId; },
  frame(method, params){ return { jsonrpc:"2.0", method, params }; },
  turnStarted(threadId, turnId){ return this.frame("turn/started", {threadId, turnId}); },
  plan(turnId, complex, reason, tasks){ return this.frame("item/plan", {turnId, complex, reason, tasks}); },
  subagentStarted(turnId, routingTag, persona, task){ return this.frame("item/subagent/started", {turnId, routingTag, persona, task}); },
  agentDelta(routingTag, text){ return this.frame("item/agentMessage/delta", {routingTag, text}); },
  reasoningDelta(routingTag, text){ return this.frame("item/reasoning/delta", {routingTag, text}); },
  subagentCompleted(routingTag, status, output){ return this.frame("item/subagent/completed", {routingTag, status, output}); },
  steer(threadId, turnId, text){ return this.frame("turn/steer", {threadId, turnId, text}); },
  turnCompleted(turnId, finalItemId){ return this.frame("turn/completed", {turnId, finalItemId}); },
  /* Tolerant parse of a planner reply. Returns {complex, reason, tasks:[{id,title,role}]}.
     Falls back to {complex:false} on any failure so callers degrade to a single answer. */
  parsePlan(text){
    if(!text) return {complex:false, reason:"", tasks:[]};
    let raw = String(text);
    const fence = raw.match(/```(?:json)?\s*([\s\S]*?)```/i); if(fence) raw = fence[1];
    const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
    if(s<0 || e<=s) return {complex:false, reason:"", tasks:[]};
    let obj; try{ obj = JSON.parse(raw.slice(s, e+1)); }catch(err){ return {complex:false, reason:"", tasks:[]}; }
    if(!obj || obj.complex!==true || !Array.isArray(obj.tasks) || !obj.tasks.length) return {complex:false, reason:(obj&&obj.reason)||"", tasks:[]};
    const roles = {worker:1, reviewer:1, analyst:1};
    const tasks = obj.tasks.slice(0,5).map((t,i)=>({
      id: "t"+(i+1),
      title: String((t&&t.title)||("Task "+(i+1))).slice(0,120),
      role: roles[(t&&t.role)] ? t.role : "worker",
    }));
    return {complex:true, reason:String(obj.reason||"").slice(0,200), tasks};
  },
};

function normalizeBrowserUrl(value){
  const raw = String(value || "").trim();
  if(!raw) return "about:blank";
  if(/^(about:|https?:\/\/|file:\/\/)/i.test(raw)) return raw;
  if(/^[\w.-]+\.[a-z]{2,}(?:[/:?#]|$)/i.test(raw)) return "https://" + raw;
  return "https://www.google.com/search?igu=1&q=" + encodeURIComponent(raw);
}
function htmlEscape(s){ return String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function browserFrameFor(url){
  if(url === "about:blank") return {src:"about:blank", srcDoc:null};
  let u=null; try{ u=new URL(url); }catch(e){}
  const host = u ? u.hostname.replace(/^www\./,"") : "";
  const q = u ? (u.searchParams.get("q") || "") : "";
  if(host === "google.com" || (u && u.pathname.includes("/search"))){
    const query = q || (host === "google.com" ? "" : url);
    const results = query ? [
      ["Google", "https://www.google.com", "Search the world's information, including webpages, images, videos and more."],
      ["Google Maps", "https://maps.google.com", "Find local businesses, view maps and get driving directions."],
      ["Google Cloud", "https://cloud.google.com", "Cloud products and AI infrastructure for building modern applications."],
      ["Google Search Help", "https://support.google.com/websearch", "Learn how Google Search works and refine your results."]
    ] : [];
    const body = query
      ? `<div class="tabs"><span class="on">All</span><span>Images</span><span>Videos</span><span>Forums</span></div>${results.map(r=>`<div class="res"><div class="res-url">${htmlEscape(r[1])}</div><h2>${htmlEscape(r[0])}</h2><p>${htmlEscape(r[2])}</p></div>`).join("")}`
      : `<div class="home"><div class="logo"><span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span></div><div class="hint">Type a search in the Vellum browser bar.</div></div>`;
    return {src:"about:blank", srcDoc:`<!doctype html><html><head><meta charset="utf-8"><style>
      body{margin:0;background:#202124;color:#e8eaed;font:14px Arial,sans-serif} .top{height:58px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #3c4043;gap:16px}
      .brand{font-size:22px;font-weight:500}.search{height:40px;max-width:580px;flex:1;border-radius:22px;background:#303134;display:flex;align-items:center;padding:0 18px;color:#bdc1c6}
      .tabs{display:flex;gap:24px;padding:14px 28px 8px;border-bottom:1px solid #3c4043;color:#bdc1c6}.tabs span{padding-bottom:8px}.tabs .on{color:#e8eaed;border-bottom:3px solid #8ab4f8}
      .res{padding:18px 28px;border-bottom:1px solid #3c4043;max-width:760px}.res-url{font-size:12px;color:#bdc1c6;margin-bottom:6px}.res h2{margin:0 0 6px;color:#8ab4f8;font-size:20px;font-weight:400}.res p{margin:0;color:#bdc1c6;line-height:1.45}
      .home{height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;flex-direction:column}.logo{font-size:64px;letter-spacing:-4px}.hint{color:#bdc1c6;margin-top:18px}
    </style></head><body><div class="top"><div class="brand">Google</div><div class="search">${htmlEscape(query || "google.com")}</div></div>${body}</body></html>`};
  }
  return {src:url, srcDoc:null};
}
function wsUrlForBackend(base){
  const clean = String(base || "http://127.0.0.1:8000").replace(/\/+$/,"");
  return clean.replace(/^https:/i,"wss:").replace(/^http:/i,"ws:") + "/api/terminal/ws";
}
async function runWorkspaceAction(base, payload){
  const clean = String(base || "http://127.0.0.1:8000").replace(/\/+$/,"");
  const resp = await fetch(clean + "/api/computer-use/workspace/action", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  const body = await resp.json().catch(()=>({}));
  if(!resp.ok) throw new Error(body.detail || body.message || ("HTTP " + resp.status));
  return body;
}
function BrowserPane({ backendBase }){
  const [url,setUrl] = useState("about:blank");
  const [draft,setDraft] = useState("");
  const [history,setHistory] = useState(["about:blank"]);
  const [idx,setIdx] = useState(0);
  const [status,setStatus] = useState("ready");
  function go(next, replace){
    const normalized = normalizeBrowserUrl(next);
    setUrl(normalized);
    setDraft(normalized === "about:blank" ? "" : normalized);
    setStatus(normalized === "about:blank" ? "blank" : ("loading " + normalized));
    if(replace) setHistory(h=> h.map((x,i)=> i===idx ? normalized : x));
    else { setHistory(h=> [...h.slice(0,idx+1), normalized]); setIdx(i=> i+1); }
    if(normalized !== "about:blank"){
      runWorkspaceAction(backendBase, {action:"browser.navigate", url:normalized})
        .then(r=> setStatus(r.message || ("loaded " + normalized)))
        .catch(e=> setStatus("local frame updated; browser bridge offline: " + (e.message || e)));
    }
  }
  function submit(e){ e.preventDefault(); go(draft, false); }
  function back(){ if(idx<=0) return; const next=history[idx-1]; setIdx(idx-1); setUrl(next); setDraft(next==="about:blank"?"":next); setStatus("history back"); }
  function forward(){ if(idx>=history.length-1) return; const next=history[idx+1]; setIdx(idx+1); setUrl(next); setDraft(next==="about:blank"?"":next); setStatus("history forward"); }
  function reload(){ setStatus("reloading " + url); setUrl("about:blank"); setTimeout(()=>setUrl(history[idx] || "about:blank"), 0); }
  function openExternal(){ const target = url === "about:blank" ? normalizeBrowserUrl(draft) : url; if(target && target !== "about:blank") window.open(target, "_blank", "noopener,noreferrer"); }
  const frame = browserFrameFor(url);
  return (
    <div className="browser-tool">
      <div className="browser-toolbar">
        <button className="browser-nav" title="Back" disabled={idx<=0} onClick={back}><IcChevL size={15}/></button>
        <button className="browser-nav" title="Forward" disabled={idx>=history.length-1} onClick={forward}><IcChevR size={15}/></button>
        <button className="browser-nav" title="Reload" onClick={reload}><IcRefresh size={13}/></button>
        <form className="browser-form" onSubmit={submit}><input className="browser-address" value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Search or enter URL"/></form>
        <button className="browser-ext" title="Open externally" onClick={openExternal}><IcExpand size={13}/></button>
      </div>
      <div className="browser-frame-wrap">
        {url !== "about:blank" && <iframe className="browser-frame" src={frame.src} srcDoc={frame.srcDoc || undefined} title="Vellum browser view"/>}
        {url === "about:blank" && <div className="browser-blank">Enter a URL to open a page inside Vellum.<br/>Pages that block embedding can still be opened externally or driven through the browser bridge.</div>}
      </div>
      <div className="browser-status">{status}</div>
    </div>
  );
}
function TerminalPane({ backendBase }){
  const [profile,setProfile] = useState("powershell");
  const [status,setStatus] = useState("disconnected");
  const [output,setOutput] = useState("");
  const [cmd,setCmd] = useState("");
  const socketRef = useRef(null);
  const outRef = useRef(null);
  function append(text){ setOutput(prev=> (prev + text).slice(-50000)); }
  function connect(){
    if(socketRef.current){ try{ socketRef.current.close(); }catch(e){} }
    setStatus("connecting");
    const ws = new WebSocket(wsUrlForBackend(backendBase));
    socketRef.current = ws;
    ws.onopen = ()=>{ ws.send(JSON.stringify({type:"start", profile, cols:120, rows:32})); setStatus(profile + " connecting"); };
    ws.onmessage = (event)=>{
      let msg; try{ msg = JSON.parse(event.data); }catch(e){ append(String(event.data)); return; }
      if(msg.type==="ready") setStatus(profile + " ready");
      else if(msg.type==="output") append(msg.data || "");
      else if(msg.type==="error"){ append("\r\n" + (msg.message || "terminal error") + "\r\n"); setStatus("error"); }
      else if(msg.type==="exit") setStatus("exited");
    };
    ws.onerror = ()=> setStatus("websocket error");
    ws.onclose = ()=> setStatus(s=> s==="exited" ? s : "disconnected");
  }
  useEffect(()=>{ connect(); return ()=>{ if(socketRef.current){ try{ socketRef.current.close(); }catch(e){} } }; }, [profile, backendBase]);
  useEffect(()=>{ if(outRef.current) outRef.current.scrollTop = outRef.current.scrollHeight; }, [output]);
  async function submit(e){
    e.preventDefault();
    const text = cmd.trim();
    if(!text) return;
    setCmd("");
    const ws = socketRef.current;
    if(ws && ws.readyState === WebSocket.OPEN){ ws.send(JSON.stringify({type:"input", data:text + "\r"})); return; }
    append("> " + text + "\r\n");
    setStatus("running fallback command");
    try{
      const res = await runWorkspaceAction(backendBase, {action:"terminal.run", command:text});
      const data = res.data || {};
      if(data.stdout) append(data.stdout);
      if(data.stderr) append(data.stderr);
      append("\r\n[exit " + (data.returncode ?? "?") + "]\r\n");
      setStatus(res.message || "command complete");
    }catch(err){
      append("terminal backend unavailable: " + (err.message || err) + "\r\n");
      setStatus("offline");
    }
  }
  return (
    <div className="terminal-panel">
      <div className="terminal-toolbar">
        <select className="terminal-shell" value={profile} onChange={e=>setProfile(e.target.value)}>
          <option value="powershell">PowerShell</option>
          <option value="cmd">CMD</option>
          <option value="pwsh">PowerShell Core</option>
          <option value="wsl">WSL</option>
        </select>
        <button className="terminal-connect" onClick={connect}>Reconnect</button>
        <span className="terminal-statusline">{status}</span>
      </div>
      <div className="terminal-output" ref={outRef}>{output || "Connecting to the Vellum terminal backend...\r\n"}</div>
      <form className="terminal-inputbar" onSubmit={submit}>
        <span className="terminal-prompt">&gt;</span>
        <input className="terminal-input" value={cmd} onChange={e=>setCmd(e.target.value)} placeholder="Run a command"/>
        <button className="terminal-run" type="submit">Run</button>
      </form>
    </div>
  );
}

    }

  async function runCodingTurn(chatId,aid,userText){
    const ctrl=new AbortController(), answerRef={current:""}; let session=null; abortRef.current=ctrl;
    try{
      setCodingError(""); setCodingStatus("starting");
      session=await ensureCodingSession(); activeCodingSessionRef.current=session;
      const runningSession={...session,status:"running"}; codingSessionRef.current=runningSession; setCodingSession(runningSession);
      await codingApiRef.current.runTurn(session.id,userText,frame=>applyCodingEvent(chatId,aid,frame,answerRef),{signal:ctrl.signal,maxRuntimeSeconds:1800,maxProviderEvents:10000});
      setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:answerRef.current||x.text||"Completed.",thinking:false,streaming:false}:x));
    }catch(e){
      if(!(e&&e.name==="AbortError")){
        let replayedTerminal=false;
        if(session&&codingApiRef.current){
          try{ const replay=await codingApiRef.current.events(session.id,lastSequenceRef.current[session.id]||0), events=replay.events||[]; replayedTerminal=events.some(data=>["turn.completed","turn.stopped","turn.limit_reached","turn.error"].includes(data.type)); events.forEach(data=>applyCodingEvent(chatId,aid,{event:"replay",data},answerRef)); }catch(replayError){}
        }
        if(replayedTerminal) return;
        const message=(e&&e.message)||"Coding run failed."; setCodingError(message); setCodingStatus("error"); setProgFor(chatId,p=>({...p,status:"error"}));
        setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:answerRef.current||message,thinking:false,streaming:false,runState:"error"}:x));
      }
    }finally{
      abortRef.current=null; activeCodingSessionRef.current=null; setRunning(false);
      const current=codingSessionRef.current; if(current){ codingApiRef.current.session(current.id).then(session=>{codingSessionRef.current=session;setCodingSession(session);}).catch(()=>{}); }
    }
  }
  function sendToChat(chatId,text,atts){
    const t=(text||"").trim(); if(running||(!t&&(!atts||!atts.length))) return;
    let attachmentBudget=131072;
    const attachmentParts=(atts||[]).map(item=>{
      if(!item.content) return "Attached file: "+item.name+" ("+(item.type||"binary")+")";
      if(attachmentBudget<=0) return "Attached text file: "+item.name+" (content omitted because the attachment context limit was reached)";
      const content=item.content.slice(0,attachmentBudget); attachmentBudget=Math.max(0,attachmentBudget-content.length);
      return "Attached text file: "+item.name+"\n```\n"+content+"\n```";
    });
    const guidance=[planMode?"Planning mode: inspect the workspace and produce a concrete plan, but do not edit files or run destructive commands.":"",includeIde?"Use the active Vellum workspace and its current project state as the source of truth.":""].filter(Boolean).join("\n");
    const prompt=[guidance,t||"Inspect the attached files.",...attachmentParts].filter(Boolean).join("\n\n");
    const uid=nextId(),aid=nextId(),userMsg={id:uid,type:"user",text:t,atts};
    setMsgsFor(chatId,m=>[...m,userMsg,{id:aid,type:"assistant",provider:codingProvider,text:"",streaming:true,thinking:true,runtimeEvents:[]}]);
    setRunning(true);streamTargetRef.current=chatId;runCodingTurn(chatId,aid,prompt);
  }

  function backendBase(){ return (backendUrl||"http://127.0.0.1:8000").trim().replace(/\/+$/,""); }
  async function pingBackend(){

  function normalizeResponseStreamEvent(ev, payload){
    if(!payload) return null;
    if(ev && ev.indexOf("response.")===0) return {type:ev, payload};
    if(ev==="error") return {type:"error", payload};
    return null;
  }
  function responseItemActivity(item){
    if(!item) return null;
    if(item.type==="subagent_call") return {label:item.label||("Routed to "+(item.name||"subagent")), detail:item.detail||"", name:item.name, itemId:item.id, status:item.status};
    if(item.type==="tool_call") return {label:item.label||("Used "+(item.name||"tool")), detail:item.detail||"", name:item.name, itemId:item.id, status:item.status};
    if(item.type==="reasoning") return {label:item.label||"Thinking", detail:item.detail||"", itemId:item.id, status:item.status};
    return null;
  }
  function mergeSourceList(list, source){
    if(!source || !source.url) return list || [];
    const arr = list ? list.slice() : [];
    if(!arr.some(s=>s.url===source.url)) arr.push(source);
    return arr;
  }
  async function streamBackend(chatId, aid, message){
    const ctrl = new AbortController(); abortRef.current = ctrl;
    try{
      const resp = await fetch(backendBase()+"/api/chat/stream", { method:"POST", signal:ctrl.signal, headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message, thread_id: threadRef.current[chatId]||null, model: selModel, store: memoryOn }) });
      if(!resp.ok || !resp.body){ let msg="Backend error ("+resp.status+")"; try{ const j=await resp.json(); if(j&&j.detail) msg=j.detail; }catch(e){} setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:"⚠ "+msg,thinking:false,streaming:false}:x)); abortRef.current=null; setRunning(false); return; }
      const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="", acc="";
      let semanticSeen = false;
      let tools = [];
      let sources = [];
      let activity = [];
      while(true){
        const r=await reader.read(); if(r.done) break;
        buf+=dec.decode(r.value,{stream:true});
        let sep;
        while((sep=buf.indexOf("\n\n"))>=0){
          const block=buf.slice(0,sep); buf=buf.slice(sep+2);
          let ev="message", data="";
          block.split("\n").forEach(line=>{ if(line.indexOf("event:")===0) ev=line.slice(6).trim(); else if(line.indexOf("data:")===0) data+=line.slice(5).trim(); });
          if(!data) continue;
          try{ const j=JSON.parse(data);
            const sem = normalizeResponseStreamEvent(ev, j);
            if(sem){
              semanticSeen = true;
              if(sem.type==="response.created" || sem.type==="response.in_progress"){
                if(j.thread_id) threadRef.current[chatId]=j.thread_id;
              } else if(sem.type==="response.output_item.added"){
                const item = j.item || {};
                if(item.type==="source" && item.source){
                  sources = mergeSourceList(sources, item.source);
                  setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,sources:sources.slice(),thinking:false}:x));
                } else {
                  const act = responseItemActivity(item);
                  if(act){
                    activity = activity.concat([act]);
                    if(item.name && item.type==="tool_call" && tools.indexOf(item.name)<0) tools.push(item.name);
                    if(item.name && item.type==="subagent_call" && tools.indexOf(item.name)<0) tools.push(item.name);
                    setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,activity:activity.slice(),tools:tools.slice(),thinking:false}:x));
                  }
                }
              } else if(sem.type==="response.output_text.delta"){
                if(j.delta){ acc+=j.delta; setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:acc,thinking:false}:x)); }
              } else if(sem.type==="response.completed"){
                const r = j.response || {};
                if(r.thread_id) threadRef.current[chatId]=r.thread_id;
                const fin = acc || r.output_text || "";
                setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:fin,sources:r.sources||sources,tools:r.tools||tools,activity:activity,thinking:false,streaming:false}:x));
              } else if(sem.type==="error"){
                const msg = (j.error && (j.error.message || j.error)) || "Backend error";
                setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:"Warning: "+msg,thinking:false,streaming:false}:x));
              }
              continue;
            }
            if(ev==="meta"){ if(j.thread_id) threadRef.current[chatId]=j.thread_id; }
            else if(ev==="tool" && !semanticSeen){
              if(j.name && tools.indexOf(j.name)<0) tools.push(j.name);
              const act = {label:"Used "+(j.name||"tool"), detail:"", name:j.name||"tool", status:"running"};
              activity = activity.concat([act]);
              setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,activity:activity.slice(),tools:tools.slice(),thinking:false}:x));
              setProgFor(chatId,p=>({...p,status:"running"}));
            }
            else if(ev==="activity" && !semanticSeen){
              activity = activity.concat([{label:j.label||"Agent activity", detail:j.detail||"", status:"running"}]);
              setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,activity:activity.slice(),thinking:false}:x));
              setProgFor(chatId,p=>({...p,status:"running"}));
            }
            else if(ev==="source" && !semanticSeen){
              sources = mergeSourceList(sources, j);
              setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,sources:sources.slice(),thinking:false}:x));
              setProgFor(chatId,p=>({...p,status:"running",sources:mergeSourceList(p.sources, j)}));
            }
            else if(ev==="token" && !semanticSeen){ if(j.text){ acc+=j.text; setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:acc,thinking:false}:x)); } }
            else if(ev==="final" && !semanticSeen){
              if(j.thread_id) threadRef.current[chatId]=j.thread_id;
              const fin=acc||j.answer||"";
              const finalSources = j.sources||sources;
              const finalTools = j.tools||tools;
              setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:fin,sources:finalSources,tools:finalTools,activity:activity.slice(),thinking:false,streaming:false}:x));
              setProgFor(chatId,p=>({...p,status:"done",sources:finalSources}));
            }
          }catch(e){}
        }
      }
      setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,streaming:false,thinking:false}:x));
      loadMemory();
    }catch(e){
      if(e && e.name==="AbortError") setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,streaming:false,thinking:false}:x));
      else setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:"⚠ Backend unreachable. Start it (uvicorn agent.api:app) and serve this UI from :5173 so CORS allows it.",thinking:false,streaming:false}:x));
    }
    abortRef.current=null; setRunning(false);
  }

    const root=parent?codingSession.cwd+separator+parent.split("/").join(separator):codingSession.cwd;
