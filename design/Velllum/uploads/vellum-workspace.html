                    <div className="cm-prov-name">{p.name}</div>
                    <div className="cm-prov-sub">{p.sub}</div>
                  </div>
                  <div className="cm-key">
                    <span className={"cm-key-dot"+(apiKeys[p.id]?" on":"")}/>
                    <input type="password" placeholder={p.ph} value={apiKeys[p.id]} onChange={(e)=>setApiKeys(k=>({...k,[p.id]:e.target.value}))}/>
                  </div>
                </div>
              ))}
              <div className="cm-note">Keys are stored locally and only the active provider is used. Each Vellum user sets up their own — nothing is shared.</div>
            </div>

            <div className="cm-sec">
              <div className="cm-sec-hd"><span>Vellum backend — memory, privacy, vault</span><span className={"status-pill "+(backendStatus==="connected"?"complete":backendStatus==="checking"?"running":"")}>{backendStatus}</span></div>
              <div className="cm-prov">
                <div className={"cm-prov-radio"+(useBackend?" on":"")} onClick={()=>{ const n=!useBackend; setUseBackend(n); if(n) pingBackend(); }}/>
                <div className="cm-prov-main" onClick={()=>{ const n=!useBackend; setUseBackend(n); if(n) pingBackend(); }}>
                  <div className="cm-prov-name">Route chats through the backend</div>
                  <div className="cm-prov-sub">Engages Honcho user-model + FTS5 search + Obsidian write-back + privacy gate.</div>
                </div>
                <div className="cm-key" style={{width:172}}><input placeholder="http://127.0.0.1:8000" value={backendUrl} onChange={(e)=>setBackendUrl(e.target.value)}/></div>
              </div>
              <div className="cm-note">Retrieval runs on <b style={{color:"#888"}}>FTS5 + Honcho</b> — Qdrant (vector search) stays off. Needs the backend running and this UI served from an allowed origin (:5173). <span style={{color:"#e35d2b",cursor:"pointer"}} onClick={pingBackend}>Test connection</span></div>
            </div>

            <div className="modal-actions"><button className="modal-btn" onClick={()=>setShowModels(false)}>Close</button><button className="modal-btn primary" onClick={()=>setShowModels(false)}>Save</button></div>
          </div>
        </div>
      ); })()}

      {/* Context menu */}
      {ctxMenu && (
        <div className="ctx-menu pop-in" style={{top:ctxMenu.y, left:ctxMenu.x}} onClick={(e)=>e.stopPropagation()}>
          <div className="ctx-item"><div className="ctx-item-l"><IcPin size={13}/><span>Pin chat</span></div><span className="kbd">Ctrl Alt P</span></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcEdit size={13}/><span>Rename chat</span></div><span className="kbd">Ctrl Alt R</span></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcArchive size={13}/><span>Archive chat</span></div><span className="kbd">Ctrl Shift A</span></div>
          <div className="ctx-div"/>
          <div className="ctx-item" onClick={()=>{setCtxMenu(null); addSideChat();}}><div className="ctx-item-l"><IcChat size={13}/><span>Open side chat</span></div></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcCopy size={13}/><span>Copy</span></div><IcChevR size={12}/></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcFork size={13}/><span>Fork</span></div><IcChevR size={12}/></div>
          <div className="ctx-item dim"><div className="ctx-item-l"><IcAuto size={13}/><span>Add automation…</span></div></div>
          <div className="ctx-div"/>
          <div className="ctx-item"><div className="ctx-item-l"><IcWindow size={13}/><span>Open in new window</span></div></div>
        </div>
      )}

      {/* Command palette */}
      {showPalette && (
        <div className="palette-overlay" onClick={()=>{setShowPalette(false);setPaletteQ("");}}>
          <div className="palette-box pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="palette-input-row"><IcSearch size={16}/><input className="palette-in" autoFocus placeholder="Search commands and chats…" value={paletteQ} onChange={(e)=>{setPaletteQ(e.target.value); setPalIdx(0);}} onKeyDown={paletteKey}/><span className="kbd">Esc</span></div>
            <div className="palette-list">
              {flat.length===0 && <div className="palette-empty">No matches for “{paletteQ}”.</div>}
              {cmdMatches.length>0 && <div className="palette-sec">Commands</div>}
              {cmdMatches.map((c)=>{ const gi = flat.findIndex(f=>f.kind==="cmd" && f.item.id===c.id); return (<div key={c.id} className={"palette-item"+(palIdx===gi?" hi":"")} onMouseEnter={()=>setPalIdx(gi)} onClick={()=>runPalette({kind:"cmd",item:c})}><div className="palette-item-l"><span style={{color:"#888",display:"flex"}}>{c.icon}</span><span className="palette-item-title">{c.title}</span></div>{c.kbd && <span className="kbd">{c.kbd}</span>}</div>); })}
              {chatMatches.length>0 && <div className="palette-sec">Chats</div>}
              {chatMatches.map((c)=>{ const gi = flat.findIndex(f=>f.kind==="chat" && f.item.id===c.id); return (<div key={c.id} className={"palette-item"+(palIdx===gi?" hi":"")} onMouseEnter={()=>setPalIdx(gi)} onClick={()=>runPalette({kind:"chat",item:c})}><div className="palette-item-l">{c.age?<span style={{color:"#444"}}>◷</span>:<Spinner/>}<span className="palette-item-title">{c.title}</span><span className="palette-item-sub">{c.project}</span></div>{c.age && <span className="kbd">{c.age}</span>}</div>); })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ App ═══ */
function App(){
  const [shell, setShell] = useState("browser");
  const [maximized, setMaximized] = useState(false);
  const switchShell = ()=> setShell(s=> s==="browser" ? "desktop" : "browser");
  const toggleMax = ()=> setMaximized(m=>!m);
  const workspace = <VellumWorkspace shell={shell} onSwitchShell={switchShell} onToggleMax={toggleMax} maximized={maximized}/>;
  return (
    <div className="stage">
      <div className="desktop-bg"/>
      <div className="bg-orb" style={{width:420,height:420,left:"6%",top:"12%",background:"radial-gradient(circle,#e35d2b,transparent 70%)"}}/>
      <div className="bg-orb" style={{width:380,height:380,right:"8%",bottom:"6%",background:"radial-gradient(circle,#5a4bd6,transparent 70%)",opacity:.25}}/>
      <div className={"window "+(maximized?"win-max":"win-float")}>
        {shell==="browser"
          ? <ChromeBrowser maximized={maximized} onMax={toggleMax} shell={shell} onShell={setShell}>{workspace}</ChromeBrowser>
          : <ChromeDesktop maximized={maximized} onMax={toggleMax} title="Find best non-veg meal — Vellum" shell={shell} onShell={setShell}>{workspace}</ChromeDesktop>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
