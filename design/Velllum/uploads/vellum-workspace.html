    catch(e){ setCodingError((e&&e.message)||"Directory could not be opened."); }
  }

  function providerButtonClass(provider){
    const health=healthFor(provider); let cls="coding-target-btn"+(codingProvider===provider?" active":"");
    if(health&&health.available&&health.configured) cls+=" ready"; else if(health&&health.available) cls+=" warn";
    return cls;
  }
  function chooseCodingProvider(provider){ if(running) return; const supported=supportedAccessModeIds(provider); if(!supported.includes(codingAccessMode)) setCodingAccessMode(supported[0]||"read_only"); setCodingProvider(provider); }
  function codingHealthText(){
    if(codingStatus==="offline") return codingError||"Local coding backend is offline.";
    if(codingStatus==="checking") return "Checking installed coding runtimes…";
    if(codingStatus==="starting") return "Starting "+(codingProvider==="claude"?"Claude Code":"Codex")+"…";
    if(codingStatus==="running") return (codingProvider==="claude"?"Claude Code":"Codex")+" is working in the selected project.";
    if(codingStatus==="stopping") return "Stopping the provider runtime…";
    const health=healthFor(codingProvider); return (health&&health.message)||"Runtime status unavailable.";
  }
  function runtimeIcon(kind){ if(kind==="command") return <IcTerminal size={12}/>; if(kind==="file") return <IcFile size={12}/>; if(kind==="warning") return <IcShield size={12}/>; return <IcPlugin size={12}/>; }
  function RunEvents({items}){ return <div className="run-events">{items.map(item=><div key={item.id} className={"run-event "+item.state}><span className="run-event-icon">{runtimeIcon(item.type)}</span><span className="run-event-label">{item.label}</span><span className="run-event-detail" title={item.detail}>{item.detail||"Provider event"}</span>{item.checkpointId&&codingSession&&codingSession.workspace_kind==="git_worktree"?<button className="run-event-rewind" disabled={running} onClick={()=>rewindCodingCheckpoint(item.checkpointId)}>Rewind</button>:<span className="run-event-state">{item.state}</span>}</div>)}</div>; }

  function openCtx(e){ e.preventDefault(); e.stopPropagation(); const r = rootRef.current.getBoundingClientRect(); setCtxMenu({ x: Math.min(e.clientX-r.left, r.width-236), y: Math.min(e.clientY-r.top, r.height-300) }); }
  const visibleTasks = tasksExpanded ? TASKS : TASKS.slice(0,6);
  const prog = progressByChat[activeChat] || emptyProgress();
  const progDone = prog.tasks.filter(t=> t.status==="done" || t.status==="error").length;
  const progPct = prog.tasks.length ? Math.round((progDone/prog.tasks.length)*100) : 0;

  function renderMsg(msg){
    if(msg.type==="user") return <div key={msg.id} className="user-msg">{msg.atts && msg.atts.length>0 && <div className="att-row" style={{marginBottom:msg.text?6:0}}>{msg.atts.map((at,i)=>(<div key={i} className="att-chip">{at.image && at.url ? <img src={at.url} alt=""/> : <IcFile size={13}/>}<span className="att-name">{at.name}</span></div>))}</div>}{msg.text}</div>;
    if(msg.type==="assistant"){
      if(msg.thinking) return <div key={msg.id} className="working-line"><span className="glow-text">{msg.provider==="claude"?"Claude Code":"Codex"} is connecting</span><span className="tdot"/><span className="tdot"/><span className="tdot"/></div>;
      return <div key={msg.id} className="msg-wrap">
        {msg.plan && msg.plan.length>0 && (()=>{ const pr = progressByChat[activeChat]||emptyProgress(); const byId={}; (pr.tasks||[]).forEach(t=>byId[t.id]=t); return (
          <div className="plan-block" style={{border:"1px solid #1e1e1e",borderRadius:10,padding:"8px 10px",margin:"4px 0 10px",background:"#121212"}}>
            <div className="prog-title" style={{marginBottom:4}}>Plan</div>
            {msg.plan.map(t=>{ const st=(byId[t.id]||{}).status||"pending"; return (
              <div key={t.id} className="task-row">
                {st==="done"?<IcCheckCircle size={14}/>:st==="running"||st==="review"?<Spinner/>:<IcCircle size={14}/>}
                <span className={"task-lbl"+(st==="done"?" done":"")}>{t.title}</span>
                {(byId[t.id]&&byId[t.id].persona&&st==="running")&&<span className="sa-working" style={{marginLeft:6}}>{byId[t.id].persona.name}</span>}
              </div>
            ); })}
          </div>
        ); })()}
        {msg.streaming ? <div><span className="streaming-text">{msg.text}</span><span className="caret"/></div> : <div className="msg-text">{msg.text}</div>}
        {msg.runtimeEvents && msg.runtimeEvents.length>0 && <RunEvents items={msg.runtimeEvents}/>}
        {msg.turnId && <div className="run-meta"><span className={msg.runState==="stopped"?"stopped":msg.runState==="complete"?"live":""}>{msg.runState||"live"}</span><span>{msg.provider}</span><span>{msg.turnId.slice(0,18)}</span>{msg.traceId&&<span>{msg.traceId.slice(0,18)}</span>}</div>}
        {msg.activity && msg.activity.length>0 && <div className="att-row" style={{marginTop:8}}>{msg.activity.slice(0,4).map((a,i)=><span key={i} className="att-chip"><Spinner/><span className="att-name">{a.label}</span></span>)}</div>}
        {!msg.streaming && msg.sources && msg.sources.length>0 && <div className="att-row" style={{marginTop:8}}>{msg.sources.slice(0,5).map((s,i)=>(<a key={i} className="att-chip" href={s.url} target="_blank" rel="noreferrer" style={{textDecoration:"none",color:"#9bbcd6"}}><IcGlobe size={12}/><span className="att-name">{s.domain||s.title||"source"}</span></a>))}</div>}
      </div>;
    }
    if(msg.type==="system") return <div key={msg.id} className="sys-line">{msg.icon==="cmd" ? <Fragment><span style={{fontSize:12,color:"#3a3a3a"}}>⬡</span><span className="sys-cmd">{msg.label}</span></Fragment> : <Fragment><div className="sys-dot"/><span>{msg.label}</span></Fragment>}</div>;
    if(msg.type==="learning") return <div key={msg.id} className="learning-inline"><div className="learning-inline-kicker">Learning event</div><div className="learning-inline-title">{msg.title}</div><div className="learning-inline-body">{msg.body}</div></div>;
    if(msg.type==="spawn"){ const a = agentById(msg.agentId); return (
      <div key={msg.id} className="spawn-block">
        <div className="spawn-hdr"><span>{msg.header}</span><IcChevD size={12}/></div>
        <div className="spawn-created">Assigned {a && <PixelSprite name={a.sprite} color={a.color} px={2}/>}<span className="spawn-agent">{a?a.name:msg.agentId}</span>{msg.agentRole && <span style={{color:"#484848"}}>({msg.agentRole})</span>}<span style={{color:"#484848"}}>with a narrow brief:</span></div>
        <div className="spawn-instr">{msg.instruction}</div>
      </div>
    );}
    if(msg.type==="closed") return <div key={msg.id}><div className="close-hdr"><div className="sys-dot"/><span>Closed {msg.count} agent sessions</span><IcChevD size={12}/></div>{msg.agents.map((a,i)=>(<div key={i} className="close-item"><span style={{color:"#484848"}}>Closed</span><span>{a}</span></div>))}</div>;
    return <div key={msg.id} className="msg-wrap"><MsgText msg={msg}/></div>;
  }

  const chatTitle = chatTitleFor(activeChat);

  function togglePin(chat){
    setPinned(prev=> prev.some(p=>p.id===chat.id) ? prev.filter(p=>p.id!==chat.id) : [{id:chat.id, title:chat.title, age:chat.age}, ...prev]);
  }
  function archiveChat(id){
    setArchived(prev=> prev.includes(id) ? prev : [...prev, id]);
    setPinned(prev=> prev.filter(p=>p.id!==id));
    setNewChats(prev=> prev.filter(c=>c.id!==id));
    setArchiveConfirm(null);
    if(activeChat===id) setActiveChat("new");
  }
  function chatRow(chat){
    const id = chat.id;
    return (
      <div key={id} className={"chat-row"+(id===activeChat?" active":"")} onClick={()=>{setActiveChat(id);setSbHover(false);}} onContextMenu={openCtx}>
        <span className="chat-row-title">{chat.title}</span>
        {archiveConfirm===id ? (
          <button className="confirm-btn" onClick={(e)=>{e.stopPropagation(); archiveChat(id);}}>Confirm</button>
        ) : (
          <Fragment>
            <div className="chat-row-actions">
              <button className="cr-act" title={pinned.some(p=>p.id===id)?"Unpin":"Pin"} onClick={(e)=>{e.stopPropagation(); togglePin(chat);}}><IcPin size={13}/></button>
              <button className="cr-act" title="Archive" onClick={(e)=>{e.stopPropagation(); setArchiveConfirm(id);}}><IcArchive size={13}/></button>
            </div>
            {chat.age ? <span className="chat-row-age">{chat.age}</span> : <Spinner/>}
          </Fragment>
        )}
      </div>
    );
  }

  function sbOptMenu(){
    return (
      <div className="sb-opt-menu pop-in" onClick={(e)=>e.stopPropagation()}>
        <div className="sb-opt-item"><div className="sb-opt-l"><IcArchive size={14}/><span>Archive all chats</span></div></div>
        <div className="sb-opt-item" onMouseEnter={()=>setSbSub("organize")} onMouseLeave={()=>setSbSub(null)}>
          <div className="sb-opt-l"><IcFolder size={14}/><span>Organize sidebar</span></div><IcChevR size={13}/>
          {sbSub==="organize" && (
            <div className="sb-submenu">
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("project"); setSbMenu(null);}}><div className="sb-opt-l"><IcFolder size={13}/><span>By project</span></div>{organizeBy==="project" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("recent"); setSbMenu(null);}}><div className="sb-opt-l"><IcFolder size={13}/><span>Recent projects</span></div>{organizeBy==="recent" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("chrono"); setSbMenu(null);}}><div className="sb-opt-l"><IcAuto size={13}/><span>Chronological list</span></div>{organizeBy==="chrono" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>setSbMenu(null)}><div className="sb-opt-l"><span style={{fontSize:13,width:13,display:"flex",justifyContent:"center"}}>↑</span><span>Move up</span></div></div>
            </div>
          )}
        </div>
        <div className="sb-opt-item" onMouseEnter={()=>setSbSub("sort")} onMouseLeave={()=>setSbSub(null)}>
          <div className="sb-opt-l"><IcRefresh size={14}/><span>Sort by</span></div><IcChevR size={13}/>
          {sbSub==="sort" && (
            <div className="sb-submenu">
              <div className="sb-opt-item" onClick={()=>{setSortBy("created"); setSbMenu(null);}}><div className="sb-opt-l"><IcFile size={13}/><span>Created</span></div>{sortBy==="created" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setSortBy("updated"); setSbMenu(null);}}><div className="sb-opt-l"><IcEdit size={13}/><span>Updated</span></div>{sortBy==="updated" && <span className="drop-check">✓</span>}</div>
            </div>
          )}
        </div>
      </div>
    );
  }
  function sbHeader(label, key, addBtn){
    return (
      <div className="sb-section-hd">
        <span className="sb-section-lbl">{label}</span>
        <div className="sb-hd-actions">
          <button className="sb-hd-btn" onClick={(e)=>{e.stopPropagation(); setSbMenu(sbMenu===key?null:key); setSbSub(null);}}><IcMoreDots size={14}/></button>
          {addBtn || <button className="sb-hd-btn" title="New chat" onClick={()=>{setActiveProject(null);setActiveChat("new");setSbHover(false);}}><IcEdit size={13}/></button>}
        </div>
        {sbMenu===key && sbOptMenu()}
      </div>
    );
  }

  return (
    <div className="workspace" ref={rootRef} onClick={()=>setCtxMenu(null)}>
      <div ref={trigRef} className="sb-trigger"/>

      {/* Sidebar */}
      <div className={"sidebar"+(sbOpen?" open":"")}>
        <div className="sb-top">
          <div className="sb-runtime-row">
            <button className="sb-runtime-trigger" aria-haspopup="menu" aria-expanded={runtimeMenu} onClick={()=>setRuntimeMenu(v=>!v)}>
              <span>{codingProvider==="claude"?"Claude Code":"Codex"}</span><IcChevD size={13}/>
            </button>
            <button className="sb-runtime-search" title="Search chats and commands" aria-label="Search chats and commands" onClick={()=>{setShowPalette(true);setPaletteQ("");setPalIdx(0);}}><IcSearch size={16}/></button>
            {runtimeMenu && <div className="runtime-switcher pop-in" role="menu">
              <button className="runtime-option" role="menuitemradio" aria-checked={codingProvider==="codex"} onClick={()=>{chooseCodingProvider("codex");setRuntimeMenu(false);}}>
                <span className="runtime-option-copy"><span className="runtime-option-name">Codex</span><span className="runtime-option-desc">Plan, build, debug, and ship</span></span>
                <span className="runtime-option-state">{codingProvider==="codex"?"selected":(healthFor("codex")||{}).available?"ready":"local"}</span>
              </button>
              <button className="runtime-option" role="menuitemradio" aria-checked={codingProvider==="claude"} onClick={()=>{chooseCodingProvider("claude");setRuntimeMenu(false);}}>
                <span className="runtime-option-copy"><span className="runtime-option-name">Claude Code</span><span className="runtime-option-desc">Review, reason, and implement</span></span>
                <span className="runtime-option-state">{codingProvider==="claude"?"selected":(healthFor("claude")||{}).available?"ready":"local"}</span>
              </button>
              <button className="runtime-option" role="menuitem" disabled title="Grok Build adapter is not connected yet">
                <span className="runtime-option-copy"><span className="runtime-option-name">Grok</span><span className="runtime-option-desc">Grok Build runtime</span></span><span className="runtime-option-state">not connected</span>
              </button>
            </div>}
          </div>
          <button className="sb-nav-btn" onClick={()=>{setActiveProject(null);setActiveChat("new");setSbHover(false);}}><IcEdit size={15}/><span>New chat</span></button>
          <button className="sb-nav-btn" aria-disabled="true" title="GitHub pull requests are not connected in this frontend-only pass"><IcGitHub size={15}/><span>Pull requests</span></button>
          <button className="sb-nav-btn" aria-disabled="true" title="Scheduled coding runs are not connected yet"><IcGauge size={15}/><span>Scheduled</span></button>
          <button className="sb-nav-btn" aria-disabled="true" title="Plugin management remains available from the composer"><IcPlugin size={15}/><span>Plugins</span></button>
        </div>
        <div className="sb-scroll">
          <div className="sb-section">
            <div className="sb-section-lbl">Pinned</div>
            {pinned.filter(p=>!archived.includes(p.id)).length>0
              ? pinned.filter(p=>!archived.includes(p.id)).map(chatRow)
              : <div className="sb-empty">Pin important chats for quick access</div>}
          </div>
          <div className="sb-section">
            <div className="sb-project-wrap">
              {sbHeader("Projects","projects",<button className="sb-hd-btn" title="Add project" onClick={(e)=>{e.stopPropagation();setProjAddMenu(v=>!v);}}><IcPlus size={14}/></button>)}
              {projAddMenu && <div className="sb-project-menu pop-in" onClick={e=>e.stopPropagation()}>
                <button onClick={startFromScratch}><IcPlus size={14}/>Start from scratch</button>
                <button onClick={useExistingFolder}><IcFolder size={14}/>Use an existing folder</button>
              </div>}
            </div>
            {projects.map(project=><div key={project.id} className="project-item">
              <div className={"proj-row"+(project.expanded?" open":"")} onClick={()=>toggleProj(project.id)}>
                <IcFolder size={15}/><span className="proj-name">{project.name}</span>
                <div className="proj-row-actions">
                  <button className="pr-act" title="New chat in project" onClick={(e)=>{e.stopPropagation();newChatInProject(project.id);}}><IcPlus size={13}/></button>
                  <button className="pr-act" title="Project options" onClick={(e)=>{e.stopPropagation();setProjRowMenu(projRowMenu===project.id?null:project.id);}}><IcMoreDots size={13}/></button>
                </div>
              </div>
              {projRowMenu===project.id&&<div className="project-row-menu pop-in" onClick={e=>e.stopPropagation()}>
                <button onClick={()=>newChatInProject(project.id)}><IcEdit size={13}/>New chat</button>
                <button onClick={()=>openNameModal("rename",project)}><IcEdit size={13}/>Rename project</button>
                <button onClick={()=>pinProject(project.id)}><IcPin size={13}/>{project.pinned?"Unpin project":"Pin project"}</button>
                <button onClick={()=>archiveProjectChats(project.id)}><IcArchive size={13}/>Archive chats</button>
                {project.id!=="proj-vellum"&&<button className="danger" onClick={()=>removeProject(project.id)}><IcX size={13}/>Remove project</button>}
              </div>}
              {project.expanded && <div className="project-chat-list">
                {(project.chats||[]).length>0 ? project.chats.filter(c=>!archived.includes(c.id)).slice(0,8).map(chatRow) : <div className="proj-nochats">No chats yet</div>}
              </div>}
            </div>)}
          </div>
          <div className="sb-section">
            {sbHeader("Chats","chats")}
            {newChats.filter(c=>!archived.includes(c.id)).map(chatRow)}
            {codingSessions.slice(0,8).map(session=><div key={session.id} className={"chat-row"+(codingSession&&codingSession.id===session.id?" active":"")} onClick={()=>openCodingSession(session)}><span className="chat-row-title">{session.title||session.provider}</span>{session.status!=="closed"&&<div className="chat-row-actions"><button className="cr-act" title="Close workspace" onClick={(event)=>closeCodingSession(session,event)}><IcX size={12}/></button></div>}<span className="chat-row-age">{session.provider} · {session.status}</span></div>)}
            {newChats.filter(c=>!archived.includes(c.id)).length===0&&codingSessions.length===0&&<div className="sb-empty">New conversations appear here</div>}
          </div>
        </div>
        <div className="sb-bottom">
          {showSettings && (
            <div className="settings-pop fade-up">
              <div className="sp-hdr"><div className="sp-email">Local workspace</div><div className="sp-role">Provider credentials stay outside Vellum</div></div>
              <div className="sp-item" onClick={()=>{refreshCodingRuntime();setShowSettings(false);}}><IcRefresh size={13}/><span>Refresh runtimes</span></div>
              <div className="sp-item"><IcShield size={13}/><span>{codingAccess.label} access</span></div>
              <div className="sp-item-row" onClick={()=>setShowUsage(v=>!v)}><span style={{display:"flex",alignItems:"center",gap:8}}><IcGauge size={13}/><span>Last run usage</span></span><IcChevD size={12}/></div>
              {showUsage && (<div className="usage-inner fade-up"><div className="usage-line"><span>Last run</span><span className="usage-sub">{codingUsage?compactValue(codingUsage):"No usage event yet"}</span></div></div>)}
            </div>
          )}
          <button className="sb-profile sb-settings-row" onClick={()=>setShowSettings(v=>!v)}><span className="sb-avatar">PR</span><span className="sb-profile-name">Pratyakksh</span><IcSettings size={14}/></button>
        </div>
      </div>

      {/* Main */}
      <div className={"main"+(shell==="desktop"&&sbPinned?" desk-inset":"")} style={sbPinned?{marginLeft:266}:undefined}>
        <div className="chat-pane">
        <SideRays speed={2.7} rayColor1="#EAB308" rayColor2="#96c8ff" intensity={1.9} spread={2.1} origin="top-right" tilt={6} saturation={1.5} blend={.75} falloff={1.6} opacity={1}/>
        <div className="side-rays-shade" aria-hidden="true"/>
        {isLanding ? (
          <Fragment>
            <div className="landing">
              <div className="runtime-empty">
                <div className="runtime-empty-kicker">Local coding workspace</div>
                <div className="runtime-empty-title">Build with the right runtime.</div>
                <div className="runtime-empty-copy">Choose a project and start with one agent. Vellum keeps provider sessions, commands, file changes, usage, and stop control in one web workspace.</div>
                <div className="runtime-empty-note"><i/>Your provider login stays on this machine</div>
              </div>
              <div style={{width:"100%",maxWidth:850,position:"relative"}}>
                <div style={{maxWidth:760,margin:"0 auto"}}><InputBox placeholder="Describe what to inspect, plan, or build" model="5.5" api={composerApi} onSend={onMainSend}/></div>
              </div>
            </div>
          </Fragment>
        ) : (
          <Fragment>
              <div className="topbar">
                <div className="tb-left">
                  <button className={"icon-btn"+(sbPinned?" on":"")} onClick={()=>setSbPinned(v=>!v)} title="Pin sidebar (Ctrl B)"><IcSidebar size={15}/></button>
                  <span className="tb-title">{chatTitle}</span>
                  <div className="tb-more" onClick={openCtx}><IcMoreDots size={15}/></div>
                </div>
                <div className="tb-right">
                  <span className={"status-pill "+(running?"running":"complete")}>{running?(codingProvider==="claude"?"Claude working":"Codex working"):(codingProvider==="claude"?"Claude ready":"Codex ready")}</span>
                  <button className={"icon-btn"+(showProg?" on":"")} title="Toggle Progress" onClick={()=>setShowProg(v=>!v)}><IcTasks size={15}/></button>
                  <button className={"icon-btn"+(showSub?" on":"")} title="Toggle Workspace" onClick={()=>setShowSub(v=>!v)}><IcColumns size={15}/></button>
                </div>
              </div>

              <div className="msgs" ref={msgsRef} style={showProg?{paddingRight:338}:null}>
                {messages.map(renderMsg)}
              </div>

              <InputBox running={running} model="5.5" api={composerApi} onSend={onMainSend} onStop={stopStream} wrapStyle={showProg?{paddingRight:338}:null} panelOpen={showProg}/>

              {/* Progress floating card */}
              {showProg && (
                <div className="prog-float" style={{width:310}}>
                  {prog.tasks.length>0 && (
                  <div className="prog-sec">
                    <div className="prog-title">Progress</div>
                    {prog.tasks.map(t=>(
                      <div key={t.id} className="task-row">
                        {t.status==="done" ? <IcCheckCircle size={15}/> : t.status==="running"||t.status==="review" ? <Spinner/> : <IcCircle size={15}/>}
                        <span className={"task-lbl"+(t.status==="done"?" done":"")}>{t.title}</span>
                        {t.persona && (t.status==="running"||t.status==="review") && <span className="sa-working" style={{marginLeft:6}}>{t.persona.name} is working</span>}
                      </div>
                    ))}
                  </div>
                  )}
                  <div className="prog-sec">
                    <div className="prog-title">Outputs</div>
                    {(prog.outputs && prog.outputs.length>0)
                      ? prog.outputs.map((o,i)=>(<div key={i} className="out-file"><IcFile size={13}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o}</span></div>))
                      : <div className="task-empty" style={{color:"#555",fontSize:12.5,padding:"2px 0"}}>No artifacts yet</div>}
                  </div>
                  {tabs.some(t=>t.kind==="side") && (
                    <div className="prog-sec">
                      <div className="prog-title">Side chats</div>
                      {tabs.filter(t=>t.kind==="side").map(t=>(
                        <div key={t.id} className="sa-row" onClick={()=>{setActiveTab(t.id); setShowSub(true);}}>
                          <IcCircle size={14}/><span className="sa-name">{t.label}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {prog.tasks.some(t=>t.persona) && (
                  <div className="prog-sec">
                    <div className="prog-title">Subagents</div>
                    {prog.tasks.filter(t=>t.persona).map(t=>(
                      <div key={t.id} className="sa-row" onClick={()=>openTaskAgent(t)}>
                        <PixelSprite name={t.persona.sprite} color={t.persona.color} px={2}/>
                        <span className="sa-name">{t.persona.name}</span>
                        {t.status==="running" && <span className="sa-working">is working</span>}
                        {t.status==="done" && <span className="sa-working" style={{color:"#5a8f5a"}}>done</span>}
                      </div>
                    ))}
                  </div>
                  )}
                  <div className="prog-sec">
                    <div className="prog-title">Sources</div>
                    {(prog.sources && prog.sources.length>0)
                      ? prog.sources.map((s,i)=>(<div key={i} className="out-file"><IcGlobe size={13}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.domain||s.title||s.url||"source"}</span></div>))
                      : <div className="task-empty" style={{color:"#555",fontSize:12.5,padding:"2px 0"}}>No sources yet</div>}
                  </div>
                </div>
              )}
          </Fragment>
        )}
        </div>

        {/* Workspace column */}
        {showSub && <div className={"resize-h"+(resizing?" active":"")} onMouseDown={(e)=>{e.preventDefault();setResizing(true);const sx=e.clientX,sw=wsWidth;const mv=(ev)=>setWsWidth(clamp(sw-(ev.clientX-sx),340,760));const up=()=>{setResizing(false);window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);document.body.style.cursor="";};window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);document.body.style.cursor="col-resize";}}/>}
            {showSub && (
              <div className="sub-panel" style={{width:wsWidth, borderLeft:"1px solid #191919"}}>
                <div className="workspace-bar">
                  {tabs.map(t=>(
                    <button key={t.id} className={"workspace-tab"+(activeTab===t.id?" active":"")} onClick={()=>setActiveTab(t.id)}>
                      <span className="workspace-tab-icon">{tabIcon(t)}</span><span>{t.label}</span>
                      <span className="workspace-tab-x" onClick={(e)=>closeTab(t.id,e)}><IcX size={11}/></span>
                    </button>
                  ))}
                  <div className="tab-add-btn" onClick={(e)=>{e.stopPropagation();setShowPlus(v=>!v);}}><IcPlus size={13}/></div>
                  <div className="tabs-right"><button className="icon-btn"><IcExpand size={14}/></button><button className="icon-btn" onClick={()=>setShowSub(false)} title="Close panel"><IcColumns size={14}/></button></div>
                </div>
                {showPlus && (
                  <div className="plus-drop pop-in">
                    {launcherKinds().map(k=>(<div key={k} className="plus-item" onClick={()=>addTab(k)}><div className="plus-item-l">{KIND_META[k].sm}<span>{KIND_META[k].label}</span></div>{KIND_META[k].kbd && <span className="kbd">{KIND_META[k].kbd}</span>}</div>))}
                    {chatInProject && <div className="plus-sec">Suggested</div>}
                    {chatInProject && OUTPUTS.map((o,i)=>(<div key={i} className="plus-file" onClick={()=>addTab("browser")}><IcFile size={12}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o}</span></div>))}
                  </div>
                )}

                {!activeTabObj && (()=>{ const ks = launcherKinds(); const cols = ks.length===4 ? 2 : ks.length; return (
                  <div className="workspace-body"><div className="launcher" style={chatInProject?null:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
                    <div className="launch-grid" style={{gridTemplateColumns:"repeat("+cols+",minmax(0,1fr))"}}>
                      {ks.map(k=>(<div key={k} className="launch-card" onClick={()=>addTab(k)}><span className="launch-ic">{KIND_META[k].big}</span><div className="launch-title">{KIND_META[k].label}</div><div className="launch-sub">{KIND_META[k].sub}</div>{KIND_META[k].kbd && <span className="kbd" style={{marginTop:4}}>{KIND_META[k].kbd}</span>}</div>))}
                    </div>
                    {chatInProject && <div className="launch-sec">Suggested</div>}
                    {chatInProject && OUTPUTS.map((o,i)=>(<div key={i} className="launch-doc" onClick={()=>addTab("browser")}><span className="launch-doc-ic"><IcFile size={15}/></span><div><div className="launch-doc-name">{o}</div><div className="launch-doc-sub">Document</div></div></div>))}
                  </div></div>
                ); })()}

                {activeTabObj && activeTabObj.kind==="taskagent" && (()=>{ const pr = progressByChat[activeChat]||emptyProgress(); const t = (pr.tasks||[]).find(x=>x.id===activeTabObj.taskId) || {title:activeTabObj.label, status:"pending", output:""}; return (
                  <div className="workspace-body">
                    <div className="drawer-hdr">
                      <div><div className="drawer-title">{t.persona && <PixelSprite name={t.persona.sprite} color={t.persona.color} px={3}/>} {t.persona?t.persona.name:t.title}</div><div className="drawer-sub">{t.title}</div></div>
                      <span className={"status-pill "+(t.status==="done"?"complete":t.status==="error"?"closed":"running")}>{t.status}</span>
                    </div>
                    <div className="msgs compact-msgs" style={{padding:"10px 12px"}}>
                      <div className="msg-text" style={{whiteSpace:"pre-wrap"}}>{t.output || (t.status==="running"?"…":"No output yet")}</div>
                      {t.review && <div className="msg-text" style={{whiteSpace:"pre-wrap",marginTop:10,color:"#a78bfa"}}>Review: {t.review}</div>}
                    </div>
                  </div>
                ); })()}
                {activeTabObj && activeTabObj.kind==="agent" && (()=>{ const a = agentById(activeTabObj.agentId) || SUBAGENTS[0]; return (
                  <div className="workspace-body">
                    <div className="drawer-hdr">
                      <div><div className="drawer-title"><PixelSprite name={a.sprite} color={a.color} px={3}/> {a.name}</div><div className="drawer-sub">{a.role} agent · {a.task}</div></div>
                      <span className={"status-pill "+a.status}>{a.status}</span>
                    </div>
                    <div className="relationship-tree">
                      <div className="tree-root">Vellum Master</div>
                      <div className="tree-branch">├─ Faraday → implementation</div>
                      <div className="tree-branch">├─ Nietzsche → spec review</div>
                      <div className="tree-branch">└─ {a.name} → {a.task}</div>
                    </div>
                    <div className="msgs compact-msgs">
                      {RAMAN_MSGS.map(msg=>{
                        if(msg.type==="system") return (<div key={msg.id} className="sys-line"><span style={{fontSize:12,color:"#3a3a3a"}}>⬡</span><span className="sys-cmd">{msg.label}</span></div>);
                        if(msg.type==="diff") return (
                          <div key={msg.id} className="msg-wrap">
                            <div className="test-pass">{msg.testLine}</div>
                            <div style={{marginTop:10}}>
                              <div style={{fontSize:13,color:"#aaa",marginBottom:6}}>{msg.commitSection.title}</div>
                              <ul className="ul">{msg.commitSection.bullets.map((b,i)=>(<li key={i}>{b.label && <span style={{color:"#555"}}>{b.label} </span>}{b.code && <InlineCode>{b.code}</InlineCode>}{b.codeSm && <Fragment><span style={{color:"#888"}}>{b.text}</span><InlineCode>{b.codeSm}</InlineCode></Fragment>}{!b.code && !b.codeSm && <span style={{color:"#888"}}>{b.text}</span>}</li>))}</ul>
                              <div className="diff-block">
                                <div className="diff-hdr"><div className="diff-title"><span style={{fontSize:14,opacity:.7}}>⌘</span><span>Edited 2 files</span></div><div className="diff-acts"><button className="diff-btn">Undo ↺</button><button className="diff-btn">Review</button></div></div>
                                {msg.files.map((f,i)=>(<div key={i} className="diff-file-row"><span className="diff-fname">{f.name}</span><span><span className="diff-add">+{f.added}</span> <span className="diff-rem">-{f.removed}</span></span></div>))}
                              </div>
                            </div>
                          </div>
                        );
                        return null;
                      })}
                    </div>
                    <InputBox running={false} model="5.5" api={composerApi} onSend={(t,att)=>sendToChat(activeTabObj.id,t,att)} placeholder={"Message "+a.name+"…"}/>
                  </div>
                ); })()}

                {activeTabObj && activeTabObj.kind==="terminal" && (
                  <div className="workspace-body">
                    <div className="drawer-hdr"><div><div className="drawer-title"><IcTerminal size={15}/> Terminal</div><div className="drawer-sub">Command execution stays visible and reviewable.</div></div><span className="status-pill running">ready</span></div>
                    <TerminalPane backendBase={backendBase()}/>
                  </div>
                )}
                {activeTabObj && activeTabObj.kind==="browser" && (
                  <div className="workspace-body"><BrowserPane backendBase={backendBase()}/></div>
                )}
                {activeTabObj && activeTabObj.kind==="files" && (
                  <div className="workspace-body">
                    <div className="files-bar">{codingTreePath&&<button className="icon-btn" title="Parent directory" onClick={parentProjectDirectory}><IcChevL size={14}/></button>}<span>{codingTreePath||codingTree.root||codingProjectRoot||"Choose a project first"}</span><button className="icon-btn" style={{marginLeft:"auto"}} title="Refresh project tree" onClick={()=>{if(codingSession){const separator=codingSession.cwd.includes("\\")?"\\":"/",root=codingTreePath?codingSession.cwd+separator+codingTreePath.split("/").join(separator):codingSession.cwd;codingApiRef.current.projectTree(root).then(setCodingTree).catch(()=>{});}}}><IcRefresh size={14}/></button></div>
                    <div className="files-body">
                      <div className="files-left">
                        {filePreview
                          ? <div className="files-preview"><div className="files-preview-name">{filePreview.path}</div><div className="files-preview-meta">{filePreview.size!==undefined?(filePreview.size+" bytes"):""}{filePreview.truncated?" · preview truncated":""}</div><div className={"files-preview-body"+(filePreview.error?" error":"")}>{filePreview.content}</div></div>
                          : <div className="files-empty"><IcFolder size={30}/><div className="files-empty-t">Open file</div><div className="files-empty-s">Select a file from the workspace tree</div></div>}
                      </div>
                      <div className="files-tree">
                        <div className="files-filter"><IcSearch size={13}/><input placeholder="Filter files…" value={fileFilter} onChange={e=>setFileFilter(e.target.value)}/></div>
                        {(codingTree.items||[]).filter(item=>!fileFilter||item.name.toLowerCase().includes(fileFilter.toLowerCase())).map(item=>item.kind==="directory"
                          ? <div key={item.path} className="ftree-row" onClick={()=>openProjectDirectory(item)}><IcChevR size={13}/><IcFolder size={13}/><span>{item.name}</span></div>
                          : <div key={item.path} className="ftree-row" style={{paddingLeft:9}} onClick={()=>openProjectFile(item)}><IcFile size={12}/><span>{item.name}</span></div>
                        )}
                        {codingSession&&(codingTree.items||[]).length===0&&<div className="proj-nochats">No readable files found</div>}
                      </div>
                    </div>
                  </div>
                )}
                {activeTabObj && activeTabObj.kind==="memory" && (
                  <div className="workspace-body">
                    <div className="drawer-hdr">
                      <div><div className="drawer-title">❖ Memory Trace</div><div className="drawer-sub">{backendStatus==="connected" ? "Live from FTS5 + Honcho · Qdrant off" : "What Vellum remembered, used, and learned."}</div></div>
                      <span className={"status-pill "+(backendStatus==="connected"?"complete":"running")} onClick={loadMemory} style={{cursor:"pointer"}}>{backendStatus==="connected"?"live ↻":"demo"}</span>
                    </div>
                    {(backendStatus==="connected" && memoryEntries.length>0) ? (
                      <Fragment>
                        <div className="drawer-section-title">Recent memory · {memoryEntries.length}</div>
                        {memoryEntries.slice(0,30).map((e,i)=>(<div key={i} className="memory-card"><div className="memory-reason" style={{marginTop:0,color:"#9a9a9a",lineHeight:1.55}}>{((e.content||e.text||"")+"").slice(0,280)}</div></div>))}
                      </Fragment>
                    ) : (
                      <Fragment>
                        <div className="drawer-section-title">Used in this task</div>{MEMORY_USED.map((m,i)=>(<div key={i} className="memory-card"><div className="memory-title">{m.title}</div><div className="memory-meta">{m.meta}</div><div className="memory-reason">Why: {m.reason}</div></div>))}
                        <div className="drawer-section-title">Learning events</div>{LEARNING_EVENTS.map((e,i)=>(<div key={i} className="learn-card"><div className="learn-title">{e.title}</div><div className="learn-body">{e.body}</div><div className="learn-conf">Confidence · {e.confidence}</div></div>))}
                        {backendStatus!=="connected" && <div className="cm-note" style={{margin:"12px 14px"}}>Turn on the backend in Settings → Models & Compute to see your real stored memories here.</div>}
                      </Fragment>
                    )}
                  </div>
                )}
                {activeTabObj && activeTabObj.kind==="side" && (()=>{ const sid = activeTabObj.id; const smsgs = chatMsgs[sid] || []; return (
                  <div className="workspace-body">
                    <div className="drawer-hdr"><div><div className="drawer-title"><IcChat size={15}/> {activeTabObj.label}</div><div className="drawer-sub">A focused side conversation, separate from the main task.</div></div></div>
                    {smsgs.length===0
                      ? <div className="msgs" style={{flex:1,alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"#444"}}><div style={{fontSize:14,color:"#777",marginBottom:4}}>New side chat</div><div style={{fontSize:12}}>Ask anything — it won't disturb the main thread.</div></div></div>
                      : <div className="msgs">{smsgs.map(renderMsg)}</div>}
                    <InputBox running={running} model="5.5" api={composerApi} onSend={(t,a)=>sendToChat(sid,t,a)} onStop={stopStream} placeholder={"Message "+activeTabObj.label+"…"}/>
                  </div>
                ); })()}
              </div>
            )}
      </div>

      {/* Name project modal */}
      {nameModal && (
        <div className="modal-overlay" onClick={()=>setNameModal(null)}>
          <div className="modal-box pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="modal-hd"><div className="modal-title">{nameModal.mode==="rename"?"Rename project":"Name project"}</div><span className="modal-x" onClick={()=>setNameModal(null)}><IcX size={15}/></span></div>
            <div className="modal-sub">Keep it short and recognizable</div>
            <input className="modal-input" value={nameModal.name}
              ref={(el)=>{ if(el && !el._sel){ el._sel=true; el.focus(); el.select(); } }}
              onChange={(e)=>setNameModal(m=>({...m, name:e.target.value}))}
              onKeyDown={(e)=>{ if(e.key==="Enter"){ e.preventDefault(); saveNameModal(); } }}/>
            <div className="modal-actions"><button className="modal-btn" onClick={()=>setNameModal(null)}>Cancel</button><button className="modal-btn primary" onClick={saveNameModal}>Save</button></div>
          </div>
        </div>
      )}

      {/* Models & Compute modal */}
      {showModels && (()=>{ const rec = hw ? recommendModel(hw) : null; return (
        <div className="modal-overlay" onClick={()=>setShowModels(false)}>
          <div className="modal-box compute-modal pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="modal-hd"><div className="modal-title">Models & Compute</div><span className="modal-x" onClick={()=>setShowModels(false)}><IcX size={15}/></span></div>
            <div className="modal-sub">Vellum decides where your models run. Scan your machine, then download a local model if it fits — or bring your own key for a cloud provider.</div>

            <div className="cm-sec">
              <div className="cm-sec-hd"><span>Your hardware</span><button className="cm-scan" onClick={scanHardware}>{scanning?"Scanning…":(hw?"Re-scan":"Scan this computer")}</button></div>
              {hw ? (
                <Fragment>
                  <div className="cm-specs">
                    <div className="cm-chip"><b>CPU</b><span>{hw.cores?hw.cores+" cores":"—"}</span></div>
                    <div className="cm-chip"><b>Memory</b><span>{hw.ram?("≥ "+hw.ram+" GB"):"—"}</span></div>
                    <div className="cm-chip"><b>GPU</b><span>{hw.gpu||"none detected"}</span></div>
                    <div className="cm-chip"><b>Free disk</b><span>{hw.storage?("~"+hw.storage+" GB"):"—"}</span></div>
                    <div className="cm-chip"><b>OS</b><span>{hw.platform}</span></div>
                  </div>
                  <div className="cm-note">Browser scan is approximate — memory caps at 8 GB and VRAM isn't exposed. The desktop app reports exact specs.</div>
                </Fragment>
              ) : <div className="cm-hint">Detects cores, memory, GPU and free disk to tell you whether a local model is realistic — or whether you're better off on a cloud key.</div>}
            </div>

            {rec && (
              <div className="cm-sec">
                <div className="cm-sec-hd"><span>Recommendation</span></div>
                <div className={"cm-reco "+rec.tier}>
                  <div className="cm-reco-t">{rec.title}</div>
                  <div className="cm-reco-b">{rec.note}</div>
                  {rec.model && <button className="cm-dl">Download {rec.model} · {rec.size}</button>}
                </div>
              </div>
            )}

            <div className="cm-sec">
              <div className="cm-sec-hd"><span>Connect a provider — bring your own key</span></div>
              {PROVIDERS.map(p=>(
                <div key={p.id} className="cm-prov">
                  <div className={"cm-prov-radio"+(activeProvider===p.id?" on":"")} onClick={()=>setProvider(p.id)}/>
                  <div className="cm-prov-main" onClick={()=>setProvider(p.id)}>
                    <div className="cm-prov-name">{p.name}</div>
                    <div className="cm-prov-sub">{p.sub}</div>
                  </div>
                  <div className="cm-key">
                    <span className={"cm-key-dot"+(apiKeys[p.id]?" on":"")}/>
                    <input type="password" placeholder={p.ph} value={apiKeys[p.id]} onChange={(e)=>setApiKeys(k=>({...k,[p.id]:e.target.value}))}/>
                  </div>
                </div>
              ))}
              <div className="cm-note">Keys are stored locally and only the active provider is used. Each Vellum user sets up their own — nothing is shared.</div>
            </div>

            <div className="cm-sec">
              <div className="cm-sec-hd"><span>Vellum backend — memory, privacy, vault</span><span className={"status-pill "+(backendStatus==="connected"?"complete":backendStatus==="checking"?"running":"")}>{backendStatus}</span></div>
              <div className="cm-prov">
                <div className={"cm-prov-radio"+(useBackend?" on":"")} onClick={()=>{ const n=!useBackend; setUseBackend(n); if(n) pingBackend(); }}/>
                <div className="cm-prov-main" onClick={()=>{ const n=!useBackend; setUseBackend(n); if(n) pingBackend(); }}>
                  <div className="cm-prov-name">Route chats through the backend</div>
                  <div className="cm-prov-sub">Engages Honcho user-model + FTS5 search + Obsidian write-back + privacy gate.</div>
                </div>
                <div className="cm-key" style={{width:172}}><input placeholder="http://127.0.0.1:8000" value={backendUrl} onChange={(e)=>setBackendUrl(e.target.value)}/></div>
              </div>
              <div className="cm-note">Retrieval runs on <b style={{color:"#888"}}>FTS5 + Honcho</b> — Qdrant (vector search) stays off. Needs the backend running and this UI served from an allowed origin (:5173). <span style={{color:"#e35d2b",cursor:"pointer"}} onClick={pingBackend}>Test connection</span></div>
            </div>

            <div className="modal-actions"><button className="modal-btn" onClick={()=>setShowModels(false)}>Close</button><button className="modal-btn primary" onClick={()=>setShowModels(false)}>Save</button></div>
          </div>
        </div>
      ); })()}

      {/* Context menu */}
      {ctxMenu && (
        <div className="ctx-menu pop-in" style={{top:ctxMenu.y, left:ctxMenu.x}} onClick={(e)=>e.stopPropagation()}>
          <div className="ctx-item"><div className="ctx-item-l"><IcPin size={13}/><span>Pin chat</span></div><span className="kbd">Ctrl Alt P</span></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcEdit size={13}/><span>Rename chat</span></div><span className="kbd">Ctrl Alt R</span></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcArchive size={13}/><span>Archive chat</span></div><span className="kbd">Ctrl Shift A</span></div>
          <div className="ctx-div"/>
          <div className="ctx-item" onClick={()=>{setCtxMenu(null); addSideChat();}}><div className="ctx-item-l"><IcChat size={13}/><span>Open side chat</span></div></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcCopy size={13}/><span>Copy</span></div><IcChevR size={12}/></div>
          <div className="ctx-item"><div className="ctx-item-l"><IcFork size={13}/><span>Fork</span></div><IcChevR size={12}/></div>
          <div className="ctx-item dim"><div className="ctx-item-l"><IcAuto size={13}/><span>Add automation…</span></div></div>
          <div className="ctx-div"/>
          <div className="ctx-item"><div className="ctx-item-l"><IcWindow size={13}/><span>Open in new window</span></div></div>
        </div>
      )}

      {/* Command palette */}
      {showPalette && (
        <div className="palette-overlay" onClick={()=>{setShowPalette(false);setPaletteQ("");}}>
          <div className="palette-box pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="palette-input-row"><IcSearch size={16}/><input className="palette-in" autoFocus placeholder="Search commands and chats…" value={paletteQ} onChange={(e)=>{setPaletteQ(e.target.value); setPalIdx(0);}} onKeyDown={paletteKey}/><span className="kbd">Esc</span></div>
            <div className="palette-list">
              {flat.length===0 && <div className="palette-empty">No matches for “{paletteQ}”.</div>}
              {cmdMatches.length>0 && <div className="palette-sec">Commands</div>}
              {cmdMatches.map((c)=>{ const gi = flat.findIndex(f=>f.kind==="cmd" && f.item.id===c.id); return (<div key={c.id} className={"palette-item"+(palIdx===gi?" hi":"")} onMouseEnter={()=>setPalIdx(gi)} onClick={()=>runPalette({kind:"cmd",item:c})}><div className="palette-item-l"><span style={{color:"#888",display:"flex"}}>{c.icon}</span><span className="palette-item-title">{c.title}</span></div>{c.kbd && <span className="kbd">{c.kbd}</span>}</div>); })}
              {chatMatches.length>0 && <div className="palette-sec">Chats</div>}
              {chatMatches.map((c)=>{ const gi = flat.findIndex(f=>f.kind==="chat" && f.item.id===c.id); return (<div key={c.id} className={"palette-item"+(palIdx===gi?" hi":"")} onMouseEnter={()=>setPalIdx(gi)} onClick={()=>runPalette({kind:"chat",item:c})}><div className="palette-item-l">{c.age?<span style={{color:"#444"}}>◷</span>:<Spinner/>}<span className="palette-item-title">{c.title}</span><span className="palette-item-sub">{c.project}</span></div>{c.age && <span className="kbd">{c.age}</span>}</div>); })}
              {sessionMatches.length>0 && <div className="palette-sec">Saved coding sessions</div>}
              {sessionMatches.map(session=>{ const gi=flat.findIndex(f=>f.kind==="session"&&f.item.id===session.id); return (<div key={session.id} className={"palette-item"+(palIdx===gi?" hi":"")} onMouseEnter={()=>setPalIdx(gi)} onClick={()=>runPalette({kind:"session",item:session})}><div className="palette-item-l"><IcTerminal size={13}/><span className="palette-item-title">{session.title||session.provider}</span><span className="palette-item-sub">{sessionProjectRoot(session)}</span></div><span className="kbd">{session.provider} · {session.status}</span></div>); })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ App ═══ */
function App(){
  return (
    <div className="web-shell">
      <div className="web-workspace">
        <VellumWorkspace shell="web" onSwitchShell={()=>{}} onToggleMax={()=>{}} maximized={true}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
