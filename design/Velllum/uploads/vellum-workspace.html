<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vellum — Workspace Preview</title>

<!-- React + Babel (CDN). Double-click this file to run. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;background:#050507;color:#d8d8d8;font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a}
button{font-family:inherit}

/* Stage / backdrop */
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.desktop-bg{position:absolute;inset:0;z-index:0;
  background:radial-gradient(120% 90% at 50% -10%, rgba(227,93,43,.07), transparent 45%),radial-gradient(80% 70% at 85% 110%, rgba(80,70,120,.05), transparent 50%),linear-gradient(180deg,#0a0a0e 0%,#070709 60%,#050506 100%)}
.desktop-bg::after{content:"";position:absolute;inset:0;opacity:.35;background-image:radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);background-size:22px 22px;mask-image:radial-gradient(circle at 50% 40%, #000 30%, transparent 80%)}
.bg-orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4;z-index:0;pointer-events:none}

/* Window */
.window{position:relative;z-index:2;display:flex;flex-direction:column;overflow:hidden;background:#0d0d0d;animation:winIn .45s cubic-bezier(.2,.7,.2,1);transition:width .22s ease,height .22s ease,border-radius .22s ease}
.win-float{width:min(1340px,94vw);height:min(862px,92vh);border-radius:12px;border:1px solid #232326;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 40px 120px rgba(0,0,0,.7),0 8px 30px rgba(0,0,0,.55)}
.win-max{width:100vw;height:100vh;border-radius:0;border:none;box-shadow:none}
@keyframes winIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}

/* Chrome */
.chrome{display:flex;flex-direction:column;height:100%;min-height:0}
.window-body{flex:1;min-height:0;position:relative;overflow:hidden;background:#0d0d0d}
.drag-region{-webkit-app-region:drag}
.chrome-toggle{display:flex;align-items:center;gap:2px;background:#141416;border:1px solid #232326;border-radius:8px;padding:2px;flex-shrink:0}
.chrome-toggle button{border:none;background:transparent;color:#6a6a6e;width:27px;height:22px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.chrome-toggle button:hover{color:#bbb}
.chrome-toggle button.active{background:#2a2a2e;color:#ededed}
.win-ctrls{display:flex;align-items:stretch;height:100%}
.win-ctrl{width:44px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#9a9a9a;cursor:pointer;transition:background .12s,color .12s}
.win-ctrl:hover{background:#1d1d1f;color:#eee}
.win-ctrl.wc-close:hover{background:#e3402f;color:#fff}
.win-ctrl svg{display:block}
.chrome-browser .bz-tabs{display:flex;align-items:flex-end;height:38px;background:#070708;padding-left:8px;gap:2px;border-bottom:1px solid #161618}
.bz-tab{display:flex;align-items:center;gap:8px;height:30px;padding:0 11px;border-radius:9px 9px 0 0;background:#0d0d0d;color:#bbb;font-size:12px;max-width:230px;cursor:default;border:1px solid #1c1c1f;border-bottom:none;position:relative;top:1px}
.bz-fav{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f6a25f,#e35d2b);flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.bz-tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bz-x{margin-left:4px;color:#666;font-size:12px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer}
.bz-x:hover{background:#222;color:#ddd}
.bz-newtab{width:28px;height:28px;border:none;background:transparent;color:#666;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;align-self:center;margin-bottom:2px}
.bz-newtab:hover{background:#161618;color:#bbb}
.bz-tabsfill{flex:1;height:100%}
.bz-toolbar{display:flex;align-items:center;gap:6px;height:42px;background:#0d0d0d;padding:0 10px;border-bottom:1px solid #161618}
.bz-nav{width:30px;height:30px;border:none;background:transparent;color:#777;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.bz-nav:hover{background:#1a1a1c;color:#ccc}
.bz-nav.dim{color:#3c3c3c;cursor:default}
.bz-omni{flex:1;display:flex;align-items:center;gap:9px;height:30px;background:#161618;border:1px solid #232326;border-radius:16px;padding:0 13px;color:#9a9a9a;font-size:12.5px;cursor:text;min-width:0}
.bz-omni .bz-url{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bz-omni .bz-host{color:#ddd}
.bz-iconbtn{width:30px;height:30px;border:none;background:transparent;color:#888;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.bz-iconbtn:hover{background:#1a1a1c;color:#ccc}
.bz-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#e35d2b,#7a4cf0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0}
.chrome-desktop .ws-titlebar{display:flex;align-items:center;height:36px;background:#0a0a0b;padding-left:10px;border-bottom:1px solid #161618;position:relative}
.wt-appmark{width:15px;height:15px;border-radius:4px;background:radial-gradient(circle at 35% 30%,#f6a25f,#e35d2b);margin-right:9px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
.wt-menu{display:flex;align-items:center;gap:2px;margin-left:4px}
.wt-mi{padding:3px 9px;border-radius:5px;color:#aaa;font-size:12.5px;cursor:default;transition:background .12s,color .12s}
.wt-mi:hover{background:#1c1c1f;color:#eee}
.wt-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#666;pointer-events:none;white-space:nowrap}
.wt-right{margin-left:auto;display:flex;align-items:center;gap:8px;height:100%}
.wt-right .chrome-toggle{margin-right:6px}

/* Workspace root */
.workspace{display:flex;height:100%;width:100%;overflow:hidden;position:relative;background:#0d0d0d}
.sb-trigger{position:absolute;top:0;left:0;width:14px;height:100%;z-index:90}
.sidebar{position:absolute;top:0;left:0;width:272px;height:100%;background:#0c0c0d;border-right:1px solid #191919;z-index:120;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .18s cubic-bezier(.4,0,.2,1);box-shadow:0 0 40px rgba(0,0,0,.5)}
.sidebar.open{transform:translateX(0)}
.sb-top{padding:8px 10px 6px;display:flex;flex-direction:column;gap:1px}
.sb-nav-btn{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#888;font-size:13px;transition:background .12s,color .12s;border:none;background:none;width:100%;text-align:left}
.sb-nav-btn:hover{background:#181818;color:#ddd}
.sb-nav-kbd{margin-left:auto}
.sb-section{padding:10px 10px 4px}
.sb-section-lbl{font-size:11px;color:#484848;font-weight:500;letter-spacing:.06em;padding:2px 10px 6px;text-transform:uppercase}
.proj-row{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:6px;cursor:pointer;color:#888;font-size:13px;transition:background .12s,color .12s}
.proj-row:hover,.proj-row.open{color:#ccc}
.chat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 4px 28px;border-radius:6px;cursor:pointer;color:#777;font-size:12.5px;transition:background .12s,color .12s;gap:6px}
.chat-row:hover{background:#181818;color:#ccc}
.chat-row.active{background:#1c1c1c;color:#ddd}
.chat-row-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.chat-row-age{font-size:11px;color:#444;flex-shrink:0}
.chat-row-actions{display:none;align-items:center;gap:1px;flex-shrink:0}
.chat-row:hover .chat-row-age{display:none}
.chat-row:hover .chat-row-actions{display:flex}
.cr-act{border:none;background:none;color:#888;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.cr-act:hover{color:#fff;background:#2a2a2a}
.confirm-btn{border:1px solid rgba(227,93,43,.45);background:rgba(227,93,43,.14);color:#e35d2b;border-radius:6px;font-size:11px;padding:2px 9px;cursor:pointer;flex-shrink:0}
.confirm-btn:hover{background:rgba(227,93,43,.24)}
.sb-add-proj{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:2px 6px;border:1px dashed #2a2a2a;border-radius:7px;color:#666;font-size:12.5px;cursor:pointer}
.sb-add-proj:hover{color:#ccc;border-color:#3a3a3a;background:#141414}
.proj-file{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 22px;color:#777;font-size:12px;cursor:pointer;border-radius:6px}
.proj-file:hover{background:#181818;color:#ccc}
.proj-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-row-actions{display:none;align-items:center;gap:1px;flex-shrink:0}
.proj-row:hover .proj-row-actions{display:flex}
.pr-act{border:none;background:none;color:#888;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.pr-act:hover{color:#fff;background:#2a2a2a}
.proj-nochats{font-size:12px;color:#3a3a3a;padding:3px 10px 3px 28px}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-box{width:380px;max-width:90%;background:#161618;border:1px solid #2a2a2e;border-radius:13px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.8)}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:16px;color:#eee;font-weight:500}
.modal-x{cursor:pointer;color:#666;display:flex}.modal-x:hover{color:#ddd}
.modal-sub{font-size:12.5px;color:#666;margin-top:3px}
.modal-input{width:100%;margin-top:14px;background:#0f0f10;border:1px solid #2a2a2e;border-radius:9px;padding:10px 12px;color:#eee;font-size:13.5px;font-family:'Geist',sans-serif;outline:none}
.modal-input:focus{border-color:#3a3a40}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal-btn{border:1px solid #2a2a2e;background:#1c1c1f;color:#ccc;border-radius:8px;padding:7px 16px;font-size:12.5px;cursor:pointer}
.modal-btn:hover{background:#242428}
.modal-btn.primary{background:#e8e8e8;color:#111;border-color:#e8e8e8}
.modal-btn.primary:hover{background:#fff}
.compute-modal{width:580px;max-width:94%;max-height:84vh;overflow-y:auto}
.cm-sec{margin-top:18px}
.cm-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cm-sec-hd > span{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.cm-scan{border:1px solid #2a2a2e;background:#1c1c1f;color:#ddd;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer}
.cm-scan:hover{background:#242428}
.cm-hint{font-size:12px;color:#666;line-height:1.5}
.cm-specs{display:flex;flex-wrap:wrap;gap:7px}
.cm-chip{display:flex;flex-direction:column;gap:2px;background:#121214;border:1px solid #242427;border-radius:9px;padding:8px 12px;min-width:96px}
.cm-chip b{color:#6a6a6a;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.cm-chip span{color:#ddd;font-size:13px}
.cm-note{font-size:11px;color:#555;margin-top:8px;line-height:1.5}
.cm-reco{border-radius:11px;padding:13px 14px;border:1px solid #242427;background:#121214}
.cm-reco.capable{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.05)}
.cm-reco.modest{border-color:rgba(227,93,43,.3);background:rgba(227,93,43,.05)}
.cm-reco.cloud{border-color:rgba(91,155,213,.3);background:rgba(91,155,213,.05)}
.cm-reco-t{font-size:13.5px;color:#e6e6e6;font-weight:500;margin-bottom:4px}
.cm-reco-b{font-size:12px;color:#888;line-height:1.55}
.cm-dl{margin-top:11px;border:none;background:#e8e8e8;color:#111;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer}
.cm-dl:hover{background:#fff}
.cm-prov{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #1a1a1c}
.cm-prov:last-child{border-bottom:none}
.cm-prov-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid #3a3a3e;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cm-prov-radio.on{border-color:#e35d2b}
.cm-prov-radio.on::after{content:"";width:8px;height:8px;border-radius:50%;background:#e35d2b}
.cm-prov-main{flex:1;min-width:0}
.cm-prov-name{font-size:13px;color:#ddd}
.cm-prov-sub{font-size:11px;color:#666;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-key{display:flex;align-items:center;gap:7px;background:#0f0f10;border:1px solid #242427;border-radius:8px;padding:5px 10px;width:188px;flex-shrink:0}
.cm-key input{flex:1;background:transparent;border:none;outline:none;color:#ccc;font-size:11.5px;font-family:'Geist Mono',monospace;min-width:0}
.cm-key input::placeholder{color:#444}
.cm-key-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
.cm-key-dot.on{background:#4ade80}
.att-row{display:flex;flex-wrap:wrap;gap:6px}
.att-row.att-compose{padding:9px 12px 2px}
.att-chip{display:flex;align-items:center;gap:6px;background:#1a1a1c;border:1px solid #262629;border-radius:8px;padding:4px 8px;font-size:11.5px;color:#bbb;max-width:180px}
.att-chip img{width:24px;height:24px;border-radius:4px;object-fit:cover;flex-shrink:0}
.att-chip .att-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-x{cursor:pointer;color:#666;display:flex;flex-shrink:0}
.att-x:hover{color:#ddd}
.spinner{width:13px;height:13px;border:1.5px solid #2a2a2a;border-top-color:#e35d2b;border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.sb-bottom{border-top:1px solid #191919;padding:6px 10px 8px;position:relative}
.sb-settings-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;color:#777;font-size:13px;transition:background .12s,color .12s}
.sb-settings-row:hover{background:#181818;color:#ccc}
.kbd{font-size:10px;color:#3a3a3a;background:#161616;border:1px solid #222;border-radius:3px;padding:1px 5px;font-family:'Geist Mono',monospace}
.core-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;color:#777;font-size:12.5px;cursor:pointer;transition:background .12s,color .12s}
.core-row:hover{background:#181818;color:#ccc}
.core-count{margin-left:auto;font-size:11px;color:#444}
.settings-pop{position:absolute;bottom:46px;left:10px;width:230px;background:#161616;border:1px solid #222;border-radius:10px;overflow:hidden;z-index:300;box-shadow:0 8px 40px rgba(0,0,0,.7)}
.sp-hdr{padding:10px 14px 8px;border-bottom:1px solid #222}
.sp-email{font-size:12px;color:#999}
.sp-role{font-size:11px;color:#484848;margin-top:2px}
.sp-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:#888;font-size:12.5px}
.sp-item:hover{background:#1e1e1e;color:#ddd}
.sp-item-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;color:#888;font-size:12.5px}
.sp-item-row:hover{background:#1e1e1e;color:#ddd}
.sp-div{height:1px;background:#1e1e1e;margin:2px 0}
.usage-inner{padding:2px 14px 8px}
.usage-line{display:flex;justify-content:space-between;font-size:11.5px;color:#666;padding:2px 0}
.usage-sub{font-size:11px;color:#444}
.upgrade-link{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#666;cursor:pointer;padding:3px 0}
.upgrade-link:hover{color:#aaa}

/* Main */
.main{flex:1;display:flex;overflow:hidden;min-width:0;transition:margin-left .18s cubic-bezier(.4,0,.2,1)}
.proj-picker{position:absolute;top:34px;left:24px;min-width:248px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:11px;padding:4px;box-shadow:0 16px 50px rgba(0,0,0,.75);z-index:300}
.pp-search{display:flex;align-items:center;gap:8px;padding:7px 10px 9px;color:#666;border-bottom:1px solid #232326;margin-bottom:4px}
.pp-search input{flex:1;background:transparent;border:none;outline:none;color:#ccc;font-size:12.5px;font-family:'Geist',sans-serif}
.pp-search input::placeholder{color:#555}
.pp-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;color:#cfcfcf;font-size:12.5px;position:relative}
.pp-item:hover{background:#2a2a2e;color:#fff}
.pp-l{display:flex;align-items:center;gap:9px}
.pp-submenu{position:absolute;left:100%;top:-4px;margin-left:6px;min-width:212px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:11px;padding:4px;box-shadow:0 16px 50px rgba(0,0,0,.75);z-index:310}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#0d0d0d;position:relative}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;min-height:42px;flex-shrink:0;gap:8px;position:relative;z-index:5}
.tb-left{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.tb-title{font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-more{display:flex;align-items:center;padding:4px 5px;border-radius:5px;cursor:pointer;color:#444;transition:color .12s,background .12s;flex-shrink:0}
.tb-more:hover{color:#888;background:#181818}
.tb-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icon-btn{display:flex;align-items:center;padding:5px;border-radius:5px;cursor:pointer;color:#484848;transition:color .12s,background .12s;border:none;background:none;line-height:1}
.icon-btn:hover{color:#999;background:#181818}
.icon-btn.on{color:#bbb;background:#1c1c1c}
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:28px}
.landing-title{font-size:25px;color:#ddd;font-weight:400;letter-spacing:-.03em;text-align:center}
.landing-subtitle{margin-top:7px;color:#555;font-size:13px;text-align:center}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:12px 0 4px;display:flex;flex-direction:column;transition:padding-right .18s ease}
.msg-wrap{padding:3px 20px}
.msg-text{color:#ccc;font-size:13.5px;line-height:1.65;letter-spacing:-.01em}
.user-msg{align-self:flex-end;max-width:78%;margin:8px 20px;background:#1a1a1c;border:1px solid #242427;border-radius:13px 13px 4px 13px;padding:9px 13px;color:#e2e2e2;font-size:13.5px;line-height:1.55;animation:fadeUp .18s ease}
.sys-line{display:flex;align-items:center;gap:6px;color:#444;font-size:12px;padding:3px 20px}
.sys-dot{width:5px;height:5px;border-radius:50%;background:#2a2a2a;flex-shrink:0}
.sys-cmd{font-size:12px;color:#484848}
.icode{display:inline;background:#1c1c1c;border:1px solid #252525;border-radius:4px;padding:1px 6px;font-family:'Geist Mono',monospace;font-size:11.5px;color:#e09a4a}
.tdot{width:5px;height:5px;border-radius:50%;background:#e35d2b;display:inline-block;animation:tpulse 1.4s ease infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
.working-line{display:flex;align-items:center;gap:9px;padding:6px 20px}
.glow-text{font-size:13px;font-weight:500;background:linear-gradient(90deg,#5f5f5f 0%,#fff 22%,#e35d2b 42%,#ffd9b8 55%,#fff 74%,#5f5f5f 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 2s linear infinite}
.streaming-text{font-size:13.5px;line-height:1.65;background:linear-gradient(90deg,#9a9a9a 0%,#fff 18%,#e35d2b 38%,#ffe2c8 52%,#fff 72%,#9a9a9a 100%);background-size:240% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 2.6s linear infinite}
.caret{display:inline-block;width:7px;height:14px;background:#e35d2b;margin-left:3px;border-radius:1px;vertical-align:text-bottom;box-shadow:0 0 7px rgba(227,93,43,.8);animation:blink 1.05s step-end infinite}
@keyframes shimmer{0%{background-position:140% center}100%{background-position:-140% center}}
@keyframes blink{50%{opacity:0}}
.spawn-block{margin:3px 20px;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:9px 12px}
.spawn-hdr{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;margin-bottom:5px}
.spawn-created{font-size:12px;color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.spawn-agent{color:#d0d0d0;font-weight:500}
.spawn-instr{font-size:11px;color:#484848;font-family:'Geist Mono',monospace;line-height:1.4}
.close-hdr{display:flex;align-items:center;gap:6px;font-size:12px;color:#444;padding:3px 20px;cursor:pointer}
.close-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#484848;padding:1px 20px 1px 30px}
.learning-inline{margin:7px 20px;background:#101010;border:1px solid #232323;border-radius:10px;padding:10px 12px}
.learning-inline-kicker{font-size:10.5px;color:#e35d2b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.learning-inline-title{font-size:13px;color:#bbb;margin-bottom:3px}
.learning-inline-body{font-size:12px;color:#666;line-height:1.5}

/* Input */
.input-wrap{padding:10px 14px 12px;flex-shrink:0;position:relative;z-index:5;transition:padding-right .18s ease}
.input-box{background:#121212;border:1px solid #1e1e1e;border-radius:13px;overflow:hidden;transition:border-color .15s}
.input-box:focus-within{border-color:#2a2a2a}
.input-ta{width:100%;background:transparent;border:none;outline:none;color:#d8d8d8;font-size:13.5px;font-family:'Geist',sans-serif;padding:12px 14px 6px;resize:none;line-height:1.55}
.input-ta::placeholder{color:#383838}
.input-footer{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 9px}
.input-lft{display:flex;align-items:center;gap:5px}
.input-rgt{display:flex;align-items:center;gap:5px}
.pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:#181818;border:1px solid #222;cursor:pointer;color:#666;font-size:11.5px;transition:border-color .12s,color .12s;white-space:nowrap}
.pill.accent{color:#e35d2b;border-color:rgba(227,93,43,.25)}
.model-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:#181818;border:1px solid #222;cursor:pointer;color:#777;font-size:11.5px;transition:border-color .12s,color .12s}
.model-pill:hover{border-color:#333;color:#aaa}
.model-num{font-weight:600;color:#bbb;font-size:12px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-search{width:100%;background:#0f0f10;border:1px solid #242427;border-radius:7px;padding:5px 9px;color:#ccc;font-size:12px;font-family:'Geist',sans-serif;outline:none;margin:2px 0 4px}
.model-search::placeholder{color:#444}
.model-list{max-height:260px;overflow-y:auto}
.model-sync{font-size:11px;color:#e35d2b;cursor:pointer}
.model-sync:hover{color:#f6824f}
.send-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#d8d8d8;cursor:pointer;border:none;color:#0d0d0d;transition:background .12s,transform .12s;flex-shrink:0}
.send-btn:hover{background:#fff;transform:translateY(-1px)}
.send-btn:disabled{background:#2a2a2a;color:#555;cursor:default;transform:none}
.stop-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;cursor:pointer;color:#e35d2b;transition:background .12s;flex-shrink:0;box-shadow:0 0 0 3px rgba(227,93,43,.07)}
.proj-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;background:#181818;border:1px solid #1e1e1e;color:#555;font-size:11.5px;cursor:pointer}

/* Menus */
.menu-pop{position:absolute;background:#161618;border:1px solid #242427;border-radius:10px;overflow:visible;z-index:200;min-width:210px;box-shadow:0 12px 44px rgba(0,0,0,.7);padding:4px}
.menu-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;color:#bbb;font-size:12.5px;transition:background .12s}
.menu-item:hover{background:#202024}
.menu-item-l{display:flex;align-items:center;gap:9px}
.menu-sec{padding:7px 10px 3px;font-size:10px;color:#4a4a4a;letter-spacing:.07em;text-transform:uppercase}
.toggle{width:30px;height:17px;border-radius:999px;background:#2a2a2e;position:relative;transition:background .15s;flex-shrink:0}
.toggle.on{background:#e35d2b}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .15s}
.toggle.on::after{transform:translateX(13px)}
.plug-ic{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.submenu{position:absolute;left:100%;bottom:0;top:auto;margin-left:6px;background:#161618;border:1px solid #242427;border-radius:10px;min-width:210px;box-shadow:0 12px 44px rgba(0,0,0,.7);padding:4px;z-index:210}
/* desktop menu bar dropdowns */
.wt-mi{position:relative}
.wt-mi.open{background:#1c1c1f;color:#eee}
.menubar-drop{position:absolute;top:26px;left:0;min-width:218px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:600}
.menubar-item{display:flex;align-items:center;justify-content:space-between;gap:28px;padding:6px 10px;border-radius:6px;color:#cfcfcf;font-size:12.5px;cursor:default;white-space:nowrap}
.menubar-item:hover{background:#2a2a2e;color:#fff}
.menubar-item.dim{color:#555}.menubar-item.dim:hover{background:transparent;color:#555}
.menubar-k{color:#666;font-size:11.5px;font-family:'Geist Mono',monospace}
.menubar-sep{height:1px;background:#2a2a2e;margin:4px 6px}
/* sidebar section header menus */
.sb-section-hd{display:flex;align-items:center;padding:2px 10px 6px;position:relative}
.sb-section-hd .sb-section-lbl{padding:0;flex:1}
.sb-hd-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .12s}
.sb-section-hd:hover .sb-hd-actions{opacity:1}
.sb-hd-btn{border:none;background:none;color:#666;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.sb-hd-btn:hover{color:#ccc;background:#1c1c1c}
.sb-opt-menu{position:absolute;top:24px;left:10px;min-width:200px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:200}
.sb-opt-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 10px;border-radius:6px;color:#cfcfcf;font-size:12.5px;cursor:pointer;position:relative}
.sb-opt-item:hover{background:#2a2a2e;color:#fff}
.sb-opt-l{display:flex;align-items:center;gap:9px}
.sb-submenu{position:absolute;left:100%;top:-4px;margin-left:6px;min-width:190px;background:#1b1b1d;border:1px solid #2a2a2e;border-radius:9px;padding:4px;box-shadow:0 14px 44px rgba(0,0,0,.7);z-index:210}
.resize-h{width:6px;flex-shrink:0;cursor:col-resize;position:relative;z-index:30;background:transparent}
.model-drop{position:absolute;bottom:60px;z-index:50;display:flex;gap:3px}
.drop-panel{background:#181818;border:1px solid #232323;border-radius:8px;overflow:hidden;min-width:158px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.drop-lbl{font-size:10.5px;color:#484848;padding:7px 13px 2px;letter-spacing:.05em;text-transform:uppercase}
.drop-item{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;cursor:pointer;color:#888;font-size:12.5px}
.drop-item:hover{background:#222;color:#ddd}
.drop-item.sel{color:#ddd}
.drop-check{color:#e35d2b;font-size:12px}

/* Slash menu */
.slash-pop{position:absolute;bottom:62px;left:14px;width:min(560px,calc(100% - 28px));max-height:330px;overflow-y:auto;background:#161618;border:1px solid #242427;border-radius:11px;z-index:220;box-shadow:0 16px 50px rgba(0,0,0,.75);padding:5px}
.slash-item{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:8px;cursor:pointer;transition:background .1s}
.slash-item.hi,.slash-item:hover{background:#22232a}
.slash-ic{color:#888;display:flex;flex-shrink:0}
.slash-name{font-size:12.5px;color:#ddd;flex-shrink:0}
.slash-desc{font-size:11.5px;color:#5e5e5e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slash-tag{margin-left:auto;font-size:10.5px;color:#555;flex-shrink:0}
.slash-sec{font-size:10px;color:#4a4a4a;padding:7px 11px 3px;letter-spacing:.06em;text-transform:uppercase}

/* Progress floating card (inside chat) */
.prog-float{position:absolute;top:50px;right:14px;bottom:14px;border:1px solid #1f1f22;border-radius:14px;background:#0f0f10;overflow-y:auto;z-index:6;box-shadow:0 18px 50px rgba(0,0,0,.5);animation:popIn .16s ease}
.prog-sec{padding:13px 14px;border-bottom:1px solid #191919}
.prog-sec:last-child{border-bottom:none}
.prog-title{font-size:11px;color:#555;font-weight:500;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
.task-lbl{font-size:12px;color:#666;line-height:1.45}
.task-lbl.done{color:#888}
.show-more{color:#444;font-size:12px;cursor:pointer;padding:4px 0;transition:color .12s}
.show-more:hover{color:#888}
.out-file{display:flex;align-items:center;gap:6px;padding:3px 0;color:#666;font-size:12px;cursor:pointer;transition:color .12s}
.out-file:hover{color:#aaa}
.sa-row{display:flex;align-items:center;gap:9px;padding:6px 0;cursor:pointer}
.sa-row:hover .sa-name{color:#fff}
.sa-name{font-size:12.5px;color:#cfcfcf;flex-shrink:0;transition:color .12s}
.sa-working{font-size:11px;color:#555}
.sa-stat{margin-left:auto;display:flex;gap:6px;font-family:'Geist Mono',monospace;font-size:11px}
.sa-add{color:#4ade80}.sa-rem{color:#f87171}
.sources-row{display:flex;align-items:center;justify-content:space-between;color:#555;font-size:12.5px;cursor:pointer;padding:3px 0;transition:color .12s}
.sources-row:hover{color:#aaa}

/* Memory cards */
.memory-card{background:#121212;border:1px solid #202020;border-radius:9px;padding:9px 10px;margin:6px 0;cursor:pointer;transition:border-color .12s,background .12s}
.memory-card:hover{background:#171717;border-color:#2b2b2b}
.memory-title{font-size:12.5px;color:#bbb;line-height:1.35}
.memory-meta{font-size:10.5px;color:#e35d2b;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.memory-reason{font-size:11.5px;color:#606060;line-height:1.45;margin-top:4px}
.learn-card{background:#121212;border:1px solid #222;border-radius:9px;padding:9px 10px;margin:6px 0}
.learn-title{font-size:12.5px;color:#bbb;margin-bottom:3px}
.learn-body{font-size:11.5px;color:#606060;line-height:1.45}
.learn-conf{font-size:10.5px;color:#e35d2b;margin-top:6px;text-transform:uppercase;letter-spacing:.05em}

/* Workspace column */
.sub-panel{display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#0d0d0d;flex-shrink:0;position:relative}
.workspace-bar{display:flex;align-items:center;border-bottom:1px solid #191919;padding:5px 6px;min-height:41px;background:#0f0f0f;flex-shrink:0;gap:4px;overflow-x:auto;position:relative}
.workspace-bar::-webkit-scrollbar{height:0}
.workspace-tab{display:flex;align-items:center;gap:6px;border:1px solid transparent;background:transparent;color:#555;border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s,border-color .12s}
.workspace-tab:hover{color:#aaa;background:#181818}
.workspace-tab.active{color:#d8d8d8;background:#151515;border-color:#272727}
.workspace-tab-icon{font-size:11.5px;color:#777;display:flex;align-items:center}
.workspace-tab-x{display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:4px;opacity:.4;transition:opacity .12s,background .12s}
.workspace-tab-x:hover{opacity:1;background:#262626}
.tab-add-btn{display:flex;align-items:center;padding:5px;border-radius:6px;cursor:pointer;color:#3a3a3a;transition:color .12s,background .12s}
.tab-add-btn:hover{color:#888;background:#181818}
.tabs-right{margin-left:auto;display:flex;align-items:center;gap:2px;flex-shrink:0}
.plus-drop{position:absolute;top:42px;left:6px;background:#181818;border:1px solid #232323;border-radius:8px;overflow:hidden;z-index:80;min-width:212px;box-shadow:0 8px 28px rgba(0,0,0,.65);padding:3px}
.plus-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer;color:#999;font-size:12.5px}
.plus-item:hover{background:#222;color:#ddd}
.plus-item-l{display:flex;align-items:center;gap:8px}
.plus-sec{padding:7px 10px 2px;font-size:10px;color:#484848;letter-spacing:.06em;text-transform:uppercase}
.plus-file{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#666;font-size:12px}
.plus-file:hover{background:#222;color:#ddd}
.workspace-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;background:#0d0d0d}

/* Launcher (new tab) */
.launcher{padding:16px}
.launch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.launch-card{background:#0f0f10;border:1px solid #1e1e20;border-radius:12px;padding:24px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.launch-card:hover{background:#151517;border-color:#2a2a2d}
.launch-ic{color:#cfcfcf;margin-bottom:2px}
.launch-title{font-size:13px;color:#e2e2e2}
.launch-sub{font-size:11px;color:#666}
.launch-sec{font-size:10.5px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:18px 2px 6px}
.launch-doc{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:9px;cursor:pointer;transition:background .12s}
.launch-doc:hover{background:#161618}
.launch-doc-ic{width:32px;height:32px;border-radius:7px;background:#15151a;border:1px solid #232326;display:flex;align-items:center;justify-content:center;color:#888;flex-shrink:0}
.launch-doc-name{font-size:12.5px;color:#cfcfcf}
.launch-doc-sub{font-size:11px;color:#555;margin-top:1px}

.drawer-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid #191919;background:#0f0f0f;flex-shrink:0}
.drawer-title{display:flex;align-items:center;gap:8px;color:#ddd;font-size:13.5px}
.drawer-sub{font-size:11.5px;color:#555;margin-top:3px}
.drawer-section-title{font-size:10.5px;color:#555;font-weight:500;margin:13px 14px 4px;letter-spacing:.06em;text-transform:uppercase}
.status-pill{font-size:10px;color:#555;border:1px solid #262626;border-radius:999px;padding:3px 7px;background:#151515;text-transform:capitalize;white-space:nowrap}
.status-pill.running{color:#e35d2b;border-color:rgba(227,93,43,.35);background:rgba(227,93,43,.08)}
.status-pill.complete{color:#4ade80;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08)}
.status-pill.reviewing{color:#a78bfa;border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.08)}
.agent-dock{display:flex;flex-direction:column;padding:10px 12px 6px;gap:6px;border-bottom:1px solid #191919}
.agent-dock-card{display:flex;align-items:center;gap:9px;background:#111;border:1px solid #1f1f1f;border-radius:9px;padding:8px 9px;cursor:pointer;transition:border-color .12s,background .12s}
.agent-dock-card:hover,.agent-dock-card.active{background:#171717;border-color:#2a2a2a}
.agent-name{font-size:12.5px;color:#bbb}
.agent-task{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;max-width:150px}
.agent-status{font-size:10px;color:#555;border:1px solid #262626;border-radius:999px;padding:2px 6px;background:#151515;text-transform:capitalize;white-space:nowrap}
.agent-status.running{color:#e35d2b;border-color:rgba(227,93,43,.35);background:rgba(227,93,43,.08)}
.agent-status.complete{color:#4ade80;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08)}
.agent-status.reviewing{color:#a78bfa;border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.08)}
.agent-status.closed{color:#555}.agent-status.idle{color:#444}
.relationship-tree{margin:8px 12px;background:#101010;border:1px solid #1f1f1f;border-radius:9px;padding:10px 12px;font-family:'Geist Mono',monospace;font-size:11px;color:#555;line-height:1.65}
.tree-root{color:#aaa;margin-bottom:2px}.tree-branch{color:#666}
.compact-msgs{overflow:visible;display:block;padding-top:6px;flex:none}
.terminal-card{margin:14px;background:#090909;border:1px solid #222;border-radius:10px;padding:12px 13px;font-family:'Geist Mono',monospace;font-size:12px;color:#aaa;line-height:1.9}
.terminal-dim{color:#555}.terminal-prompt{color:#e35d2b}
.workspace-empty{margin:14px;background:#101010;border:1px dashed #262626;border-radius:10px;padding:18px;color:#555;font-size:12.5px;text-align:center;line-height:1.5}
.browser-mini{margin:0;display:flex;flex-direction:column;height:100%}
.bm-bar{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid #191919;background:#0f0f0f;color:#777}
.bm-omni{flex:1;background:#161618;border:1px solid #232326;border-radius:14px;padding:5px 11px;color:#888;font-size:11.5px}
.bm-stage{flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:12.5px;text-align:center;padding:20px}
.diff-block{background:#111;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden;margin:8px 0}
.diff-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #1e1e1e}
.diff-title{display:flex;align-items:center;gap:6px;font-size:13px;color:#aaa}
.diff-acts{display:flex;align-items:center;gap:6px}
.diff-btn{padding:3px 9px;border-radius:5px;font-size:11.5px;cursor:pointer;border:1px solid #232323;background:#181818;color:#777}
.diff-btn:hover{background:#222;color:#ccc}
.diff-file-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #161616}
.diff-file-row:last-child{border-bottom:none}
.diff-fname{font-size:12px;font-family:'Geist Mono',monospace;color:#777}
.diff-add{color:#4ade80;font-family:'Geist Mono',monospace;font-size:12px}
.diff-rem{color:#f87171;font-family:'Geist Mono',monospace;font-size:12px}
.test-pass{font-family:'Geist Mono',monospace;font-size:12px;color:#4ade80;background:#0a1f0a;border:1px solid #173317;border-radius:4px;padding:3px 9px;display:inline-block}
.ul{list-style:disc;padding-left:17px}
.ul li{color:#777;font-size:12.5px;line-height:1.75}
.files-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #191919;background:#0f0f0f;color:#777;font-size:12px;font-family:'Geist Mono',monospace;flex-shrink:0}
.files-body{flex:1;display:flex;min-height:0}
.files-left{flex:1;display:flex;align-items:center;justify-content:center;border-right:1px solid #191919;min-width:0;overflow:auto}
.files-empty{display:flex;flex-direction:column;align-items:center;gap:5px;color:#555}
.files-empty-t{font-size:14px;color:#cfcfcf;margin-top:4px}
.files-empty-s{font-size:12px;color:#555}
.files-tree{width:250px;flex-shrink:0;overflow-y:auto;padding:8px}

.files-filter input{flex:1;background:transparent;border:none;outline:none;color:#ccc;font-size:12px;font-family:'Geist',sans-serif}
.files-filter input::placeholder{color:#444}
.ftree-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;cursor:pointer;color:#aaa;font-size:12.5px;transition:background .12s}
.ftree-row:hover{background:#161618;color:#ddd}
.md-badge{font-size:9px;color:#4ade80;border:1px solid #1f4d2c;border-radius:3px;padding:0 3px;font-family:'Geist Mono',monospace;flex-shrink:0}
.files-preview{padding:18px;align-self:flex-start;width:100%}
.files-preview-name{font-size:13px;color:#ddd;font-family:'Geist Mono',monospace;margin-bottom:8px}
.files-preview-body{font-size:12px;color:#666;line-height:1.6;font-family:'Geist Mono',monospace}
.resize-h{width:6px;flex-shrink:0;cursor:col-resize;position:relative;z-index:30;background:transparent}
.resize-h::after{content:"";position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:#191919;transition:background .12s,width .12s}
.resize-h:hover::after,.resize-h.active::after{background:#e35d2b;width:2px}
.ctx-menu{position:absolute;background:#181818;border:1px solid #232323;border-radius:8px;overflow:hidden;z-index:400;min-width:224px;box-shadow:0 4px 28px rgba(0,0,0,.75);padding:3px}
.ctx-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer;color:#888;font-size:12.5px}
.ctx-item:hover{background:#222;color:#ddd}
.ctx-item-l{display:flex;align-items:center;gap:8px}
.ctx-item.dim{color:#3a3a3a;cursor:default}
.ctx-div{height:1px;background:#202020;margin:2px 0}
.palette-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:11vh;backdrop-filter:blur(3px)}
.palette-box{width:min(560px,90%);background:#161618;border:1px solid #2a2a2e;border-radius:13px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.8);max-height:62vh;display:flex;flex-direction:column}
.palette-input-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #232326}
.palette-in{flex:1;background:transparent;border:none;outline:none;color:#ddd;font-size:14.5px;font-family:'Geist',sans-serif}
.palette-in::placeholder{color:#3c3c3c}
.palette-list{overflow-y:auto;padding:5px}
.palette-sec{font-size:10px;color:#4a4a4a;padding:8px 12px 4px;letter-spacing:.07em;text-transform:uppercase}
.palette-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;cursor:pointer}
.palette-item.hi{background:#23232a}
.palette-item-l{display:flex;align-items:center;gap:10px;min-width:0}
.palette-item-title{font-size:13px;color:#cfcfcf;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette-item-sub{font-size:11.5px;color:#555;margin-left:4px}
.palette-empty{padding:22px;text-align:center;color:#444;font-size:12.5px}
.gh-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:6px;background:#181818;border:1px solid #222;cursor:pointer;color:#888;font-size:12px}
.gh-btn:hover{border-color:#333;color:#ccc}
.mode-switch{display:flex;align-items:center;gap:4px;background:#111;border:1px solid #1d1d1d;border-radius:999px;padding:3px}
.mode-switch.compact{margin-right:4px}
.mode-chip{border:none;background:transparent;color:#555;border-radius:999px;padding:4px 9px;font-family:'Geist',sans-serif;font-size:11.5px;cursor:pointer;transition:background .12s,color .12s}
.mode-chip:hover{color:#aaa;background:#181818}
.mode-chip.active{color:#111;background:#d8d8d8}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes tpulse{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .16s ease}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.pop-in{animation:popIn .14s ease}

const VPROTO = {
  uuid(){ try{ return crypto.randomUUID(); }catch(e){ return "id-"+Math.random().toString(36).slice(2); } },
  tag(parent, sub){ return "agent:"+parent+":subagent:"+sub; },
  masterTag(turnId){ return "agent:master:turn:"+turnId; },
  frame(method, params){ return { jsonrpc:"2.0", method, params }; },
  turnStarted(threadId, turnId){ return this.frame("turn/started", {threadId, turnId}); },
  plan(turnId, complex, reason, tasks){ return this.frame("item/plan", {turnId, complex, reason, tasks}); },
  subagentStarted(turnId, routingTag, persona, task){ return this.frame("item/subagent/started", {turnId, routingTag, persona, task}); },
  agentDelta(routingTag, text){ return this.frame("item/agentMessage/delta", {routingTag, text}); },
  reasoningDelta(routingTag, text){ return this.frame("item/reasoning/delta", {routingTag, text}); },
  subagentCompleted(routingTag, status, output){ return this.frame("item/subagent/completed", {routingTag, status, output}); },
  steer(threadId, turnId, text){ return this.frame("turn/steer", {threadId, turnId, text}); },
  turnCompleted(turnId, finalItemId){ return this.frame("turn/completed", {turnId, finalItemId}); },
  /* Tolerant parse of a planner reply. Returns {complex, reason, tasks:[{id,title,role}]}.
     Falls back to {complex:false} on any failure so callers degrade to a single answer. */
  parsePlan(text){
    if(!text) return {complex:false, reason:"", tasks:[]};
    let raw = String(text);
    const fence = raw.match(/```(?:json)?\s*([\s\S]*?)```/i); if(fence) raw = fence[1];
    const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
    if(s<0 || e<=s) return {complex:false, reason:"", tasks:[]};
    let obj; try{ obj = JSON.parse(raw.slice(s, e+1)); }catch(err){ return {complex:false, reason:"", tasks:[]}; }
    if(!obj || obj.complex!==true || !Array.isArray(obj.tasks) || !obj.tasks.length) return {complex:false, reason:(obj&&obj.reason)||"", tasks:[]};
    const roles = {worker:1, reviewer:1, analyst:1};
    const tasks = obj.tasks.slice(0,5).map((t,i)=>({
      id: "t"+(i+1),
      title: String((t&&t.title)||("Task "+(i+1))).slice(0,120),
      role: roles[(t&&t.role)] ? t.role : "worker",
    }));
    return {complex:true, reason:String(obj.reason||"").slice(0,200), tasks};
  },
};

    if(m==="item/subagent/started"){
      const i = p.tasks.findIndex(t=>t.id===a.task.id);
      if(i>=0) p.tasks[i] = {...p.tasks[i], status:"running", routingTag:a.routingTag, persona:a.persona};

    }
    if(m==="item/agentMessage/delta"){

      else setMsgsFor(chatId,m=>m.map(x=>x.id===aid?{...x,text:"⚠ Backend unreachable. Start it (uvicorn agent.api:app) and serve this UI from :5173 so CORS allows it.",thinking:false,streaming:false}:x));
    }
    abortRef.current=null; setRunning(false);
  }

  /* tabs */
  function addSideChat(){
    const n = (++sideCtRef.current);
    const id = "side-" + n;
    const name = n===1 ? "Side chat" : "Side chat " + n;
    setTabs(prev=> [...prev, {id, kind:"side", label:name, icon:"side"}]);
    setActiveTab(id); setShowSub(true); setShowPlus(false);
  }
  function addTab(kind){
    if(kind==="side") return addSideChat();
    const meta = { terminal:{label:"Terminal",icon:"term"}, browser:{label:"Browser",icon:"globe"}, memory:{label:"Memory",icon:"mem"}, files:{label:"Open file",icon:"file"} }[kind] || {label:"Tab",icon:"globe"};
    const id = kind + "-" + (++tabCt.current);
    setTabs(prev=> [...prev, {id, kind, label:meta.label, icon:meta.icon}]);
    setActiveTab(id); setShowSub(true); setShowPlus(false);
  }
  function openSubagent(agent){
    setShowSub(true);
    const exist = tabs.find(t=>t.kind==="agent" && t.agentId===agent.id);
    if(exist){ setActiveTab(exist.id); return; }
    const id = "agent-"+agent.id;
    setTabs(prev=> [...prev, {id, kind:"agent", label:agent.name, icon:"sprite", agentId:agent.id}]);
    setActiveTab(id);
  }
  function closeTab(id, e){
    e && e.stopPropagation();
    setTabs(prev=>{
      const idx = prev.findIndex(t=>t.id===id);
      const next = prev.filter(t=>t.id!==id);
      if(activeTab===id){ if(next.length) setActiveTab(next[Math.max(0, idx-1)].id); else setActiveTab(""); }
      return next;
    });
  }
  function tabIcon(t){
    if(t.icon==="sprite"){ const a = agentById(t.agentId); return a ? <PixelSprite name={a.sprite} color={a.color} px={2}/> : <IcUser size={12}/>; }
    if(t.icon==="term") return <IcTerminal size={12}/>;
    if(t.icon==="globe") return <IcGlobe size={12}/>;
    if(t.icon==="mem") return <span>❖</span>;
    if(t.icon==="side") return <IcChat size={12}/>;
    if(t.icon==="file") return <IcFile size={12}/>;
    return <IcGlobe size={12}/>;
  }

  /* palette */
  const COMMANDS = [
    { id:"new",      title:"New chat",               icon:<IcEdit size={14}/>,    kbd:"",       run:()=> setActiveChat("new") },
    { id:"sidebar",  title:"Toggle sidebar",         icon:<IcSidebar size={14}/>, kbd:"Ctrl B", run:()=> setSbPinned(v=>!v) },
    { id:"mission",  title:"Toggle Progress panel",  icon:<IcLayout size={14}/>,  kbd:"",       run:()=> setShowProg(v=>!v) },
    { id:"work",     title:"Toggle Workspace panel", icon:<IcColumns size={14}/>, kbd:"",       run:()=> setShowSub(v=>!v) },
    { id:"shell",    title:(shell==="browser"?"Switch to Desktop app shell":"Switch to Browser shell"), icon:<IcWindow size={14}/>, kbd:"Ctrl \\", run:()=> onSwitchShell() },
    { id:"max",      title:(maximized?"Restore window":"Maximize window"), icon:<IcExpand size={14}/>, kbd:"", run:()=> onToggleMax() },
    { id:"m-coding", title:"Mode: Coding",           icon:<IcTerminal size={14}/>,kbd:"Ctrl 2", run:()=> setActiveMode("coding") },
    { id:"t-memory", title:"Open Memory trace",      icon:<IcBook size={14}/>,    kbd:"",       run:()=> addTab("memory") },
  ];
  const q = paletteQ.trim().toLowerCase();
  const cmdMatches  = COMMANDS.filter(c=> !q || c.title.toLowerCase().includes(q));
  const chatMatches = allChats.filter(c=> !q || c.title.toLowerCase().includes(q));
  const flat = [...cmdMatches.map(c=>({kind:"cmd", item:c})), ...chatMatches.map(c=>({kind:"chat", item:c}))];
  function runPalette(entry){ if(!entry) return; if(entry.kind==="cmd") entry.item.run(); else setActiveChat(entry.item.id); setShowPalette(false); setPaletteQ(""); }
  function paletteKey(e){
    if(e.key==="ArrowDown"){ e.preventDefault(); setPalIdx(i=> Math.min(flat.length-1, i+1)); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); setPalIdx(i=> Math.max(0, i-1)); }
    else if(e.key==="Enter"){ e.preventDefault(); runPalette(flat[palIdx]); }
  }

  /* slash commands */
  const SLASH_CMDS = [
    { id:"code-review", name:"Code review", desc:"Review unstaged changes or compare against a branch", ic:<IcFork size={14}/> },
    { id:"compact", name:"Compact", desc:"Compact this thread's context (75% full)", ic:<IcColumns size={14}/> },
    { id:"fast", name:"Fast", desc:"1.5x speed, increased usage", ic:<IcSpark size={14}/> },
    { id:"goal", name:"Goal", desc:"Set a goal that Vellum keeps working towards", ic:<IcTarget size={14}/>, run:()=> setPursueGoal(true) },
    { id:"mcp", name:"MCP", desc:"Show MCP server status", ic:<IcPlugin size={14}/> },
    { id:"memories", name:"Memories", desc:"Open the memory trace", ic:<IcBook size={14}/>, run:()=> addTab("memory") },
    { id:"model", name:"Model", desc:selModel, ic:<IcGauge size={14}/> },
    { id:"personality", name:"Personality", desc:"Choose how Vellum responds", ic:<IcUser size={14}/> },
    { id:"plan", name:"Plan mode", desc:"Toggle plan mode", ic:<IcLayout size={14}/>, run:()=> setPlanMode(v=>!v) },
    { id:"reasoning", name:"Reasoning", desc:selReasoning, ic:<IcGauge size={14}/> },
    { id:"side", name:"Side", desc:"Start a side conversation in an ephemeral fork", ic:<IcChat size={14}/>, run:()=> addTab("side") },
    { id:"status", name:"Status", desc:"Show chat id, context usage, and rate limits", ic:<IcGauge size={14}/> },
  ];
  const SLASH_SKILLS = [
    { id:"brainstorming", name:"Brainstorming", desc:"Explore intent, requirements, and design before implementation" },
    { id:"browser-skill", name:"Browser", desc:"Let Vellum open and control the in-app browser" },
    { id:"ci-debug", name:"CI Debug", desc:"Debug failing GitHub Actions checks" },
    { id:"computer-use", name:"Computer Use", desc:"Control Windows apps from Vellum" },
    { id:"dispatch", name:"Dispatching Parallel Agents", desc:"Split independent work across parallel agents" },
    { id:"exec-plans", name:"Executing Plans", desc:"Execute written implementation plans with review checkpoints" },
    { id:"finish-branch", name:"Finishing a Development Branch", desc:"Wrap up implementation and choose integration path" },
  ];
  function slashFiltered(text){
    const s = (text||"").trimStart().slice(1).toLowerCase();
    const cmds = SLASH_CMDS.filter(c=> !s || c.name.toLowerCase().includes(s)).map(c=>({...c, group:"cmd"}));
    const sk = SLASH_SKILLS.filter(c=> !s || c.name.toLowerCase().includes(s)).map(c=>({...c, group:"skill"}));
    return [...cmds, ...sk];
  }
  function runSlash(item){ if(item && item.run) item.run(); }
  const composerApi = {
    accessLabel, accessMode, setAccessMode, selModel, setSelModel, selReasoning, setSelReasoning,
    planMode, setPlanMode, pursueGoal, setPursueGoal, includeIde, setIncludeIde, pluginsOn, setPluginsOn,
    slashList: slashFiltered, runSlash, openModels: ()=> setShowModels(true),
    models, modelLabel, syncModels, syncing, memoryOn, setMemoryOn,
  };

  function openCtx(e){ e.preventDefault(); e.stopPropagation(); const r = rootRef.current.getBoundingClientRect(); setCtxMenu({ x: Math.min(e.clientX-r.left, r.width-236), y: Math.min(e.clientY-r.top, r.height-300) }); }
  const visibleTasks = tasksExpanded ? TASKS : TASKS.slice(0,6);

  function renderMsg(msg){
    if(msg.type==="user") return <div key={msg.id} className="user-msg">{msg.atts && msg.atts.length>0 && <div className="att-row" style={{marginBottom:msg.text?6:0}}>{msg.atts.map((at,i)=>(<div key={i} className="att-chip">{at.image && at.url ? <img src={at.url} alt=""/> : <IcFile size={13}/>}<span className="att-name">{at.name}</span></div>))}</div>}{msg.text}</div>;
    if(msg.type==="assistant"){
      if(msg.thinking) return <div key={msg.id} className="working-line"><span className="glow-text">Vellum is working</span><span className="tdot"/><span className="tdot"/><span className="tdot"/></div>;
      return <div key={msg.id} className="msg-wrap">{msg.streaming ? <div><span className="streaming-text">{msg.text}</span><span className="caret"/></div> : <div className="msg-text">{msg.text}</div>}{!msg.streaming && msg.sources && msg.sources.length>0 && <div className="att-row" style={{marginTop:8}}>{msg.sources.slice(0,5).map((s,i)=>(<a key={i} className="att-chip" href={s.url} target="_blank" rel="noreferrer" style={{textDecoration:"none",color:"#9bbcd6"}}><IcGlobe size={12}/><span className="att-name">{s.domain||s.title||"source"}</span></a>))}</div>}</div>;
    }
    if(msg.type==="system") return <div key={msg.id} className="sys-line">{msg.icon==="cmd" ? <Fragment><span style={{fontSize:12,color:"#3a3a3a"}}>⬡</span><span className="sys-cmd">{msg.label}</span></Fragment> : <Fragment><div className="sys-dot"/><span>{msg.label}</span></Fragment>}</div>;
    if(msg.type==="learning") return <div key={msg.id} className="learning-inline"><div className="learning-inline-kicker">Learning event</div><div className="learning-inline-title">{msg.title}</div><div className="learning-inline-body">{msg.body}</div></div>;
    if(msg.type==="spawn"){ const a = agentById(msg.agentId); return (
      <div key={msg.id} className="spawn-block">
        <div className="spawn-hdr"><span>{msg.header}</span><IcChevD size={12}/></div>
        <div className="spawn-created">Assigned {a && <PixelSprite name={a.sprite} color={a.color} px={2}/>}<span className="spawn-agent">{a?a.name:msg.agentId}</span>{msg.agentRole && <span style={{color:"#484848"}}>({msg.agentRole})</span>}<span style={{color:"#484848"}}>with a narrow brief:</span></div>
        <div className="spawn-instr">{msg.instruction}</div>
      </div>
    );}
    if(msg.type==="closed") return <div key={msg.id}><div className="close-hdr"><div className="sys-dot"/><span>Closed {msg.count} agent sessions</span><IcChevD size={12}/></div>{msg.agents.map((a,i)=>(<div key={i} className="close-item"><span style={{color:"#484848"}}>Closed</span><span>{a}</span></div>))}</div>;
    return <div key={msg.id} className="msg-wrap"><MsgText msg={msg}/></div>;
  }

  const chatTitle = chatTitleFor(activeChat);

  function togglePin(chat){
    setPinned(prev=> prev.some(p=>p.id===chat.id) ? prev.filter(p=>p.id!==chat.id) : [{id:chat.id, title:chat.title, age:chat.age}, ...prev]);
  }
  function archiveChat(id){
    setArchived(prev=> prev.includes(id) ? prev : [...prev, id]);

    setArchiveConfirm(null);
    if(activeChat===id) setActiveChat("new");
  }

    const id = chat.id;
    return (
      <div key={id} className={"chat-row"+(id===activeChat?" active":"")} onClick={()=>{setActiveChat(id);setSbHover(false);}} onContextMenu={openCtx}>
        <span className="chat-row-title">{chat.title}</span>
        {archiveConfirm===id ? (
          <button className="confirm-btn" onClick={(e)=>{e.stopPropagation(); archiveChat(id);}}>Confirm</button>
        ) : (
          <Fragment>
            <div className="chat-row-actions">
              <button className="cr-act" title={pinned.some(p=>p.id===id)?"Unpin":"Pin"} onClick={(e)=>{e.stopPropagation(); togglePin(chat);}}><IcPin size={13}/></button>

          </Fragment>
        )}
      </div>
    );

        <div className="sb-opt-item" onMouseEnter={()=>setSbSub("organize")} onMouseLeave={()=>setSbSub(null)}>
          <div className="sb-opt-l"><IcFolder size={14}/><span>Organize sidebar</span></div><IcChevR size={13}/>
          {sbSub==="organize" && (
            <div className="sb-submenu">
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("project"); setSbMenu(null);}}><div className="sb-opt-l"><IcFolder size={13}/><span>By project</span></div>{organizeBy==="project" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("recent"); setSbMenu(null);}}><div className="sb-opt-l"><IcFolder size={13}/><span>Recent projects</span></div>{organizeBy==="recent" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setOrganizeBy("chrono"); setSbMenu(null);}}><div className="sb-opt-l"><IcAuto size={13}/><span>Chronological list</span></div>{organizeBy==="chrono" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>setSbMenu(null)}><div className="sb-opt-l"><span style={{fontSize:13,width:13,display:"flex",justifyContent:"center"}}>↑</span><span>Move up</span></div></div>
            </div>
          )}
        </div>
        <div className="sb-opt-item" onMouseEnter={()=>setSbSub("sort")} onMouseLeave={()=>setSbSub(null)}>
          <div className="sb-opt-l"><IcRefresh size={14}/><span>Sort by</span></div><IcChevR size={13}/>
          {sbSub==="sort" && (
            <div className="sb-submenu">
              <div className="sb-opt-item" onClick={()=>{setSortBy("created"); setSbMenu(null);}}><div className="sb-opt-l"><IcFile size={13}/><span>Created</span></div>{sortBy==="created" && <span className="drop-check">✓</span>}</div>
              <div className="sb-opt-item" onClick={()=>{setSortBy("updated"); setSbMenu(null);}}><div className="sb-opt-l"><IcEdit size={13}/><span>Updated</span></div>{sortBy==="updated" && <span className="drop-check">✓</span>}</div>

                  <button className="sb-hd-btn" title="Add project" onClick={(e)=>{e.stopPropagation(); setProjAddMenu(v=>!v);}}><IcFolderPlus size={14}/></button>

                          <div className="pp-submenu">
                            <div className="pp-item" onClick={startFromScratch}><div className="pp-l"><IcPlus size={13}/><span>Start from scratch</span></div></div>

                  <span className="tb-title">{chatTitle}</span>
                  <div className="tb-more" onClick={openCtx}><IcMoreDots size={15}/></div>
                </div>
                <div className="tb-right">
                  <div className="mode-switch compact">{MODES.map(m=>(<button key={m.id} className={"mode-chip"+(activeMode===m.id?" active":"")} onClick={()=>setActiveMode(m.id)}>{m.label}</button>))}</div>

                  <button className={"icon-btn"+(showSub?" on":"")} title="Toggle Workspace" onClick={()=>setShowSub(v=>!v)}><IcColumns size={15}/></button>

              </div>

              <div className="msgs" ref={msgsRef} style={showProg?{paddingRight:312}:null}>
                {messages.map(renderMsg)}

              {/* Progress floating card */}
              {showProg && (
                <div className="prog-float" style={{width:290}}>
                  <div className="prog-sec">
                    <div className="prog-title">Progress</div>
                    {visibleTasks.map(t=>(<div key={t.id} className="task-row">{t.done ? <IcCheckCircle size={15}/> : t.running ? <IcCircleRun size={15}/> : <IcCircle size={15}/>}<span className={"task-lbl"+(t.done?" done":"")}>{t.label}</span></div>))}
                    {!tasksExpanded && TASKS.length>6 && <div className="show-more" onClick={()=>setTasksExpanded(true)}>Show {TASKS.length-6} more</div>}

                    <div className="prog-title">Outputs</div>

                  {tabs.some(t=>t.kind==="side") && (
                    <div className="prog-sec">
                      <div className="prog-title">Side chats</div>
                      {tabs.filter(t=>t.kind==="side").map(t=>(
                        <div key={t.id} className="sa-row" onClick={()=>{setActiveTab(t.id); setShowSub(true);}}>
                          <IcCircle size={14}/><span className="sa-name">{t.label}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="prog-sec">
                    <div className="prog-title">Subagents</div>
                    {SUBAGENTS.map(a=>(
                      <div key={a.id} className="sa-row" onClick={()=>openSubagent(a)}>
                        <PixelSprite name={a.sprite} color={a.color} px={2}/>
                        <span className="sa-name">{a.name}</span>
                        {a.status==="running" && <span className="sa-working">is working</span>}
                        {a.status==="running" && <span className="sa-stat"><span className="sa-add">+{a.add}</span><span className="sa-rem">-{a.rem}</span></span>}
                      </div>
                    ))}
                  </div>
                  <div className="prog-sec"><div className="sources-row"><span>Sources</span><IcChevR size={13}/></div></div>
                </div>
              )}
          </Fragment>
        )}
        </div>

        {/* Workspace column */}
        {showSub && <div className={"resize-h"+(resizing?" active":"")} onMouseDown={(e)=>{e.preventDefault();setResizing(true);const sx=e.clientX,sw=wsWidth;const mv=(ev)=>setWsWidth(clamp(sw-(ev.clientX-sx),340,760));const up=()=>{setResizing(false);window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);document.body.style.cursor="";};window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);document.body.style.cursor="col-resize";}}/>}
            {showSub && (
              <div className="sub-panel" style={{width:wsWidth, borderLeft:"1px solid #191919"}}>
                <div className="workspace-bar">
                  {tabs.map(t=>(
                    <button key={t.id} className={"workspace-tab"+(activeTab===t.id?" active":"")} onClick={()=>setActiveTab(t.id)}>
                      <span className="workspace-tab-icon">{tabIcon(t)}</span><span>{t.label}</span>
                      <span className="workspace-tab-x" onClick={(e)=>closeTab(t.id,e)}><IcX size={11}/></span>

                    {chatInProject && OUTPUTS.map((o,i)=>(<div key={i} className="plus-file" onClick={()=>addTab("browser")}><IcFile size={12}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o}</span></div>))}

                {!activeTabObj && (()=>{ const ks = launcherKinds(); const cols = ks.length===4 ? 2 : ks.length; return (

                    <div className="launch-grid" style={{gridTemplateColumns:"repeat("+cols+",minmax(0,1fr))"}}>
                      {ks.map(k=>(<div key={k} className="launch-card" onClick={()=>addTab(k)}><span className="launch-ic">{KIND_META[k].big}</span><div className="launch-title">{KIND_META[k].label}</div><div className="launch-sub">{KIND_META[k].sub}</div>{KIND_META[k].kbd && <span className="kbd" style={{marginTop:4}}>{KIND_META[k].kbd}</span>}</div>))}
                    </div>
                    {chatInProject && <div className="launch-sec">Suggested</div>}
                    {chatInProject && OUTPUTS.map((o,i)=>(<div key={i} className="launch-doc" onClick={()=>addTab("browser")}><span className="launch-doc-ic"><IcFile size={15}/></span><div><div className="launch-doc-name">{o}</div><div className="launch-doc-sub">Document</div></div></div>))}

                {activeTabObj && activeTabObj.kind==="agent" && (()=>{ const a = agentById(activeTabObj.agentId) || SUBAGENTS[0]; return (

                    <div className="relationship-tree">

                          <div key={msg.id} className="msg-wrap">
                            <div className="test-pass">{msg.testLine}</div>
                            <div style={{marginTop:10}}>
                              <div style={{fontSize:13,color:"#aaa",marginBottom:6}}>{msg.commitSection.title}</div>

                                <div className="diff-hdr"><div className="diff-title"><span style={{fontSize:14,opacity:.7}}>⌘</span><span>Edited 2 files</span></div><div className="diff-acts"><button className="diff-btn">Undo ↺</button><button className="diff-btn">Review</button></div></div>
                                {msg.files.map((f,i)=>(<div key={i} className="diff-file-row"><span className="diff-fname">{f.name}</span><span><span className="diff-add">+{f.added}</span> <span className="diff-rem">-{f.removed}</span></span></div>))}
                              </div>
                            </div>
                          </div>
                        );
                        return null;
                      })}
                    </div>
                    <InputBox running={false} model="5.5" api={composerApi} onSend={(t,att)=>sendToChat(activeTabObj.id,t,att)} placeholder={"Message "+a.name+"…"}/>
                  </div>
                ); })()}

                {activeTabObj && activeTabObj.kind==="terminal" && (
                  <div className="workspace-body">
                    <div className="drawer-hdr"><div><div className="drawer-title"><IcTerminal size={15}/> Terminal</div><div className="drawer-sub">Command execution stays visible and reviewable.</div></div><span className="status-pill running">ready</span></div>

                {activeTabObj && activeTabObj.kind==="browser" && (
                  <div className="workspace-body"><div className="browser-mini"><div className="bm-bar"><IcChevL size={15}/><IcChevR size={15}/><IcRefresh size={13}/><div className="bm-omni">docs.vellum.ai/computer-use</div></div><div className="bm-stage">Browser view appears here for research, docs, app testing, and computer-use sessions.</div></div></div>
                )}
                {activeTabObj && activeTabObj.kind==="files" && (
                  <div className="workspace-body">
                    <div className="files-bar"><span>/</span><button className="icon-btn" style={{marginLeft:"auto"}} title="Workspace root"><IcFolder size={14}/></button></div>

                      <div className="files-left">
                        {selFile
                          ? <div className="files-preview"><div className="files-preview-name">{selFile}</div><div className="files-preview-body"># {selFile.replace(/\.md$/,"")}<br/><br/>Preview of the selected file would render here.</div></div>
                          : <div className="files-empty"><IcFolder size={30}/><div className="files-empty-t">Open file</div><div className="files-empty-s">Select a file from the workspace tree</div></div>}
                      </div>
                      <div className="files-tree">
                        <div className="files-filter"><IcSearch size={13}/><input placeholder="Filter files…"/></div>
                        {FILE_TREE.map((f,i)=> f.dir
                          ? <div key={i} className="ftree-row"><IcChevR size={13}/><IcFolder size={13}/><span>{f.name}</span></div>
                          : <div key={i} className="ftree-row" style={{paddingLeft:9}} onClick={()=>setSelFile(f.name)}><span className="md-badge">M↓</span><span>{f.name}</span></div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
                {activeTabObj && activeTabObj.kind==="memory" && (
                  <div className="workspace-body">
                    <div className="drawer-hdr">
                      <div><div className="drawer-title">❖ Memory Trace</div><div className="drawer-sub">{backendStatus==="connected" ? "Live from FTS5 + Honcho · Qdrant off" : "What Vellum remembered, used, and learned."}</div></div>
                      <span className={"status-pill "+(backendStatus==="connected"?"complete":"running")} onClick={loadMemory} style={{cursor:"pointer"}}>{backendStatus==="connected"?"live ↻":"demo"}</span>
                    </div>
                    {(backendStatus==="connected" && memoryEntries.length>0) ? (
                      <Fragment>
                        <div className="drawer-section-title">Recent memory · {memoryEntries.length}</div>
                        {memoryEntries.slice(0,30).map((e,i)=>(<div key={i} className="memory-card"><div className="memory-reason" style={{marginTop:0,color:"#9a9a9a",lineHeight:1.55}}>{((e.content||e.text||"")+"").slice(0,280)}</div></div>))}
                      </Fragment>
                    ) : (
                      <Fragment>
                        <div className="drawer-section-title">Used in this task</div>{MEMORY_USED.map((m,i)=>(<div key={i} className="memory-card"><div className="memory-title">{m.title}</div><div className="memory-meta">{m.meta}</div><div className="memory-reason">Why: {m.reason}</div></div>))}
                        <div className="drawer-section-title">Learning events</div>{LEARNING_EVENTS.map((e,i)=>(<div key={i} className="learn-card"><div className="learn-title">{e.title}</div><div className="learn-body">{e.body}</div><div className="learn-conf">Confidence · {e.confidence}</div></div>))}
                        {backendStatus!=="connected" && <div className="cm-note" style={{margin:"12px 14px"}}>Turn on the backend in Settings → Models & Compute to see your real stored memories here.</div>}
                      </Fragment>
                    )}
                  </div>
                )}
                {activeTabObj && activeTabObj.kind==="side" && (()=>{ const sid = activeTabObj.id; const smsgs = chatMsgs[sid] || []; return (
                  <div className="workspace-body">
                    <div className="drawer-hdr"><div><div className="drawer-title"><IcChat size={15}/> {activeTabObj.label}</div><div className="drawer-sub">A focused side conversation, separate from the main task.</div></div></div>
                    {smsgs.length===0
                      ? <div className="msgs" style={{flex:1,alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"#444"}}><div style={{fontSize:14,color:"#777",marginBottom:4}}>New side chat</div><div style={{fontSize:12}}>Ask anything — it won't disturb the main thread.</div></div></div>
                      : <div className="msgs">{smsgs.map(renderMsg)}</div>}
                    <InputBox running={running} model="5.5" api={composerApi} onSend={(t,a)=>sendToChat(sid,t,a)} onStop={stopStream} placeholder={"Message "+activeTabObj.label+"…"}/>
                  </div>
                ); })()}
              </div>
            )}
      </div>

      {/* Name project modal */}
      {nameModal && (
        <div className="modal-overlay" onClick={()=>setNameModal(null)}>
          <div className="modal-box pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="modal-hd"><div className="modal-title">{nameModal.mode==="rename"?"Rename project":"Name project"}</div><span className="modal-x" onClick={()=>setNameModal(null)}><IcX size={15}/></span></div>

            <input className="modal-input" value={nameModal.name}
              ref={(el)=>{ if(el && !el._sel){ el._sel=true; el.focus(); el.select(); } }}

            <div className="modal-actions"><button className="modal-btn" onClick={()=>setNameModal(null)}>Cancel</button><button className="modal-btn primary" onClick={saveNameModal}>Save</button></div>
          </div>
        </div>
      )}

      {/* Models & Compute modal */}
      {showModels && (()=>{ const rec = hw ? recommendModel(hw) : null; return (
        <div className="modal-overlay" onClick={()=>setShowModels(false)}>
          <div className="modal-box compute-modal pop-in" onClick={(e)=>e.stopPropagation()}>
            <div className="modal-hd"><div className="modal-title">Models & Compute</div><span className="modal-x" onClick={()=>setShowModels(false)}><IcX size={15}/></span></div>
            <div className="modal-sub">Vellum decides where your models run. Scan your machine, then download a local model if it fits — or bring your own key for a cloud provider.</div>

            <div className="cm-sec">
              <div className="cm-sec-hd"><span>Your hardware</span><button className="cm-scan" onClick={scanHardware}>{scanning?"Scanning…":(hw?"Re-scan":"Scan this computer")}</button></div>
              {hw ? (
                <Fragment>
                  <div className="cm-specs">
                    <div className="cm-chip"><b>CPU</b><span>{hw.cores?hw.cores+" cores":"—"}</span></div>
                    <div className="cm-chip"><b>Memory</b><span>{hw.ram?("≥ "+hw.ram+" GB"):"—"}</span></div>
                    <div className="cm-chip"><b>GPU</b><span>{hw.gpu||"none detected"}</span></div>
                    <div className="cm-chip"><b>Free disk</b><span>{hw.storage?("~"+hw.storage+" GB"):"—"}</span></div>
                    <div className="cm-chip"><b>OS</b><span>{hw.platform}</span></div>
                  </div>
                  <div className="cm-note">Browser scan is approximate — memory caps at 8 GB and VRAM isn't exposed. The desktop app reports exact specs.</div>
                </Fragment>
              ) : <div className="cm-hint">Detects cores, memory, GPU and free disk to tell you whether a local model is realistic — or whether you're better off on a cloud key.</div>}
            </div>

            {rec && (
              <div className="cm-sec">
                <div className="cm-sec-hd"><span>Recommendation</span></div>

                  <div className="cm-reco-b">{rec.note}</div>

              </div>

              <div className="cm-sec-hd"><span>Connect a provider — bring your own key</span></div>
