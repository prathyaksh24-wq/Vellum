# Vector search runs embedded via ChromaDB (agent/rag/store.py) — no container.
# Only Honcho's user-model store needs services.
services:
  honcho:
    image: ghcr.io/plastic-labs/honcho:latest
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - DATABASE_URL=postgresql://honcho:honcho@honcho-db:5432/honcho
    depends_on:
      - honcho-db
  honcho-db:
    image: postgres:16
    environment:
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: honcho
      POSTGRES_DB: honcho
    volumes:
      - honcho_data:/var/lib/postgresql/data

volumes:
  honcho_data:
